<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Smart Board</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --banner-height: 110px;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: auto; /* تم التعديل للسماح بالتمرير على الموبايل */
            -webkit-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
        }

        .top-banner {
            height: var(--banner-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; 
            background: linear-gradient(180deg, #111 0%, #000 100%);
            border-bottom: 4px solid var(--primary-gold);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .logo-img { height: 65px; }
        .mr-ezz-img { height: 85px; border-radius: 12px; border: 2px solid var(--primary-gold); }

        .session-info { text-align: center; flex-grow: 1; }
        .session-info h1 { 
            font-size: 2.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
            margin: 0;
        }
        .session-info span { color: var(--primary-gold); font-weight: 800; }

        .content-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; 
            padding: 30px; 
            overflow-y: auto;
            height: calc(100vh - var(--banner-height));
            align-content: start;
        }

        .content-card {
            background: var(--card-bg); 
            border: 2px solid rgba(197,160,89,0.15);
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            transition: 0.3s; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }

        .content-card:hover { 
            border-color: var(--primary-gold); 
            background: rgba(197,160,89,0.1);
            transform: translateY(-5px);
        }

        /* إصلاح الموبايل */
        @media (max-width: 768px) {
            :root { --banner-height: 70px; }
            .top-banner { padding: 0 10px; }
            .logo-img { height: 35px; }
            .mr-ezz-img { display: none; } /* إخفاء الصورة في الموبايل لتوفير مساحة */
            .session-info h1 { font-size: 1rem; }
            .content-grid { 
                grid-template-columns: 1fr 1fr; /* عرض عنصرين بجانب بعض */
                padding: 15px; 
                gap: 10px;
            }
            .content-card { min-height: 80px; padding: 10px; }
            .content-card h2 { font-size: 0.9rem; }
            .back-btn { padding: 8px 12px !important; font-size: 0.8rem; }
        }

        #activity-stage { 
            position: fixed; 
            inset: 0; 
            background:#000; 
            z-index: 8000; 
            display: none; 
        }

        .exit-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 9999;
            padding: 10px 20px;
            background: #d63031;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        #stage-content { width: 100%; height: 100%; }

        .toolbox-wrapper { position: fixed; bottom: 20px; right: 20px; z-index: 12000; display: flex; flex-direction: column-reverse; gap: 10px; }
        .tool-btn { width: 50px; height: 50px; border-radius: 50%; background: #1a1a1a; border: 2px solid var(--primary-gold); color: var(--primary-gold); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; opacity: 0; transform: scale(0); pointer-events: none; }
        .tool-btn.main-toggle { opacity: 1; transform: scale(1); pointer-events: auto; background: var(--primary-gold); color: #000; }
        .toolbox-wrapper.open .tool-btn { opacity: 1; transform: scale(1); pointer-events: auto; }

        #drawing-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 8500; }
    </style>
</head>
<body>

    <header class="top-banner">
        <button class="back-btn" onclick="window.location.href='vetoof.html'" style="background:var(--primary-gold); border:none; color:#000; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">← BACK</button>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        <div class="session-info">
            <h1 id="display-title">VETO <span>BOARD</span></h1>
        </div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage">
        <button class="exit-btn" onclick="closeStage()">CLOSE ✖</button>
        <div id="stage-content"></div>
    </div>

    <canvas id="drawing-canvas"></canvas>

    <div class="toolbox-wrapper" id="toolBox">
        <button class="tool-btn main-toggle" onclick="toggleToolBox()">🛠️</button>
        <button class="tool-btn" onclick="location.reload()">🔄</button>
    </div>

    <script src="data/levels.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentSessionId = urlParams.get('session');
        let currentScriptElement = null; // مخزن للسكربت النشط حالياً

        function updateDynamicTitle() {
            if (currentSessionId) {
                const parts = currentSessionId.split('-');
                if (parts.length === 2) {
                    document.getElementById('display-title').innerHTML = `LEVEL <span>${parts[0]}</span> | SESSION <span>${parts[1]}</span>`;
                }
            }
        }

        function initSession() {
            updateDynamicTitle();
            if (!currentSessionId || !window.sessionData || !window.sessionData[currentSessionId]) return;
            
            const container = document.getElementById('content-container');
            window.sessionData[currentSessionId].forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.onclick = () => openActivity(item);
                card.innerHTML = `<h2>${item}</h2>`;
                container.appendChild(card);
            });
            
            const canvas = document.getElementById('drawing-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function openActivity(activityName) {
            if (!currentSessionId) return;
            const [lvl, sess] = currentSessionId.split('-');
            let filePath = "";
            const nameUpper = activityName.toUpperCase();

            // Mapping Logic (نفس المنطق الخاص بك)
            if (nameUpper.includes("TONGUE")) filePath = `data/L-${lvl}-S-${sess}-Ton.js`;
            else if (nameUpper.includes("ONE SHOT")) filePath = `data/L-${lvl}-S-${sess}-One.js`;
            else if (nameUpper.includes("GRAMMAR")) filePath = `data/L-${lvl}-S-${sess}-Gra.js`;
            else if (nameUpper.includes("GP")) filePath = `data/L-${lvl}-${sess}-GP.js`;
            else if (nameUpper.includes("PROJECT")) filePath = `data/L-${lvl}-S-${sess}-Pro.js`;
            else if (nameUpper.includes("WISH")) filePath = `data/L-${lvl}-S-${sess}-Wis.js`;
            else if (nameUpper.includes("SQUEEZER")) filePath = `data/L-${lvl}-S-${sess}-${nameUpper.includes("TEST") ? "Squt" : "Squr"}.js`;
            else if (nameUpper.includes("DMT")) filePath = nameUpper.includes("TEST") ? `data/Timer.js` : `data/L-${lvl}-S-${sess}-DMT.js`;
            else if (nameUpper.includes("LISTENING")) filePath = nameUpper.includes("INTRO") ? `data/L-${lvl}-S-${sess}-Lin.js` : `data/L-${lvl}-S-${sess}-Lis.js`;
            else if (nameUpper.includes("VOCAB")) filePath = `data/L-${nameUpper.includes("TEST") ? "2" : "1"}-${lvl}-S-${sess}-Voc.js`;
            else if (nameUpper.includes("READING")) filePath = `data/L-${lvl}-S-${sess}-Rea.js`;
            else filePath = `data/L-1-${lvl}-S-${sess}-${activityName.split(' ')[0].substring(0, 3)}.js`;

            // تنظيف أي نشاط سابق قبل فتح الجديد
            closeStage();

            document.getElementById('activity-stage').style.display = 'block';
            
            // إنشاء سكربت جديد وتخزينه لحذفه لاحقاً
            currentScriptElement = document.createElement('script');
            currentScriptElement.src = filePath;
            currentScriptElement.id = "active-activity-script";
            currentScriptElement.onerror = () => { 
                alert("Error loading file: " + filePath); 
                closeStage(); 
            };
            document.body.appendChild(currentScriptElement);
        }

        function closeStage() {
            // 1. إخفاء المسرح
            document.getElementById('activity-stage').style.display = 'none';
            
            // 2. مسح محتوى المسرح تماماً لإيقاف أي Elements أو أصوات
            document.getElementById('stage-content').innerHTML = "";
            
            // 3. حذف ملف السكربت من الـ DOM لمنع التداخل
            if (currentScriptElement) {
                currentScriptElement.remove();
                currentScriptElement = null;
            }
            
            // 4. حذف السكربت بالـ ID كإجراء إضافي
            const oldScript = document.getElementById("active-activity-script");
            if (oldScript) oldScript.remove();
        }

        function toggleToolBox() { document.getElementById('toolBox').classList.toggle('open'); }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeStage();
        });

        window.onload = initSession;
    </script>
</body>
</html>
