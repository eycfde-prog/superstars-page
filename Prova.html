<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة Verb to Be</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #fab1a0;
            --bg-color: #f0f3f7;
            --text-color: #2d3436;
            --correct-color: #00b894;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        #game-container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border: 5px solid var(--secondary-color);
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        #question-box {
            background: #fff9f0;
            padding: 40px 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sentence {
            font-size: 2rem;
            font-weight: bold;
            color: #d63031; /* لون الخطأ */
            margin: 0;
            direction: ltr; /* لجعل الجملة الإنجليزية تظهر بشكل صحيح */
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 15px 25px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            font-weight: bold;
        }

        #answer-btn {
            background-color: var(--primary-color);
            color: white;
        }

        #next-btn {
            background-color: var(--correct-color);
            color: white;
            display: none;
        }

        button:active {
            transform: scale(0.95);
        }

        .progress {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #636e72;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>ابحث عن الخطأ وصححه! 🌟</h1>
    
    <div id="question-box">
        <p id="sentence"></p>
    </div>

    <div class="btn-container">
        <button id="answer-btn" onclick="showAnswer()">إظهار الإجابة الصحيحة ✅</button>
        <button id="next-btn" onclick="nextQuestion()">السؤال التالي ➡️</button>
    </div>

    <div class="progress">السؤال <span id="current">1</span> من 10</div>
</div>

<script>
    const questions = [
        { wrong: "I is a student", right: "I am a student" },
        { wrong: "He are my friend", right: "He is my friend" },
        { wrong: "They am happy", right: "They are happy" },
        { wrong: "It are a big cat", right: "It is a big cat" },
        { wrong: "We is playing", right: "We are playing" },
        { wrong: "She am beautiful", right: "She is beautiful" },
        { wrong: "You is a hero", right: "You are a hero" },
        { wrong: "The birds is flying", right: "The birds are flying" },
        { wrong: "My mom are kind", right: "My mom is kind" },
        { wrong: "I are hungry", right: "I am hungry" }
    ];

    let currentIndex = 0;

    const sentenceEl = document.getElementById('sentence');
    const answerBtn = document.getElementById('answer-btn');
    const nextBtn = document.getElementById('next-btn');
    const currentEl = document.getElementById('current');

    function loadQuestion() {
        sentenceEl.textContent = questions[currentIndex].wrong;
        sentenceEl.style.color = "#d63031"; // لون أحمر للخطأ
        answerBtn.style.display = "block";
        nextBtn.style.display = "none";
        currentEl.textContent = currentIndex + 1;
    }

    function showAnswer() {
        sentenceEl.textContent = questions[currentIndex].right;
        sentenceEl.style.color = "#00b894"; // لون أخضر للإجابة الصحيحة
        answerBtn.style.display = "none";
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < questions.length) {
            loadQuestion();
        } else {
            alert("أحسنت يا بطل! أنهيت الـ 10 أسئلة بنجاح 🎉");
            currentIndex = 0;
            loadQuestion();
        }
    }

    // تشغيل أول سؤال عند الفتح
    loadQuestion();
</script>

</body>
</html>
