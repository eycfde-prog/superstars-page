<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYC Veto Program - WOLF Edition</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --text-color: #ecf0f1;
            --vortex-speed: 5s;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: var(--text-color); overflow-x: hidden; }

        /* Banner */
        .banner { display: flex; align-items: center; justify-content: space-between; padding: 10px 50px; background: linear-gradient(90deg, #000, #2c3e50, #000); border-bottom: 3px solid var(--accent-color); }
        .banner img { height: 80px; border-radius: 50%; border: 2px solid var(--text-color); }
        .banner h1 { text-align: center; font-size: 1.8em; }

        .controls { display: flex; justify-content: center; padding: 10px; background: #000; }
        .switch-btn { padding: 10px 25px; font-weight: bold; background: var(--accent-color); color: white; border: 2px solid white; border-radius: 25px; cursor: pointer; transition: 0.3s; margin: 0 5px; }
        .switch-btn:hover { background: #c0392b; box-shadow: 0 0 15px var(--accent-color); }

        /* Grid System */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; padding: 40px; justify-items: center; }
        .level-wrapper { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
        .main-circle { width: 80px; height: 80px; background: var(--accent-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; z-index: 10; transition: 0.3s; box-shadow: 0 0 15px rgba(231,76,60,0.4); }
        
        .sub-circle { position: absolute; width: 35px; height: 35px; background: #3498db; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 5; font-size: 0.8em; }
        @keyframes orbit { from { transform: rotate(0deg) translateX(75px) rotate(0deg); } to { transform: rotate(360deg) translateX(75px) rotate(-360deg); } }
        .active .sub-circle { display: flex; animation: orbit 6s linear infinite; }
        .active .s1 { animation-delay: 0s; } .active .s2 { animation-delay: -1.5s; } .active .s3 { animation-delay: -3s; } .active .s4 { animation-delay: -4.5s; }

        /* Full Screen iFrame & Session Overlay */
        #session-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a1a;
            z-index: 2000;
            flex-direction: column;
        }
        .session-nav {
            padding: 15px;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
        }
        #content-frame {
            width: 100%;
            flex-grow: 1;
            border: none;
            background: white;
        }
        .activity-menu {
            display: flex;
            gap: 15px;
            padding: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .activity-card {
            width: 150px; height: 100px;
            background: var(--primary-color);
            border: 2px solid var(--accent-color);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .activity-card:hover { transform: translateY(-5px); background: var(--accent-color); }

        /* Keeping your original Vortex & Flash styles... */
        #vortex-container { display: none; width: 100%; height: 70vh; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .vortex { width: 350px; height: 350px; border: 8px double var(--accent-color); border-radius: 50%; border-top-color: transparent; animation: spin var(--vortex-speed) linear infinite; position: absolute; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .vortex-content { z-index: 20; text-align: center; }
        .vortex-content input { padding: 15px; border-radius: 30px; border: 2px solid var(--accent-color); width: 250px; text-align: center; font-size: 1.2em; background: rgba(0,0,0,0.7); color: white; outline: none; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; backdrop-filter: blur(5px); }
        #flash-screen { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 600px; background: #2c3e50; border-radius: 15px; overflow: hidden; z-index: 1000; box-shadow: 0 0 50px #000; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeFlash()"></div>

    <div id="session-overlay">
        <div class="session-nav">
            <h2 id="session-title" style="margin:0; color:var(--accent-color)">Level X - Session Y</h2>
            <button class="switch-btn" onclick="closeSession()">Exit Session</button>
        </div>
        <div id="activity-selector" class="activity-menu">
            </div>
        <iframe id="content-frame" style="display:none;"></iframe>
    </div>

    <div id="main-ui">
        <header class="banner">
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="Logo">
            <h1>Mr. Ezz .Y. Ali</h1>
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz">
        </header>

        <div class="controls">
            <button class="switch-btn" onclick="toggleView()">Tokens Portal</button>
        </div>

        <main class="grid-container" id="levels-grid"></main>
        
        <div id="vortex-container">
            <div class="vortex"></div>
            <div class="vortex-content">
                <h2>VORTEX ACCESS</h2>
                <input type="text" id="offlineCode" placeholder="Enter Agent Code..." onkeypress="handleCode(event)">
            </div>
        </div>
    </div>

    <div id="flash-screen">
        <div class="card-top" id="studentHeader"></div>
        <div class="card-bottom" id="gradeInputs">
            </div>
    </div>

    <script>
        // --- Core Project Logic ---
        
        // This object defines what's inside each session
        const curriculum = {
            "L1-S1": ["Listening", "Grammar", "Vocab"],
            "L1-S2": ["Listening", "Grammar", "Vocab", "Reading"],
            // We can expand this for all 12 levels
        };

        function openSession(lvl, sess) {
            const sessionID = `L${lvl}-S${sess}`;
            document.getElementById('session-title').innerText = `EYC Veto: Level ${lvl} - Session ${sess}`;
            document.getElementById('session-overlay').style.display = 'flex';
            
            const selector = document.getElementById('activity-selector');
            selector.innerHTML = ''; // Clear previous
            selector.style.display = 'flex';
            document.getElementById('content-frame').style.display = 'none';

            // Get activities for this session or default
            const activities = curriculum[sessionID] || ["Listening", "Vocab", "Grammar"];

            activities.forEach(act => {
                const card = document.createElement('div');
                card.className = 'activity-card';
                card.innerText = act;
                card.onclick = () => loadActivity(act, sessionID);
                selector.appendChild(card);
            });
        }

        function loadActivity(type, sessionID) {
            const frame = document.getElementById('content-frame');
            const selector = document.getElementById('activity-selector');
            
            selector.style.display = 'none'; // Hide menu
            frame.style.display = 'block'; // Show frame
            
            // Path: Data/Listening.js or Data/Grammar.js
            // Logic: We tell the frame to load a generic runner page that imports the specific JS data
            const activityPath = `Data/${type}.js`; 
            
            // For now, we'll use a data-injection approach
            frame.srcdoc = `
                <html>
                    <head>
                        <style>
                            body { background: #eee; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
                            .loader { text-align: center; }
                        </style>
                    </head>
                    <body>
                        <div class="loader">
                            <h1>Loading ${type}...</h1>
                            <p>Session: ${sessionID}</p>
                            <script src="${activityPath}"><\/script>
                        </div>
                    </body>
                </html>
            `;
        }

        function closeSession() {
            document.getElementById('session-overlay').style.display = 'none';
            document.getElementById('content-frame').src = "";
        }

        // --- Grid Generation ---
        const grid = document.getElementById('levels-grid');
        for (let i = 1; i <= 12; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'level-wrapper';
            wrapper.innerHTML = `
                <div class="main-circle" onclick="toggleSubCircles(this)">Level ${i}</div>
                <div class="sub-circle s1" onclick="openSession(${i}, 1)">1</div>
                <div class="sub-circle s2" onclick="openSession(${i}, 2)">2</div>
                <div class="sub-circle s3" onclick="openSession(${i}, 3)">3</div>
                <div class="sub-circle s4" onclick="openSession(${i}, 4)">4</div>
            `;
            grid.appendChild(wrapper);
        }

        function toggleSubCircles(el) {
            const wasActive = el.parentElement.classList.contains('active');
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
            if (!wasActive) el.parentElement.classList.add('active');
        }

        // --- Your Original Portal Logic (Keep as is) ---
        function toggleView() {
            const grid = document.getElementById('levels-grid');
            const vortex = document.getElementById('vortex-container');
            const btn = document.querySelector('.switch-btn');
            grid.style.display = (grid.style.display === 'none') ? 'grid' : 'none';
            vortex.style.display = (vortex.style.display === 'none') ? 'flex' : 'none';
            btn.innerText = (grid.style.display === 'none') ? "Back to Levels" : "Tokens Portal";
        }
        
        function handleCode(e) { if (e.key === 'Enter') { /* Your existing fetch logic */ } }
        function closeFlash() { 
            document.getElementById('overlay').style.display = 'none'; 
            document.getElementById('flash-screen').style.display = 'none'; 
        }
    </script>
</body>
</html>
