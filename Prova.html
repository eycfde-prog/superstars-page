<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb to Be - Family Fun</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #fab1a0;
            --bg-color: #f0f3f7;
            --text-color: #2d3436;
            --correct-color: #00b894;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        #game-container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border: 5px solid var(--secondary-color);
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        #question-box {
            background: #fff9f0;
            padding: 40px 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sentence {
            font-size: 1.8rem;
            font-weight: bold;
            color: #d63031;
            margin: 0;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 18px 25px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            font-weight: bold;
        }

        #answer-btn {
            background-color: var(--primary-color);
            color: white;
        }

        #next-btn {
            background-color: var(--correct-color);
            color: white;
            display: none;
        }

        button:active {
            transform: scale(0.95);
        }

        .progress {
            margin-top: 20px;
            font-size: 1rem;
            color: #636e72;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Find the Mistake! ✨</h1>
    
    <div id="question-box">
        <p id="sentence"></p>
    </div>

    <div class="btn-container">
        <button id="answer-btn" onclick="showAnswer()">Show Correct Answer ✅</button>
        <button id="next-btn" onclick="nextQuestion()">Next Question ➡️</button>
    </div>

    <div class="progress">Question <span id="current">1</span> of 10</div>
</div>

<script>
    const questions = [
        { wrong: "My mother are kind", right: "My mother is kind." },
        { wrong: "Are your father a doctor?", right: "Is your father a doctor?" },
        { wrong: "My sister am tall", right: "My sister is tall." },
        { wrong: "Is your parents home?", right: "Are your parents home?" },
        { wrong: "The family are big", right: "The family is big." },
        { wrong: "Am he your brother?", right: "Is he your brother?" },
        { wrong: "Grandmother is happy?", right: "Is grandmother happy?" },
        { wrong: "My grandfather are old", right: "My grandfather is old." },
        { wrong: "Aunt and Uncle is here", right: "Aunt and Uncle are here." },
        { wrong: "Are it my sister?", right: "Is it my sister?" }
    ];

    let currentIndex = 0;

    const sentenceEl = document.getElementById('sentence');
    const answerBtn = document.getElementById('answer-btn');
    const nextBtn = document.getElementById('next-btn');
    const currentEl = document.getElementById('current');

    function loadQuestion() {
        sentenceEl.textContent = questions[currentIndex].wrong;
        sentenceEl.style.color = "#d63031"; 
        answerBtn.style.display = "block";
        nextBtn.style.display = "none";
        currentEl.textContent = currentIndex + 1;
    }

    function showAnswer() {
        sentenceEl.textContent = questions[currentIndex].right;
        sentenceEl.style.color = "#00b894"; 
        answerBtn.style.display = "none";
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < questions.length) {
            loadQuestion();
        } else {
            alert("Amazing! You finished all questions! 🏆");
            currentIndex = 0;
            loadQuestion();
        }
    }

    loadQuestion();
</script>

</body>
</html>
