<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Smart Board</title>
   <style>
    :root {
        --primary-gold: #c5a059;
        --gold-glow: rgba(197, 160, 89, 0.4);
        --bg-dark: #050505;
        --card-bg: rgba(255, 255, 255, 0.03);
        --banner-height: 80px; /* صغرنا الارتفاع شوية عشان المساحة */
        --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* تحسين البانر العلوي */
    .top-banner {
        height: var(--banner-height);
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        padding: 0 20px;
        border-bottom: 2px solid var(--primary-gold);
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .logo-img { height: 40px; filter: drop-shadow(0 0 5px var(--gold-glow)); }
    .mr-ezz-img { 
        height: 55px; 
        border: 2px solid var(--primary-gold); 
        box-shadow: 0 0 10px var(--gold-glow);
    }

    /* "Content Cards" بتصميم حيوي */
    .content-grid {
        gap: 20px;
        padding: 25px;
        perspective: 1000px;
    }

    .content-card {
        background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
        border: 1px solid rgba(197, 160, 89, 0.15);
        border-radius: 20px;
        backdrop-filter: blur(5px);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .content-card:hover {
        transform: translateY(-10px) scale(1.02);
        border-color: var(--primary-gold);
        background: rgba(197, 160, 89, 0.08);
        box-shadow: 0 15px 35px rgba(197, 160, 89, 0.2);
    }

    .content-card h2 {
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #efefef;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    /* الملاحظات الذكية */
    #smart-note-input {
        background: rgba(15, 15, 15, 0.9);
        backdrop-filter: blur(15px);
        border: 2px solid var(--primary-gold);
        box-shadow: 0 0 30px rgba(197,160,89,0.3);
        border-radius: 25px;
        font-size: 1.8rem; /* أنسب للموبايل */
    }

    /* الـ Toolbox الروشة */
    .toolbox-wrapper .tool-btn {
        width: 55px;
        height: 55px;
        border-radius: 50%; /* شكل دائري ألطف */
        background: rgba(30, 30, 30, 0.9);
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        border: 1px solid rgba(197, 160, 89, 0.3);
    }

    .tool-btn.active {
        background: var(--primary-gold) !important;
        color: #000 !important;
        box-shadow: 0 0 20px var(--primary-gold);
    }

    /* لمسة جمالية للـ Scrollbar */
    .content-grid::-webkit-scrollbar { width: 5px; }
    .content-grid::-webkit-scrollbar-thumb { background: var(--primary-gold); border-radius: 10px; }

</style>
</head>
<body>

    <header class="top-banner">
        <button onclick="window.location.href='vetoof.html'" style="background:none; border:1px solid var(--primary-gold); color:var(--primary-gold); padding:8px 15px; border-radius:5px; cursor:pointer;">← BACK</button>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        <div class="session-info"><h1 id="display-title">VETO BOARD</h1></div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage">
        <button class="exit-btn" onclick="closeStage()">EXIT (ESC)</button>
        <div class="nav-hotspot nav-prev" onclick="if(typeof prevSlide === 'function') prevSlide()"></div>
        <div class="nav-hotspot nav-next" onclick="if(typeof nextSlide === 'function') nextSlide()"></div>
        <div id="stage-content" style="width:100%; height:100%;"></div>
    </div>

    <div id="quick-note-container">
        <input type="text" id="smart-note-input" placeholder="اكتب ملاحظتك هنا...">
    </div>

    <div id="laser-pointer"></div>
    <canvas id="drawing-canvas"></canvas>

    <div class="toolbox-wrapper" id="toolBox">
        <button class="tool-btn" style="display:flex; background:#222;" onclick="toggleToolBox()">🛠️</button>
        <button class="tool-btn" id="laserBtn" onclick="handleToolClick('laserBtn', toggleLaser)">🔦</button>
        <button class="tool-btn" id="reloadBtn" onclick="handleToolClick('reloadBtn', () => location.reload())">🔄</button>
        <button class="tool-btn" id="noteBtn" onclick="toggleNote()">📝</button>
    </div>

    <script src="data/levels.js"></script>

    <script>
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const urlParams = new URLSearchParams(window.location.search);
        const currentSessionId = urlParams.get('session');

        let laserActive = false;
        let isDrawing = false;
        const laser = document.getElementById('laser-pointer');
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resizeCanvas; resizeCanvas();

        function initSession() {
            if (!currentSessionId || !sessionData[currentSessionId]) return;
            const container = document.getElementById('content-container');
            sessionData[currentSessionId].forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.onclick = () => openActivity(item);
                card.innerHTML = `<h2>${item}</h2>`;
                container.appendChild(card);
            });
        }

        async function openActivity(activityName) {
            const [lvl, sess] = currentSessionId.split('-');
            let filePath = "";
            const nameUpper = activityName.toUpperCase();

            console.log("Activity Triggered:", nameUpper);

            // Logic Integration Start
            if (nameUpper.includes("ONE SHOT")) {
                if (nameUpper.includes("INTRO")) {
                    console.log("One Shot Intro: No script linked.");
                    return; 
                } else if (nameUpper.includes("TEST")) {
                    filePath = `data/L-${lvl}-S-${sess}-One.js`;
                } else {
                    filePath = `data/L-${lvl}-S-${sess}-One.js`;
                }
            }
            else if (nameUpper.includes("GP")) {
                filePath = `data/L-${lvl}-${sess}-GP.js`;
            }
            else if (nameUpper.includes("PROJECT")) {
                if (nameUpper.includes("TEST")) {
                    return; 
                } else {
                    filePath = `data/L-${lvl}-S-${sess}-Pro.js`;
                }
            }
            else if (nameUpper.includes("WISH")) {
                if (nameUpper.includes("TEST")) {
                    return; 
                } else {
                    filePath = `data/L-${lvl}-S-${sess}-Wis.js`;
                }
            }
            else if (nameUpper.includes("SQUEEZER")) {
                const suffix = nameUpper.includes("TEST") ? "Squt" : "Squr";
                filePath = `data/L-${lvl}-S-${sess}-${suffix}.js`;
            }
            else if (nameUpper.includes("DMT")) {
                filePath = nameUpper.includes("TEST") ? `data/Timer.js` : `data/L-${lvl}-S-${sess}-DMT.js`;
            }
            else if (nameUpper.includes("LISTENING")) {
                if (nameUpper.includes("INTRO")) {
                    filePath = `data/L-${lvl}-S-${sess}-Lin.js`;
                } else {
                    filePath = `data/L-${lvl}-S-${sess}-Lis.js`;
                }
            }
            else if (nameUpper.includes("GRAMMAR")) {
                filePath = `data/L-1-${lvl}-S-${sess}-Gra.js`;
            } 
            else if (nameUpper.includes("VOCAB")) {
                const type = nameUpper.includes("TEST") ? "2" : "1";
                filePath = `data/L-${type}-${lvl}-S-${sess}-Voc.js`;
            }
            else if (nameUpper.includes("READING")) {
                filePath = `data/L-${lvl}-S-${sess}-Rea.js`;
            }
            else {
                const prefix = activityName.split(' ')[0].substring(0, 3);
                filePath = `data/L-1-${lvl}-S-${sess}-${prefix}.js`;
            }
            // Logic Integration End

            console.log("Final Loading Path:", filePath); 

            const stage = document.getElementById('activity-stage');
            stage.style.display = 'block';
            
            if (isMobile && stage.requestFullscreen) {
                stage.requestFullscreen().catch(err => console.log(err));
            }

            document.getElementById('stage-content').innerHTML = "";
            const script = document.createElement('script');
            script.src = filePath;
            document.head.appendChild(script);
        }

        function toggleToolBox() { document.getElementById('toolBox').classList.toggle('open'); }

        function handleToolClick(btnId, action) {
            const btn = document.getElementById(btnId);
            action();
            if(!btn.classList.contains('active')) {
                btn.style.background = "var(--primary-gold)";
                btn.style.color = "#000";
                setTimeout(() => {
                    btn.style.background = "#1a1a1a";
                    btn.style.color = "var(--primary-gold)";
                }, 150);
            }
        }

        function toggleLaser() {
            laserActive = !laserActive;
            document.getElementById('laserBtn').classList.toggle('active');
            laser.style.display = (laserActive && !isMobile) ? 'block' : 'none';
        }

        function toggleNote() {
            const noteContainer = document.getElementById('quick-note-container');
            const noteInput = document.getElementById('smart-note-input');
            const noteBtn = document.getElementById('noteBtn');

            if (noteContainer.style.display === 'none' || noteContainer.style.display === '') {
                noteContainer.style.display = 'block';
                noteBtn.classList.add('active');
                noteInput.focus();
            } else {
                noteContainer.style.display = 'none';
                noteBtn.classList.remove('active');
                noteInput.value = ""; 
            }
        }

        let closeStage = function() {
            document.getElementById('activity-stage').style.display = 'none';
            document.getElementById('stage-content').innerHTML = "";
            document.getElementById('quick-note-container').style.display = 'none';
            document.getElementById('noteBtn').classList.remove('active');
            if (document.fullscreenElement) document.exitFullscreen();
        };

        function getCoords(e) {
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        }

        function startAction(e) {
            if (!laserActive) return;
            isDrawing = true;
            const pos = getCoords(e);
            ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
            ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 6; ctx.lineCap = 'round';
            if (isMobile) laser.style.display = 'block';
            updateLaserPos(e);
        }

        function moveAction(e) {
            if (!laserActive) return;
            const pos = getCoords(e);
            updateLaserPos(e);
            if (isDrawing) { ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
        }

        function endAction() {
            isDrawing = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (isMobile) laser.style.display = 'none';
        }

        function updateLaserPos(e) {
            const pos = getCoords(e);
            laser.style.left = pos.x + 'px';
            laser.style.top = pos.y + 'px';
        }

        window.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);
        window.addEventListener('touchstart', (e) => { if(laserActive) e.preventDefault(); startAction(e); }, {passive: false});
        window.addEventListener('touchmove', (e) => { if(laserActive) e.preventDefault(); moveAction(e); }, {passive: false});
        window.addEventListener('touchend', endAction);

        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                if(document.getElementById('quick-note-container').style.display === 'block') toggleNote();
                else closeStage();
                return;
            }
            if (document.getElementById('activity-stage').style.display === 'none') return;
            if (e.key === "ArrowRight" || e.key === " ") { if(typeof nextSlide === "function") nextSlide(); }
            else if (e.key === "ArrowLeft") { if(typeof prevSlide === "function") prevSlide(); }
        });

        initSession();
    </script>
</body>
</html>
