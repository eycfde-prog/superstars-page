<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Ezz .Y. Ali - Learning System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sky: #87CEEB;
            --cloud-white: rgba(255, 255, 255, 0.9);
            --primary-tech-blue: #3498db;
            --accent-sun: rgba(255, 223, 0, 0.25);
            --text-dark: #2c3e50;
            --text-light: #ffffff;
            --font-huge: 2.5rem;
            --font-medium: 1.8rem;
            --primary-red: #e74c3c;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200%;
            background: url('https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/4940b6bbd5ca38042de66f63a8619a4dc684c91b/vetoofb.webp');
            background-repeat: repeat-y;
            background-size: cover;
            z-index: -1;
            animation: cloudsRise 60s linear infinite;
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;
            opacity: 0.8;
        }

        @keyframes cloudsRise {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        header {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            padding: 10px 40px;
            height: 120px;
            gap: 30px;
        }

        .sun-halo {
            filter: drop-shadow(0 0 15px rgba(255, 223, 0, 0.8)) drop-shadow(0 0 30px rgba(255, 200, 0, 0.4));
            border: 2px solid rgba(255, 223, 0, 0.5);
        }

        .teacher-name {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-dark);
            text-shadow: 0 0 15px rgba(255, 223, 0, 0.7), 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .logo { width: 70px; border-radius: 50%; }

        .profile-img { width: 70px; border-radius: 50%; border: 2px solid white; }

        .activity-header {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
            z-index: 1000;
            height: 100px;
            background: #1e293b;
            border-bottom: 4px solid var(--primary-tech-blue);
            padding: 0 20px;
            font-size: 2rem !important;
        }

        .main-btn {
            margin: 20px auto; display: block; background-color: var(--primary-tech-blue);
            color: white; padding: 12px 35px; border-radius: 25px;
            font-weight: bold; cursor: pointer; border: none; transition: 0.3s;
            font-size: 1.1rem; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(135, 206, 235, 0.95); display: none; z-index: 2000;
            overflow-y: auto; backdrop-filter: blur(5px);
        }

        .activity-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px; padding: 50px;
        }

        .activity-card {
            background: rgba(255,255,255,0.9); border: 2px solid rgba(52, 152, 219, 0.3);
            min-height: 150px; font-size: var(--font-huge); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s ease; color: var(--text-dark); cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .activity-card:hover {
            background: var(--primary-tech-blue); color: white;
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(52, 152, 219, 0.4); border-color: white;
        }

        .levels-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 80px; width: 90%; margin: 60px auto; justify-items: center;
            transform-style: preserve-3d;
        }

        .level-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .level-btn {
            width: 110px; height: 110px;
            background: radial-gradient(circle at 30% 30%, #5dade2, var(--primary-tech-blue));
            color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1rem;
            z-index: 10; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .level-wrapper::before {
            content: "";
            position: absolute;
            width: 135px; height: 135px;
            border: 5px dashed #f1c40f;
            border-radius: 50%;
            animation: rotateSlow 15s linear infinite;
        }

        .sub-btn {
            position: absolute;
            width: 45px; height: 45px;
            background: #fff;
            color: var(--primary-tech-blue);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem;
            z-index: 15; opacity: 0; transform: scale(0);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .sub-btn::after {
            content: "";
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border: 2px dashed var(--primary-tech-blue);
            border-radius: 50%;
            animation: rotateFast 3s linear infinite;
        }

        @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotateFast { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .level-wrapper.active .sub-btn { opacity: 1; transform: scale(1); }
        .level-wrapper.active .sub-btn:nth-child(2) { top: -20px; left: 50px; }
        .level-wrapper.active .sub-btn:nth-child(3) { bottom: -20px; left: 50px; }
        .level-wrapper.active .sub-btn:nth-child(4) { left: -20px; top: 50px; }
        .level-wrapper.active .sub-btn:nth-child(5) { right: -20px; top: 50px; }

        #activityOverlay { 
            display: none; 
            background: #0f172a; 
            justify-content: center; 
            align-items: center;
            flex-direction: column;
        }

        #activityFinalContent {
            height: calc(100vh - 160px) !important;
            width: calc(100% - 40px);
            margin: 10px 20px !important;
            border-radius: 15px;
            background: #ffffff;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 0 !important;
        }

        #activity-view-footer {
            height: 60px;
            font-size: 1.5rem;
            background: #1e293b;
            color: #94a3b8;
            border-top: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            width: 100%;
        }

        .tokens-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; padding: 20px; }

        .nav-link-btn {
            font-size: 1.8rem !important;
            color: #3498db !important;
            font-weight: 800;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 15px;
            transition: 0.3s;
        }

        .nav-separator { color: rgba(255,255,255,0.5); font-size: var(--font-medium); margin: 0 5px; }

        .nav-active-act {
            font-size: 2.2rem !important;
            color: #f1c40f !important;
            text-decoration: underline;
            font-weight: bold;
        }

        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" class="logo sun-halo">
        
        <div class="header-left" style="display: flex; flex-direction: row; justify-content: flex-start; flex-grow: 1; margin-left: 20px; align-items: center; gap: 20px;">
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/MrEzz.png" class="profile-img sun-halo">

    <button class="main-btn" id="portalActionBtn" onclick="toggleTokens()">Tokens Portal</button>

    <div class="levels-container" id="levelsGrid"></div>

    <div id="sessionOverlay" class="overlay">
        <div id="sessionContent"></div>
    </div>

        <div class="activity-header">
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" style="width: 45px; border-radius: 50%;">

            ESC to Close | Power by Veto System

        function goToLevels() { closeAll(); }
        function goToSession(lv, ss) { document.getElementById('activityOverlay').style.display = 'none'; openSession(lv, ss); }

        function openFinalActivity(lv, ss, actName) {
            const detailsHtml = `
                <button class="nav-link-btn" onclick="goToLevels()">L${lv}</button>
                <span class="nav-separator">»</span>
                <button class="nav-link-btn" onclick="goToSession(${lv}, ${ss})">S${ss}</button>
                <span class="nav-separator">»</span>
                <span class="nav-active-act">${actName}</span>
            `;
            document.getElementById('activityDetails').innerHTML = detailsHtml;

            const container = document.getElementById('activityFinalContent');
            container.innerHTML = `
                <div style="text-align:center;">
                    <div class="loader"></div>
                    <h2 style="font-size:4rem; color:var(--primary-tech-blue); font-family:Cairo;">VETO SYSTEM LOADING...</h2>
                </div>`;
            
            document.getElementById('activityOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';

            const oldScript = document.getElementById('activity-script');
            if (oldScript) oldScript.remove();

            let cleanName = actName.replace(/\s+/g, ''); 
            let shortName = cleanName.substring(0, 3).charAt(0).toUpperCase() + cleanName.substring(0, 3).slice(1);
            const fileName = `L-${lv}-S-${ss}-${shortName}.js`;
            
            setTimeout(() => {
                const script = document.createElement('script');
                script.id = 'activity-script';
                script.src = `data/${fileName}`;
                script.onerror = () => {
                    container.innerHTML = `<h1 style="font-size:5rem; color:red;">FILE NOT FOUND: ${fileName}</h1>`;
                };
                document.body.appendChild(script);
            }, 500);
        }

        const grid = document.getElementById('levelsGrid');
        for (let i = 1; i <= 12; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'level-wrapper';
            wrap.innerHTML = `<div class="level-btn">Level ${i}</div>`;
            for (let j = 1; j <= 4; j++) {
                const s = document.createElement('div');
                s.className = 'sub-btn'; s.innerText = j;
                s.onclick = (e) => { e.stopPropagation(); openSession(i, j); };
                wrap.appendChild(s);
            }
            wrap.onclick = (e) => {
                e.stopPropagation();
                const targetLevelIndex = i;
                document.querySelectorAll('.level-wrapper').forEach((w, index) => {
                    const currentLevelNum = index + 1;
                    if (currentLevelNum <= targetLevelIndex) {
                        w.classList.add('active');
                    } else {
                        w.classList.remove('active');
                    }
                });
            };
            grid.appendChild(wrap);
        }

        function openSession(lv, ss) {
            const activities = sessionData[`${lv}-${ss}`] || ["Coming Soon"];
            let html = `<div class="activity-grid">`;
            activities.forEach(act => {
                html += `<div class="activity-card" onclick="openFinalActivity(${lv}, ${ss}, '${act}')">${act}</div>`;
            });
            html += `</div>`;
            document.getElementById('sessionContent').innerHTML = html;
            document.getElementById('sessionOverlay').style.display = 'block';
            updateBtn("Levels Portal", () => closeAll());
        }

        function toggleTokens() {
            const categories = ["Attendence", "ICA", "Reading", "Tongue Twister", "One Shot", "Games", "Squeezer", "DMT", "Wish", "Project", "Graduation Project", "Extra Bonus"];
            let html = `<div class="tokens-grid">`;
            categories.forEach(c => {
                html += `<div style="background:#1e1e1e; border:1px solid #3498db; height:120px; border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative;">
                            <input type="text" style="width:100%; background:transparent; border:none; color:white; text-align:center; font-size:1.8rem; outline:none;" placeholder=" ">
                            <label style="position:absolute; color:#555; pointer-events:none; font-size: 1.2rem;">${c}</label>
                         </div>`;
            });
            html += `</div>`;
            document.getElementById('sessionContent').innerHTML = html;
            document.getElementById('sessionOverlay').style.display = 'block';
            updateBtn("Levels Portal", () => closeAll());
        }

        function updateBtn(text, fn) {
            const btn = document.getElementById('portalActionBtn');
            btn.innerText = text;
            btn.onclick = fn;
        }

        function closeAll() {
            document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
            document.body.style.overflow = 'auto';
            updateBtn("Tokens Portal", () => toggleTokens());
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeAll();

            if (e.key === "Enter") {
                const overlay = document.getElementById('activityOverlay');
                if (overlay.style.display === 'flex' || overlay.style.display === 'block') {
                    if (typeof window.nextStep === "function") window.nextStep();
                }
            }

            if (e.key === "ArrowRight" || e.key === "ArrowLeft") {
                const cards = document.querySelectorAll('.activity-card');
                if (cards.length > 0 && document.getElementById('sessionOverlay').style.display === 'block') {
                    console.log("Navigation Triggered");
                }
            }
        });
    </script>
</body>
</html>
