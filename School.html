<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veto Program - Professional Board & Avatar Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --v-dark-bg: #0f172a;
            --v-panel-bg: #1e293b;
            --v-primary: #6366f1;
            --v-accent: #f59e0b;
            --v-success: #10b981;
            --v-danger: #ef4444;
            --v-text-main: #f8fafc;
            --v-text-dim: #94a3b8;
            --bar-height: 120px;
            --skin-light: #FFDBAC;
            --skin-dark: #F1C27D;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Cairo', sans-serif; }
        body { background: var(--v-dark-bg); color: var(--v-text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Layout Bars */
        .main-bar { height: var(--bar-height); background: var(--v-panel-bg); padding: 0 30px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border-bottom: 2px solid #334155; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 10; }
        .footer-bar { height: var(--bar-height); background: var(--v-panel-bg); border-top: 2px solid #334155; display: flex; align-items: center; padding: 0 20px; gap: 15px; overflow-x: auto; }

        /* Avatar Elements */
        .avatar-frame { width: 75px; height: 75px; border-radius: 50%; background: #fff; overflow: hidden; border: 3px solid var(--v-primary); position: relative; }
        .avatar-svg { width: 100%; height: 100%; display: block; }

        /* Content Areas */
        .content-area { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .question-box { max-width: 1100px; margin: 0 auto; width: 100%; }
        .q-text { font-size: 38px; line-height: 1.4; margin-bottom: 40px; font-weight: 700; }
        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .choice-card { background: #1e293b; border: 2px solid #334155; padding: 25px; border-radius: 15px; font-size: 22px; cursor: pointer; transition: 0.2s; display: flex; gap: 15px; }
        .choice-card:hover { border-color: var(--v-primary); transform: translateY(-3px); }
        .choice-card.correct { background: var(--v-success) !important; border-color: #fff; }
        .choice-card.wrong { background: var(--v-danger) !important; border-color: #fff; }

        /* Studio Overlay */
        .studio-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 200; display: none; align-items: center; justify-content: center; }
        .studio-card { background: var(--v-panel-bg); padding: 40px; border-radius: 24px; width: 900px; display: flex; gap: 50px; border: 2px solid var(--v-primary); }
        .preview-zone { flex: 1; display: flex; flex-direction: column; align-items: center; background: #070b14; border-radius: 20px; padding: 20px; }
        .options-zone { flex: 1.5; }
        .option-btn { background: #334155; border: none; color: white; padding: 20px; border-radius: 12px; cursor: pointer; text-align: center; font-weight: bold; }
        .option-btn:hover { background: var(--v-primary); }

        /* Student Pills Footer */
        .student-pill { min-width: 130px; text-align: center; padding: 10px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 2px solid transparent; transition: 0.3s; flex-shrink: 0; }
        .student-pill.active { border-color: var(--v-primary); background: rgba(99, 102, 241, 0.2); }
        .mini-avatar { width: 45px; height: 45px; margin: 0 auto 5px; border-radius: 50%; background: #fff; overflow: hidden; border: 2px solid var(--v-primary); }

        /* Explanation & Setup */
        .explanation-overlay { position: absolute; inset: 0; background: var(--v-dark-bg); z-index: 50; padding: 40px; display: none; overflow-y: auto; }
        #setupScreen { position: fixed; inset: 0; background: var(--v-dark-bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; padding: 15px; border-radius: 10px; width: 400px; margin: 10px; font-size: 18px; }
        .btn-start { background: var(--v-primary); color: white; padding: 15px 50px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div id="setupScreen">
    <h1 style="margin-bottom:30px; font-size: 40px; letter-spacing: 2px;">VETO ACADEMY</h1>
    <textarea id="studentInput" class="input-dark" style="height:150px" placeholder="Enter students (one per line)">Ahmed
Sara</textarea>
    <button class="btn-start" onclick="initSession()">START SESSION</button>
</div>

<div id="avatarStudio" class="studio-overlay">
    <div class="studio-card">
        <div class="preview-zone">
            <div class="avatar-frame" style="width: 200px; height: 200px;">
                <svg id="studioPreviewSVG" class="avatar-svg" viewBox="0 0 100 100">
                    <defs>
                        <radialGradient id="skinGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                            <stop offset="0%" style="stop-color:var(--skin-light);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:var(--skin-dark);stop-opacity:1" />
                        </radialGradient>
                        <filter id="shadow" x="0" y="0" width="200%" height="200%">
                            <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
                        </filter>
                    </defs>
                    <rect x="40" y="75" width="20" height="25" id="neck-part" fill="#d1a67d" />
                    <circle cx="50" cy="50" r="40" id="main-skin-circle" fill="url(#skinGrad)" />
                    <g id="layer-eyes" filter="url(#shadow)"></g>
                    <g id="layer-nose" filter="url(#shadow)"></g>
                    <g id="layer-mouth" filter="url(#shadow)"></g>
                </svg>
            </div>
            <h2 id="studioStudentName" style="margin-top: 25px; color:white;">STUDENT NAME</h2>
        </div>
        <div class="options-zone">
            <h2 id="stepTitle" style="color:var(--v-accent); margin-bottom:20px;">Step</h2>
            <div id="optionsGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;"></div>
        </div>
    </div>
</div>

<header class="main-bar">
    <div style="display: flex; align-items: center; gap: 15px;">
        <div id="h-avatar-box" class="avatar-frame"></div>
        <div>
            <div id="h-name" style="font-weight: 700; font-size: 22px;">---</div>
            <div style="font-size: 12px; color: var(--v-text-dim);">ACTIVE STUDENT</div>
        </div>
    </div>
    <div class="academy-logo"><h2 style="color:var(--v-primary)">VETO</h2></div>
    <div style="display: flex; gap: 30px; text-align: center;">
        <div><span class="val" id="lec-timer" style="font-size: 24px; font-weight: 700; color: var(--v-primary);">00:00</span><br><small>LEC</small></div>
        <div><span class="val" id="h-score" style="font-size: 24px; font-weight: 700; color: var(--v-accent);">0</span><br><small>PTS</small></div>
        <div><span class="val" id="q-timer" style="font-size: 24px; font-weight: 700; color: var(--v-danger);">30</span><br><small>TIME</small></div>
    </div>
</header>

<main class="content-area">
    <div class="question-box" id="q-container">
        <span id="q-idx" style="color:var(--v-primary); font-weight:700; letter-spacing:2px;">QUESTION #1</span>
        <h2 class="q-text" id="q-text">Loading...</h2>
        <div class="choices-grid" id="choices-grid"></div>
    </div>

    <div id="explanation-mode" class="explanation-overlay">
        <h2 style="color:var(--v-accent); margin-bottom:20px;">Teacher's Explanation Zone</h2>
        <div id="exp-q-preview" style="background:var(--v-panel-bg); padding:20px; border-radius:15px; margin-bottom:20px;"></div>
        <textarea id="exp-notes" style="width:100%; height:150px; background:#0f172a; border:2px solid #334155; color:white; padding:20px; font-size:20px; border-radius:15px;" placeholder="Explain the concept..."></textarea>
        <button class="btn-start" style="margin-top:20px" onclick="nextQuestion()">NEXT QUESTION</button>
    </div>
</main>

<footer class="footer-bar" id="footer-list"></footer>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxGD5yrULOGgiRXgdjZ_9JHpHsEvLMR-Yrn2ngBiLJBd7K-mGl-x1PoZ9jdxQLZJTz8/exec";

    const SkinTones = [
        {light: '#FFDBAC', dark: '#F1C27D'}, {light: '#F1C27D', dark: '#E0AC69'},
        {light: '#E0AC69', dark: '#C68642'}, {light: '#8D5524', dark: '#5E3A1A'},
        {light: '#C68642', dark: '#8D5524'}
    ];

    const Assets = {
        eyes: ['<g transform="translate(0,-2)"><circle cx="35" cy="48" r="4" fill="#111"/><circle cx="65" cy="48" r="4" fill="#111"/></g>','<path d="M30 48 Q35 42 40 48" stroke="#111" fill="none" stroke-width="3"/><path d="M60 48 Q65 42 70 48" stroke="#111" fill="none" stroke-width="3"/>','<rect x="28" y="46" width="12" height="4" fill="#111"/><rect x="60" y="46" width="12" height="4" fill="#111"/>','<circle cx="35" cy="48" r="5" fill="#3C3489"/><circle cx="65" cy="48" r="5" fill="#3C3489"/>','<path d="M30 50 L40 44 M60 44 L70 50" stroke="#111" stroke-width="4"/>'],
        nose: ['<path d="M48 50 Q50 56 52 50" stroke="rgba(0,0,0,0.5)" fill="none" stroke-width="2.5"/>','<path d="M50 44 V56" stroke="rgba(0,0,0,0.4)" stroke-width="3"/>','<path d="M46 54 H54" stroke="rgba(0,0,0,0.5)" stroke-width="3"/>','<path d="M47 48 L50 58 L53 48" stroke="rgba(0,0,0,0.6)" fill="none" stroke-width="2"/>','<circle cx="50" cy="54" r="3" fill="rgba(0,0,0,0.3)"/>'],
        mouth: ['<path d="M35 68 Q50 82 65 68" stroke="#111" fill="none" stroke-width="3"/>','<path d="M40 72 H60" stroke="#111" stroke-width="4"/>','<path d="M38 72 Q50 68 62 72" stroke="#111" fill="none" stroke-width="3"/>','<circle cx="50" cy="72" r="6" fill="rgba(0,0,0,0.6)"/>','<path d="M35 70 Q50 78 65 70" stroke="#c0392b" fill="none" stroke-width="5"/>']
    };

    let session = {
        students: [], currentS: 0, currentQ: 0, answered: false, timer: null, startTime: Date.now(),
        avatarStep: 0, pendingNames: [], currentTempName: ""
    };

    let qBank = [];

    const steps = [
        {title: "Skin Tone", key: "skin", options: [1,2,3,4,5]},
        {title: "Eyes Style", key: "eyes", options: [1,2,3,4,5]},
        {title: "Nose Style", key: "nose", options: [1,2,3,4,5]},
        {title: "Mouth Style", key: "mouth", options: [1,2,3,4,5]}
    ];

    async function callBackend(action, data = {}) {
        try {
            const url = `${API_URL}?action=${action}`;
            const response = await fetch(url, {
                method: "POST",
                mode: 'no-cors', // للتغلب على مشاكل الـ CORS في بعض البيئات
                body: JSON.stringify(data)
            });
            // ملاحظة: no-cors قد لا تعيد JSON، يفضل استخدامه فقط إذا كانت البيئة مقيدة
            // إذا كنت تستخدم GAS كـ Web App، الـ CORS العادي يعمل
            return await response.json();
        } catch(e) { 
            console.log("Backend Call Simulation:", action, data);
            return {status: 'ok'}; 
        }
    }

    async function initSession() {
        const input = document.getElementById('studentInput').value.split('\n').filter(n => n.trim());
        if(!input.length) return;
        
        document.getElementById('setupScreen').innerHTML = "<h1>جاري التحميل...</h1>";

        // محاكاة جلب الأسئلة (أو استبدلها بـ callBackend)
        qBank = [
            { q: "ما هو العنصر المسؤول عن العناوين الكبيرة في HTML؟", c: ["<h6>", "<head>", "<h1>", "<title>"], a: 2 },
            { q: "أي خاصية تغير لون النص في CSS؟", c: ["background-color", "color", "text-style", "font-weight"], a: 1 }
        ];

        for (let name of input) {
            // هنا نفترض أن الطالب جديد دائماً للمثال، يمكنك تفعيل الـ check لاحقاً
            session.pendingNames.push(name);
        }

        startAvatarWizard();
        setInterval(updateLecTimer, 1000);
    }

    function startAvatarWizard() {
        if(session.pendingNames.length === 0) {
            document.getElementById('avatarStudio').style.display = 'none';
            finalizeSetup();
            return;
        }
        session.currentTempName = session.pendingNames.shift();
        session.avatarStep = 0;
        
        // Reset SVG
        document.getElementById('layer-eyes').innerHTML = '';
        document.getElementById('layer-nose').innerHTML = '';
        document.getElementById('layer-mouth').innerHTML = '';
        
        document.getElementById('studioStudentName').innerText = session.currentTempName.toUpperCase();
        document.getElementById('avatarStudio').style.display = 'flex';
        renderAvatarStep();
    }

    function renderAvatarStep() {
        const s = steps[session.avatarStep];
        document.getElementById('stepTitle').innerText = s.title;
        document.getElementById('optionsGrid').innerHTML = s.options.map((o, i) => `
            <button class="option-btn" onclick="applyAvatarChoice('${s.key}', ${i})">${i+1}</button>
        `).join('');
    }

    function applyAvatarChoice(key, idx) {
        if(key === 'skin') {
            const c = SkinTones[idx];
            document.documentElement.style.setProperty('--skin-light', c.light);
            document.documentElement.style.setProperty('--skin-dark', c.dark);
            document.getElementById('neck-part').setAttribute('fill', c.dark);
        } else {
            document.getElementById(`layer-${key}`).innerHTML = Assets[key][idx];
        }

        session.avatarStep++;
        
        if(session.avatarStep >= steps.length) {
            const svgContent = document.getElementById('studioPreviewSVG').innerHTML;
            const newStudent = { name: session.currentTempName, avatar: svgContent, score: 0 };
            session.students.push(newStudent);
            callBackend("saveNewStudent", newStudent);
            startAvatarWizard();
        } else {
            renderAvatarStep();
        }
    }

    function finalizeSetup() {
        document.getElementById('setupScreen').style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        session.answered = false;
        document.getElementById('explanation-mode').style.display = 'none';
        
        const q = qBank[session.currentQ % qBank.length];
        const s = session.students[session.currentS];

        document.getElementById('h-name').innerText = s.name;
        document.getElementById('h-score').innerText = s.score;
        document.getElementById('h-avatar-box').innerHTML = `<svg class="avatar-svg" viewBox="0 0 100 100">${s.avatar}</svg>`;
        document.getElementById('q-idx').innerText = `QUESTION #${session.currentQ + 1}`;
        document.getElementById('q-text').innerText = q.q;

        const grid = document.getElementById('choices-grid');
        grid.innerHTML = q.c.map((choice, i) => `
            <div class="choice-card" onclick="handleAnswer(${i})" id="c-${i}">
                <span style="color:var(--v-primary); font-weight:700">${String.fromCharCode(65+i)}.</span>
                ${choice}
            </div>
        `).join('');

        renderFooter();
        startQTimer();
    }

    function handleAnswer(idx) {
        if(session.answered) return;
        session.answered = true;
        clearInterval(session.timer);
        
        const q = qBank[session.currentQ % qBank.length];
        const currentStudent = session.students[session.currentS];

        if(idx === q.a) {
            document.getElementById(`c-${idx}`).classList.add('correct');
            currentStudent.score += 10;
            callBackend("updateScore", { name: currentStudent.name, points: 10 });
            setTimeout(nextQuestion, 1500);
        } else {
            if(idx !== -1) document.getElementById(`c-${idx}`).classList.add('wrong');
            document.getElementById(`c-${q.a}`).classList.add('correct');
            showExplanation(q);
        }
    }

    function showExplanation(q) {
        document.getElementById('explanation-mode').style.display = 'block';
        document.getElementById('exp-q-preview').innerText = q.q;
        document.getElementById('exp-notes').focus();
    }

    function nextQuestion() {
        session.currentQ++;
        session.currentS = (session.currentS + 1) % session.students.length;
        loadQuestion();
    }

    function renderFooter() {
        document.getElementById('footer-list').innerHTML = session.students.map((s, i) => `
            <div class="student-pill ${i === session.currentS ? 'active' : ''}">
                <div class="mini-avatar"><svg viewBox="0 0 100 100">${s.avatar}</svg></div>
                <div style="font-size:14px; font-weight:bold">${s.name}</div>
                <div style="font-size:12px; color:var(--v-accent)">Pts: ${s.score}</div>
            </div>
        `).join('');
    }

    function startQTimer() {
        let t = 30;
        document.getElementById('q-timer').innerText = t;
        clearInterval(session.timer);
        session.timer = setInterval(() => {
            t--;
            document.getElementById('q-timer').innerText = t;
            if(t <= 0) { clearInterval(session.timer); handleAnswer(-1); }
        }, 1000);
    }

    function updateLecTimer() {
        const diff = Math.floor((Date.now() - session.startTime) / 1000);
        const m = Math.floor(diff / 60); const s = diff % 60;
        document.getElementById('lec-timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
    }
</script>
</body>
</html>
