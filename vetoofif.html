<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Smart Board</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --banner-height: 110px;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; 
            -webkit-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
        }

        .top-banner {
            height: var(--banner-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; 
            background: linear-gradient(180deg, #111 0%, #000 100%);
            border-bottom: 4px solid var(--primary-gold);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .logo-img { height: 65px; filter: drop-shadow(0 0 5px rgba(197,160,89,0.3)); }
        .mr-ezz-img { height: 85px; border-radius: 12px; border: 2px solid var(--primary-gold); }

        .session-info { text-align: center; flex-grow: 1; }
        .session-info h1 { 
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            margin: 0;
        }
        .session-info span { 
            color: var(--primary-gold); 
            font-weight: 800;
        }

        .content-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; 
            padding: 40px; 
            overflow-y: auto;
            height: calc(100vh - var(--banner-height));
        }

        .content-card {
            background: var(--card-bg); 
            border: 2px solid rgba(197,160,89,0.15);
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 160px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .content-card:hover { 
            border-color: var(--primary-gold); 
            background: rgba(197,160,89,0.1);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 40px rgba(197,160,89,0.2);
        }

        .content-card h2 { 
            font-size: 1.8rem;
            font-weight: 700;
            color: #efefef;
        }

        .exit-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            left: auto;
            z-index: 9999;
            padding: 8px 15px; 
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(214, 48, 49, 0.8);
            color: white;
            border: 2px solid #ff4757;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .exit-btn:hover {
            background: rgba(214, 48, 49, 1);
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(214, 48, 49, 0.4);
        }

        #activity-stage { position: fixed; inset: 0; background:#000; z-index: 8000; display: none; }
        #stage-content { width: 100%; height: 100%; overflow: hidden; }

        .toolbox-wrapper { 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            z-index: 9500; 
            display: flex; 
            flex-direction: column-reverse; 
            gap: 15px; 
            align-items: center;
        }

        .tool-btn { 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            background: #1a1a1a; 
            border: 3px solid var(--primary-gold); 
            color: var(--primary-gold); 
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            transform: translateY(20px) scale(0);
            pointer-events: none;
        }

        .tool-btn.main-toggle {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            background: var(--primary-gold);
            color: #000;
            z-index: 9501;
        }

        .toolbox-wrapper.open .tool-btn {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .toolbox-wrapper.open .main-toggle {
            transform: rotate(135deg); 
            background: #d63031;
            color: white;
            border-color: #ff4757;
        }

        .tool-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--primary-gold);
        }

        .tool-btn.active {
            background: #ff4757;
            border-color: #fff;
            color: white;
        }

        #quick-note-container { 
            position: fixed; 
            inset: 0; 
            z-index: 9999; 
            display: none;
            background: rgba(0,0,0,0.95); 
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #smart-note-input { 
            padding: 20px; 
            border: none;
            border-bottom: 3px solid var(--primary-gold); 
            background: transparent; 
            color: var(--primary-gold); 
            width: 90%; 
            height: auto;
            min-height: 200px; 
            font-size: 5rem; 
            text-align: center;
            outline: none;
            font-weight: bold;
            resize: none; 
            font-family: inherit;
            overflow: hidden; 
        }

        #laser-pointer { 
            position: fixed; 
            width: 20px; height: 20px; 
            background: radial-gradient(circle, #ff0000 0%, rgba(255,0,0,0) 70%);
            border-radius: 50%;
            box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            pointer-events: none; 
            z-index: 10000; 
            display: none;
        }

        #drawing-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 8500; }
    </style>
</head>
<body>

    <header class="top-banner">
        <button onclick="window.location.href='vetoof.html'" style="background:var(--primary-gold); border:none; color:#000; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">← BACK</button>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        <div class="session-info">
            <h1 id="display-title">VETO <span>BOARD</span></h1>
        </div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage">
        <button class="exit-btn" onclick="closeStage()">
            <span>✖</span> 
            <span>EXIT</span>
        </button>
        <div class="nav-hotspot nav-prev" onclick="if(typeof prevSlide === 'function') prevSlide()"></div>
        <div class="nav-hotspot nav-next" onclick="if(typeof nextSlide === 'function') nextSlide()"></div>
        <div id="stage-content"></div>
    </div>

    <div id="quick-note-container">
        <textarea id="smart-note-input" placeholder="Type your note here..." rows="1"></textarea>
        <p style="color:rgba(255,255,255,0.3); margin-top:20px; font-size:1.2rem;">Press ESC to Close | ENTER for New Line</p>
    </div>

    <div id="laser-pointer"></div>
    <canvas id="drawing-canvas"></canvas>

    <div class="toolbox-wrapper" id="toolBox">
        <button class="tool-btn main-toggle" onclick="toggleToolBox()">🛠️</button>
        <button class="tool-btn" id="laserBtn" title="Laser Pointer" onclick="handleToolClick('laserBtn', toggleLaserMode)">🔦</button>
        <button class="tool-btn" id="reloadBtn" title="Reload Page" onclick="handleToolClick('reloadBtn', () => location.reload())">🔄</button>
        <button class="tool-btn" id="noteBtn" title="Flash Note" onclick="toggleNote()">📝</button>
    </div>

    <script src="data/levels.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentSessionId = urlParams.get('session');

        let isLaserMode = false;
        const canvas = document.getElementById('drawing-canvas');
        const laser = document.getElementById('laser-pointer');
        const ctx = canvas.getContext('2d');

        function updateDynamicTitle() {
            if (currentSessionId) {
                const parts = currentSessionId.split('-');
                if (parts.length === 2) {
                    const level = parts[0];
                    const session = parts[1];
                    document.getElementById('display-title').innerHTML = `LEVEL <span>${level}</span> | SESSION <span>${session}</span>`;
                }
            }
        }

        function initSession() {
            updateDynamicTitle();
            if (!currentSessionId || !sessionData[currentSessionId]) return;
            const container = document.getElementById('content-container');
            sessionData[currentSessionId].forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.onclick = () => openActivity(item);
                card.innerHTML = `<h2>${item}</h2>`;
                container.appendChild(card);
            });
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            handlePointer();
        }

        async function openActivity(activityName) {
            const [lvl, sess] = currentSessionId.split('-');
            let filePath = "";
            const nameUpper = activityName.toUpperCase();
            
            if (nameUpper.includes("ONE SHOT")) {
                filePath = `data/L-${lvl}-S-${sess}-One.js`;
            } else if (nameUpper.includes("GP")) {
                filePath = `data/L-${lvl}-${sess}-GP.js`;
            } else if (nameUpper.includes("PROJECT")) {
                filePath = `data/L-${lvl}-S-${sess}-Pro.js`;
            } else if (nameUpper.includes("WISH")) {
                filePath = `data/L-${lvl}-S-${sess}-Wis.js`;
            } else if (nameUpper.includes("SQUEEZER")) {
                const suffix = nameUpper.includes("TEST") ? "Squt" : "Squr";
                filePath = `data/L-${lvl}-S-${sess}-${suffix}.js`;
            } else if (nameUpper.includes("DMT")) {
                filePath = nameUpper.includes("TEST") ? `data/Timer.js` : `data/L-${lvl}-S-${sess}-DMT.js`;
            } else if (nameUpper.includes("LISTENING")) {
                filePath = nameUpper.includes("INTRO") ? `data/L-${lvl}-S-${sess}-Lin.js` : `data/L-${lvl}-S-${sess}-Lis.js`;
            } else if (nameUpper.includes("GRAMMAR")) {
                filePath = `data/L-1-${lvl}-S-${sess}-Gra.js`;
            } else if (nameUpper.includes("VOCAB")) {
                const type = nameUpper.includes("TEST") ? "2" : "1";
                filePath = `data/L-${type}-${lvl}-S-${sess}-Voc.js`;
            } else if (nameUpper.includes("READING")) {
                filePath = `data/L-${lvl}-S-${sess}-Rea.js`;
            } else {
                const prefix = activityName.split(' ')[0].substring(0, 3);
                filePath = `data/L-1-${lvl}-S-${sess}-${prefix}.js`;
            }

            const stage = document.getElementById('activity-stage');
            stage.style.display = 'block';
            document.getElementById('stage-content').innerHTML = "";
            const script = document.createElement('script');
            script.src = filePath;
            document.head.appendChild(script);
        }

        function toggleToolBox() {
            document.getElementById('toolBox').classList.toggle('open');
        }

        function handleToolClick(btnId, action) {
            const btn = document.getElementById(btnId);
            action();
            btn.style.transform = "scale(0.8)";
            setTimeout(() => { btn.style.transform = "scale(1.1)"; }, 100);
        }
        
        let closeStage = function() {
            document.getElementById('activity-stage').style.display = 'none';
            document.getElementById('stage-content').innerHTML = "";
            if (document.fullscreenElement) document.exitFullscreen();
        };

        function toggleLaserMode() {
            isLaserMode = !isLaserMode;
            document.getElementById('laserBtn').classList.toggle('active');
            canvas.style.pointerEvents = isLaserMode ? 'auto' : 'none';
        }

        function handlePointer() {
            window.addEventListener('mousedown', (e) => {
                if(!isLaserMode) return;
                laser.style.display = 'block';
                ctx.clearRect(0, 0, canvas.width, canvas.height); 
                ctx.beginPath();
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.moveTo(e.clientX, e.clientY);
                
                const draw = (moveEvent) => {
                    ctx.lineTo(moveEvent.clientX, moveEvent.clientY);
                    ctx.stroke();
                    laser.style.left = moveEvent.clientX - 10 + 'px';
                    laser.style.top = moveEvent.clientY - 10 + 'px';
                };

                const stop = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); 
                    laser.style.display = 'none';
                    window.removeEventListener('mousemove', draw);
                    window.removeEventListener('mouseup', stop);
                };

                window.addEventListener('mousemove', draw);
                window.addEventListener('mouseup', stop);
            });
        }

        function closeNote() {
            document.getElementById('quick-note-container').style.display = 'none';
        }

        document.getElementById('smart-note-input').addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeNote();
            }
        });

        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.getElementById('quick-note-container').style.display === 'flex') {
                    closeNote();
                }
                if (document.getElementById('activity-stage').style.display === 'block') {
                    closeStage();
                }
            }
        });

        function toggleNote() {
            const container = document.getElementById('quick-note-container');
            const input = document.getElementById('smart-note-input');
            const isOpen = container.style.display === 'flex';
            
            container.style.display = isOpen ? 'none' : 'flex';
            if(!isOpen) {
                input.value = "";
                setTimeout(() => input.focus(), 100);
            }
        }

        window.onload = initSession;
    </script>
</body>
</html>
