<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Smart Board Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.4);
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.07);
            --banner-height: 120px;
            --font-main: 'Inter', 'Segoe UI', sans-serif;
            --transition-speed: 0.3s;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; 
            -webkit-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header Section (Enhanced Visibility) --- */
        .top-banner {
            height: var(--banner-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; 
            background: linear-gradient(180deg, #111 0%, #000 100%);
            border-bottom: 5px solid var(--primary-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .back-btn {
            background: var(--primary-gold);
            border: none;
            color: #000;
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 900;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }
        .back-btn:hover { transform: scale(1.05); background: #fff; }

        .logo-img { height: 75px; filter: drop-shadow(0 0 10px var(--gold-glow)); }
        .mr-ezz-img { height: 95px; border-radius: 15px; border: 3px solid var(--primary-gold); box-shadow: 0 0 20px var(--gold-glow); }

        .session-info { text-align: center; flex-grow: 1; }
        .session-info h1 { 
            font-size: 3rem; /* Larger for the 4-meter rule */
            letter-spacing: -1px;
            text-transform: uppercase;
            color: #fff;
        }
        .session-info span { color: var(--primary-gold); font-weight: 900; }

        /* --- Content Grid (Interactive & Focused) --- */
        .content-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 35px; 
            padding: 50px; 
            overflow-y: auto;
            flex-grow: 1;
        }

        .content-card {
            background: var(--card-bg); 
            border: 2px solid rgba(255,255,255,0.1);
            padding: 40px; 
            border-radius: 25px; 
            text-align: center; 
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            backdrop-filter: blur(10px);
            outline: none;
        }

        /* Keyboard Focus & Hover */
        .content-card:hover, .content-card:focus { 
            border-color: var(--primary-gold); 
            background: rgba(197,160,89,0.15);
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px var(--gold-glow);
        }

        .content-card h2 { 
            font-size: 2.5rem; /* Massive font for readability */
            font-weight: 900;
            color: #fff;
            line-height: 1.2;
        }

        /* --- Full Screen Stage --- */
        #activity-stage { position: fixed; inset: 0; background:#000; z-index: 8000; display: none; }
        #stage-content { width: 100%; height: 100%; }

        .exit-btn {
            position: fixed; top: 25px; right: 25px; z-index: 9999;
            padding: 15px 35px; font-size: 1.5rem; font-weight: 900;
            background: #d63031; color: white; border: none;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 20px rgba(214, 48, 49, 0.5);
        }

        /* --- Toolbox (Advanced) --- */
        .toolbox-wrapper { position: fixed; bottom: 40px; right: 40px; z-index: 12000; display: flex; flex-direction: column-reverse; gap: 20px; }
        .tool-btn { 
            width: 80px; height: 80px; border-radius: 50%; 
            background: #1a1a1a; border: 4px solid var(--primary-gold); 
            color: var(--primary-gold); font-size: 2rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translateY(30px) scale(0);
        }
        .tool-btn.main-toggle { opacity: 1; transform: scale(1); background: var(--primary-gold); color: #000; }
        .toolbox-wrapper.open .tool-btn { opacity: 1; transform: translateY(0) scale(1); }
        .tool-btn.active { background: #ff4757; color: white; border-color: #fff; transform: scale(1.2); }

        /* --- Floating Tools Elements --- */
        #quick-note-container { 
            position: fixed; inset: 0; z-index: 13000; display: none;
            background: rgba(0,0,0,0.97); flex-direction: column; justify-content: center; align-items: center;
        }
        #smart-note-input { 
            background: transparent; border: none; border-bottom: 5px solid var(--primary-gold);
            color: var(--primary-gold); width: 85%; font-size: 6rem; text-align: center;
            outline: none; font-weight: 900; resize: none;
        }
        #laser-pointer { 
            position: fixed; width: 30px; height: 30px; 
            background: radial-gradient(circle, #ff0000 0%, rgba(255,0,0,0) 80%);
            border-radius: 50%; box-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            pointer-events: none; z-index: 14000; display: none;
        }
        #drawing-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 8500; }
        #freeze-layer { position: fixed; inset: 0; z-index: 11000; background: rgba(0,0,0,0.9); display: none; cursor: grab; overflow: hidden; }
        #freeze-content { position: absolute; transform-origin: 0 0; }

    </style>
</head>
<body>

    <header class="top-banner">
        <button class="back-btn" onclick="window.location.href='vetoof.html'">← BACK</button>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        <div class="session-info">
            <h1 id="display-title">VETO <span>BOARD</span></h1>
        </div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage">
        <button class="exit-btn" onclick="closeStage()">✖ CLOSE ACTIVITY</button>
        <div id="stage-content"></div>
    </div>

    <div id="quick-note-container">
        <textarea id="smart-note-input" placeholder="WRITE HERE..." rows="1"></textarea>
        <p style="color:white; opacity:0.5; margin-top:30px; font-size:1.5rem;">PRESS [ESC] TO DISMISS</p>
    </div>

    <div id="freeze-layer"><div id="freeze-content"></div></div>
    <div id="laser-pointer"></div>
    <canvas id="drawing-canvas"></canvas>

    <div class="toolbox-wrapper" id="toolBox">
        <button class="tool-btn main-toggle" onclick="toggleToolBox()">🛠️</button>
        <button class="tool-btn" id="laserBtn" title="Laser Pointer" onclick="toggleLaserMode()">🔦</button>
        <button class="tool-btn" id="freezeBtn" title="Freeze & Zoom" onclick="toggleFreezeMode()">❄️</button>
        <button class="tool-btn" id="reloadBtn" title="Reload" onclick="location.reload()">🔄</button>
        <button class="tool-btn" id="noteBtn" title="Flash Note" onclick="toggleNote()">📝</button>
    </div>

    <script src="data/levels.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentSessionId = urlParams.get('session');
        let isLaserMode = false;
        let isFreezeMode = false;
        const canvas = document.getElementById('drawing-canvas');
        const laser = document.getElementById('laser-pointer');
        const ctx = canvas.getContext('2d');

        // Zoom & Pan State
        let scale = 1, posX = 0, posY = 0, startX = 0, startY = 0, isDragging = false;

        function updateDynamicTitle() {
            if (currentSessionId) {
                const parts = currentSessionId.split('-');
                if (parts.length === 2) {
                    document.getElementById('display-title').innerHTML = `LEVEL <span>${parts[0]}</span> | SESSION <span>${parts[1]}</span>`;
                }
            }
        }

        function initSession() {
            updateDynamicTitle();
            if (!currentSessionId || !sessionData[currentSessionId]) return;
            
            const container = document.getElementById('content-container');
            sessionData[currentSessionId].forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.tabIndex = "0"; // Make focusable for keyboard
                card.onclick = () => openActivity(item);
                card.innerHTML = `<h2>${item}</h2>`;
                
                // Keyboard Enter Support
                card.addEventListener('keydown', (e) => {
                    if(e.key === 'Enter') openActivity(item);
                });

                container.appendChild(card);
            });

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            setupFreezeControls();
            handleLaserDrawing();
        }

        // Mapping & File Loading Logic (Your Original Logic Preserved)
        async function openActivity(activityName) {
            if (!currentSessionId) return;
            const [lvl, sess] = currentSessionId.split('-');
            let filePath = "";
            const nameUpper = activityName.toUpperCase();

            if (nameUpper.includes("TONGUE")) filePath = `data/L-${lvl}-S-${sess}-Ton.js`;
            else if (nameUpper.includes("ONE SHOT")) filePath = `data/L-${lvl}-S-${sess}-One.js`;
            else if (nameUpper.includes("GRAMMAR")) filePath = `data/L-${lvl}-S-${sess}-Gra.js`;
            else if (nameUpper.includes("GP")) filePath = `data/L-${lvl}-${sess}-GP.js`;
            else if (nameUpper.includes("PROJECT")) filePath = `data/L-${lvl}-S-${sess}-Pro.js`;
            else if (nameUpper.includes("WISH")) filePath = `data/L-${lvl}-S-${sess}-Wis.js`;
            else if (nameUpper.includes("SQUEEZER")) filePath = `data/L-${lvl}-S-${sess}-${nameUpper.includes("TEST") ? "Squt" : "Squr"}.js`;
            else if (nameUpper.includes("DMT")) filePath = nameUpper.includes("TEST") ? `data/Timer.js` : `data/L-${lvl}-S-${sess}-DMT.js`;
            else if (nameUpper.includes("LISTENING")) filePath = nameUpper.includes("INTRO") ? `data/L-${lvl}-S-${sess}-Lin.js` : `data/L-${lvl}-S-${sess}-Lis.js`;
            else if (nameUpper.includes("VOCAB")) filePath = `data/L-${nameUpper.includes("TEST") ? "2" : "1"}-${lvl}-S-${sess}-Voc.js`;
            else if (nameUpper.includes("READING")) filePath = `data/L-${lvl}-S-${sess}-Rea.js`;
            else filePath = `data/L-1-${lvl}-S-${sess}-${activityName.split(' ')[0].substring(0, 3)}.js`;

            document.getElementById('activity-stage').style.display = 'block';
            const stage = document.getElementById('stage-content');
            stage.innerHTML = "";
            
            const script = document.createElement('script');
            script.src = filePath;
            script.onerror = () => { alert("File not found: " + filePath); closeStage(); };
            document.head.appendChild(script);
        }

        function closeStage() {
            document.getElementById('activity-stage').style.display = 'none';
            document.getElementById('stage-content').innerHTML = "";
        }

        function toggleToolBox() { document.getElementById('toolBox').classList.toggle('open'); }

        // --- LASER SYSTEM ---
        function toggleLaserMode() {
            isLaserMode = !isLaserMode;
            document.getElementById('laserBtn').classList.toggle('active');
            canvas.style.pointerEvents = isLaserMode ? 'auto' : 'none';
        }

        function handleLaserDrawing() {
            window.addEventListener('mousedown', (e) => {
                if(!isLaserMode) return;
                laser.style.display = 'block';
                ctx.clearRect(0, 0, canvas.width, canvas.height); 
                ctx.beginPath();
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 6;
                ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                ctx.moveTo(e.clientX, e.clientY);

                const draw = (m) => {
                    ctx.lineTo(m.clientX, m.clientY); ctx.stroke();
                    laser.style.left = m.clientX - 15 + 'px'; laser.style.top = m.clientY - 15 + 'px';
                };
                const stop = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); 
                    laser.style.display = 'none';
                    window.removeEventListener('mousemove', draw);
                    window.removeEventListener('mouseup', stop);
                };
                window.addEventListener('mousemove', draw);
                window.addEventListener('mouseup', stop);
            });
        }

        // --- FREEZE & ZOOM SYSTEM ---
        async function toggleFreezeMode() {
            const layer = document.getElementById('freeze-layer');
            const content = document.getElementById('freeze-content');
            const btn = document.getElementById('freezeBtn');
            
            if (!isFreezeMode) {
                const target = document.getElementById('activity-stage').style.display === 'block' ? 
                               document.getElementById('activity-stage') : document.body;
                
                html2canvas(target, { useCORS: true, backgroundColor: "#000" }).then(canvasImg => {
                    content.innerHTML = '';
                    content.appendChild(canvasImg);
                    layer.style.display = 'block';
                    isFreezeMode = true;
                    btn.classList.add('active');
                    scale = 1; posX = 0; posY = 0;
                    updateTransform();
                });
            } else {
                layer.style.display = 'none';
                isFreezeMode = false;
                btn.classList.remove('active');
            }
        }

        function updateTransform() {
            document.getElementById('freeze-content').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function setupFreezeControls() {
            const layer = document.getElementById('freeze-layer');
            layer.onwheel = (e) => {
                if (!isFreezeMode) return;
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                scale = Math.min(Math.max(0.5, scale * delta), 6);
                updateTransform();
            };

            const start = (e) => {
                if(!isFreezeMode) return;
                isDragging = true;
                const t = e.touches ? e.touches[0] : e;
                startX = t.clientX - posX; startY = t.clientY - posY;
            };
            const move = (e) => {
                if (!isDragging || !isFreezeMode) return;
                const t = e.touches ? e.touches[0] : e;
                posX = t.clientX - startX; posY = t.clientY - startY;
                updateTransform();
            };

            layer.onmousedown = start; layer.ontouchstart = start;
            window.onmousemove = move; window.ontouchmove = move;
            window.onmouseup = window.ontouchend = () => isDragging = false;
        }

        // --- QUICK NOTES ---
        function toggleNote() {
            const container = document.getElementById('quick-note-container');
            const isOpen = container.style.display === 'flex';
            container.style.display = isOpen ? 'none' : 'flex';
            if(!isOpen) {
                const input = document.getElementById('smart-note-input');
                input.value = "";
                setTimeout(() => input.focus(), 100);
            }
        }

        // Global Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('quick-note-container').style.display === 'flex') {
                    toggleNote();
                } else if (isFreezeMode) {
                    toggleFreezeMode();
                } else if (document.getElementById('activity-stage').style.display === 'block') {
                    closeStage();
                }
            }
            if (e.key === 'n' || e.key === 'N') toggleNote();
            if (e.key === 'l' || e.key === 'L') toggleLaserMode();
            if (e.key === 'f' || e.key === 'F') toggleFreezeMode();
        });

        window.onload = initSession;
    </script>
</body>
</html>
