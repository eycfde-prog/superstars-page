<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veto Program - Optimized Background</title>
    <style>
        :root {
            --primary-bg: #000;
            --text-color: #ffffff;
            --overlay-opacity: 0.4; /* زيادة التباين قليلاً لبروز النص */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--primary-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* حاوية الخلفية المطورة */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* تحديث الرابط ليشير إلى الفرع الرئيسي لضمان الاستمرارية */
            background-image: url('https://cdn.jsdelivr.net/gh/eycfde-prog/EYCVetoProgram@main/vetoofb.webp');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 1; /* جعلها في الأسفل */
            transition: opacity 0.5s ease-in-out;
        }

        /* الطبقة الضبابية (Overlay) لضمان وضوح النص */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, var(--overlay-opacity));
            z-index: 2;
        }

        .main-stage {
            position: relative; /* لضمان ظهور المحتوى فوق الـ fixed elements */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
            z-index: 3;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 12vw, 8rem); 
            font-weight: 900;
            letter-spacing: -2px;
            text-shadow: 0 10px 50px rgba(0,0,0,1);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="overlay"></div>

    <main class="main-stage">
        <h1>VETO PROGRAM</h1>
    </main>

    <script>
        // كود بسيط للتأكد من تحميل الصورة بنجاح
        const bg = document.querySelector('.background-container');
        const img = new Image();
        img.src = "https://cdn.jsdelivr.net/gh/eycfde-prog/EYCVetoProgram@main/vetoofb.webp";
        img.onerror = function() {
            console.error("WOLF Error: فشل تحميل صورة الخلفية من GitHub.");
            bg.style.backgroundColor = "#111"; // خلفية احتياطية
        };
    </script>
</body>
</html>
