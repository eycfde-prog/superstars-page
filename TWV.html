<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الوادي الأبيض — عزالدين علي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --parchment: #ede5d0;
    --gold: #b8902a;
    --gold-light: #d4af5a;
    --snow: #e8eef4;
    --mist: #c8d8e8;
    --accent: #2c4a6e;
    --text-muted: #6b5d4a;
    --divider: #c8b888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== LANDING PAGE ===== */
  #landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .landing-bg {
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 50% 110%, #1e3a5f 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 20% 80%, #0d2035 0%, transparent 60%),
      linear-gradient(180deg, #080d14 0%, #0f1e30 40%, #162840 100%);
    z-index: 0;
  }

  /* Snow particles */
  .snow-container {
    position: absolute;
    inset: 0;
    z-index: 1;
    overflow: hidden;
    pointer-events: none;
  }

  .snowflake {
    position: absolute;
    top: -10px;
    color: rgba(255,255,255,0.6);
    font-size: 1em;
    animation: snowfall linear infinite;
  }

  @keyframes snowfall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }

  /* Mountain silhouette */
  .mountain-svg {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    opacity: 0.7;
  }

  /* Landing content */
  .landing-content {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 3rem 2rem;
    text-align: center;
  }

  .badge {
    font-family: 'Tajawal', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--gold-light);
    text-transform: uppercase;
    border: 1px solid rgba(184,144,42,0.4);
    padding: 0.4rem 1.5rem;
    border-radius: 2rem;
    margin-bottom: 2.5rem;
    animation: fadeInDown 1s ease both;
  }

  .main-title {
    font-family: 'Amiri', serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    font-weight: 700;
    line-height: 1.1;
    color: #fff;
    text-shadow: 0 0 80px rgba(184,144,42,0.3), 0 4px 30px rgba(0,0,0,0.8);
    animation: fadeInUp 1s ease 0.3s both;
    margin-bottom: 0.5rem;
  }

  .title-en {
    font-family: 'Tajawal', sans-serif;
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 300;
    color: var(--mist);
    letter-spacing: 0.4em;
    opacity: 0.8;
    animation: fadeInUp 1s ease 0.5s both;
    margin-bottom: 2.5rem;
  }

  .divider-ornament {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0 2.5rem;
    animation: fadeIn 1s ease 0.7s both;
  }

  .divider-ornament::before,
  .divider-ornament::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    max-width: 120px;
  }

  .diamond {
    width: 8px;
    height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .synopsis {
    font-size: clamp(1rem, 2.5vw, 1.15rem);
    font-weight: 300;
    line-height: 2;
    color: rgba(232,238,244,0.85);
    max-width: 600px;
    animation: fadeInUp 1s ease 0.9s both;
    margin-bottom: 3rem;
  }

  .meta-row {
    display: flex;
    gap: 2.5rem;
    align-items: center;
    justify-content: center;
    margin-bottom: 3.5rem;
    animation: fadeIn 1s ease 1.1s both;
    flex-wrap: wrap;
  }

  .meta-item {
    text-align: center;
  }

  .meta-label {
    font-size: 0.75rem;
    color: var(--gold-light);
    letter-spacing: 0.2em;
    margin-bottom: 0.3rem;
    opacity: 0.8;
  }

  .meta-value {
    font-family: 'Amiri', serif;
    font-size: 1.1rem;
    color: #fff;
  }

  .meta-sep {
    width: 1px;
    height: 40px;
    background: rgba(184,144,42,0.3);
  }

  .chapters-preview {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 3.5rem;
    animation: fadeIn 1s ease 1.2s both;
  }

  .ch-pill {
    font-size: 0.78rem;
    padding: 0.35rem 1rem;
    border: 1px solid rgba(184,144,42,0.3);
    border-radius: 2rem;
    color: rgba(232,238,244,0.7);
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.03);
  }

  .ch-pill:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(184,144,42,0.1);
  }

  .cta-btn {
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    padding: 1rem 3.5rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--ink);
    border: none;
    border-radius: 3rem;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 0.05em;
    transition: all 0.3s ease;
    box-shadow: 0 4px 30px rgba(184,144,42,0.4);
    animation: fadeInUp 1s ease 1.4s both;
    position: relative;
    overflow: hidden;
  }

  .cta-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .cta-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 40px rgba(184,144,42,0.6);
  }

  .cta-btn:hover::after { opacity: 1; }

  .scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    color: rgba(255,255,255,0.3);
    font-size: 0.75rem;
    animation: bounce 2s ease infinite 2s;
  }

  .scroll-arrow {
    width: 20px;
    height: 20px;
    border-left: 1px solid rgba(255,255,255,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.3);
    transform: rotate(-45deg);
  }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(8px); }
  }

  /* ===== READER PAGE ===== */
  #reader {
    display: none;
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    position: relative;
  }

  /* Progress bar */
  .progress-bar {
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    height: 3px;
    background: rgba(0,0,0,0.1);
    z-index: 100;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    width: 0%;
    transition: width 0.1s;
  }

  /* Reader header */
  .reader-header {
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    z-index: 99;
    padding: 0.8rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(245,240,232,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(184,144,42,0.2);
    gap: 1rem;
    flex-wrap: wrap;
  }

  .header-title {
    font-family: 'Amiri', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--ink);
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    background: none;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 0.5rem;
    padding: 0.35rem 0.8rem;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--text-muted);
    font-family: 'Tajawal', sans-serif;
    transition: all 0.2s;
  }

  .ctrl-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .font-size-display {
    font-size: 0.8rem;
    color: var(--text-muted);
    min-width: 30px;
    text-align: center;
  }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gold);
    font-family: 'Amiri', serif;
    font-size: 1rem;
    padding: 0.3rem 0.8rem;
    border-radius: 0.5rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .back-btn:hover { background: rgba(184,144,42,0.1); }

  /* Chapter nav */
  .chapter-nav {
    position: fixed;
    top: 60px;
    right: 0;
    left: 0;
    z-index: 98;
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.6rem 1rem;
    background: rgba(245,240,232,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(184,144,42,0.15);
    flex-wrap: wrap;
  }

  .ch-nav-btn {
    font-family: 'Tajawal', sans-serif;
    font-size: 0.8rem;
    padding: 0.3rem 1rem;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 2rem;
    cursor: pointer;
    background: none;
    color: var(--text-muted);
    transition: all 0.25s;
    white-space: nowrap;
  }

  .ch-nav-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .ch-nav-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #fff;
  }

  /* Reading area */
  .reading-area {
    padding-top: 120px;
    padding-bottom: 6rem;
    max-width: 720px;
    margin: 0 auto;
    padding-right: 2rem;
    padding-left: 2rem;
  }

  /* Chapter title area */
  .chapter-header {
    text-align: center;
    padding: 3rem 0 2rem;
    border-bottom: 1px solid var(--divider);
    margin-bottom: 3rem;
  }

  .chapter-num {
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 1rem;
  }

  .chapter-title {
    font-family: 'Amiri', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 1.5rem;
  }

  .chapter-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
  }

  .chapter-ornament::before,
  .chapter-ornament::after {
    content: '';
    width: 60px;
    height: 1px;
    background: var(--divider);
  }

  .chapter-ornament-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* Paragraphs */
  .story-text p {
    font-family: 'Amiri', serif;
    font-size: var(--reading-font-size, 1.2rem);
    line-height: 2.1;
    color: var(--ink);
    margin-bottom: 1.6em;
    text-align: justify;
  }

  .story-text p.dialogue {
    padding-right: 1.5rem;
    border-right: 3px solid var(--gold-light);
    color: #2a1a08;
  }

  .section-break {
    text-align: center;
    margin: 2.5rem 0;
    color: var(--gold);
    font-size: 1.2rem;
    letter-spacing: 0.5em;
    opacity: 0.6;
  }

  /* Night mode */
  body.night #reader {
    background: #0f0e0c;
    color: #d4c9b5;
  }

  body.night .reader-header,
  body.night .chapter-nav {
    background: rgba(15,14,12,0.95);
    border-color: rgba(184,144,42,0.2);
  }

  body.night .header-title,
  body.night .chapter-title,
  body.night .story-text p {
    color: #d4c9b5;
  }

  body.night .ctrl-btn { color: #8a7a66; border-color: rgba(255,255,255,0.1); }
  body.night .ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }
  body.night .ch-nav-btn { color: #8a7a66; border-color: rgba(255,255,255,0.1); }
  body.night .story-text p.dialogue { color: #c4b89e; }
  body.night .back-btn { color: var(--gold-light); }
  body.night .chapter-num { color: var(--gold-light); }

  /* Chapter transition */
  .chapter-content {
    animation: fadeIn 0.5s ease;
  }

  /* Footer in reader */
  .reader-footer {
    text-align: center;
    padding: 3rem 2rem;
    border-top: 1px solid var(--divider);
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .chapter-end-nav {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .nav-btn-end {
    font-family: 'Amiri', serif;
    padding: 0.7rem 2rem;
    border: 1px solid var(--divider);
    border-radius: 2rem;
    cursor: pointer;
    background: none;
    color: var(--text-muted);
    font-size: 1rem;
    transition: all 0.2s;
  }

  .nav-btn-end:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(184,144,42,0.05);
  }

  body.night .nav-btn-end { color: #8a7a66; border-color: rgba(255,255,255,0.1); }
  body.night .reader-footer { color: #6a5a4a; border-color: rgba(255,255,255,0.1); }
  body.night .chapter-header { border-color: rgba(255,255,255,0.1); }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  /* Time indicator */
  .reading-time {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 1rem;
    opacity: 0.7;
  }

  /* Sepia mode */
  body.sepia #reader { background: #f4ead0; }
  body.sepia .reader-header, body.sepia .chapter-nav { background: rgba(244,234,208,0.95); }

  @media (max-width: 600px) {
    .meta-sep { display: none; }
    .meta-row { gap: 1.5rem; }
    .reading-area { padding-right: 1.2rem; padding-left: 1.2rem; }
    .reader-header { padding: 0.6rem 1rem; }
    .chapter-nav { top: 55px; }
    .reading-area { padding-top: 130px; }
  }
</style>
</head>
<body>

<!-- ===== LANDING ===== -->
<div id="landing">
  <div class="landing-bg"></div>

  <!-- Snow animation -->
  <div class="snow-container" id="snowContainer"></div>

  <!-- Mountain SVG -->
  <svg class="mountain-svg" viewBox="0 0 1440 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <linearGradient id="mtnGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#e8eef4" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#0f1e30" stop-opacity="0.9"/>
      </linearGradient>
    </defs>
    <polygon points="0,300 0,180 200,60 400,150 600,20 800,130 1000,40 1200,160 1440,80 1440,300" fill="url(#mtnGrad)"/>
    <polygon points="0,300 0,220 150,140 300,200 500,100 700,170 900,90 1100,180 1300,120 1440,160 1440,300" fill="rgba(8,13,20,0.6)"/>
    <!-- Snow caps -->
    <polygon points="200,60 170,100 230,100" fill="rgba(232,238,244,0.4)"/>
    <polygon points="600,20 560,80 640,80" fill="rgba(232,238,244,0.5)"/>
    <polygon points="1000,40 960,100 1040,100" fill="rgba(232,238,244,0.4)"/>
  </svg>

  <div class="landing-content">
    <div class="badge">رواية • غموض وإثارة</div>

    <h1 class="main-title">الوادي الأبيض</h1>
    <div class="title-en">THE WHITE VALLEY</div>

    <div class="divider-ornament">
      <div class="diamond"></div>
    </div>

    <p class="synopsis">
      في قلب جبال لامبرث الشمالية، وراء كهفٍ يُفتح مرةً كل عام، يهوي مدرس التاريخ كلاي إلى عالمٍ من الصمت والثلج والأسرار. وادٍ يعيش فيه شعبٌ بلا عيون — لكنه يرى كل شيء.
    </p>

    <div class="meta-row">
      <div class="meta-item">
        <div class="meta-label">المؤلف</div>
        <div class="meta-value">عزالدين علي</div>
      </div>
      <div class="meta-sep"></div>
      <div class="meta-item">
        <div class="meta-label">السنة</div>
        <div class="meta-value">٢٠٢٦</div>
      </div>
      <div class="meta-sep"></div>
      <div class="meta-item">
        <div class="meta-label">الفصول</div>
        <div class="meta-value">٥ فصول</div>
      </div>
    </div>

    <div class="chapters-preview" id="landingChapters"></div>

    <button class="cta-btn" onclick="openReader(0)">
      ابدأ القراءة ←
    </button>
  </div>

  <div class="scroll-hint">
    <span>الفصول</span>
    <div class="scroll-arrow"></div>
  </div>
</div>

<!-- ===== READER ===== -->
<div id="reader">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <header class="reader-header">
    <button class="back-btn" onclick="goBack()">← الغلاف</button>
    <div class="header-title" id="headerTitle">الوادي الأبيض</div>
    <div class="header-controls">
      <button class="ctrl-btn" onclick="changeFontSize(-1)">أ−</button>
      <span class="font-size-display" id="fontSizeDisplay">19</span>
      <button class="ctrl-btn" onclick="changeFontSize(1)">أ+</button>
      <button class="ctrl-btn" id="themeBtn" onclick="cycleTheme()">🌙</button>
    </div>
  </header>

  <nav class="chapter-nav" id="chapterNav"></nav>

  <div class="reading-area">
    <div id="chapterContent"></div>
  </div>
</div>

<script>
const CHAPTERS_DATA = [["كان كلاي مدرساً للتاريخ في إحدى المدارس الثانوية بإنجلترا، رجلاً تسكنه ملامح الماضي ويعزز الفضولُ مسارَ أيامه. لم يكن شغفه محصوراً بين طيات الكتب فحسب، بل كان يهوى معانقة القمم وتسلق الجبال الشاهقة. وحين عرض عليه صديقه جون خوض مغامرة لتسلق جبل ثلجي لم تطأه أقدام الكثيرين، لم يتردد؛ فقد رأى في ذلك التحدي وقوداً لفضوله ونجاحاً جديداً يضاف إلى سجل إنجازاته.", "في مدينة \"لامبرث\" الجبلية القابعة على حدود المملكة الشمالية، حيث تتوارى الشمس خلف الغيوم أغلب فترات العام، بدأت الرحلة. وكعادته كمتسلقٍ ماهر ورجل تربويّ يحتكم للمنطق قبل كل شيء، أعدّ كلاي عُدّته بمنتهى الحرص، متأكداً من كفاءة معدات الإنقاذ قبل أدوات التسلق ذاتها.", "على النقيض تماماً، كان جون يتسم بالاستهتار، مما جعل \"كلاي\" يمطره بوابل من النصائح التربوية والتحذيرات، الأمر الذي لم يرق لصديقه. ردّ جون بتهكمه المعتاد محاولاً النيل من عزيمة \"كلاي\":", "\"أنت لا تملك الشجاعة الكافية لتواجه كلباً مروّضاً يا كلاي! فكيف لك أن تفهم منطق المغامرة كما أفهمه أنا؟\"", "كان جون يدرك جيداً نقطة ضعف صديقه؛ فـ \"كلاي\" يعاني من فوبيا تجاه الحيوانات آكلة اللحوم، كالقطط والكلاب وما شابهها. ورغم ذلك، كان كلاي يوقن في قرارة نفسه أنه ليس بجبان؛ فمن يروض الجبال الشاهقة لا يمكن وصفه بالخوف، هو فقط يفضل الابتعاد عن تلك الكائنات قدر المستطاع.", "أشرق يوم الحسم، ووصل الصديقان إلى سفح الجبل. أحكم كل منهما ربط حباله وبدأا رحلة الصعود. ورغم شموخ الجبل وارتفاعه الشاهق، إلا أن مساراته كانت ممهدة بشكل مفاجئ، مما مكنهما من بلوغ القمة في زمن قياسي.", "حين استقرا فوق القمة، غمرت السعادة قلب كلاي، لكن ملامح جون كانت تشي بخيبة أمل غريبة؛ إذ بدأ يطوف حول الحواف ويبحث في الأرجاء باضطراب. استغرب كلاي من سلوكه واستفسر عن سبب وجومه، فأجابه جون بنبرة ملؤها الحيرة: \"لقد أجريتُ حساباتي بدقة يا كلاي.. ولكن، أين الكهف؟\"", "ساد صمتٌ ثقيل قطعه \"كلاي\" بنظرة حائرة، قبل أن يكسر \"جون\" الجمود بنبرة اعتذار لم يعتدها صديقه: \"كلاي، أرجوك سامحني.. لم أكن أنوي خداعك، لكنني جئتُ بك إلى هنا لسبب يتجاوز مجرد التسلق.\"", "ظل \"كلاي\" صامتاً، يحاول استيعاب الكلمات بينما استمر \"جون\" في تمشيط القمة بعينيه القلقتين وهو يتابع حديثه: \"لقد التقيتُ بأحد كبار المتسلقين المحترفين في حفلةٍ صاخبة، ودار بيننا حديث طويل عن القمم والأسرار المدفونة. أخبرني أن هذا الجبل تحديداً يشهد انهياراً ثلجياً دورياً؛ وبعد كل انهيار، ينكشف كهفٌ غامض عند القمة. يظل هذا الكهف مفتوحاً لعام كامل، حتى يأتي الانهيار التالي فيغلقه، وهكذا دواليك.. سنة يفتح فيها أبوابه، وسنة يطبق فيها على أسراره.\"", "انعقد حاجبا \"كلاي\" دهشةً، وسأل بوجل: \"وهبْ أنَّ المعلومة صحيحة، ما الذي تريده من هذا الكهف يا جون؟\"", "توقف \"جون\" عن البحث فجأة، والتفت إلى صديقه هامساً بصوتٍ خفيض وكأنه يخشى أن تسمعه الجبال: \"هذا الكهف ليس مجرد فجوة في الصخر يا كلاي.. إنه معبرٌ يقود إلى قرية مفقودة، قريةٍ تخبئ في جوفها جنةً لا تخطر على قلب بشر.\"", "لم يكد \"جون\" يُنهي جملته حتى اهتزت الأرض تحت أقدامهما بعنف؛ زلزالٌ مباغت ضرب أعماق الجبل. وفي غضون ثوانٍ، تحول الثلج الساكن إلى وحشٍ أبيض هائج انقضّ عليهما. جرفهما الانهيار بعيداً، ليرتطما بالصخور ويهويا في اتجاهين متناقضين: \"جون\" سقط نحو عالمنا الذي نعرفه، أما \"كلاي\"، فقد هوى إلى عمق \"الوادي الأبيض\".", "عندما استعاد \"كلاي\" وعيه، كان أول ما أدركه هو أنه لا يزال على قيد الحياة، لكن الألم كان ينهش كل عضلة في جسده. أحس بسخونة غير مبررة تسري في قدمه اليسرى، ليدرك بمرارة أنه فقد وعيه أثناء السقوط وأن كاحله قد تهشم تماماً.", "سعل بقوة وهو يتأوه، حاول التحرك لكنه فشل في البداية. استلقى على ظهره فوق الجليد البارد، وظل يصرخ باسم \"جون\" لفتره، آملاً في ردٍ يكسر حدة الصمت، لكن لم يجبه سوى صدى صوته والعراء اللامتناهي. لم يكن حوله سوى بياض الثلج، وعلى مد البصر، لمحت عيناه أشباحَ أشجارٍ بعيدة.", "تحامل على نفسه وبذل جهداً مضنياً ليقف على قدم واحدة، في عملية استنزفت منه فترة أخرى من العذاب. نادى مجدداً، استغاث بكل قوته، لكن الصمت كان سيد الموقف. تطلع إلى السماء فرأى أذيال الليل تدنو سريعة، وأدرك أن عليه البحث عن مأوى ودفء قبل أن يفتك به الصقيع.", "ولحسن الحظ، كانت حقيبته لا تزال معه، وبها خيمته ومؤنٌ تكفيه لبعض الوقت، لكن \"إلى متى؟\". بفضل خبرته كمتسلق محترف، تمكن من جمع بعض الحطب وإشعال نارٍ صغيرة احتمى بها داخل تجويف صخري ضيق في الجبل الذي سقط منه، ليكون له درعاً من الرياح العاتية.", "تحت ضوء النار الخافت، فحص ساقه المصابة بألم؛ كانت الإصابة بليغة وتحتاج لتدخل طبي يتجاوز إمكانيات حقيبة الإسعافات البدائية التي يحملها. وبينما كان يخطط للزحف جنوباً مع بزوغ الفجر بحثاً عن أي أثر للبشر، اخترق هدوء الليل عويل ذئابٍ بعيدة.", "انقبض قلبه، وتسلل الرعب إلى أعماقه؛ فهو الذي يخشى أصغر الحيوانات، يجد نفسه الآن جريحاً في مواجهة ضواري الجبال. ومن الارهاق والالم استسلم لغفوة مضطربة، وعيناه تارةً تغمضان من التعب، وتارةً تنفتحان برعب مع كل حركة ريح، مترقباً ظهور تلك الأنياب في الظلام.", "لم يهنأ \"كلاي\" بنومٍ عميق؛ فقد استيقظ فجأة على صوت زمجرةٍ مكتومة اهتزت لها جدران خيمته. فتح عينيه ليجد نفسه وجهاً لوجه مع كابوسٍ حيّ: ذئبٌ ضخم، كان يقف علي مدخل الخيمة الضيقة وراسه الضخمة للداخل.", "شلّ الرعب أطراف \"كلاي\" تماماً. هو الذي يرتعد من مجرد رؤية كلبٍ منزلي أليف، يجد نفسه الآن تحت رحمة ذئب تلمع أنيابه في الظلام. تقدم، فجأة انقضّ على عنقه بحركة خاطفة. وبدافعٍ غريزي للبقاء، رفع \"كلاي\" ذراعه ليحمي وجهه، فغرز الذئب أنيابه في لحمه. لم يحتمل عقل \"كلاي\" هذا المزيج من الألم الجسدي والرعب النفسي، فأظلمت الدنيا في عينيه واستسلم لغيبوبةٍ عميقة.", "فتح \"كلاي\" عينيه في اليوم التالي، لم يصدق أنه نجا للمرة الثانية. كان جسده لا يزال يرتجف من بقايا الصدمة، لكنه بدأ يهدأ وهو يتأمل المكان من حوله. لم يكن في خيمته الضيقة، بل في خيمةٍ فارهة مخدومة بعناية؛ سقفها مزخرف بنقوش، وجدرانها تزدان بجلود حيواناتٍ.", "وهناك فتاةً في العشرينيات من عمرها، تعطي له ظهرها وتنشغل بعملٍ ما باهتمامٍ. كانت ترتدي ثوباً يشبه العباءات الهندية بلونٍ ذهبي أخاذ، وتتدلى على ظهرها ضفيرة سوداء طويلة.", "استدارة الفتاة وهي تحمل طبقاً من الحساء الساخن وتتقدم نحوه بثبات. كانت الخيمة مضاءة بمصابيح زيتية، ومع اقترابها من الضوء، راي \"كلاي\" فتاة جميلة؛ بشرة بيضاء،", "وحواجب ورموش. لكن، حين اقتربت أكثر، لم يكن للفتاة عينان. كانت جفونها منغلقة للداخل بعمق، محجريها خاليان من العينين.", "شعر \"كلاي\" بغصة في قلبه؛ فالحسنُ -كما يقال- لا يكتمل. شعر باسف لحالها، وحين حاول الاعتدال في جلسته، شعر بوخزٍ في ذراعه، ليجد أن عضة الذئب قد ضُمّدت بعناية.", "تسمّر \"كلاي\" في مكانه حين تقدمت الفتاة نحوه بمشيةٍ واثقة لا تردد فيها، ووضعت قدر الحساء في حجره مباشرةً دون أن تهرق منه قطرة واحدة. انخلع قلبه رعباً من شدة الدقة؛ كيف لمكفوفة أن تحدد مكانه وحجره بهذه البساطة وكأنها تراه بوضوح؟ والأدهى من ذلك، أنها تراجعت خطوتين للخلف وجلست على مقعدٍ خلفها مباشرةً دون أن تتحسس مكانه، ثم ارتسمت على وجهها أجمل ابتسامة.", "امتزجت فصوصٍ عقله من الحيرة؛ هل هي مغمضة العينين فحسب أم أنَّ الظلام قدرُها المحتوم؟ لم يتمالك نفسه، فمال بجسده نحوها، مقترباً بعينيه. كانت تجلس تحت وهج المصباح مباشرة، ومع ذلك، لم يرَ سوى خطين دقيقين تزدانان برموشٍ، خلفهم محجرين غائرين بلا أعين.", "بدت \"مليكة\" وكأنها استشعرت حركته رغم البعد الذي يفصلهما؛ تلاشت ابتسامتها تدريجياً، وعقدت يديها فوق ركبتيها في خجلٍ، وكأنها \"رأت\" تحديقه القريب. اتسعت عينا \"كلاي\" دهشةً، وقبل أن ينطق بكلمة، بادرت هي بصوتٍ عذب: \"أهلاً بك.. أنا أُدعى مليكة، وأعيش هنا في وادي لامبرث. هل أنت بخير الآن؟\"", "تعجب \"كلاي\" من لغتها الإنجليزية السليمة ولكنتها الواضحة. صمت للحظات ليستجمع شتات نفسه ثم أجاب: \"أشكركِ.. أنا بخير الآن. وأشكركِ لأنكِ أنقذتِ حياتي من ذلك الذئب، أنا مدينٌ لكِ.\"", "انطلقت ضحكةٌ رقيقة وهي تقول: \"إن كان هناك من يستحق الشكر حقاً، فهو (بن)؛ فهو من خلّصك من قبضة ذلك الذئب الضخم.\"", "سحرته ضحكتها، فسألها عن هوية \"بن\". أوضحت له بهدوء أنه أحد الرجال التابعين لكبير أطباء الوادي.. \"وادي لامبرث\". غمرها بكلمات الامتنان، وتحاشى بلياقةٍ أن يسألها عما أصاب عينيها، لكنه فوجئ بها تخبره أنها ابنة \"زعيم الوادي\". ، طلب منها أن يقابل الزعيم ليعبر له عن شكره لما قدمه رجاله.", "رحبت \"مليكة\" بالفكرة وساعده على النهوض. حين وقف، لاحظ أن ساقه قد ضُمّدت بمهارةٍ طبية تتجاوز مجرد الإسعافات الأولية. ولكن، ما إن خطى أول خطوة خارج الخيمة، حتى انقبض صدره برعب.", "كان الوقت نهاراً، والشمس ترسل خيوطاً دافئة علي الثلوج المحيطة. رأى \"كلاي\" من حوله خياماً كثيرة منظمة بدقة ، وتتوسطها خيمة ذهبية كبيره تخطف الأبصار من أي زاوية في الوادي. لكن الصدمة لم تكن في الخيام، بل في \"البشر\".", "تسمّر \"كلاي\" في مكانه وهو يراقب القرويين الذين يتحركون حوله؛ كانوا جميعاً، بلا استثناء، مكفوفين. كل وجهٍ يمر به يحمل نفس السمة: رموشٌ طويلة ترسم خطين على جفنين مغلقين ومنغمرين للداخل، وجوهٌ بلا عيون، تتحرك في هذا الوادي وكأنها ترى كل شئ.", "مشى \"كلاي\" وسط الناس وهو يفتح عينيه على وسعهما، غير مصدق لما يراه، كانه في حلم مزعج. كان الجميع يتحركون، يمارسون حياتهم اليومية بطبيعية تامة، يتبادلون الأحاديث، لكن الوجوه كانت تخلو تماماً من الأعين.", "ما زاد رعب \"كلاي\" ودهشته هو أن هؤلاء الناس كانوا يلتفتون نحوه ونحو \"مليكة\" كلما مرّوا بجانبهم، وكأنهم يمتلكون بصراً خفياً يرشدهم. رأى البعض يلقي التحية على ابنة الزعيم باحترام وهي تسير بجانبه بخطوات واثقة. \"كيف يعقل هذا؟\" تساءل في سره. لاحظ أن حركتهم تميل للهدوء والبطء النسبي، وأصواتهم كانت منخفضة جداً، مما أضفى على المكان صمتاً.", "قفزت إلى ذهنه فكرة أن حاكم هذا الوادي لا بد وأن يكون مبصراً؛ فمن الممكن ان يكون هو الذي يوجههم علي الاقل.", "قطع حبل أفكاره وصوله إلى الخيمة الذهبية ، والتي بدت كقصر ملكي وسط الوادي بحجمها الاكبر من اي خيمة فالوادي, ولونها اللامع. وحين خطا خطوته الأولى داخلها، تجمد مكانه في الذهول. الزعيم نفسه كان أعمى مثل شعبه!", "كان رجلاً في الستينيات من عمره، يرتدي زياً ملكياً فاخراً تتناغم فيه الألوان مع الذهب بشكل مذهل. جالس على عرش معدني صُنع باحترافية ، تزينه نقوش هندسية بيضاء على شكل \"ندفات الثلج\"، وفوق رأسه تاج ذهبي ضخم مرصع بأحجار كريمة تلمع تحت ضوء المصابيح الكبيرة.", "وقف \"كلاي\" على مسافة من القائد، بينما تركت \"مليكة\" جانبه لتأخذ مكانها بجوار عرش والدها. وجد \"كلاي\" نفسه بين بحارسين صامتين، وظل عاجزاً عن الكلام لدقيقة كاملة وهو يحدق في كل تفصيلة حوله. هناك بعض الجنود والقرويين ورجل عجوز قبيح بجانب الزعيم.", "شعر \"كلاي\" للحظة أن ما يراه هو مجرد \"سخافة\" أو حلم ثقيل؛ فهل يعقل أن كل هؤلاء مجرد \"كومبارس\" يرتدون أقنعة متقنة للسخرية من مدرس تاريخ يهوى تسلق الجبال؟ أين الكاميرات؟ أين المخرج؟", "استجمع \"كلاي\" شتات عقله المشلول عن التفسير، وبدأ يتحدث بصوت مهتز، عرفهم به و بمهنته كمدرس تاريخ، وعن رحلته مع صديقه وما حدث لهما فوق الجبل. وبعدما انتهى، ألقى سؤاله الذي كان يحرق جوفه، وكانت الإجابة كانت صادمة: \"ما الذي حدث لأعينكم يا سيدي؟\"", "صمت الزعيم لثوانٍ، ثم أجاب ببرود وثبات: \"وهل تشعر أن هناك مشكلة ما في أعيننا يا مستر كلاي؟\"", "ابتسم \"كلاي\" بشكل لا إرادي وتلفت حوله، لعل أحداً يشاركه الدعابة ظناً منه أن الزعيم يلقي نكتة، لكن الوجوه من حوله ظلت صلبة وصامتة. أن تتحدث مع بشر بلا أعين؛ شعورٌ يشبه مخاطبة الجدران، و المرعب عندما تفهمك الجدران وترد عليك!", "كان في الخيمة أكثر من ثلاثين شخصاً يحيطون به، كلهم بلا عيون. حاول \"كلاي\" شرح وجهة نظره بتوتر: \"أقصد.. أن أعينكم غير موجودة، ليست مفتوحة مثل عينيَّ.\"", "سادت همهمات خافتة بين الحاضرين، وسمع \"كلاي\" صوت ضحكتين مكتومتين، مما زاد من قلقه. فكر الزعيم لثوانٍ، ثم أمر الحارسين بإحضاره. وبدقة غريبة وكأنهما يريان كل شئ، سحبه الحارسان من ذراعيه، وقيدا يديه خلف ظهره بـ \"كلبش\" معدني، وعند الوصول امام الزعيم بخطواط أجبره أحدهما بركلة مباغتة خلف ركبتيه على الركوع أمامه.", "رغم شعور الإهانة، إلا أن دهشة \"كلاي\" كانت أقوي. وجد وجه القائد غاضباً هو الآخر، حيث رفع يده في اتجاه \"كلاي\" بحزم. انقبض قلب \"كلاي\" ظناً منه أنه يصدر أمر إعدامه، فالتفت وراءه يبحث عن الجلاد، لكنه فوجئ بالحارس الذي ضربه يطأطئ رأسه في أسى، معتذراً للزعيم بذلٍّ قبل أن ينصرف.", "أدرك \"كلاي\" حينها حقيقتين: الأولى أن هؤلاء القوم يرون كل شيء بلا عيون، والثانية هي ذلك الهدوء القاتل الذي يغلف حياتهم.", "خطا الزعيم خطوتين حتى صار أمام \"كلاي\" مباشرة. وبدقة، رفع إبهاميه ومررهما فوق عيني \"كلاي\" على بُعد مليمترات بسيطة دون أن يلمسهما، ثم تراجع وأمر بفك قيوده وارساله حيثما كان.", "قال الزعيم بهدوء: \"أنت رجل مريض يا مستر كلاي.. لديك ورمين بارزين في وجهك. وإذا كنت تبحث عن علاج، فسآمر أطبائي الخاصين باستئصال هذين الورمين ان شئت.\"", "لم يصدق \"كلاي\" ما سمع؛ فبدلاً من اعترافهم بعماهم، اتهموه هو بالمرض! استجمع قواه ورد: \"لا يا سيدي.. أشكرك بشدة، لكني لا أبحث عن علاج لأورامي. هل تسمح لي بالانصراف الآن؟\" أجاب الزعيم: \"بالطبع يمكنك الانصراف.. وأهلاً بك أيها الغريب في وادي لامبرث.\"", "خرج \"كلاي\" من الخيمة بخطوات متسارعة تكاد تشبه الجري من الخوف. وما إن غادر، حتى مال العجوز القبيح على أذن الزعيم، وهمس بصوت لا يسمعه غيره: \"أيها الزعيم، أنصحك بإرسال من يراقب هذا الكائن.. صاحب عيون الحيوانات.\"", "جلس \"كلاي\" على الأرض الباردة يلهث من التعب، وساقُه المصابة تئن من المشي. أخذ يفكر: \"كيف يعقل هذا؟ لا يعرفون معنى العين؟ هل ولدوا جميعاً هكذا؟", "كان يحدّث نفسه وهو ينظر لقمة الجبل بتحدٍّ: \"يجب أن أخرج من هنا.. غداً سأغادر هذا الجنان\".", "عاد \"كلاي\" إلى الوادي باحثاً عن \"مليكة\" حتى وجدها، وسألها عن حقيبة ظهره ومعدات تسلقه التي فُقدت أثناء الانهيار. وحين أحضرتها له، أخبرها أنه ينوي الرحيل غداً، لكن رد \"مليكة\" قضي علي نواياه.", "قالت له أن وادي \"لامبرث\" هو دائرة مغلقة تحيط بها الجبال من كل جانب. وقالت: \"استقر أجدادنا هنا من زمن. حاول الكثيرون عبر الأجيال تسلق هذه القمم، لكن دون جدوى؛ فكل من يحاول الصعود يهوي من الثلج-تماماً كما حدث معك- وإن نجا من السقوط، تأكله ذئاب ان لم ننقذه.\"", "شعر \"كلاي\" بالدهشة والخوف؛ فتجربته مع الزلزال والذئب كانت دليلاً علي ما قالته. ومع ذلك، فقرر أن يرى بنفسه؛ بالتاكيد عجز هؤلاء \"العميان\" عن رؤية ممر أو ثغرة قد يلحظها هو ببصره.", "انطلق يدور حول حدود الوادي، يفتش عن أمل في الهرب، حتى نال منه التعب الجسدي والنفسي، فسقط على الأرض.", "كانت \"مليكة\" قد أمرت الحراس بمراقبته، وحين وجدوه سقط، حملوه وأعادوه إلى خيمته.", "استلقى \"كلاي\" في خيمته، ورغم أنه كان مفتوح العينين، إلا أن جسده كان متجمداً ولسانه عاجزاً عن النطق ، تمنى لو تركوه يموت وسط الثلوج، بدلاً من أن يُسجن في وادٍ مجهول في قرية من العميان الذين يرون \"بصره\" مرضاً.", "مرت ثلاثة أيام و\"كلاي\" حبيس خيمته، يرفض الخروج أو مواجهة الوجوه التي بلا أعين. استسلم لدوامة من الاكتئاب، بينما كانت \"مليكة\" تلازمه، تحضر له الطعام والماء يومياً، شاعرةً بثقل حزنه لكنها تدرك عجزها عن تبديده.", "في ذلك اليوم، قررت \"مليكة\" ان تحادثه، وحاولت أن تشرح له أن الحياة في \"لامبرث\" ليست سيئة، وأن أهل الوادي طيبون ولا يضمرون له شراً. وافقها الرأي، فهو يلمس كرمهم، ورعاية ابنة الزعيم له ليست بالأمر الهين، لكنه قال: \"أنا حزين على حياتي التي يبدو انها ضاعت.\" أجابته بهدوء: \"أبي الزعيم يقول إن كل شيء يحدث لسبب.. وبالتأكيد هناك سبب لوجودك هنا.\"", "لم يقتنع \"كلاي\"، ولم تكن لديه طاقة للجدال، حتى نطقت \"مليكة\" بما لم يكن في الحسبان؛ أخبرته أن والدها أمر الأطباء بفحص عينيه للتأكد من أن \"أورامه\" ليست معدية.", "هنا، انفجر \"كلاي\". اتسعت عيناه وفقد أعصابه، وصرخ في وجهها: \"أنا لستُ مريضاً! أنتم المجانين.. أنا الطبيعي وأنتم العميان!\"", "لكنه صمت فجأة ؛ رأى \"مليكة\" تضع يديها على أذنيها وهي تئن، قبل أن تنهار وتسقط على الأرض. لم تكن الصرخة مجرد صوت بالنسبة لها، بل كانت زلزالاً.", "انتشر صدى صوته في أرجاء الوادي الهادئ كالقنبلة، وفي غضون ثوانٍ، امتلأت الخيمة بالحراس الذين وجهوا رماحهم بدقة نحو صدره، بينما هرعت الجواري لحمل \"مليكة\" إلى الخارج. رغم التوتر، لم يملك \"كلاي\" إلا أن يندهش من سرعة استجابتهم ودقة حركتهم.", "لكنه أدرك أن المشكلة أكبر من الرماح التي تلمع أمام وجهه. كان يتساءل: \"هل صرختي هي من فعلت بها هذا؟ أم أنها تعاني من خطب ما؟\". ولكنه لم يستطع النطق, شعر بذنب في قلبه، وتمنى لو كان هناك شخص يملك \"عينين\" ليرى فيهما براءته.", "سُحب \"كلاي\" مجدداً إلى الخيمة الذهبية الكبيرة، لكنه هذه المرة لم يدخلها كضيف، بل كمتهمٍ تسبب في أذى ابنة الزعيم.", "استسلم \"كلاي\" لقدره ومشى بين الحراس. كان أهل الوادي أمام خيامهم، ورغم خلو وجوههم من الأعين، إلا أن \"كلاي\" شعر بنظراتهم الخفية، مما بث الرعب في أعماقه ، فكر في الهرب، لكن ساقه العارجة، وفكر في الصراخ، لكنه خشي أن صوته هو \"الجريمة\".", "استسلم لفكرة أن الزعيم سيأمر بإعدامه فوراً دون أن يمنحه فرصة للدفاع عن نفسه", "ولكن المحاكمة لم تكن غاضبة, وجد الزعيم جالساً على عرشه المزخرف، يرتدي تاجه الذهبي المرصع بالأحجار الملونة، وعلى وجهه التفكير، لا الغضب والانتقام. كان الصمت هو اللغة السائدة رغم وجود عدد أكبر من الحراس والحاشية.", "مُنح \"كلاي\" فرصة للحديث، فتكلم بصوت خفيض جداً، شارحاً أنه لم يقصد أذية أحد، وأنه يشعر بالأسي الشديد على ما حدث لمليكة. ساد صمت مطبق لدقيقة كاملة، كان الزعيم خلالها يزن الكلمات، ثم قال بهدوء: \"لقد صدقتَ في كل ما قلته.. وأعلمُ يقيناً أنك لم تقصد الأذى.\"", "تنفّس \"كلاي\" الصعداء وشعر بارتياح، لكن الزعيم أكمل: \"ولكنك أغفلت أمراً ؛ نحن نتحدث بصوت خفيض لنتمكن من سماع كل ما حولنا. منذ وصولك والناس يلقبونك بـ \\'السيد صياح\\' بسبب نبرة صوتك العادية، فتخيل ماذا يفعل صراخك بآذاننا؟\"", "شعر \"كلاي\" بالاسي الشديد حين تذكر مدى قرب \"مليكة\" عندما انفجر غاضباً، وقدم اعتذاره بكل صدق.", "طمأنه الزعيم بأن ابنته استعادت وعيها وستكون بخير مع الراحة، لكنه أردف: \"مستر كلاي, كما آذيتنا بصوتك دون قصد، نخشى أن تؤذينا بعينيك؛ لذا من الضروري فحص هاتين \\'الأورام\\'. ولأن القرية كلها سمعت صراخك وفزعت منه، يجب أن يحضر الجميع هذا الفحص ليتأكدوا أنك لست مصدراً للشر. \"", "تجمدت الكلمات في حلق \"كلاي\" ولم يجد ما يرد به.", "أصدر الزعيم الأمر للحراس بإعادته إلى خيمته، ولا يخرج منها الا غدا صباحا لاجراء الفحص امام الخيمة الكبيره.", "خيمة زعيم الوادي الابيض.", "مرّ اليوم كأنه دهرٌ، غلبه فيه حزنٌ؛ افتقد \"مليكة\" التي بدأ ان يعتاد علي رؤية وجهها الزجاجي النائم، وشعر بجداراً بينه وبين هذا الوادي.", "تذكر طلابه الذين أحبوه وتمنوا ألا يكبروا كي لا يغادروا صفه، وتذكر جيرانه وأصدقاءه في إنجلترا.", "فكرة أن تُفحص عيناه، جعلت الدماء تتجمد في عروقه.", "لاحت له بارقة أمل: \"المعدات!\".", "تساءل \"هل نجا جون؟ هل يبحث عني أحد؟\"..", "نبش في أمتعته حتى عثر على \"مسدس الإشارة\" (الفلاير). كانت هناك طلقة واحدة، طلقة واحدة تفصله عن العالم الخارجي. فالخروج واطلاقها، لكنه خشي ان يتفاجئ الحراس فيصيبوه بمكروه، فقرر أن فالصباح أمام الجميع، علّها تكون تذكرة خروجه من هذا السجن الأبيض.", "قطع خيالاته دخول احد الحراس الملازمين له علي باب خيمته، ووضع قدر الحساء بعنفٍ على الأرض حتى انسكب نصفه، ثم انصرف.", "عندما اقترب \"كلاي\" من الطعام وجده بارداً، أدرك قيمة \"مليكة\" وحسن معاملتها، وكراهية أهل الوادي له ايضا، حتى وإن تظاهر زعيمهم بالعكس.", "وجاء اليوم المشهود، اقتيد \"كلاي\" وسط حشدٍ غفير من القرويين، فالجميع يريد ان يعرف ابعاد ذلك الغريب صاحب العيون والحيوانيه والصوت الجهوري وهو ذاهب ليلقي بما فعله ببنت الزعيم.", "ارتطم الحرس بكتفيه بكراهية متعمدة أثناء المسير. لم يكن خائفاً مثل اخر مرة، فكلمّا شعر ببرودة معدن \"الفلاير\" المخبأ في جانب قميصه، دبّ الإصرار في نفسه.", "لكن الرعب عاوده حين رأى نهاية الطريق؛ سطرٌ من خمسة رجال يرتدون عباءاتٍ غامضة، وامامهم مقعدٌ خشبي مائل يشبه مقاعد الشواطئ، أُعد ليتمدد عليه \"كلاي\". خلفهم كان الزعيم يجلس على منصته مرتفعة يراقب المشهد بصمت.", "طرد الخوف، وتحسس المسدس. كان يدعو أن يرى أحدا إشارته في السماء ويأتي لانقاذه بعد ان..", "توقف فجأة عن السير، إذا كان مجرد \"صياح\" بشري قد أسقط \"مليكة\" مغشياً عليها وآلم آذان أهل الوادي، فماذا سيفعل دويّ \"الفلاير\"؟ إن طلقة الإشارة ليست مجرد ضوء، بل هي انفجارٌ مدوٍّ سينطلق في وسط هذا السكون.", "أدرك \"كلاي\" أن الطلقة التي يراها \"تذكرة حرية\"، ستكون بالنسبة لهؤلاء القوم \"قنبلة\" تمزق طبلات آذانهم.", "سيفقدون حاستهم الوحيدة التي تعينهم على البقاء، وستقضي على وسيلة إدراكهم الوحيدة للعالم.", "وقف \"كلاي\" في تلك اللحظة على مفترق طرقٍ وجودي. يده تتحسس المسدس المخبأ، وعقله يصارع خيارين لا ثالث لهما: هل يشتري حريته ويُنقذ نفسه على جثث الأبرياء؟ هل يدمر حياة شعبٍ كامل، بمن فيهم \"مليكة\" التي رعته، من أجل فرصة نجاة قد تأتي وقد لا تأتي؟ أم يُسلم بالامر الواقع، ويترك \"الأطباء\" يقتربون من عينيه بأدواتهم الباردة، محتفظاً بآدميته وضميره؟", "كان الصمت في الوادي يزداد ثقلاً، والعيون الغائبة تحاصره بانتظار حركته التالية. نظر \"كلاي\" إلى السماء، ثم إلى الحراس، ثم إلى \"الفلاير\".. وشعر بمرارة الاختيار تخنق أنفاسه.", "حين كانت \"لامبرث\" مجرد حلم بالنجاة. بدأت القصة بفرار عائلتين، لا يتجاوز عددهم ثلاثين نفراً، هربوا من الظلم بعدما سقطت قريتهم في يد اعدائهم. تاهوا في قفار الثلوج، يحملون بقايا مؤنهم وأرواحاً أنهكها الترحال، حتى وصلو الي واد بين جبلين.", "قرروا التخييم فيه لبضع ايام، ضربت الأرض هزة عنيفة أدت لفيضان من الصخور والثلوج، لتنغلق الفجوات وتتحول الجبال من حولهم إلى أسوار. حاول الجيل الأول من الناجين تسلق الجبال، لكن عدم استقرار الجبل؛ فإما سقوطٌ ينهي حياتهم، أو أنياب الذئاب.", "ومع استسلامهم للقدر وقرار الاستقرار النهائي؛ فيروسٌ أصاب أعينهم. حاولوا اقصاهم لعلاج أنفسهم لكنهم فشلوا.", "اتخذ تاريخهم مساراً جديداً؛ فبدلاً من البكاء على النور المفقود، قرروا تطوير \"بصيرة\" بديلة.", "عبر السنين والأجيال، أصبحوا \"أهدأ\" لتتحول آذانهم إلى رادارات تلتقط أدق التفاصيل، وصارت حركتهم \"أبطأ\" لتجنب العثرات. ومع توقف استخدام حاسة البصر، بدأت الطبيعة البشرية تمارس دورها في التكيف؛ فتصامرت العيون مع كل مولود جديد، وتراجعت المحاجر للداخل جيلاً بعد جيل، حتى اختفت الأعين ولم يبقَ منها سوى خطوط ورموش.", "بالنسبة لأحفاد هؤلاء المهاجرين، أصبحت فكرة \"النظر\" مجرد خرافة من أساطير الأجداد، و اعتبروا العيون البارزة والمفتوحة سمةً تقتصر على الحيوانات والوحوش المفترسة فقط.", "خطا \"كلاي\" خطواته ليقف وجهاً لوجه أمام مقعد الفحص، ويده تقبض على \"الفلاير\" في جانبه، مستعداً لانتزاعه، كان يعلم أن هذا الدويّ سيحيل صمتهم إلى عذاب، وسكونهم إلى ضجيج أبدي.", "فكر في التراجع.. هل يمكن للمنطق أن ينقذه؟ هل يمكنه إقناعهم بمساعدته في إرسال إشارته بعيداً عن آذانهم؟ لكنه حين نظر إلى وجه الزعيم الجاد، أدرك أنهم لو علموا بوجود هذا السلاح الصوتي، لسلبوه أمله الوحيد.", "اشتدت قبضته على سلاحه، وتسارعت دقات قلبه.", "تأهب الحراس فجأة، وأحكموا قبضاتهم على أسلحتهم رغم أنه لم يتحرك بعد. هل شعروا بتسارع أنفاسه؟ هل قرأوا توتر جسده الذي فضحه في هذا السكون؟", "بحث بعينيه بين الحشود عن \"مليكة\"، لعل رؤيتها تمنحه القوة أو القرار، لكنها لم تكن هناك. \"حتى لو غابت عن عيني، فإن صدى الانفجار سيصل إلى خيمتها ويمزق هدوءها مرة اخري\"، هكذا حدث نفسه بمرارة.", "التفت ببصره نحو الجماهير؛ أولئك الذين كانوا يثيرون رعبه بنظراتهم الغائبة، صار ينظر إليهم الآن بعين الشفقة. ولأول مرة، لاحظ وجود الأطفال.. صغارٌ بلا أعين لكن البراءة تفيض من وجوههم وهم يتشبثون بأثواب أمهاتهم. قفز إلى ذهنه مشهد تلاميذه في المدرسة، أولئك الصغار الذين كانوا ينتظرونه في الممرات ليلقوا عليه التحية.", "هنا، حسم \"كلاي\" أمره؛ لن يبني حريته على أنقاض براءة هؤلاء. استسلم لقدره وتمدد على الكرسي بمنتهى الهدوء، تاركاً سلاحه مكانه.", "وجد نفسه في مواجهة مباشرة مع الزعيم، وأمامه اصطفّ الأطباء الخمسة. أربعة منهم يرتدون معاطف طويلة، بينما وقف كبيرهم في المنتصف بزيٍّ يميل للأناقة الملكية. كان كبيرهم هو الذي راه كلاي بجانب الزعيم فالخيمة الكبيره. لم يرتاح كلاي لرؤية العجوز القبيح للمرة الثانيه. رأى وجه ذلك الطبيب عن قرب ؛ رجل فالسبعين بملامحه فظة، وأنفُ معقوفاً يشبه مناقير الجوارح، وحواجبه كثيفة بشكل يثير الاشمئزاز.", "تحرك اثنان من الأطباء ببطئ وبرود، وأحكما قيد ذراعي \"كلاي\" بمقعد الفحص. تضاعف ذعره حين رأى الطبيب العجوز \"إنزو\" يقترب منه، وملامحه تزداد بشاعة كلما اقترب.", "فرك الطبيب أصابعه بمعجون ، وقبل أن يستوعب \"كلاي\" ما يحدث، غرز العجوز أصابعه فوق عينيه بظلف ، وكأنه يحاول اقتلاعهما. شعر \"كلاي\" بنارٍ تستعر داخل عينيه، فحبس صرختة صدره، مفضلاً احتراق أعصابه على أن يؤذي القرويين بصوته.", "بعد ثواني من الفحص و الألم، أمر الطبيب بفك قيوده وتنظيف عينيه. وما هي إلا دقائق حتى كان التقرير بين يدي الزعيم، الذي قال بنبرته الهادئة المعتادة، بينما \"كلاي\" يفرك عينيه من شدة الحرقان: \"أخبرني \\'إنزو\\'، طبيبي الملكي ومستشاري، أن أورامك هذه غير معدية.. لكنه في غاية الدهشة لأنك تملك أعضاءً حيوانية.\"", "توقف \"كلاي\" عن مسح دموعه، ونظر برؤية ضبابية مهتزة نحو الزعيم الذي تابع كلامه: \"كل الحيوانات التي نصطادها أو نربيها تملك عيوناً منتفخة مثل عينك. هذه العيون المتورمة تجذب الشياطين إلى الوادي، وهذا هو السبب في تصرفات الحيوانات الهوجائية وغير المتزنة.\"", "اندهش \"كلاي\" من نفسه؛ كيف غابت عنه هذه النقطة؟ جلود الحيوانات في كل مكان، ومع ذلك لم يربط بين عيونها وعينيه كدليل. أكمل الزعيم بنبرة تحذيرية: \"لك الحق في الاحتفاظ بها في جسدك إن شئت يا مستر كلاي.. ولكن، أتمنى ألا تجذب إليك الشياطين فتفعل بنا ما يؤذينا.\"", "لم يجد \"كلاي\" رداً؛ فالمنطق هنا مقلوب تماماً. عاد يمسح دموعه وهو يهمس لنفسه: \"ليسموها ما شاؤوا.. حيوانية أو شيطانية، المهم أنها عيناي، وستبقيان معي\".", "عاد إلى خيمته مثقلاً بشعور الهزيمة، رغم أن صوت صميرة يطمئنه بأنه فعل الصواب حين ضحى بحريته لإنقاذ قرية كاملة من الهلاك. غسل عينيه واستسلم لنومٍ عميق من أثر الإجهاد، د استيقظ بفزع على يد تهزه.", "كانت إحدى جواري \"مليكة\" تدعوه للمجيء إلى خيمة سيدتها. ورغم الغيظ الذي يملأ قلبه تجاه أهل الوادي الذين نعتوه بالحيوان بعد كل ما ضحى به، إلا أنه لم يتردد؛ فكان لزاماً عليه الاطمئنان على الإنسانة الوحيدة التي عاملته بودّ، وكانت هي الأكثر تضرراً من صرخته.", "دخل \"كلاي\" خيمة \"مليكة\"، فاستقبله سكونٌ لم يعهده في أي ركنٍ آخر من أركان الوادي، سكونٌ جعله يسمع ضربات قلبه. كانت \"مليكة\" تجلس على سريرها محاطة بجواريها، وما إن أبصرته بحواسها حتى أشارت إليه بالجلوس، وأمرت الجميع بالانصراف عدا امرأة عجوز ظلت قابعة بجوارها بهدوء.", "همس \"كلاي\"، سائلاً عن حالها. ابتسمت \"مليكة\" في رقة وطمأنته بأنها تعافت منذ الأمس، لكن الأطباء ألزموها الفراش، ثم سألته باهتمام عن عينه وما حلّ بها. أجابها بأنه بخير، لكنه لم يستطع إخفاء عنها مقتِه للطبيب \"إنزو\".", "ضحكت \"مليكة\" ضحكة سحرته، وقالت: \"هلع وقعتَ تحت يد \\'إنزو\\'؟ لا أحد في القرية يطيقه سوى الزعيم وجنوده، حتى مساعدوه يرتجفون منه خوفاً.. لكن عليك أن تعتبر نفسك محظوظاً، فهو أمهر طبيب عرفه الوادي، واي مريض يتمنى نيل رعايته.\"", "استشعرت \"مليكة\" تغير وتيرة أنفاس \"كلاي\"؛ فأدركت أن كلمة \"مريض\" قد ضايقته، فسارعت بالاعتذار وقبل هو عذرها. وفجأة، سألت \"كلاي\" سؤالاً كان آخر ما يتوقعه: \"لماذا لم تستخدم تلك الأداة التي تصدر صوتاً مدوي، مع أنها كان مكن ان تقذك من الوادي كله؟\"", "توقف قلب \"كلاي\" عن الخفقان للحظة. كيف عرفت بشأن \"الفلاير\"؟ وكيف أدركت وظيفته وهي التي لا تدرك تكوين أعضاء البشر؟ وكيف علمت بتوقيت استخدامه؟ هل كان الجميع يعرفون بوجوده تحت قميصه بينما كان يظن نفسه متخفياً بفضل \"بصره\"؟", "تزاحمت الأسئلة في رأسه كالإعصار، وظل شاخصاً ببصره وفمه مفتوح من فرط الدهشة، ينتظر تفسيراً من هذه الفتاة التي بدت في عينيه الآن كساحرة تقرأ الغيب. وحين طال صمته، قالت \"مليكة\": \"أعلم أن الأسئلة تدور في عقلك الآن، وتتساءل كيف أقرأ أفكارك بهذه البساطة.\"", "تراجع \"كلاي\" بجسده للخلف قليلا بذعر.", "قامت \"مليكة\" بهدوء، وسبقتها العجوز بخفة، بينما ظل \"كلاي\" متسمراً في مكانه كالمسحور. \"تعال معي يا مستر كلاي.. أريد أن أريك شيئاً.\"", "انقاد \"كلاي\" وراءها وكأنها تجره بخيوط، حتى وصلوا إلى طاولة صغيرة في زاوية الخيمة، وضع فوقها صندوق خشبي مزخرف بنقوش واضح انها دينية . مدت العجوز يدها وفتحت الصندوق، ليكشف عن مسحوق (تراب) فضي اللون يلمع ببريق غريب.", "سالته \"مليكة\": \"هل تعرف ما هذا يا مستر كلاي؟\""], ["اقترب \"كلاي\" برأسه من الصندوق ليتفحص محتواه، لكن رائحة نفاذة سبقت عينيه واقتحمت أنفه؛ رائحة يعرفها جيداً. تراجع في امتعاض وهو يهتف: \"هذا بارود!\"", "أغلقت \"مليكة\" الصندوق بهدوء وهي تشرح له: \"هذه المادة نادرة جداً في جبالنا، ومن يعثر على ذرة منها يُعتبر مباركاً وينال مكافأة خاصة من القبيلة.\"", "اندهش \"كلاي\" مدرس التاريخ؛ فهو يعلم أن الأمم قدست معادن كثيرة، لكن البارود كان دائماً رمزاً للخراب لا السلام. وكأن \"مليكة\" قرأت أفكاره كالعادة، فأجابت: \"أجدادنا علمونا بعد حادثة أليمة في تاريخنا أن هذه المادة خطرٌ داهم. إذا لمستها النار، أطلقت صوتاً كفيلاً بقتل كل من في القرية؛ لذا كان الخيار الأسلم هو مراقبتها بدقة ومعرفة أماكن تواجدها دائماً.\"", "بدأت السيدة العجوز تسحب \"مليكة\" برفق لتعيدها إلى فراشها لتستريح، بينما تابعت الأميرة حديثها: \"لا يوجد طفل في لامبرث لا يعرف هذه الرائحة. لقد شممتها في تلك الاداة داخل حقيبتك منذ لحظة وصولك للوادي. لم أكن أفهم ماهية تلك الأداة، لكني أدركتُ فوراً أنها تحمل شراً يهدد شعبي.\"", "استقرت \"مليكة\" في جلستها فوق السرير برقة، وأكملت: \"لهذا السبب، سحبتُها خفيةً وأخفيتها عن أعين الحراس الذين فتشوا أمتعتك حين أنقذوك، ثم أعدتها إليك حين طلبتَ أغراضك؛ لأنني وقتها كنت قد تأكدتُ أنك لا تضمر لنا شراً.\"", "وقف \"كلاي\" مذهولاً، وسألها بفضول لم يستطع كبته: \"وكيف عرفتِ أنني سأستخدمها اليوم تحديداً؟ ولماذا لم تمنعيني؟ ألم تخشي أن أفعلها حقاً؟\"", "تدخلت السيدة العجوز بصوت أجشّ ورخيم: \"على الأميرة أن ترتاح الآن.\" نظر لها \"كلاي\" ثم عاد ببصره نحو \"مليكة\" ينتظر الجواب، فقالت بطمأنينة: \"كل شيء قوي له مميزاته وعيوبه يا مستر كلاي. لم أكن أعرف وظيفة أداةِك، لكنني قلت لنفسي لعلها تنقذك من خطرٍ ما في يومٍ عصيب. واليوم كان يوماً مصيرياً لك، وكنت واثقة أنك لو كنت تملك سلاحاً قوياً، فهذا هو الوقت الوحيد الذي ستفكر فيه باستخدامه.\"", "ساد الصمت لثوانٍ، و\"كلاي\" غارق في دهشته من ذكائها الحاد وفراستها، قبل أن تختم كلامها بنبرة مؤلمة من الامتنان: \"ولا تتخيل مدى امتناني لك.. لأنك آثرتَ إنقاذ شعب لامبرث على نجاتك.\"", "هنا، صفقت العجوز مرتين بخفة، فدخل حارسان وسحبا \"كلاي\" برفق إلى خارج الخيمة، تاركين الأميرة لتنعم براحتها، وتاركين \"كلاي\" مع تساؤل جديد: هل هو السجين هنا، أم أنه أصبح الآن حارساً لهذا الوادي بضميره؟", "لم يمنح الحارس \"كلاي\" وقتاً لترتيب أفكاره المشوشة؛ فبمجرد وصوله لخيمته، أمره بالتوجه فوراً إلى السوق ليمارس عملاً يقتات منه كبقية سكان الوادي. سار \"كلاي\" مكرهاً، وشعور الحصار يزداد بداخلة، فبرغم أن الوجوه من حوله بلا أعين، إلا أنه كان يشعر بحدة مراقبتهم له في كل خطوة.", "بسبب \"عرجته\" التي أعاقت حركته الشاقة مع الرجال، وُضع \"كلاي\" قرب صفوف النساء بالسوق، حيث تعلم فن الصبر: نحت العظام والخشب لصناعة القلادات والأساور. وبرغم مرارة وضعه، إلا أن \"بصره\" منحه تفوقاً لم يكن في الحسبان؛ فبينما كانت النساء \"تحسس\" طريقها لصنع العقد، كان هو ينجز المهمة بدقة وسرعة بصرية مذهلة.", "بدأت نساء السوق يتقبلن \"السيد صياح\"؛ فإنجازاته اليدوية كانت تتسم بجمال وتناسق لم يلمسوه من قبل، وتهافتن على اقتناء أعماله. لكن هذا النجاح أشعل نيران الغيرة في قلوب الرجال؛ فبالنسبة لهم، هذا \"المشوه\" صاحب الأعضاء الحيوانية المشؤمة لا يستحق كل هذا الاهتمام.", "في يومٍ كان فيه \"كلاي\" غارقاً في صنع عقدٍ لامرأتين تجلسان بجانبه يثرثران عن اساطير كهوف الوادي، اخترق أذنه همسُ رجلين يقفان على مقربة منه، تعمدا أن يصل صوتهما إليه: \"أهذا هو الشؤم الذي يصنع الحليّ؟ يظن نفسه متميزاً بأعضائه القذرة وصوته الذي كاد يصمّ الوادي.. وبسبب قطعة عظمٍ منقوشة، يظن نفسه أفضل منا!\"", "كانت الكلمات أثقل من أن يحتملها؛ تذكر تضحيته الكبرى، تذكر كيف دفن حلمه بالحرية لأجل آذانهم، فاستشاط غضباً وفقد السيطرة على صمام أمانه الوحيد. انفجر \"كلاي\" بصرخته الممنوعة: \"أنتم الجهلة! أنتم الناقصون! أنا أفضل منكم لأنني أرى ما لا تدركونه!\"", "تحول السوق في ثانية واحدة إلى ساحة دوي بها انفجار قنبلة يدوية؛ تجمد الجميع في أماكنهم وسدوا آذانهم بهلع، بينما سقطت المرأتان خلفه مباشرة مغشياً عليهما من هول الصدمة الصوتية. ساد صمتٌ مرعب بعد الإعصار الذي أطلقه \"كلاي\"، صمتٌ جعله يدرك فداحة ما فعل.", "نظر حوله بذهول، ورأى الرعب والوجع يكسوان الوجوه التي كان يشفق عليها قبل قليل. تآكل قلبه بالذنب والخجل، فجمع أدواته بسرعة وفرّ من السوق نحو خيمته، هارباً من نظراتهم التي لا تراه، ومن صوته الذي صار عدوه اللدود.", "قضى \"كلاي\" يومه حبيس الخيمة، ينهشه القلق والندم. كان يتحسس حقيبته ويجهز معدات، متوقعاً في كل لحظة أن يقتحم الحراس مكانه ليلقوا به طعاماً للذئاب. وبينما كان يدلك ساقه العرجة استعداداً لرحلة الهروب الانتحارية، آلمته بشدة فصرخ، تزامنت صرخته مع طرقات هادئة على الباب.", "تجمّد الدم في عروقه، لكنه قرر مواجهة مصيره. تنفس بعكق وفتح الباب ليرى وجهاً كان آخر ما يتوقع رؤيته: \"مليكة؟!\"", "كانت ابنة الزعيم تقف بوقارها المعهود وابتسامتها الصافية. ظن \"كلاي\" للحظة أن الأمر اكبر مما توقع، فإرسال الأميرة بنفسها قد يعني عقاباً أشد قسوة من الموت.", "\"ماذا سيفعلون بب اكثر من انياب الذئاب؟\" لكن \"مليكة\" قطعت حبل أفكاره السوداء قائلة بدعابة رقيقة: \"لم أكن أعرف أنك بخيل يا مستر كلاي، ولا ترحب بضيوفك.\"", "اعتذر \"كلاي\" بارتباك ووسع لها الطريق. مشت \"مليكة\" بخطوات واثقة، ومدت يدها في الهواء فوق الكرسي والطاولة دون أن تلمسهما، وكأنها ترسم لهما خريطة في عقلها، ثم جلست بدقة أذهلت \"كلاي\". اعاد التفكير في سبب الزيارو فقال لها بهدوء ليطمئنها: \"لا تقلقي يا مليكة، مهما حدث، لن أستخدم ذلك (الفلاير) في الوادي.\" تبسمت وردت بحكمة : \"الإنسان الذي يختار الخير لا يغير قراره بسهولة يا مستر كلاي، وكذلك من يختار الشر.\"", "صمت كلاي متحيرا في سبب الزيارة.", "أخبرته مليكة أن الزعيم علم بما حدث في السوق، و أصدر حكماً عادلاً لصالحه بعدما عرف استهزاء الرجلين به. وراضي الزعيم الضحايا وأهاليهم، والناس -لمحبتهم لعمل \"كلاي\" وإتقانه- قرروا مسامحته. غمرت \"كلاي\" موجة من الارتياح والامتنان لعدل هذا الزعيم، وشعر بالخجل من ثورته.", "فسألها \"كلاي\" فجأة: \"مليكة.. هل تؤمنين مثلهما أن عينيَّ أعضاء حيوانية تجلب الشؤم؟\" أجابته بصدق: \"لا يمكنني تكذيب قومي فأنا منهم، لكني لا أراها شؤماً. أرى أن لعينيك قوة، تماماً كما لذلك الفلاير من قوة، وأنت وحدك صاحب القرار في كيفية استخدامها.\"", "في صباح اليوم التالي، توجه \"كلاي\" إلى السوق بنفسٍ راضية، يبتادل الابتسامات مع القرويين الذين استقبلوه بودٍّ جديد. جلس يمارس فنه في صنع العقود والأساور وهو يشعر ببعض الانتماء.", "لكن سعادته لم تدم؛ فقد أبصر من بعيد الرجلين اللذين تسببا في أزمته بالأمس يتجهان نحوه.", "وقف الرجلان أمام \"كلاي\" الجالس على الأرض. حدّق في وجوههما برعب؛ فرغم خلو محجريهما من الأعين، إلا أن ملامح وجهيهما كانت تنذر بالشر. أيقن \"كلاي\" في تلك اللحظة أن \"البصر\" قد يخدع أحياناً، لكن غريزة الإنسان تجاه الشر لا تخطئ أبداً. هؤلاء القوم لا ينوون خيراً، والعدل الذي أنصفه بالأمس قد يكون هو الوقود الذي أشعل نار انتقامهم اليوم.", "على عكس توقعات \"كلاي\"، تقدم أحد الرجلين واعتذر له بصوت ناعم ومؤثر، كان قوي البنتية, وبرر زميله كلامهم السابق بأنه كان مجرد \"غيرة صنّاع\"، لأن \"كلاي\" تفوق عليهم في مهنتهم وسرق الأضواء بدقته.", "فهم يجمعون المواد من الكهوف من العظام والعاج والخشب واعطائها للنساء فالسوق ليشكلوا بها الحلي.", "شعر \"كلاي\" بإحراج شديد من أدبهم المفاجئ، لدرجة أنه هو من قام واعتذر لهم عما بدر منه في السوق.", "مرت الأيام وصاروا يعملون معاً؛ هما يحضرون الخشب والعاج، وهو يصنع الحليّ. عرف أنهم أخوان، الكبير \"تيد\" والصغير \"بن\"، والأغرب أنه اكتشف أن \"بن\" هو نفسه الشخص الذي أنقذه من ذئب الجبل حين سقط أول مرة.", "ولم يتمالك عندها كلاي فضولة بمعرفة الطريقة التي تم انقاذه بها, وشرح له الاخ الصغير بن انه استخدم النار, فكل الضواري تخشي النار.", "في يوم، عرض عليه الأخوان الذهاب معهما إلى جبل قريب لجمع مواد نادرة. تحمس \"كلاي\" للفكرة لأنه قد اشتاق لزيارة الجبال، ولكنه اعرب عن خوفه على رجله المصابة، طمأناه بأن الرحلة ستكون على ظهور الأحصنة. وافق \"كلاي\"، وكانت هذه غلطته الكبرى؛ فقد نسي إحساسه الأول بأن هذين الرجلين يضمران له الشر.", "وصلوا إلى كهف مخفيّ في حضن الجبل، له فتحة ضيقة. تسمر \"كلاي\" مكانه بدهشة حين رأى على مدخل الكهف نقوشاً قديمة جداً لوجوه بشرية تملك \"عيوناً\" حقيقية واضحة. سأل الأخوين بذهول، فقال \"بن\" ببساطة: \"هذه مجرد خربشة أظافر حيوانات كانت تعيش هنا منذ آلاف السنين، صدفة جعلتها تشبه الوجوه\".", "لم يقتنع \"كلاي\" بأن أظافر الحيوانات ترسم وجوهاً بشرية بدقة، لكنه انشغل بالدفء العجيب الذي غمره فور دخوله الكهف. كان المكان واسعاً من الداخل، وبدا وكأن أحداً عاش فيه يوماً ما، لوجود بقايا أثاث حجري متهالك.", "لم يحتاج الأخوان لنور، لكن \"كلاي\" أشعل كشافه ليرى بوضوح. بدؤوا بجمع العظام المتناثرة على الأرض، وحين سألهم \"كلاي\" عن سر وجودها، قال \"تيد\" إنها عظام الحيوانات التي سكنت الكهف قديماً.", "فتح \"كلاي\" حقيبته ليضع ما جمعه، لكنه أمسك بعظمة طويلة وتوقف فجأة. اتسعت عيناه من الصدمة، وتجمد الدم في عروقه.. هذه العظمة لا تخص حيواناً أبداً، إنها عظام بشرية!", "داخل خيمة متوسطة الحجم، كان يجلس العجوز \"إنزو\"، طبيب الزعيم. على طاولته، كان هناك فأر صغير يملك عينين واسعتين، يرتجف داخل صندوق. كان الصندوق متصلاً بمتاهة معقدة مليئة بالأشواك والفخاخ القاتلة.", "رغم أن \"إنزو\" بلا عيون، إلا أنه كان يتعامل مع الفأر وكأنه يراه تماماً. قال بصوت فحيح وهو يوجه كلامه للفأر: \"هكذا تماماً.. إنه جاهز الآن. الإنسان الذي لا يتحكم في غضبه، يسهل قيادته دائماً.\"", "كان \"تيد\" وأخوه \"بن\" يقفان خلفه. لمس \"تيد\" أذنيه بألم وهو يتذكر صرخة \"كلاي\" في السوق وقال: \"غضبه هذا كاد يفقدنا سمعنا جميعاً.\" سأل \"بن\" بفضول: \"لكن كيف سنخلص الوادي من أعضائه الحيوانية المشؤومة بهذه الطريقة يا كبير الاطباء؟\"", "أجاب \"إنزو\" دون أن يلتفت إليهما، وهو يفتح للفأر باب المتاهة: \"بعد أن استفززتموه واستجاب لكم، ستذهبون إليه في السوق وتعتذرون له كما أمر الزعيم. تظاهروا بأنكم تجار إكسسوارات، وعندما يثق فيكم، خذوه إلى \\'الكهف الدافئ\\' لجمع العظام.\"", "انبه الاخوان وتابع الطبيب رسم الخطة: \"وأنتما في طريق العودة، ستمرا بجانب \\'كهف المتاهة\\'. وبغريزته الحيوانية وعينيه، سيقول لكم: (أنا أرى كهفاً هناك، لنذهب ونستكشفه، ربما يكون طريق الخروج). حينها ستتظاهران بالجهل وتقولان: (نحن نعرف الصحراء كلها ولا يوجد كهف هنا). عندها لن يهدأ وسيذهب وحده ليكتشف المكان، وهناك سيتوه في المتاهة.. ويأكله \\'البييروولف\\'.\"", "قشعريرة باردة ضربت جسد \"تيد\" بمجرد سماع اسم الوحش \"بييروولف\". لاحظ \"إنزو\" تسارع ضربات قلب \"تيد\" فابتسم بخبث، فهو يعرف رعب \"تيد\" القديم من ذلك الوحش, ويستمتع بالأنغام التي تصدرها القلوب المتوتره.", "حاول \"تيد\" استجماع شجاعته وسأل بخوف: \"يا كبير الأطباء.. أخشى أن تساعده عيونه على العودة من المتاهة، رغم أنني لم أسمع عن أحد عاد منها حياً.\"", "نظر \"إنزو\" إلى الفأر وهو يتفادى فخاً كاد يقتله داخل المتاهة، وقال ببرود: \"حتى لو عاد.. سأجعل الزعيم يعدمه بنفسه، فلا تقلق.\"", "بدأ \"كلاي\" يربط الخيوط ببعضها، وشعر برغبة عارمة في شتم نفسه؛ كيف غاب عنه أن تلك العظام التي كان يصقلها لتتزين بها نساء الوادي هي عظام بشرية؟ تذكر الآن سر اللعبة؛ فمنذ بدأ العمل مع \"تيد\" و\"بن\"، كانا يحضران له المواد في صورة قطع صغيرة، عكس عظام الحيوانات الكاملة التي كان يبدأ بها من الصفر.", "وجه \"كلاي\" ضوء كشافه مباشرة نحو وجه \"تيد\". وبمجرد أن لامس الشعاع جلده، شعر \"تيد\" بحرارة الضوء فاستدار بردة فعل سريعة ومفاجئة أرعبت \"كلاي\"، الذي قال بصوت يرتجف: \"هذه عظام بشرية يا تيد!\" ساد صمت لثوانٍ، قبل أن يرد تيد ببرود: \"وحتى لو كانت كذلك.. ما المشكلة يا مستر كلاي؟\"", "ارتفعت نبرة \"كلاي\" بذهول: \"بشر بعيون مثلي! هم من رسموا هذه النقوش، وأنتم تنبشون قبورهم لصنع القلادات؟\" قاطعه \"بن\" بحدة: \"اخفض صوتك يا مستر كلاي.. نحن لا نعرف لمن هذه العظام، وهذه الرسومات مجرد خيالات.\" أكمل \"تيد\" بمنتهى الثقة: \"نحن في رحلة عمل، وحتى لو كانت عظام أجدادنا، فنحن أبناء لامبرث ولنا الحق في فعل ما نشاء بميراثنا.\"", "لم يجد \"كلاي\" مفراً من الصمت. كان سلاحه (الفلاير) في جيبه، لكنه تساءل: ماذا سيفعل به؟ هل يقتلهم بالصوت ويعود بجثثهم للزعيم مبررا انهم كانو يجمعوا عظام بشرية من مقبرة جماعية؟", "عادوا لعملهم فعاد هو الاخر لعلي كل هذا ينتهي بسرعة، وبدأ يجمع العظام معهم وهو يشعر بقشعريرة تسري في جسده كلما لمست يده بقايا إنسان.", "حين حلّ المساء، قرروا النوم داخل الكهف لدفئه، لكن \"كلاي\" تملكه الرعب؛ مستحيل أن ينام وسط هذه المقبرة البشرية. ترجاهم بهدوء أن يخيموا بالخارج، وللدهشة وافقوا بعد تفكير قصير. وفي طريقهم لخارج الكهف، لم يستطع \"كلاي\" منع عينيه من تأمل تلك النقوش المتهالكة لوجوه تملك عيوناً، وكأنها تستغيث به.", "خارج الكهف، بدأت طقوس \"الصيد\"؛ وهي هواية غريبة تتطلب صبراً. بدأ الأخوان بحفر دائرة متوسطة في الجليد الصلب في منطقة معينة خلف الخيام بدقة. أخرجا سناراتهما ورميا الخيوط في الحفرة، وفي دقائق معدودة، كان كل منهما يسحب سمكة تتلوى، استخرجاها من تحت الجليد بمهارة لا يملكها بصير.", "لم يستطع \"كلاي\" المقاومة، فاقترب مبدياً إعجابه، فعرضا عليه التجربة. غرق \"كلاي\" في متعة الصيد، نسي رعب الكهف، وتمنى ألا ينتهي الوقت. أدخلوا الأحصنة للكهف لحمايتها من الذئاب، وتجمعوا حول النار يشوون صيدهم.", "لاحظ كلاي ان بن يدور بوجه من الحين للاخر ويضم شفتيه كانه ينفخ في طعام ساخن, لم يرد كلاي السؤال حتي لا يزيد من تدخله في شؤن تلك القرية الغامضة.", "وعلي النقيض شعر بالخجل من نفسه؛ لقد اعتذروا له في السوق وهو لم يعتذر عن ثورته في الكهف، ففتح الموضوع واعتذر لهما عن صوته وتدخله. تقبلا اعتذاره ببرود، وقال \"تيد\" وهو يقلب سمكته فوق النار بمهارة يدوية، شاعرا بحرارة نضجها: \"هل تتذكر يا \\'بن\\' حين كنا عند جدنا (إنزو) وسمعناه يداعب فأراً في صندوق؟\" همهم \"بن\" وهو يأكل بأنه نعم فتابع \"تيد\" وهو يوجه كلامه لـ \"كلاي\": \"بفعلك اليوم يا مستر كلاي ذكرتني بذلك الفأر.. جدي يقول إن الفأر فضولي جداً، وبسببه اكتشف جدي أماكن جديدة في خيمته.\"", "فهم \"كلاي\" التشبيه؛ تيد يقصد فضوله بشأن العظام والنقوش. مسح \"بن\" يده في الثلج وقال بنبرة تحمل تحدياً خفياً: \"إذن هيا يا مستر كلاي.. أرِنا مهاراتك، واكتشف لنا أين يقع مخرج وادي لامبرث.\"", "في طريق العودة إلى الوادي، كان صمت الجبال يفسح المجال لضجيج الأفكار في رأس \"كلاي\". كان يراقب ظهر \"تيد\" و\"بن\" وهما يركبان خيولهما أمامه، ويفكر: إذا كان الفأر قد ساعدهم في اكتشاف زوايا خيامهم، فمن المؤكد أنهم عاجزون عن إدراك أسرار هذه الجبال رغم كل مهاراتهم. تذكر جملة مليكة: \"كل شيء يحدث لسبب\"، وآمن في قرارة نفسه أن سبب وجوده هنا هو \"التميز\"؛ تميز بصره الذي يجب أن يكون مفتاح النجاة للجميع.", "قرر \"كلاي\" أن يمنح \"قوة النظر\" هدفاً نبيلاً: سيجد المخرج، ويعود ليقود هؤلاء القوم من عالمهم المظلم إلى النور. وبدأ بالفعل يمسح القمم والمنحدرات بعينيه، يبحث عن شق، أو فجوة، أو مدخل كهف. وفجأة، خفق قلبه حين أبصر فوهة كهف عملاقة في جبل بعيد.", "وعلي الرغم من صوت توقف الأخوان بخيولهما فوراً حين سمعا تسارع دقات قلبه، فسألاه عما به. قال \"كلاي\" بصوت متهدج: \"أنا أرى باب كهف كبير في ذلك الجبل، هناك في تلك الناحية.\"", "تتبع الأخوان بآذانهما حركة يده وهي تشير للسراب البعيد بالنسبة لهما. صمت \"بن\" قليلاً ثم وجه وجهه نحو أخيه قائلاً: \"تيد، أنت أدرى مني بدروب الصحراء، أنا لا أذكر وجود كهوف في هذا الاتجاه.\" همهم \"تيد\" موافقاً وقال بلهجة تحمل استخفافاً مبطناً: \"مستر كلاي، هل أنت متأكد؟ أم أنك تحاول إثبات صحة كلامنا حول النار بأنك تبحث عن مخرج؟\"", "شعر \"كلاي\" بالإهانة لكنه أصرّ: \"أؤكد لك يا تيد، هناك فوهة ضخمة، أرجوكم لنذهب ونراها.\" رد \"تيد\" ببرود: \"ولكن نحن تجار ولا يمكننا المغامرة ببضاعتنا بهدف الاستكشاف، وعلينا العودة للوادي.\" وأضاف \"بن\": \"خاصة وأننا نعرف كل شبر هنا، ونعلم يقيناً أنه لا يوجد كهف في ذلك الاتجاه.\"", "تحرك الأخوان بخيولهما دون اكتراث، لكن \"كلاي\" حدث نفسه بإصرار: \"سأذهب وحدي، وسيشكرونني لاحقاً حين أنقذهم.\" وقرر أن يعود للقرية معهما ليعدّ عدته لرحلة سرية نحو ذلك الكهف المجهول.", "وبالفعل حين وصل كلاي لخيمته، بدأ يجهز حقيبته ومعدات التسلق، لكن دافعاً داخلياً ألحّ عليه أن يزور \"مليكة\" قبل رحيله. وبالفعل، توجه لخيمتها وسمح له الحراس بالدخول بعد اشارتها.", "شعر فور دخوله بذلك الدفء والسكينة التي تميز مكانها عن كل ركن في الوادي، حتى عن خيمة الزعيم نفسه.", "قالت \"مليكة\" وهي تجلس أمام آلة خشبية كبيرة تنسج عليها صوف الخراف: \"غريب جداً موعد هذه الزيارة يا مستر كلاي.\"", "ارتبك \"كلاي\" واعتذر عن وقته المتأخر، وبدا وكانه يغادر الخيمة, و لكنها ضحكت برقة سحرت قلبه مرة أخرى وقالت: \"كنت أوشك على الانتهاء من شال صوف لأقدمه لك هدية.\" انبهر \"كلاي\" حين رأى الشال؛ كانت الألوان موزعة بتناسق مذهل، مرسوم عليه لوحة فنية للثلج والأشجار والزهور، وفي منتصفها حروف اسمه بالإنجليزية. حدق في وجهها ليتأكد أنها حقاً بلا أعين، فكيف لأعمى أن يبدع هذا المزيج اللوني؟", "سألها بذهول وانفاع: \"كيف تعرفين الألوان وتنسقينها هكذا؟\" أجابته ببساطة أدهشته: \"بالحرارة يا مستر كلاي.. كل لون يمتص الحرارة ويعكسها بدرجة مختلفة. إذا قربت النار من الخيوط، ستشعر أناملك بالفروق الدقيقة بين درجة حرارة كل لون.\"", "سقط \"كلاي\" على الكرسي مبهوراً بهذا الذكاء الفطري. سألته \"مليكة\" عن أحواله وعن تجارته الجديدة، فقرر أن يصارحها بشأن \"كهف العظام\"، وأخبرها أنه سيتوقف عن العمل مع أولئك الإخوة لأنه يرفض تدنيس رفات البشر. لم يخبرها عن رحلته للكهف المجهول، لكن \"مليكة\" صُدمت من قصة العظام وطلبت أسماء التجار لتبلغ والدها الزعيم.", "وهنا وقعت الصدمة الأكبر على رأس \"كلاي\"؛ فحين ذكر أسماء \"تيد\" و\"بن\"، تغيرت نبرة \"مليكة\" وقالت له بحذر: \"تيد وبن؟ هذان من رجال \\'إنزو\\'.. الطبيب القبيح الذي فحص عينيك!\"", "كان \"كلاي\" يشعر بدفء غريب يلف جسده وروحه وهو يرتدي شال \"مليكة\"؛ كان الشال المنسوج بحب يذكره بآدميته وسط هذا العالم الجليدي. لكن فرحته لم تدم طويلًا، فقد بدأت الأسئلة تدور في عقله وهو عائدًا لخيمته: لماذا أرسل \"إنزو\" رجاله ليمثلوا دور تجارا؟ ولماذا كشفوا له سر \"كهف العظام\" بكل ثقة؟ هل كانوا يجهلون قدرته على تمييز عظام البشر، أم أن الأمر كله كان فخًا لاستدراجه؟", "تحذير \"مليكة\" له من الأخوين جعل فكرة الرحلة السرية للكهف المجهول تتراجع مؤقتًا، فالآن هناك مواجهة وشيكة أمام الزعيم، وهو الشاهد الوحيد.", "في الصباح التالي، لم يتوجه \"كلاي\" للسوق، بل اقتاده الحراس إلى \"الخيمة الكبيرة\". كان الجو مشحونًا بالتوتر؛ الزعيم يجلس على عرشه، وعن شماله \"مليكة\" بملامحها الهادئة، وعن يمينه الطبيب \"إنزو\" بملامحه المنفرة.", "وقف \"كلاي\" بجانب \"تيد\" و\"بن\" أمام منصة الحكم. وبمجرد وقوفه، شعر بقلبه يدق بعنف من الخوف، وصلت الدقات لآذان الأخوين بوضوح، فتبادلا ابتسامة سخرية خفية؛ ففي هذا الوادي، قلبك هو لسانك الذي لا يكذب، وهم الآن يقرأون خوفه ككتاب مفتوح. شعر \"كلاي\" بالعجز؛ فبرغم بصره، إلا أنهم يتفوقون عليه في فضح مشاعره الدفينة.", "كسر الزعيم الصمت بسؤال هادئ: \"هل تعرف هذين الرجلين يا مستر كلاي؟\" نظر \"كلاي\" إليهما بقلق وأجاب: \"نعم، إنهما تيد وبن.. أخوان.\" سأله الزعيم مجددًا: \"وهل بينكم علاقة تجارية كما وصلني؟\" رد \"كلاي\" بسرعة: \"كانت تجارية، لكني أوقفت العمل معهما الآن.\"", "وجه الزعيم السؤال الحاسم: \"وماذا وجدت في \\'الكهف الدافئ\\' أثناء وجودك معهما؟\" تردد \"كلاي\" للحظة، ثم قال وهو يراقب رد فعل الحاضرين من أهل الوادي: \"وجدتُ بقايا عظام بشرية.. عظام سواعد، وأقفاص صدرية، وأجزاء من جماجم. ورأيت أيضًا نقوشًا تدل على أن..\"", "قاطعه صوت \"إنزو\" الرخيم: \"حاول أن تسيطر على نبرة صوتك يا مستر كلاي، وأجب على قدر السؤال فقط.\"", "كان \"كلاي\" قد بدا يتحمس في صوته بالفعل خاصة بعدما سمع شهقات الدهشة من أهل \"لامبرث\" عند ذكر العظام البشرية, ولكن كلمات العجوز \"إنزو\" كتمت أنفاس وعقدت لسانه.", "التفت الزعيم للأخوين وسألهما: \"هل ما يقوله مستر كلاي صحيح؟\" صمت \"تيد\" لثانية ليجمع ثباته، ثم انطلق يقول: \"نحن نعرفه يا زعيم، وفعلاً ذهب معنا للكهف، لكننا لا نملك أي علم بنوع تلك العظام؛ نحن نجمع ما نجد. إن مستر كلاي هو من يتخيل أشياءً غريبة، لدرجة أنه حاول إقناعنا بزيارة كهف وهمي في طريق العودة لا يراه أحد غيره.\"", "ساد صمت مطبق في القاعة، صمتٌ سمح للجميع بسماع ضربات قلب \"كلاي\" المتسارعة والمضطربة، والتي بدت للعميان كدليل على كذبه وارتباكه أمام هدوء \"تيد\" وثبات نبضه. ورغم محاولات \"كلاي\" للدفاع عن نفسه بصدق، إلا أن قواعد المحاكمة التي فرضها \"إنزو\" جعلته يبدو ضعيفًا ومريبًا.", "انتهت المحاكمة بقرار من الزعيم بوقف استيراد العظام من \"الكهف الدافئ\" حتى إشعار آخر، وعادت الحياة لطبيعتها في الوادي. لكن بالنسبة لـ \"كلاي\"، لم يعد شيء كما كان؛ فقد أدرك أن \"إنزو\" ليس مجرد طبيب، بل هو المحرك الحقيقي للخيوط، وأن رحلته للبحث عن الكهف المجهول أصبحت الآن مسألة حياة أو موت، بعيدًا عن عيون وآذان رجال الطبيب القبيح.", "سيستخدم حاسة بصره لإنقاذ نفسه. جهز حقيبته ومؤنه لرحلة طويلة نحو \"الكهف المجهول\" الذي رآه من بعيد. لم يودع \"مليكة\"، ظناً منه أنها باتت تراه مخرفاً مثلهم. مع أول خيوط الفجر، تسلل \"كلاي\" خارج الوادي محاولا الا يشعر به أحد، متوجهاً نحو مصيره.", "ولكن، في نفس اليوم الذي كان فيه \"كلاي\" يبتعد عن خيام الوادي متجها الي كهف المتاهه، كان الطبيب \"إنزو\" القبيح يقف وسط الشعب ليعلن خبراً زلزل أركان \"لامبرث\": \"لقد سُرق التاج الملكي!\"", "\"هل عرف حقاً أنها عظام بشرية؟\" قالها الطبيب العجوز \"إنزو\" وهو يتوقف عن رمي جثة فأر ميت بضربة قوية على رأسه داخل صندوق المهملات. رد عليه \"تيد\" وهو يغطي أنفه من رائحة الفأر الكريهة: \"لا أعرف كيف عرف يا كبير الأطباء، ربما أخبرته تلك العيون المنتفخة بذلك.\"", "أضاف \"بن\" الصغير: \"لقد حاولنا مسح الفكرة من رأسه وتكذيبه، لكننا لم نتوقع أبداً أن يذهب ويخبر ابنة الزعيم.\" رمى \"إنزو\" الفأر بتقزز وقال ببرود: \"هكذا سيضطر الزعيم لعقد محاكمة.\"", "بمجرد سماع كلمة \"محاكمة\"، تسارعت دقات قلب \"تيد\" و\"بن\" من الخوف، فابتسم \"إنزو\" وهو يستمتع بموسيقى التوتر الصادرة من صدورهم، وأكمل بطمأنة: \"لا تقلقوا، هذا سيخدم خطتنا للتخلص من هذا \\'الفأر\\' (كلاي) الذي دخل الوادي وجلب معه الشؤم. منذ وصوله وكل شيء يزداد سوءاً، والزعيم صار مشغولاً به، وهذا يمنعني من مفاتحته في أمر زواج \\'مليكة\\' من \\'تيد\\'.\"", "قفز قلب \"تيد\" فرحاً حين ذُكر اسم \"مليكة\"، فتابع \"إنزو\" خطته الشيطانية: \"حين تُسألون عن العظام في المحكمة، قولوا إنكم لا تعرفون أنها بشرية. سيظهر \\'كلاي\\' أمامهم كشخص يهلوس ويتخيل أشياءً غير موجودة، وهذا سيجعله يصرّ على الهرب والذهاب بنفسه لرحلة \\'كهف المتاهة\\' ليثبت صدقه.. وهناك نهايته.\"", "وضع \"إنزو\" فأراً آخراً في المتاهة الموجودة على الطاولة أمامه. فرح الأخوان بالخطة، لكن \"تيد\" سأل بقلق: \"وماذا لو عاد؟ أشعر أن تلك العيون الحيوانية تساعده كثيراً.\" توقف \"إنزو\" عن مراقبة الفأر وهو يسقط في أحد الفخاخ ويموت، ثم قام من كرسيه واتجه نحو \"تيد\"، ووضع يديه على وجهه وقال بلهجة مرعبة: \"أريدك أن تنسى أمر \\'كلاي\\' وتبدأ بالتفكير في زواجك.. أنت زعيم \\'لامبرث\\' القادم بعد موت الزعيم الحالي.\"", "تهلل وجه \"تيد\" رغم رائحة \"إنزو\" الكريهة، فأكمل الطبيب خبثه: \"ولكي يتحقق ذلك، يجب أن يكون مهر \\'مليكة\\' أغلى شيء في الوادي كله.. التاج الملكي نفسه، وأنت من سيقوم بسرقته.\"", "كان كل شيء حوله أبيض وساكناً وهو يمتطي حصانه، حاملاً معه زادَه وعدّته. استفاد \"كلاي\" من نصيحة الأخوين رغم غدرهما، وقرر استغلال الحصان ليريح رجله العرجة، وليكون وسيلته في الالتفاف حول الجبال إذا فشلت فكرة الكهف. لكنه، ومنذ لحظة خروجه، كانت هواجس الذئاب تنهش عقله؛ تلك القصص التي حذرته منها \"مليكة\" وروتها النساء اللاتي كن يرتدين قلادات العظام البشرية.", "تذكر أسطورة \"كهف الفوهة الكبيرة\" الذي يضم متاهة لا يخرج منها أحد. تساءل في نفسه: \"هل هذا هو الكهف الذي رأيته؟ وكيف غابت عني هذه الحكايات حين كنت مع تيد وبن؟\". ربما كان بريق الأمل في الهروب أعمى بصيرته عن خرافات القرويين. فكر في العودة، لكنه أدرك أن العيش في الوادي كـ \"حيوان واهم\" يصنع الحلي من رفات البشر ليس أفضل حالاً من الموت في سبيل الحرية.", "وصل \"كلاي\" أخيراً إلى الجبل المقصود، ووقف أمام الفوهة العملاقة التي كانت غارقة في ظلام دامس. وبسبب تعب السفر، قرر التخييم أمام المدخل. ربط حصانه داخل حدود الكهف الآمنة، ونصب خيمته في الخارج، ثم حفر حفرة في الثلج واصطاد سمكة شواها على نار هادئة، واستسلم لنومٍ عميق آملاً أن يبدأ رحلة الخلاص في الصباح.. لكنه لم يستيقظ في الصباح.", "استيقظ في منتصف الليل على ألمٍ رهيب يمزق ساقه العرجة. فتح عينيه ليجد نفسه يُسحل على الجليد؛ كانت ساقه المصابة محشورة بين فكي ذئب شرس يجرّه بعيداً عن مدخل الكهف. صرخ كلاي من الالم و حاول \"كلاي\" التمسك ببعض النباتات الصخرية الهشة، لكن قوة الذئب كانت اكبر والوجع يفقده التركيز. تذكر \"الفلاير\" في لحظة يأس، لكنه أدرك بصدمة أنه تركه في الحقيبة داخل الخيمة التي يبتعد عنها الآن.", "وعندما مرّ الذئب فوق الحفرة الصغيرة التي صنعها \"كلاي\" للصيد، وجد فيها فرصته الأخيرة. غرس ذراعه بالكامل في الحفرة وتشبث بالثلج المتجمد بكل قوته. زاد الألم في رجله لدرجة الصراخ حين توقف جسده والذئب لا يزال يشده، لكنه لم يفلت الحفرة.", "هنا، قرر الذئب إنهاء اللعبة؛ ترك الساق واتجه مباشرة نحو عنق \"كلاي\" لينهي حياته بضربة واحدة. رأى \"كلاي\" أنياب الوحش وهي تنطلق نحو رقبته، وفي اللحظة التي ظن فيها أنها النهاية, غمس يديه في مياه الحفرة المتجمدة، وبحركة خاطفة فجر موجة من الماء البارد في وجه الذئب وعينيه.", "تراجع الذئب موجوعا من المفاجأة، وأخذ يعوي وهو ينفض الماء عن وجهه. كانت ثوانٍ قليلة، لكنها كافية لنهض \"كلاي\" برغم إصابته نحو باب الكهف علي قدم واحدة. وعندما وصل لمدخل الكهف فقد توازنه مع شعوره بالدوار فسقط علي ارضه.", "و استعد الذئب للهجمة الأخيرة وقفز قفزتين ليصبح أمام \"كلاي\" الملقى على الأرض يلهث مستسلماً لمصيره في رعب وهو ينظر للذئب الذي يتقدم نحوه بانياب رأها تلمع فالظلام.", "لكن حدث ما لم يكن في الحسبان؛ بمجرد وصول الذئب لخط بداية الكهف، تجمد مكانه. انكمش الوحش على نفسه وارتعدت فرائصه وكأنه رأى شيطاناً، ثم ولى مدبراً يركض بعيداً في اتجاه الصحراء الثلجة.", "بقي \"كلاي\" يرتجف علي الارض وهو يراقب الذهب الذي اختفي: \"ما الذي قد يرعب ذئباً بهذا الحجم؟\". التفت ببطئ خلفه وقلبه يرتعد, وجد حصانه المربوط في الداخل يضطرب ويصهل كانه يري شبحا. وعلى حائط الكهف المعتم، ونور القمر الخافت علي مدخله، رأى خيالاً ضخماً علي الحائط خلف الحصان لكائن يتحرك ببطء شديد.", "وفجأة، وفي رمشة عين، اختفى الحصان من مكانه وكأنه اختُطف بقوة صامتة. كاد قلب \"كلاي\" أن ينفجر من فرط النبض، وبدأ يزحف للخلف محاولا الا يعبر لخارج الكهف والقشعريرة تخدر جسده."], ["ساد الوادي حالة من الغليان والتوتر الشديد فور إعلان الطبيب \"إنزو\" عن سرقة التاج الملكي. وبمجرد اكتشاف اختفاء \"كلاي\"، لم يحتاج الأمر لكثير من التفكير ليربط الجميع بين الغريب \"صاحب العيون الحيوانية\" وبين الجريمة؛ لقد جذب الغريب الشياطين اليه سرق تاج الملك وهرب.", "في الجانب الخلفي من الخيمة الكبيرة، داخل الجناح الخاص بالزعيم، كان الأخير واقفاً بلا حراك في ثياب نومه الملكية الفاخرة. وامامه مباشرة، كانت هناك طاولة ملكيه خُصصت ليُوضع عليها التاج، لكنها الآن خاوية تماماً. وقف الزعيم شاخصاً بوجهه نحو ذلك الفراغ في صمتٍ.", "\"مليكة\" سمعت بالاشاعات التي يرويها القرويين عن كلاي ودخلت على والدها خيمته تلك الليلة، وبمنتهى الجرأة التي لا يملكها غيرها، واجهته قائلة إن ما يحدث ليس إلا لعبة قذرة من تدبير \"إنزو\"، وأنه هو من أرسل رجاله لخداع \"كلاي\". لم يستجب الزعيم لاندفاعها، وظل بصره (بصيرته) معلقاً بمكان التاج الفاضي، فتابعت \"مليكة\": \"ماذا سيفعل بالتاج وهو يعلم، كما تعلم أنت أيها الزعيم الحكيم، أنه لا مخرج من هذا الوادي؟\"", "صمت الزعيم لحظات، ثم استدار بجسده نحوها ببطء، ووضع يديه على كتفيها بحنان أبوي وقال: \"ابنتي الجميلة.. ما زلتِ أفضل ابنة لي بين بناتي من القبائل كلها، وأمكِ ستظل أفضل زوجة حظيتُ بها. منذ صغركِ وأنتِ تعشقين استكشاف كل جديد.. لا زلتُ أذكر يوم جئتِ لي وأنتِ لم تكملي الثامنة، لترييني \\'البارود\\' الذي استخرجتِهِ من حفرة حفرتِها في الثلج، في الوقت الذي رصد فيه \\'إنزو\\' مكافأة ضخمة لمن يجد جراماً واحداً منه. أنتِ دائماً متميزة.\"", "ثم أدار وجهه عنها ليعاود التأمل إلى الفراغ، وتحولت نبرة صوته إلى الجدية قليلا: \"حتى تعلقكِ الزائد بمستر \\'كلاي\\'، الذي تحاولين إخفاءه عن الجميع وحتى عن \\'كلاي\\' نفسه، هو جزء من تميزكِ ونظرتكِ المختلفة للأمور.\"", "في تلك اللحظة، خفق قلب \"مليكة\" خفقة واحدة قوية، خانتها فيها قدرتها على التحكم في مشاعرها أمام والدها. لم يعلق الزعيم، فهو لا يحتاج لإثباتات، بل أكمل: \"لكنكِ تعرفينني يا \\'مليكة\\'.. وتعلمين أنكِ لو أخطأتِ في حق \\'لامبرث\\'، سأكون أنا أول من يسعى لعقابكِ، فأنا لا أنحاز إلا للحق. والحق أن \\'كلاي\\' أظهر معدناً متذبذباً في المحكمة، والشخص المتذبذب يسهل توقع انحرافه في أي لحظة، خاصة لو كان الأمر يتعلق بالانتقام من قوم شبهوه بالحيوانات.\"", "سكتت \"مليكة\"؛ فلا مجال لمناقشة الزعيم حين يتحدث بلغة الحق والعدل. حاولت تهدئة نبرتها الدفاعية وقالت: \"لا تقلق يا أبي.. لدي ثقة بأن التاج سيعود.\"", "صمت الزعيم ثوانٍ، ثم قال بكلمات هزت أركان الغرفة: \"كل ليلة قبل النوم، كنت أقف هذه الوقفة لأستشعر \\'روح المعدن\\' المشعة من الذهب والأحجار الكريمة في تاجي\" ثم اكمل بنبرة متعالية \"اليوم لا يوجد تاج، لكني ما زلتُ الزعيم.\"", "وسط \"اللامكان\"، حيث يبتلع البياض كل شيء خارج فوهة \"كهف المتاهة\" العملاق، استيقظ \"كلاي\" فالصباح من غيبوبة الألم ليجد نفسه ملقىً على المدخل. أدرك بعدها أن جرح ساقه كان أعمق مما ظن؛ فالدماء التي نزفتها أنيابه الذئب تركت بقعة قانية على ارض المدخل، وسببت له ضعفاً عاماً جعل أطرافه ترتجف. تحامل على نفسه بزحفٍ مرهق حتى سند ظهره إلى الجدار الصخري البارد، محاولاً لملمة جراحه وربط ساقه بما تبقى من قماش.", "نظر \"كلاي\" مرة أخرى نحو المكان الذي ربط فيه حصانه، ويا ليته لم يفعل. رأى دماء الحصان تلطخ الأرض وجزءاً من الحائط، والأثر يمتد كخيط غليظ نحو أعماق الكهف المظلمة. وما أثار حيرته ورعبه هو وجود مادة لزجة (زلال أخضر) غريبة على الأرض قرب الدماء، لم يجد لها أي تفسير في قاموس الطبيعة الذي يعرفه.", "انهارت الدموع على وجنتيه؛ ليس خوفاً فقط، بل حزناً على حاله. لقد أدرك بمرارة أن حلم تسلق الجبال والعودة لعالمه صار مستحيلاً، فكاحله يبدو محطماً تماماً بفعل تلك الأنياب الغادرة. تساءل بمرارة: \"إلى أين المصير الآن؟\".", "بدأت الحسابات القاتلة تتصارع في عقله:", "الخارج: موت محقق تحت أنياب ذئاب الثلج التي تنتظر غفلته، ثم تساءل بذهول: \"لماذا لم تظهر هذه الذئاب حين كنت مع \\'تيد\\' و\\'بن\\'؟ هل لاختلاف طبيعة الكهوف سر؟\".", "الداخل: وحش غامض، أشرس وأضخم من أي ذئب، كائن لديه القدرة على التهام حصان كامل في لمح البصر وتشريد أقوى الضواري برائحته فقط.", "أيقن \"كلاي\" أن هذه الشمس هذا النهار قد تكون آخر خيط ضوء يلمسه في حياته. فالبقاء مكانه يعني انتظار الموت، والتعمق في الكهف يعني التسليم لمصير الحصان. لكن، وسط هذا اليأس، لمس \"كلاي\" بيده \"شال مليكة\" الملتف حول رقبته، فقفز إلى ذهنه اختيار ثالث؛ اختيار قد يكون انتحارياً، لكنه النهاية الوحيدة التي قد تمنحه كرامة المحاولة: العودة إلى \"وادي لامبرث\" سيراً على قدم واحدة.", "كانت الهمهمات تموج خارج الخيمة الكبيرة كأمواج البحر؛ القرويون يتجمعون بفضول وقلق يتحدثون عن \"التاج الجديد\" الذي سيضعه الزعيم بدلاً من ذلك الذي سرقه \"الغريب\" قبل يومين. شق الحشد طابور من الجنود يحملون صندوقاً ملكياً مرصعاً بالأحجار، يتقدمهم \"إنزو\" وخلفه \"تيد\" و\"بن\". دخلوا مباشرة إلى جناح الزعيم الخاص.", "كان الزعيم واقفاً بصمت بينما يُصلح الجواري ثيابه الملكية. أشار لهن بالانصراف بمجرد دخول \"إنزو\" ورجاله. فتح الطبيب العجوز الصندوق وأخرج التاج الجديد، وقدمه بخضوع: \"التاج الجديد أيها الزعيم.\"", "لم يلتفت الزعيم له ولا للتاج، بل سأل بنبرة جمدت الدماء في العروق: \"وأين التاج القديم يا إنزو؟ كيف استطاع لص أن يتسلل لغرفة نومي ويسرقه دون أن يدركه الحراس او تعمل أجراس الإنذار المتصله بالتاج؟ السارق من حاشيتي يا إنزو.. سارق يعرف المداخل والمخارج.\"", "على بُعد خطوات، كان \"تيد\" و\"بن\" يرتجفان؛ دقات قلوبهما كانت تعوي كذئاب جريحة، خوفاً من قدرة الزعيم الفائقة على قراءة الأفكار والنفوس. لكن \"إنزو\" -الذي يبدو بلا نبض- لم يترك لهما مجالاً للانكشاف، فقال بسرعة وهدوء: \"أوافقك الرأي تماماً يا زعيم، كانت عملية نظيفة يستحيل على غريب فعلها.\" كاد قلب \"تيد\" أن يفضحه من شدة المفاجأة؛ \"إنزو\" يوافق الزعيم؟! لكن الطبيب أمر تيد وبن بالانصراف فوراً لينفرد بالزعيم، ثم أكمل بخبث: \"ولكني سمعتُ أيضاً أن الأميرة والغريب كانا صديقين.. هل تقصد أن السارق شخص قريب من العائلة الملكية مثل مستر \\'كلاي\\'؟\"", "استدار الزعيم لـ \"إنزو\" بلهجة صلبة، متذكراً تحذيرات \"مليكة\" من مؤامرات الطبيب: \"لماذا أنت مصرّ على أنه الجاني يا إنزو؟\" لو كان شخصاً غير \"إنزو\" لذاب قلبه رعباً من صوت الزعيم، لكن الطبيب رد بكل ثقة: \"وأنت ايها الزعيم.. لماذا مصرّ على براءته؟\"", "لم يرد الزعيم، فأكمل \"إنزو\": \"الوقت الذي اختفى فيه التاج هو نفس وقت اختفائه. أخذ معداته، وآثار حصانه تؤكد خروجه من الوادي. عينيه الحيوانية قد صورت له أوهاماً، ربما ظن أن \\'مليكة\\' تحبه، فاستغل نفوذها ليتجول حول الخيمة الكبيرة دون شكوك. أنت بنفسك شعرت بتذبذبه في المحكمة.\"", "ثم خفض \"إنزو\" نبرته بمكر: \"ولكن من قال إننا فقدنا التاج؟ لا أحد يخرج من \\'لامبرث\\' حياً، لذا فالتاج سيعود. لقد رصدتُ مكافأة لمن يخرج خلف \\'كلاي\\' ويستعيده. وخلال يومين، سيعلم شعبنا أن الزعيم لا يُسرق تاجه أبداً، حتى لو كان مصنوعاً من ورق النخيل.\"", "هنا، ظهرت ابتسامة خفية على وجه الزعيم؛ لم يحسها \"إنزو\" ولكنه لمس بكلماته نقطة ضعف الزعيم في هذه المرحلة. ما كان يؤرقه ليس الذهب، بل صورته كزعيم قوي أمام شعبه. لقد نجح \"إنزو\" في تحويل القضية من \"بحث عن الحقيقة\" إلى \"استرداد كرامة\"، وبذلك ضمن صمت الزعيم عما سيفعله بـ \"كلاي\".", "كان الوقت يمر ثقيلاً، ولم يتبقَّ سوى ساعات قليلة قبل أن يبتلع الليلُ الجبال، ومع الليل يأتي الرعب المزدوج من داخل الكهف وخارجه. أدرك \"كلاي\" أنه لا بديل عن الحركة؛ فالبقاء ساكناً يعني الموت ببطء. اتخذ قراره المرير: سيحاول الخروج لجمع ما يمكنه حمله من خيمته، ثم يبدأ رحلة الزحف الطويلة والمهينة للعودة إلى \"وادي لامبرث\".", "تحامل على آلامه، واتكأ على جدار الكهف البارد ليقف على قدم واحدة، وعينه ترقب الخيمة القابعة في الخارج حيث طعامه وعدته. لكن المفاجأة كانت بانتظاره؛ فذئاب الثلج لا تكلّ ولا تملّ، صيدها مستمر آناء الليل وأطراف النهار. أبصر من بعيد ذئباً يشمشم حول خيمته، يمزق الأقمشة بحثاً عن أي لقمة يسد بها جوعه.", "دب الرعب في قلب \"كلاي\"، وتراجع خطوة للخلف. لكن فجأة، اشتعل في صدره غضبٌ لم يعهده من قبل؛ غضب المظلوم الذي لم يعد لديه ما يخسره. و تذكر أن هذه الكائنات تهاب مدخل الكهف كأنه جحيمها الخاص، فقرر أن يتحدى خوفه ويواجه الوحش.", "بدأ \"كلاي\" يصرخ بأعلى صوته، مستخدماً \"حاسته الممنوعة\" في الوادي كصيحة حرب. التفت الذئب نحوه، رمقه بنظرة باردة ثم عاد ببرود ليأكل ما تبقى من أسماك \"كلاي\" التي اصتادها بالامس. استشاط \"كلاي\" غيظاً، وانحنى يجمع الأحجار الصغيرة من أرضية الكهف، وقذفها نحو الذئب بكل ما أوتي من قوة.", "أصابت رميته الذئب، فترك طعامه وتصلب جسده. زمجر الوحش بغيظ وقرر أن ينهي إزعاج هذا \"البعوض\" البشري. وبلياقة مذهلة، انطلق الذئب كالسهم فوق الجليد، وفي ثوانٍ كان أمام فوهة الكهف وجهاً لوجه مع \"كلاي\".", "من هول الصدمة وسرعة الهجوم، فقد \"كلاي\" توازنه وهو يقف علي ساق واحده وسقط على ظهره. أغمض عينيه متوقعاً أن تنغرس الأنياب في صدره، لكن للمرة الثانية، حدثت المعجزة المرعبة. توقف الذئب فجأة عند الخط الفاصل بين الثلج والكهف، ورفع أنفه يشم الهواء الخارج من الأعماق. ارتعد جسد الذئب، وانكمش ذيله بين قدميه، ثم فرّ هارباً كأن عفريتاً يطارده.", "فتح \"كلاي\" عينيه بصعوبة، وأنفاسه تتسارع، استدار برأسه ببطء شديد نحو ظلام الكهف الدامس خلفه. كان يريد أن يرى بعينيه \"الشيء\" الذي يجعل أقوى مفترسات الجبال ترتعد خوفاً وتفضل الجوع على المواجهة.", "دخل \"تيد\" و\"بن\" خيمة العجوز \"إنزو\"، فوجداه جالساً كعادته خلف طاولته، لكنه هذه المرة كان يركز حواسه على شيء يلمسه بدقة متناهية. أخبرهما ببرود أنه يصنع \"التاج الملكي الجديد\" للزعيم، بديلاً عن ذلك التاج الذي سرقه \"تيد\" ودفنه في مكان سري لا يعلمه إلا \"إنزو\".", "قال الطبيب وهو يثبت حجراً كريماً في مكانه بتناسق لوني مذهل: \"ستكونان معي في غرفة الزعيم حين أسلمه التاج، لكن حذارِ أن تقتربا من دائرة سمعه، لا أريد لمشاعركما الخائبة ونبضات قلوبكما المهتزة أن تفضح الخطة.\"", "ارتبك الأخوان وتسابقت دقات قلوبهما خوفاً من الزعيم، فأكمل \"إنزو\" دون أن يلتفت إليهما: \"بمجرد أن ننتهي، سينقلب الوادي رأساً على عقب؛ الجميع سيخرج للصيد، طمعاً في الجائزة الموضوعة على رأس \\'كلاي\\'.\"", "اندفع \"تيد\" قائلاً بقثة الفارس: \"أنا سأحضره لك.. سأحضر لك رأسه.\" استشاط \"إنزو\" غضباً وكأنه توقع هذه الحماقة، ورد بحدة: \"لا تتصرف من تلقاء نفسك يا \\'تيد\\'. ألغِ عقلك تماماً إذا أردت أن تصبح زعيم \\'لامبرث\\' القادم.\"", "صمت \"تيد\" محرجاً، فعاد \"إنزو\" لتركيزه على التاج وأضاف: \"الزعيم يريده حياً، وبالطبع نحن لن نعيده حياً حتى لا يثرثر كثيراً.. هذا إن وجدناه أصلاً، فهو الآن قد دخل المتاهة، ومن يدخلها لا يعود.\"", "سأل \"بن\" بحيرة: \"كيف ذلك والزعيم يطلبه حياً؟\" أجاب \"إنزو\": \"سيخرج الفرسان للبحث في كل مكان ولن يجدوا شيئاً. أما أنتما، فأنتما تعرفان وجهته تماماً، لكنكما لن تذهبوا خلفه, ستتوجهوا الا كهف الذئاب.\"", "لم يفهم \"تيد\" تماماً، فسأل: \"وإذا وجدناه؟\" رد \"إنزو\" ببرود قاتل: \"أنتما لن تجداه.. سيكون مطلوباً منكما فقط أن تجدا \\'أي شيء\\' يخصه. ابحثا جيداً وستجدان دليلاً على موته.\"", "ثم عدّل \"إنزو\" التاج في مكانه بعدما انتهى من صنعه، وقال بنبرة واثقة: \"واتركا لي أمر الزعيم.. أنا سأتكفل به.\"", "لم يجد \"كلاي\" خلفه شيئاً، لا حركة ولا صوتاً، بل فراغاً موحشاً يشبه ذلك الذي تركه اختفاء الحصان المفاجئ. أدرك برعب أن مجرد \"رائحة\" أو \"أنفاس\" هذا الكائن القابع في الظلام كافية لتهجير ذئاب الجبال الدموية، لكن عقله عجز تماماً عن رسم صورة لهذا المسخ الذي يبتلع الخيول بصمت ويهيب الضواري.", "نظر \"كلاي\" إلى خيوط الشمس التي بدأت تودع مدخل الكهف، وشعر بضياع تام. الخروج يعني الموت تمزيقاً تحت أنياب الذئاب، والبقاء يعني الانتظار حتى يُسحب في جوف الليل كما سُحب حصانه, عاد لنقطة الصفر من جديد. هذه الأفكار استنزفت ما تبقى من طاقته، فاستلقى على ظهره بألم، وانسابت الدموع من زوايا عينيه وهو يتأمل سقف الكهف بمرارة.", "\"فليأتِ ذلك المسخ ويلتقطني من هنا\"، هكذا فكر بيأس وهو يعيد شريط حياته أمام عينيه؛ من مدرّس تاريخ في عالمه البعيد، إلى تائه في وادي \"لامبرث\" الأعمى. مرّت أمام مخيلته كل الوجوه التي قابلها، لكن وجه \"مليكة\" ظل هو الأدفأ والأنقى في هذه الصحراء الجليدية. تحسس شال الصوف الذي أهدته إياه، وتمنى لو كانت بجانبه الآن.", "شعر بالانكسار وهو ملقى على الأرض بانتظار غياب الشمس ليصبح عشاءً لمسخ لم تره أعين البشر من قبل. بكى على حاله، ولكي يستجمع شتات نفسه، تخيل صوت \"مليكة\" وهي تبدي إعجابها بشجاعته وذكائه في مواجهة ذئاب الجبال التي يرتعد الوادي من ذكر سيرتها.", "خفق قلبه بقوة لهذا التصور، وعاد إليه ذلك الغضب المحرك؛ غضبٌ جعله يرغب في النهوض وقتل هذا المسخ قبل أن يموت، ليترك خلفه أثراً أو يزيل عقبة عمن سيأتي بعده. لكن جسده كان مشلولاً من التعب الجسدي والنفسي، فظل شاخصاً ببصره نحو سقف الكهف، يتأمل تفاصيله بدقة تحت ضوء الغروب الضعيف.", "وفجأة، تجمّدت أنفاسه. ضيق عينيه وفتحهما مراراً ليتأكد مما يراه. \"هل هذه.. حروف إنجليزية؟!\"", "قالها وهو لا يصدق عينيه. كانت هناك كلمة مرسومة بوضوح علي السقف. وفي لحظة انبعاث مفاجئة، انتفض \"كلاي\" وجلس مستنداً، نسي آلام كاحله المحطم، خلع شال \"مليكة\" الصوفي الثقيل، ولفه ببراعة حول قدمه المصابة ليصنع منها \"جبيرة\" قوية وحذاء يحمي جرحه، وهو يهمس لنفسه بإصرار عجيب: \"يجب أن أدخل إلى هذا الكهف!\"", "\"أهلاً بكم في وادي لامبرث\"", "تلك هي الكلمات التي رآها \"كلاي\" مكتوبة في سقف الكهف. وفي تلك اللحظة، تدفق الأدرينالين في جسده المحطم كتيار كهربائي، وشعر بطاقة تحركه. وجود هذه الكلمات يعني وجود شخص آخر يرى، شخص مثله وضع هذه العلامة ليرشد غيره. فمن المستحيل على سكان \"لامبرث\" العميان أن يتسلقوا سقف الكهف كالعناكب ليتحسسوا كلمات ليست بارزة ولا محفورة أصلاً.", "\"هذه رسالة من شخص يرى.. لشخص يرى\"، هكذا فكر \"كلاي\" بذهول. \"البشر الذين رسموا الوجوه ذات العيون الحقيقية كانوا هنا، فماذا حدث لهم؟\".", "قرر \"كلاي\" استغلال الدقائق الأخيرة قبل مغيب الشمس تماماً لجمع مؤنه، وطعامه، والأهم من ذلك \"الفلاير\" من خيمته خارج الكهف. كان عليه اقتحام المتاهة ومواجهة الوحش الساكن في أعماقها ان ادي الامر ليفهم حقيقة هذا الوادي الملعون. بدأ بالتحرك بقدم ونصف، محاولاً جذب حقائبه الثقيلة لداخل الكهف، لكن ما يستغرق دقائق من شخص سليم، استغرق من \"كلاي\" ساعة كاملة بسبب كاحله المحطم والألم الذي كان كالخناجر في قدمه مع كل حركة.", "بشق الأنفس، استطاع سحب الشنطة والمؤن إلى داخل حدود الكهف الآمنة من الذئاب، لكنه عندما التفت خلفه، أدرك انه أسقط \"شال مليكة\" من قدمه أثناء الزحف وهو لم يشعر، وبقي الشال ملقىً في الخارج على الجليد. كان الشال ملطخاً بدمائه القانية، وبسبب ثقله وانشغاله بالحقيبة، تركه خلفه بضعة أمتار.", "اخذ كلاي نفسا عميقا وهو ينظر الي الشال وتحامل
