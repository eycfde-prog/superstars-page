<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EYC VETO - Agent Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="vetoo.css">
</head>
<body>

    <div class="mobile-header">
        <div onclick="toggleSidebar()"><i class="fas fa-bars fa-lg"></i></div>
        <div style="font-weight: 900; color: var(--accent); letter-spacing: 1px;">VETO SYSTEM</div>
        <div onclick="openFlashCard()"><i class="fas fa-user-circle fa-lg"></i></div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="logo-area">VETO SYSTEM</div>
        <div class="profile-mini" onclick="openFlashCard(); if(window.innerWidth<=768) toggleSidebar();">
            <img id="sideAvatar" src="https://via.placeholder.com/80">
            <div id="sideName" style="font-weight: 700;">Agent Name</div>
            <div style="font-size: 0.6rem; color: var(--accent); margin-top: 5px;">VIEW PERFORMANCE</div>
        </div>
        
        <div class="nav-menu" id="levelMenu"></div>

        <button onclick="logout()" style="padding: 20px; background: #dc2626; color: white; border: none; font-weight: 700; cursor: pointer;">
            <i class="fas fa-power-off"></i> LOGOUT
        </button>
    </aside>

    <main class="main-stage">
        <div id="path" class="breadcrumb">Welcome Agent</div>
        <h1 id="sessionTitle" style="font-size: 1.5rem; margin: 0; color: #1e293b;">Dashboard</h1>
        <div class="activity-grid" id="activityGrid">
            <div style="text-align: center; grid-column: 1/-1; color: #94a3b8; margin-top: 50px;">
                <i class="fas fa-arrow-left fa-2x"></i><br><br>
                Select a Level from the menu to start
            </div>
        </div>
    </main>

    <div id="activityOverlay">
        <div id="activityWindow">
            <iframe id="activityFrame" src="" frameborder="0" style="width:100%; height:100%;"></iframe>
        </div>
        <button class="btn btn-close" onclick="closeActivity()" style="position: absolute; bottom: 20px; width: 200px;">CLOSE ACTIVITY</button>
    </div>

    <div id="flashCardOverlay">
        <div class="flash-card">
            <div class="card-header">
                <img id="cardAvatar" src="" style="width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--accent);">
                <div style="text-align: center;">
                    <h2 id="cardName" style="margin:0; font-size: 1.3rem;">--</h2>
                    <div id="cardEmail" style="font-size: 0.8rem; opacity: 0.7;">--</div>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 10px;">
                    <span style="background:#10b98122; padding:4px 12px; border-radius:15px; font-size:0.7rem; color:var(--accent);">CODE: <b id="cardCode">--</b></span>
                    <span style="background:#ffffff11; padding:4px 12px; border-radius:15px; font-size:0.7rem;">OFFLINE: <b id="cardOffline">--</b></span>
                </div>
            </div>

            <div class="card-scroll-area">
                <div class="info-grid">
                    <div class="info-box"><label>GROUP</label><div id="cardGroup">--</div></div>
                    <div class="info-box"><label>AGE</label><div id="cardAge">--</div></div>
                    <div class="info-box"><label>TOKENS</label><div id="cardTokens">0</div></div>
                    <div class="info-box"><label>GLOBAL RANK</label><div id="cardGRank">#0</div></div>
                </div>

                <h3 style="font-size: 0.9rem; color: var(--accent); text-transform: uppercase; margin-bottom: 15px;"><i class="fas fa-star"></i> Level Mastery</h3>
                <div class="levels-container" id="levelsRow"></div>

                <h3 style="font-size: 0.9rem; color: var(--accent); text-transform: uppercase; margin-bottom: 15px;"><i class="fas fa-chart-bar"></i> Skills Progress</h3>
                <div class="activity-section" id="activitiesList"></div>
            </div>

            <div class="card-controls">
                <button class="btn btn-refresh" onclick="refreshCard()"><i class="fas fa-sync"></i> REFRESH</button>
                <button class="btn btn-close" onclick="closeFlashCard()">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color: white; margin-bottom: 25px;">VETO LOGIN</h2>
            <input type="email" id="loginEmail" class="login-input" placeholder="EMAIL ADDRESS">
            <input type="text" id="loginCode" class="login-input" placeholder="ACCESS CODE">
            <button onclick="attemptLogin()" id="loginBtn" style="width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: 900; cursor: pointer;">ACCESS DASHBOARD</button>
        </div>
    </div>

    <script src="vetoo.js"></script>
</body>
</html>
