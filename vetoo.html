<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYC Veto Program - WOLF Edition</title>
    <link rel="stylesheet" href="vetoof.css">
</head>
<body>

    <div id="overlay" onclick="closeFlash()"></div>

    <div id="main-ui">
        <header class="banner">
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="Logo">
            <h1>Mr. Ezz .Y. Ali</h1>
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz">
        </header>

        <div class="controls">
            <button class="switch-btn" onclick="toggleView()">Tokens Portal</button>
        </div>

        <main class="grid-container" id="levels-grid"></main>
        
        <div id="vortex-container">
            <div class="vortex"></div>
            <div class="vortex-content">
                <h2>VORTEX ACCESS</h2>
                <input type="text" id="offlineCode" placeholder="Enter Agent Code..." onkeypress="handleCode(event)">
                <p style="margin-top:15px; font-size:0.8em; color:rgba(255,255,255,0.5)">Press Enter to Scan</p>
            </div>
        </div>
    </div>

    <div id="flash-screen">
        <div class="card-top" id="studentHeader"></div>
        <div class="card-bottom">
            <div class="grade-box"><input type="number" placeholder="Attendence" onchange="submitGrade(this, 'Attendence')"></div>
            <div class="grade-box"><input type="number" placeholder="ICA" onchange="submitGrade(this, 'ICA')"></div>
            <div class="grade-box"><input type="number" placeholder="Reading" onchange="submitGrade(this, 'Reading')"></div>
            <div class="grade-box"><input type="number" placeholder="Tongue Twister" onchange="submitGrade(this, 'Tongue Twister')"></div>
            <div class="grade-box"><input type="number" placeholder="One Shot" onchange="submitGrade(this, 'One Shot')"></div>
            <div class="grade-box"><input type="number" placeholder="Games" onchange="submitGrade(this, 'Games')"></div>
            <div class="grade-box"><input type="number" placeholder="Squeezer" onchange="submitGrade(this, 'Squeezer')"></div>
            <div class="grade-box"><input type="number" placeholder="DMT" onchange="submitGrade(this, 'DMT')"></div>
            <div class="grade-box"><input type="number" placeholder="Wish" onchange="submitGrade(this, 'Wish')"></div>
            <div class="grade-box"><input type="number" placeholder="Project" onchange="submitGrade(this, 'Project')"></div>
            <div class="grade-box"><input type="number" placeholder="Graduation Project" onchange="submitGrade(this, 'Graduation Project')"></div>
            <div class="grade-box bonus-box"><input type="number" placeholder="★ Special Bonus" onchange="submitGrade(this, 'Bonus')"></div>
        </div>
    </div>

    <div id="content-frame-container">
        <button class="close-frame" onclick="closeFrame()">Back to Map</button>
        <iframe id="content-iframe"></iframe>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw9ua5PF26VSy4gzNK0pSNMRuZ5ejXBQaAR0-m-rUNirMW8F7Knk6wYcBz80LCy5PhqvQ/exec";
        let currentStudent = null;

        function toggleView() {
            const grid = document.getElementById('levels-grid');
            const vortex = document.getElementById('vortex-container');
            const btn = document.querySelector('.switch-btn');
            if (grid.style.display !== 'none') {
                grid.style.display = 'none';
                vortex.style.display = 'flex';
                btn.innerText = "Back to Levels";
            } else {
                grid.style.display = 'grid';
                vortex.style.display = 'none';
                btn.innerText = "Tokens Portal";
            }
        }

        function handleCode(e) {
            if (e.key === 'Enter') {
                const code = e.target.value.trim();
                if(!code) return;
                
                e.target.disabled = true;
                e.target.placeholder = "Scanning...";

                fetch(`${API_URL}?action=getStudentByOfflineCode&offlineCode=${code}`)
                .then(response => response.json())
                .then(res => {
                    e.target.disabled = false;
                    e.target.placeholder = "Enter Agent Code...";
                    if (res.status === "success") {
                        showStudentCard(res.data);
                        e.target.value = "";
                    } else {
                        alert(res.message || "Code not found!");
                    }
                })
                .catch(err => {
                    console.error(err);
                    e.target.disabled = false;
                    alert("System Connection Error");
                });
            }
        }

        function showStudentCard(data) {
            currentStudent = data;
            document.getElementById('studentHeader').innerHTML = `
                <img src="${data.avatar}" onerror="this.src='https://via.placeholder.com/100'">
                <div class="student-info">
                    <h3>${data.name}</h3>
                    <p>Tokens: <b style="color:#2ecc71">${data.tokens}</b> | Stars: <b style="color:#f1c40f">⭐${data.stars}</b></p>
                    <p>Global: #${data.globalRank} | Local: #${data.localRank} | Group: ${data.group}</p>
                </div>
            `;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('flash-screen').style.display = 'block';
        }

        function submitGrade(input, activity) {
            const val = input.value;
            if (!val || !currentStudent) return;
            
            const parent = input.parentElement;
            parent.style.opacity = "0.5";

            const updateUrl = `${API_URL}?action=updateGrades&email=${encodeURIComponent(currentStudent.email)}&activity=${encodeURIComponent(activity)}&grade=${val}`;

            fetch(updateUrl)
            .then(response => response.json())
            .then(res => {
                if(res.status === "success") {
                    parent.classList.add('updated');
                    parent.style.opacity = "1";
                    showStudentCard(res.data); 
                    input.value = ""; 
                } else {
                    alert("Wolf Error: " + (res.message || res));
                    parent.style.opacity = "1";
                }
            })
            .catch(err => {
                console.error(err);
                alert("Connection Lost!");
                parent.style.opacity = "1";
            });
        }

        function closeFlash() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('flash-screen').style.display = 'none';
            document.querySelectorAll('.grade-box').forEach(b => b.classList.remove('updated'));
            document.querySelectorAll('.grade-box input').forEach(i => i.value = "");
        }

        function openLecture(level, session) {
            const frameContainer = document.getElementById('content-frame-container');
            const iframe = document.getElementById('content-iframe');
            
            const baseHTML = `
                <html>
                <head>
                    <style>
                        :root { --accent: #e74c3c; --bg: #1a1a1a; }
                        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
                        
                        /* Animations */
                        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); opacity: 1; } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
                        @keyframes fadeInUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
                        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
                        @keyframes slideInRight { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
                        .animate-bounceIn { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
                        .animate-fadeInUp { animation: fadeInUp 0.6s ease-out; }

                        /* Fixed Header */
                        .veto-header { 
                            display: flex; align-items: center; justify-content: space-between; 
                            padding: 10px 20px; background: #000; border-bottom: 2px solid var(--accent);
                            height: 60px; shrink: 0;
                        }
                        .veto-header img { height: 45px; border-radius: 50%; }
                        .veto-header .info { text-align: center; flex-grow: 1; }
                        .veto-header .info h2 { margin: 0; font-size: 1.1em; color: var(--accent); }
                        .veto-header .info p { margin: 0; font-size: 0.85em; opacity: 0.8; }
                        .veto-header .trainer { font-size: 0.9em; font-weight: bold; text-align: right; }

                        /* Scrollable Content Area */
                        #content-area { flex-grow: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }

                        /* Fixed Footer */
                        .veto-footer { 
                            background: #000; text-align: center; padding: 8px; 
                            font-size: 0.8em; border-top: 1px solid #333; color: var(--accent);
                        }

                        /* Giant Display Classes */
                        .slide-container { width: 100%; display: flex; flex-direction: column; align-items: center; }
                        .slide-title-pop { font-size: 3vw; color: #f1c40f; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); margin-bottom: 20px; }
                        .main-term-card {
                            background: #3498db; width: 60vw; height: 40vh;
                            display: flex; align-items: center; justify-content: center;
                            border-radius: 30px; border: 10px solid white;
                            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
                        }
                        .term-text { font-size: 15vw; font-weight: 900; color: white; }
                        .term-desc-pop { font-size: 4vw; margin-top: 20px; color: #bdc3c7; }

                        /* Practice Giant */
                        .question-text { font-size: 5vw; margin-bottom: 30px; color: white; text-align: center; }
                        .options-grid-giant { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 80vw; }
                        .option-btn-giant { 
                            padding: 30px; font-size: 4vw; font-weight: bold; 
                            background: #2c3e50; border: 4px solid var(--accent); color: white; 
                            border-radius: 20px; cursor: pointer; transition: 0.3s;
                        }
                        .option-btn-giant:hover { background: var(--accent); transform: scale(1.05); }

                        /* Comparison Table Giant */
                        .giant-table { width: 80vw; border-collapse: separate; border-spacing: 0 15px; }
                        .giant-table td { padding: 25px; font-size: 5vw; font-weight: bold; text-align: center; border-radius: 15px; }
                        .col-subject { background: #3498db; color: white; }
                        .col-object { background: #e67e22; color: white; }

                        /* Floating Controls */
                        .nav-controls-overlay { position: fixed; bottom: 80px; width: 100%; display: flex; justify-content: center; gap: 50px; align-items: center; pointer-events: none; }
                        .nav-btn-round { 
                            pointer-events: auto; width: 80px; height: 80px; border-radius: 50%; 
                            background: rgba(231, 76, 60, 0.8); border: none; color: white; 
                            font-size: 2em; cursor: pointer; transition: 0.3s; 
                        }
                        .nav-btn-round:hover { background: var(--accent); transform: scale(1.2); }
                        .slide-counter-bubble { background: rgba(0,0,0,0.7); padding: 10px 25px; border-radius: 30px; font-size: 1.5em; }

                        /* Startup Menu */
                        .menu-btn { width: 250px; padding: 20px; margin: 10px; background: var(--accent); border: none; color: white; font-size: 1.2em; border-radius: 10px; cursor: pointer; transition: 0.3s; }
                    </style>
                </head>
                <body>
                    <header class="veto-header">
                        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="Logo">
                        <div class="info">
                            <h2>EYC - Veto Program</h2>
                            <p id="dynamic-subtitle">Level ${level} | Session ${session} | <span id="activity-name">Mission Selection</span></p>
                        </div>
                        <div class="trainer">Trainer: Mr Ezz Y.Ali</div>
                    </header>

                    <div id="content-area">
                        <div id="inner-view">
                            <h1>Level ${level} - Session ${session}</h1>
                            <p>Choose your mission, Agent.</p>
                            <button class="menu-btn" onclick="loadScript('Listening')">🎧 Listening</button>
                            <button class="menu-btn" onclick="loadScript('Grammar')">📝 Grammar</button>
                        </div>
                    </div>

                    <footer class="veto-footer">EYC - Veto Program</footer>

                    <script>
                        let currentSlide = 0;
                        let lessonData = null;

                        function loadScript(type) {
                            const scriptPath = \`data/L\${${level}}S\${${session}}_\${type}.js\`;
                            document.getElementById('activity-name').innerText = type;
                            document.getElementById('inner-view').innerHTML = '<h2 style="color:#e74c3c;">Scanning Veto Records...</h2>';

                            const script = document.createElement('script');
                            script.src = scriptPath;
                            script.onload = () => {
                                setTimeout(() => {
                                    lessonData = (type === 'Grammar') ? (window.grammarData || grammarData) : (window.listeningData || listeningData);
                                    if (lessonData) { renderSlide(0); }
                                }, 100);
                            };
                            document.body.appendChild(script);
                        }

                        function renderSlide(index) {
                            const slide = lessonData.slides[index];
                            let html = \`<div class="slide-container" style="animation: zoomIn 0.5s ease-out;">\`;

                            if (slide.type === "explanation") {
                                html += \`
                                    <div class="giant-box-wrapper">
                                        <h1 class="slide-title-pop">\${slide.title}</h1>
                                        <div class="main-term-card animate-bounceIn">
                                            <span class="term-text">\${slide.term}</span>
                                        </div>
                                        \${slide.desc ? \`<p class="term-desc-pop">\${slide.desc}</p>\` : ''}
                                    </div>\`;
                            } 
                            else if (slide.type === "practice") {
                                html += \`<h1 class="slide-title-pop">\${slide.title}</h1>\`;
                                slide.questions.forEach((q) => {
                                    html += \`
                                        <div class="practice-card-giant animate-fadeInUp">
                                            <p class="question-text">\${q.q}</p>
                                            <div class="options-grid-giant">
                                                \${q.options.map(opt => \`
                                                    <button class="option-btn-giant" onclick="checkAnswer(this, '\${opt}', '\${q.correct}')">\${opt}</button>
                                                \`).join('')}
                                            </div>
                                        </div>\`;
                                });
                            }
                            else if (slide.type === "comparison") {
                                html += \`
                                    <h1 class="slide-title-pop">\${slide.title}</h1>
                                    <div class="comparison-table-wrapper">
                                        <table class="giant-table">
                                            <tr class="table-header-row"><th>SUBJECT</th><th>OBJECT</th></tr>
                                            \${slide.data.map((row, i) => \`
                                                <tr style="animation: slideInRight \${0.2 + (i*0.1)}s ease-out fill-mode: backwards;">
                                                    <td class="col-subject">\${row[0]}</td>
                                                    <td class="col-object">\${row[1]}</td>
                                                </tr>
                                            \`).join('')}
                                        </table>
                                    </div>\`;
                            }

                            html += \`
                                <div class="nav-controls-overlay">
                                    <button class="nav-btn-round" onclick="renderSlide(\${index-1})" \${index===0?'disabled style="opacity:0.3"':''}>❮</button>
                                    <span class="slide-counter-bubble">\${index+1} / \${lessonData.slides.length}</span>
                                    <button class="nav-btn-round" onclick="renderSlide(\${index+1})" \${index===lessonData.slides.length-1?'disabled style="opacity:0.3"':''}>❯</button>
                                </div>
                            </div>\`;

                            document.getElementById('inner-view').innerHTML = html;
                            document.getElementById('content-area').scrollTop = 0;
                        }

                        function checkAnswer(btn, selected, correct) {
                            if (selected === correct) { 
                                btn.style.background = "#27ae60"; 
                                btn.style.transform = "scale(1.1)";
                                alert("Correct! 🎉"); 
                            } else { 
                                btn.style.background = "#c0392b"; 
                                btn.classList.add('animate-bounceIn');
                                alert("Wrong! ❌"); 
                            }
                        }
                    <\/script>
                </body>
                </html>
            `;

            iframe.srcdoc = baseHTML;
            frameContainer.style.display = 'block';
        }

        function closeFrame() {
            document.getElementById('content-frame-container').style.display = 'none';
            document.getElementById('content-iframe').srcdoc = "";
        }

        const grid = document.getElementById('levels-grid');
        for (let i = 1; i <= 12; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'level-wrapper';
            wrapper.innerHTML = `
                <div class="main-circle" onclick="toggleSubCircles(this)">Level ${i}</div>
                <div class="sub-circle s1" onclick="openLecture(${i}, 1)">1</div>
                <div class="sub-circle s2" onclick="openLecture(${i}, 2)">2</div>
                <div class="sub-circle s3" onclick="openLecture(${i}, 3)">3</div>
                <div class="sub-circle s4" onclick="openLecture(${i}, 4)">4</div>
            `;
            grid.appendChild(wrapper);
        }

        function toggleSubCircles(el) {
            const wasActive = el.parentElement.classList.contains('active');
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
            if (!wasActive) el.parentElement.classList.add('active');
        }
    </script>
</body>
</html>
