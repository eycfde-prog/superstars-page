<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veto Bubbles - Miss Dina</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sky: #87CEEB;
            --danger-color: #ff0000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg-sky);
            font-family: 'Fredoka One', cursive;
            touch-action: none; /* منع الزووم والحركات العشوائية */
        }

        /* توقيع Miss Dina */
        #teacher-sign {
            position: absolute;
            bottom: 5px; right: 10px;
            font-size: 1rem; color: #fff;
            z-index: 10; text-shadow: 1px 1px 2px #000;
        }

        #game-container {
            width: 100%; height: 100%;
            position: relative;
            background: linear-gradient(to bottom, #1e90ff, #87CEEB);
        }

        #stats {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-around;
            font-size: 1.8rem; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            z-index: 20;
        }

        /* الخط الأحمر - مرتفع قليلاً ليتناسب مع الكيبورد */
        #danger-line {
            position: absolute; bottom: 40%; /* مرفوع لترك مساحة للكيبورد */
            width: 100%; height: 4px;
            background: repeating-linear-gradient(90deg, red, red 10px, transparent 10px, transparent 20px);
            z-index: 5;
        }

        /* تنسيق الكلمة بالطول للموبايل */
        #word-wrapper {
            position: absolute;
            top: -100px;
            display: flex;
            flex-direction: row; /* الحروف بجانب بعضها */
            gap: 8px;
            width: 100%;
            justify-content: center;
        }

        .bubble-char {
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.4);
            border: 3px solid white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; color: #004488;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
        }

        .popped { animation: pop-effect 0.3s forwards; visibility: hidden; }
        @keyframes pop-effect {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 1000; color: white; text-align: center;
        }

        button {
            padding: 15px 40px; font-size: 1.8rem; font-family: 'Fredoka One';
            background: #ff477e; color: white; border: none; border-radius: 30px;
            box-shadow: 0 6px #c9184a; cursor: pointer;
        }

        #hidden-input {
            position: absolute; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="teacher-sign">Miss Dina ✨</div>
    
    <div id="stats">
        <div>⏳ <span id="timer">30</span>s</div>
        <div>🏆 <span id="score">0</span></div>
    </div>

    <div id="word-wrapper"></div>
    <div id="danger-line"></div>

    <input type="text" id="hidden-input" inputmode="text">

    <div id="start-screen" class="overlay">
        <h1 style="color: #00b4d8;">VETO BUBBLES</h1>
        <p style="font-size: 1.2rem;">With Miss Dina</p>
        <button id="start-btn">START GAME</button>
    </div>

    <div id="end-screen" class="overlay" style="display: none;">
        <h1>FINISH!</h1>
        <p style="font-size: 2rem;">Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<audio id="pop-sound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="success-sound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script>
    const originalWords = ["live", "kind", "old", "together", "mother", "brother", "sister", "father", "years", "family"];
    let wordPool = [...originalWords];
    let currentWord = "";
    let charIdx = 0;
    let score = 0;
    let timeLeft = 30;
    let isActive = false;
    let baseSpeed = 0.4; // سرعة بطيئة جداً لنطق الحروف

    const wrapper = document.getElementById('word-wrapper');
    const input = document.getElementById('hidden-input');
    const popSnd = document.getElementById('pop-sound');
    const winSnd = document.getElementById('success-sound');

    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('start-screen').style.display = 'none';
        isActive = true;
        // تفعيل الكيبورد فوراً
        input.focus();
        input.click();
        
        spawnWord();
        tick();
        runTimer();
    });

    function spawnWord() {
        if (wordPool.length === 0) wordPool = [...originalWords];
        const randIdx = Math.floor(Math.random() * wordPool.length);
        currentWord = wordPool.splice(randIdx, 1)[0];
        
        charIdx = 0;
        wrapper.innerHTML = "";
        wrapper.style.top = "-80px";
        
        currentWord.split('').forEach(char => {
            const div = document.createElement('div');
            div.className = 'bubble-char';
            div.innerText = char.toUpperCase();
            wrapper.appendChild(div);
        });
    }

    function tick() {
        if (!isActive) return;
        let top = parseFloat(wrapper.style.top) || -80;
        
        // سرعة متغيرة (أبطأ للكلمات الطويلة)
        let speed = baseSpeed / (currentWord.length > 5 ? 1.5 : 1);
        wrapper.style.top = (top + speed) + "px";

        // إذا لمست الخط الأحمر (40% من الشاشة لترك مساحة للكيبورد)
        const lineY = document.getElementById('danger-line').offsetTop;
        if (top + 60 > lineY) {
            spawnWord(); // تضيع الكلمة وتظهر غيرها
        }

        requestAnimationFrame(tick);
    }

    function runTimer() {
        const timer = setInterval(() => {
            if (!isActive) { clearInterval(timer); return; }
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                isActive = false;
                showEnd();
            }
        }, 1000);
    }

    // استجابة الكيبورد
    window.addEventListener('keydown', (e) => {
        if (!isActive) return;
        const pressed = e.key.toLowerCase();
        const target = currentWord[charIdx].toLowerCase();

        if (pressed === target) {
            const bubbles = document.querySelectorAll('.bubble-char');
            bubbles[charIdx].classList.add('popped');
            popSnd.currentTime = 0;
            popSnd.play(); // صوت الفرقعة
            charIdx++;

            if (charIdx === currentWord.length) {
                score++;
                document.getElementById('score').innerText = score;
                winSnd.play(); // صوت النجاح
                setTimeout(spawnWord, 300);
            }
        }
        input.focus(); // التأكد من بقاء الكيبورد مفتوحاً
    });

    // بقاء الكيبورد مفتوحاً عند لمس الشاشة
    document.addEventListener('touchstart', () => {
        if(isActive) input.focus();
    });

    function showEnd() {
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
    }
</script>

</body>
</html>
