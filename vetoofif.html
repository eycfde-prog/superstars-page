<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETO PROGRAM | Session Content</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --banner-height: 140px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Banner Style */
        .top-banner {
            height: var(--banner-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 3px solid var(--primary-gold);
        }

        .logo-img { height: 70px; }
        .mr-ezz-img { height: 100px; border-radius: 8px; }

        .session-info h1 {
            font-size: 2.5rem;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .content-card {
            background: var(--card-bg);
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            animation: fadeInUp 0.5s ease forwards;
        }

        .content-card:hover {
            border-color: var(--primary-gold);
            background: rgba(197, 160, 89, 0.1);
            transform: translateY(-10px);
        }

        /* Done Overlay */
        #done-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .done-text {
            font-size: 8rem;
            color: #2ecc71;
            font-weight: 900;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(46,204,113,0.5);
        }
        
        .test-btn {
            padding: 20px 60px;
            background: var(--primary-gold);
            color: black;
            border-radius: 50px;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .test-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--primary-gold); }

        .back-btn {
            position: fixed; bottom: 30px; left: 30px;
            padding: 15px 30px; background: var(--primary-gold);
            color: black; text-decoration: none; font-weight: bold;
            border-radius: 50px; z-index: 100;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header class="top-banner">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        <div class="session-info"><h1 id="display-title">Loading...</h1></div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000;">
        <button onclick="closeStage()" style="position:absolute; top:20px; right:20px; z-index:2001; background:var(--primary-gold); border:none; padding:10px 20px; cursor:pointer; font-weight:bold; border-radius:5px;">CLOSE [ESC]</button>
        
        <div id="stage-content" style="width:100%; height:100%;"></div>
    
        <div id="done-overlay">
            <div class="done-text">DONE!</div>
            <button id="test-link" class="test-btn">GO TO TEST</button>
        </div>
    </div>

    <a href="vetoof.html" class="back-btn">← BACK TO LEVELS</a>

    <script src="data/levels.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        let currentActivityName = "";

        if (sessionId) {
            const [lvl, sess] = sessionId.split('-');
            document.getElementById('display-title').innerText = `Level ${lvl} - Session ${sess}`;
            renderSessionData(sessionId);
        }

        function getFilePrefix(name) { return name.split(' ')[0].substring(0, 3); }

        function openActivity(activityName, isTest = false) {
            const [lvl, sess] = sessionId.split('-');
            const prefix = getFilePrefix(activityName);
            currentActivityName = activityName;

            // تصحيح: إزالة المسافة بعد حرف L-
            let fileName = `L-${lvl}-S-${sess}-${prefix}.js`;
            let filePath = `data/${fileName}`;

            if (isTest) {
                fileName = `L-${lvl}-S-${sess}-${prefix}t.js`;
                filePath = `data/vetoo/${fileName}`;
            }

            console.log("Loading File:", filePath);

            const stage = document.getElementById('activity-stage');
            const doneOverlay = document.getElementById('done-overlay');
            const stageContent = document.getElementById('stage-content');

            stage.style.display = 'block';
            doneOverlay.style.display = 'none';
            stageContent.innerHTML = "";

            const script = document.createElement('script');
            script.src = filePath;
            script.onerror = () => {
                stageContent.innerHTML = `<div style="color:white; text-align:center; margin-top:20%; font-size:2rem;">
                    File Not Found:<br><span style="color:var(--primary-gold)">${filePath}</span>
                </div>`;
            };
            document.head.appendChild(script);
        }

        window.triggerVetoDone = function() {
            document.getElementById('done-overlay').style.display = 'flex';
            document.getElementById('test-link').onclick = () => openActivity(currentActivityName, true);
        };

        function closeStage() {
            document.getElementById('activity-stage').style.display = 'none';
            document.getElementById('stage-content').innerHTML = "";
        }

        window.addEventListener('keydown', (e) => { if(e.key === "Escape") closeStage(); });

        function renderSessionData(id) {
            const container = document.getElementById('content-container');
            const data = sessionData[id] || [];
            container.innerHTML = data.length ? "" : `<h2 style="grid-column:1/-1;text-align:center;opacity:0.5;">No content found</h2>`;
            
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.onclick = () => openActivity(item);
                card.innerHTML = `<h2>${item}</h2>`;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
