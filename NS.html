<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EYC VETO - Agent Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #10b981; --bg: #020617; --card: #0f172a; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            padding: 15px; /* مسافة أمان للموبايل */
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* لضمان ظهور البداية في الشاشات الطويلة */
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* حاوية التسجيل */
        .container { 
            display: flex; 
            flex-direction: row; /* الوضع الافتراضي للكمبيوتر */
            width: 100%;
            max-width: 1000px; 
            background: var(--card); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid #1e293b; 
            position: relative;
        }

        /* تعديلات الموبايل */
        @media (max-width: 768px) {
            .container {
                flex-direction: column; /* الأفتار فوق والفورم تحت */
                margin: 10px auto;
            }
            .avatar-section {
                padding: 30px 20px !important;
                border-right: none !important;
                border-bottom: 1px solid #1e293b;
            }
            .form-section {
                padding: 25px 20px !important;
            }
            h2 { font-size: 1.2rem; }
            #avatar-container { width: 140px !important; height: 140px !important; }
        }

        .avatar-section { 
            flex: 1; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border-right: 1px solid #1e293b; 
            padding: 40px; 
        }

        .form-section { 
            flex: 1.5; 
            padding: 40px; 
            position: relative; 
            background: var(--card);
        }
        
        #avatar-container { 
            width: 180px; height: 180px; 
            background: rgba(255,255,255,0.05); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 3px solid var(--gold); 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
        
        #avatar-img { width: 100%; height: auto; }
        
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; border-left: 4px solid var(--gold); padding-left: 15px; }
        
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        
        input, select { 
            width: 100%; 
            padding: 14px; 
            background: #020617; 
            border: 1px solid #1e293b; 
            color: white; 
            border-radius: 10px; 
            outline: none; 
            font-size: 1rem;
            transition: 0.3s; 
            box-sizing: border-box; 
        }
        input:focus, select:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(16, 185, 129, 0.1); }
        
        button { 
            background: var(--gold); 
            color: black; 
            border: none; 
            padding: 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 900; 
            width: 100%; 
            transition: 0.3s; 
            margin-top: 10px;
            font-size: 1rem;
            text-transform: uppercase;
        }
        
        button:active { transform: scale(0.98); }
        
        .prev-btn { background: transparent; color: #64748b; border: 1px solid #1e293b; margin-top: 10px; }
        
        /* Loading & Success */
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--card); display: none; align-items: center; justify-content: center; z-index: 100; flex-direction: column; text-align: center; padding: 20px; box-sizing: border-box; }
        .success-card { text-align: center; animation: fadeIn 0.5s ease; }
        .code-box { background: #000; padding: 20px; border-radius: 15px; border: 2px dashed var(--gold); margin: 20px 0; font-size: 1.8rem; letter-spacing: 5px; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-section">
        <div id="avatar-container">
            <img id="avatar-img" src="https://avataaars.io/?avatarStyle=Transparent" alt="Avatar">
        </div>
        <h3 id="display-name" style="margin-top: 20px; color: var(--gold); text-align: center; font-size: 1.1rem;">NEW AGENT</h3>
    </div>

    <div class="form-section">
        <div class="loading-overlay" id="loader">
            <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--gold);"></i>
            <p style="margin-top: 20px; font-weight: bold; letter-spacing: 1px;">ENCRYPTING DATA...</p>
        </div>

        <form id="registrationForm">
            <div class="step active" id="step1">
                <h2>01. Identity</h2>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required oninput="document.getElementById('display-name').innerText = this.value.toUpperCase() || 'NEW AGENT'">
                </div>
                <button type="button" onclick="nextStep(2)">Begin Mission <i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="step" id="step2">
                <h2>02. Intelligence</h2>
                <div class="input-group">
                    <label>Google Email</label>
                    <input type="email" id="email" placeholder="agent@gmail.com" required>
                </div>
                <div class="input-group">
                    <label>WhatsApp Number</label>
                    <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
                </div>
                <div class="input-group">
                    <label>Agent Age</label>
                    <input type="number" id="age" placeholder="Ex: 15" required>
                </div>
                <button type="button" onclick="nextStep(3)">Continue</button>
                <button type="button" class="prev-btn" onclick="nextStep(1)">Back</button>
            </div>

            <div class="step" id="step3">
                <h2>03. Schedule</h2>
                <div class="input-group">
                    <label>Select Your Group</label>
                    <select id="groupSelection" required></select>
                </div>
                <button type="button" onclick="nextStep(4)">Tactical Uniform</button>
                <button type="button" class="prev-btn" onclick="nextStep(2)">Back</button>
            </div>

            <div class="step" id="step4">
                <h2>04. Final Gear</h2>
                <div class="input-group"><label>Hair Style</label><select id="topType" onchange="updateAvatar()"></select></div>
                <div class="input-group"><label>Outfit</label><select id="clotheType" onchange="updateAvatar()"></select></div>
                <div class="input-group"><label>Expression</label><select id="eyeType" onchange="updateAvatar()"></select></div>
                <button type="submit" style="background: white; color: black; border: 2px solid var(--gold);">FINISH REGISTRATION</button>
                <button type="button" class="prev-btn" onclick="nextStep(3)">Back</button>
            </div>
        </form>

        <div id="success-card" style="display:none;" class="success-card">
            <div style="font-size: 4rem; color: var(--gold); margin-bottom: 10px;"><i class="fas fa-check-circle"></i></div>
            <h2>MISSION SUCCESS</h2>
            <p style="color: #94a3b8; line-height: 1.6;">Your agent profile has been created. Use the code below to access the dashboard.</p>
            <div class="code-box" id="agent-code">----</div>
            <button onclick="copyAndEnter()" style="background: var(--gold); color: #000;">Copy & Open Dashboard</button>
        </div>
    </div>
</div>

<script>
    // URL الخاص بـ Google Script
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7-FnOVZskIuM44XG6KfTpoFimf5BPv2iMdaiHg0OLpYcSMyFTz6HYVI-UlYTlnqS0RA/exec"; 

    function initGroups() {
        const days = ["Sat", "Sun", "Mon", "Tue", "Wed", "Thu", "Fri"];
        const times = ["12:00 PM", "02:00 PM", "04:00 PM", "06:00 PM", "08:00 PM"];
        const select = document.getElementById('groupSelection');
        days.forEach(d => times.forEach(t => {
            let opt = document.createElement('option');
            opt.value = `${d} ${t}`;
            opt.innerText = `${d} - ${t}`;
            select.appendChild(opt);
        }));
    }

    function populateSelect(id, options) {
        const s = document.getElementById(id);
        s.innerHTML = ""; 
        options.forEach(o => {
            let opt = document.createElement('option');
            opt.value = o;
            opt.innerText = o.replace(/([A-Z])/g, ' $1').trim(); // تجميل الأسماء
            s.appendChild(opt);
        });
    }

    function updateAvatar() {
        const top = document.getElementById('topType').value;
        const clothe = document.getElementById('clotheType').value;
        const eye = document.getElementById('eyeType').value;
        const url = `https://avataaars.io/?avatarStyle=Transparent&topType=${top}&clotheType=${clothe}&eyeType=${eye}&accessoriesType=Blank&facialHairType=Blank&mouthType=Default&skinColor=Tanned`;
        document.getElementById('avatar-img').src = url;
    }

    function nextStep(n) {
        // التحقق البسيط من الحقول قبل الانتقال
        if (n > 1) {
            const currentStep = document.querySelector('.step.active');
            const inputs = currentStep.querySelectorAll('input[required], select[required]');
            for (let input of inputs) {
                if (!input.value) {
                    alert("Please fill all required fields");
                    return;
                }
            }
        }
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        window.scrollTo(0,0); // للرجوع للأعلى في الموبايل عند التنقل
    }

    document.getElementById('registrationForm').onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById('loader').style.display = 'flex';

        const data = {
            action: "signup",
            name: document.getElementById('name').value,
            email: document.getElementById('email').value.toLowerCase(),
            phone: document.getElementById('phone').value,
            age: document.getElementById('age').value,
            group: document.getElementById('groupSelection').value,
            avatar: document.getElementById('avatar-img').src
        };

        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            const result = await res.json();
            if(result.status === "success") {
                document.getElementById('registrationForm').style.display = 'none';
                document.getElementById('success-card').style.display = 'block';
                document.getElementById('agent-code').innerText = result.code;
                localStorage.setItem('veto_email', data.email);
                localStorage.setItem('veto_code', result.code);
            } else {
                alert("Registration failed: " + result.message);
            }
        } catch(err) { 
            alert("Connection Error. Please try again."); 
        }
        document.getElementById('loader').style.display = 'none';
    };

    function copyAndEnter() {
        const code = document.getElementById('agent-code').innerText;
        navigator.clipboard.writeText(code).then(() => {
            alert("Code Copied to Clipboard!");
            window.location.href = 'VetoO.html'; // تأكد من اسم ملف الداشبورد
        });
    }

    window.onload = () => {
        initGroups();
        populateSelect('topType', ["NoHair", "ShortHairShortFlat", "ShortHairShortCurly", "ShortHairDreads01", "ShortHairFrizzle", "LongHairStraight", "LongHairCurvy", "Hijab"]);
        populateSelect('clotheType', ["Hoodie", "Overall", "BlazerShirt", "GraphicShirt", "CollarSweater"]);
        populateSelect('eyeType', ["Default", "Happy", "Wink", "Side", "Hearts"]);
        updateAvatar();
    };
</script>
</body>
</html>
