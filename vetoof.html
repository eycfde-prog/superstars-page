<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETO PROGRAM | Interactive Dashboard</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --accent-blue: #00d4ff;
            --bg-dark: #050505;
            --banner-height: 120px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Top Banner Space */
        .top-banner {
            height: var(--banner-height);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 2px solid var(--primary-gold);
            position: relative;
            z-index: 10;
        }

        .top-banner h1 {
            font-size: 3.5rem;
            letter-spacing: 8px;
            text-shadow: 0 0 20px var(--primary-gold);
        }

        /* Main Grid Container */
        .levels-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
            padding: 40px;
            height: calc(100vh - var(--banner-height));
            align-content: center;
            justify-items: center;
        }

        /* Level Circle Style */
        .level-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .level-circle {
            width: 120px;
            height: 120px;
            background: #111;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 5;
            transition: transform 0.3s;
            border: 2px solid #222;
        }

        .level-circle:hover { transform: scale(1.1); }

        .level-circle span { font-weight: bold; font-size: 1.2rem; }
        .level-circle .num { font-size: 2.2rem; color: var(--primary-gold); }

        /* Rotating Border Effect */
        .rotating-border {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(transparent, var(--primary-gold), transparent 30%);
            animation: rotate 8s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Sessions Sub-circles */
        .sessions-tray {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            display: none; /* Hidden by default */
            pointer-events: none;
        }

        .session-node {
            position: absolute;
            width: 60px;
            height: 60px;
            background: var(--primary-gold);
            color: black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s;
            box-shadow: 0 0 15px var(--primary-gold);
        }

        .session-node:hover { background: white; transform: scale(1.2); }

        /* Session positions (Around the level) */
        .s1 { top: 0; left: 50%; transform: translateX(-50%); }
        .s2 { bottom: 0; left: 50%; transform: translateX(-50%); }
        .s3 { left: 0; top: 50%; transform: translateY(-50%); }
        .s4 { right: 0; top: 50%; transform: translateY(-50%); }

        /* Overlay for Content */
        #content-overlay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            background: rgba(0,0,0,0.9);
            border-left: 5px solid var(--primary-gold);
            padding: 20px;
            display: none;
            z-index: 100;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .active .sessions-tray { display: block; }
    </style>
</head>
<body>

    <header class="top-banner">
        <h1>VETO PROGRAM ARCHITECT</h1>
    </header>

    <main class="levels-container" id="grid">
        </main>

    <div id="content-overlay">
        <h3 style="color: var(--primary-gold); margin-bottom: 10px;" id="session-title">Session Data</h3>
        <ul id="session-list" style="list-style: none; line-height: 1.8;"></ul>
    </div>

    <script>
        const sessionData = {
            "1-1": ["Grammar 1 Study", "Listening 1 Intro"],
            "1-2": ["Grammar 2 Study", "Vocab 1 Review"],
            "1-3": ["Listening 2 Review", "Grammar 2 Review", "Grammar 3 Study", "Vocab 1 Test", "Vocab 2 Review"],
            "1-4": ["Listening 3 Review", "Grammar 3 Review", "Grammar 4 Study", "Vocab 2 Test", "Reading 1 Review"],
            "2-1": ["Listening 4 Review", "Grammar 4 Review", "Reading 1 Review", "Reading 2 Review"],
            // ... (Rest of your data is integrated)
            "2-2": ["Listening 5 Review", "Grammar 5 Review", "Reading 2 Review", "Reading 3 Review", "Vocab 3 Review", "One Shot 1 Test"],
            "2-3": ["Listening 6 Review", "Reading 3 Review", "Reading 4 Review", "Vocab 3 Test", "Vocab 4 Review"],
            "2-4": ["Listening 7 Review", "Reading 4 Review", "Reading 5 Review", "Grammar 6 Study", "One Shot 2 Test", "Vocab 4 Test", "Tongue Twister 1 Intro"],
            // Note: Add all your data into this object in the final file
        };

        const grid = document.getElementById('grid');

        // Create 12 Levels
        for (let i = 1; i <= 12; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'level-wrapper';
            wrapper.id = `lvl-${i}`;
            
            wrapper.innerHTML = `
                <div class="rotating-border"></div>
                <div class="level-circle" onclick="toggleLevel(${i})">
                    <span>LEVEL</span>
                    <div class="num">${i}</div>
                </div>
                <div class="sessions-tray">
                    <div class="session-node s1" onclick="showContent('${i}-1')">S1</div>
                    <div class="session-node s2" onclick="showContent('${i}-2')">S2</div>
                    <div class="session-node s3" onclick="showContent('${i}-3')">S3</div>
                    <div class="session-node s4" onclick="showContent('${i}-4')">S4</div>
                </div>
            `;
            grid.appendChild(wrapper);
        }

        function toggleLevel(levelNum) {
            // Logic: Show sessions for this level and all previous levels
            for (let i = 1; i <= 12; i++) {
                const el = document.getElementById(`lvl-${i}`);
                if (i <= levelNum) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            }
        }

        function showContent(key) {
            const overlay = document.getElementById('content-overlay');
            const list = document.getElementById('session-list');
            const title = document.getElementById('session-title');
            
            title.innerText = `SESSION ${key} CONTENT`;
            list.innerHTML = "";
            
            const tasks = sessionData[key] || ["No data available for this session"];
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.innerText = `• ${task}`;
                list.appendChild(li);
            });

            overlay.style.display = 'block';
        }
    </script>
</body>
</html>
