<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Ezz .Y. Ali - Learning Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --primary-red: #e74c3c;
            --white: #ffffff;
            --sub-btn-size: 40px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            color: var(--white);
            display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%; background: linear-gradient(to bottom, #1a1a1a, #000000);
            padding: 15px 0; border-bottom: 2px solid var(--primary-red);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .logo { width: 70px; border-radius: 50%; }
        .profile-img { width: 70px; border-radius: 50%; border: 2px solid var(--white); }
        .teacher-name { font-size: 22px; font-weight: bold; }

        .tokens-portal-btn {
            margin: 20px 0; background-color: var(--primary-red);
            color: white; padding: 10px 35px; border-radius: 25px;
            font-weight: bold; cursor: pointer; transition: 0.3s; border: none; z-index: 1001;
        }

        #main-wrapper {
            position: relative; width: 100%; flex-grow: 1;
            display: flex; justify-content: center; padding: 20px 0;
        }

        /* Portal View Layer */
        #portal-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: none; z-index: 100;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
        }

        /* Tokens Grid */
        .data-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; width: 95%; margin: auto;
        }

        /* Session Content Style */
        .session-content {
            width: 90%; max-width: 600px; margin: auto;
            background: #1e1e1e; border-left: 5px solid var(--primary-red);
            padding: 20px; border-radius: 10px;
        }
        .session-content h2 { color: var(--primary-red); border-bottom: 1px solid #333; padding-bottom: 10px; }
        .session-content ul { list-style: none; padding: 0; }
        .session-content li { padding: 10px 0; border-bottom: 1px solid #2a2a2a; font-size: 18px; }

        .data-card {
            background: #1e1e1e; border: 1px solid var(--primary-red);
            height: 100px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; position: relative;
        }

        .data-card input {
            width: 90%; height: 80%; background: transparent; border: none;
            color: var(--primary-red); text-align: center; font-size: 20px;
            font-weight: bold; outline: none; z-index: 2;
        }

        .data-card label {
            position: absolute; color: #888; font-size: 14px; pointer-events: none;
        }
        .data-card input:not(:placeholder-shown) + label { display: none; }

        /* Levels Grid */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 80px; width: 95%; max-width: 1400px; justify-items: center;
        }

        .level-wrapper { position: relative; width: 120px; height: 120px; }

        .level-btn {
            width: 100%; height: 100%; background-color: var(--primary-red);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-weight: bold; border: 4px solid var(--white);
            cursor: pointer; position: relative; z-index: 5;
        }

        .sub-btn {
            position: absolute; width: var(--sub-btn-size); height: var(--sub-btn-size);
            background-color: var(--white); color: var(--primary-red);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 14px; font-weight: bold;
            opacity: 0; transform: scale(0); transition: 0.4s; z-index: 4; cursor: pointer;
        }

        .level-wrapper.active .sub-btn { opacity: 1; transform: scale(1); }
        .level-wrapper.active .sub-btn:nth-child(2) { top: -45px; left: 35px; }
        .level-wrapper.active .sub-btn:nth-child(3) { bottom: -45px; left: 35px; }
        .level-wrapper.active .sub-btn:nth-child(4) { left: -45px; top: 35px; }
        .level-wrapper.active .sub-btn:nth-child(5) { right: -45px; top: 35px; }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" class="logo">
        <div class="teacher-name">Mr. Ezz .Y. Ali</div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/MrEzz.png" class="profile-img">
    </header>

    <button id="toggleBtn" class="tokens-portal-btn" onclick="togglePortal('tokens')">Tokens Portal</button>

    <div id="main-wrapper">
        <div id="portal-container">
            <div id="portal-content"></div>
        </div>
        
        <div class="grid-container" id="levelsGrid"></div>
    </div>

    <script>
        // Data Structure for Sessions
        const sessionData = {
            "level-1-1": ["Gr 1 study", "Lis 1 intro"],
            "level-1-2": ["Lis 1 Rev", "Gr 1 Rev", "Gr 2 study", "Vocab 1 Rev"],
            "level-1-3": ["Lis 2 Rev", "Gr 2 Rev", "Gr 3 study", "Vocab 1 test", "Vocab 2 Rev"],
            "level-1-4": ["Lis 3 Rev", "Gr 3 Rev", "Gr 4 study", "Vocab 2 test", "Reading 1 Rev"]
        };

        const levelsGrid = document.getElementById('levelsGrid');
        const portalContainer = document.getElementById('portal-container');
        const portalContent = document.getElementById('portal-content');
        const toggleBtn = document.getElementById('toggleBtn');

        // 1. Generate 12 Levels
        for (let i = 1; i <= 12; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'level-wrapper';
            wrapper.innerHTML = `<div class="level-btn">Level ${i}</div>`;
            
            for (let j = 1; j <= 4; j++) {
                const sBtn = document.createElement('div');
                sBtn.className = 'sub-btn';
                sBtn.innerText = j;
                sBtn.onclick = (e) => {
                    e.stopPropagation();
                    showSessionContent(i, j);
                };
                wrapper.appendChild(sBtn);
            }

            wrapper.onclick = (e) => {
                e.stopPropagation();
                document.querySelectorAll('.level-wrapper').forEach(w => w !== wrapper && w.classList.remove('active'));
                wrapper.classList.toggle('active');
            };
            levelsGrid.appendChild(wrapper);
        }

        // 2. Function to show Session Content
        function showSessionContent(lv, ss) {
            const key = `level-${lv}-${ss}`;
            const content = sessionData[key] || ["Content coming soon for this level..."];
            
            let html = `<div class="session-content">
                            <h2>Level ${lv} - Session ${ss}</h2>
                            <ul>${content.map(item => `<li>${item}</li>`).join('')}</ul>
                        </div>`;
            
            portalContent.innerHTML = html;
            portalContainer.style.display = 'block';
            toggleBtn.innerText = "Levels Portal";
        }

        // 3. Tokens Portal Content
        function showTokens() {
            const categories = ["Attendence", "ICA", "Reading", "Tongue Twister", "One Shot", "Games", "Squeezer", "DMT", "Wish", "Project", "Graduation Project", "Extra Bonus"];
            let html = `<div class="data-grid">`;
            categories.forEach(cat => {
                html += `<div class="data-card"><input type="text" placeholder=" "><label>${cat}</label></div>`;
            });
            html += `</div>`;
            portalContent.innerHTML = html;
        }

        // 4. Global Toggle
        function togglePortal(mode) {
            if (portalContainer.style.display === 'block') {
                portalContainer.style.display = 'none';
                toggleBtn.innerText = "Tokens Portal";
            } else {
                if(mode === 'tokens') showTokens();
                portalContainer.style.display = 'block';
                toggleBtn.innerText = "Levels Portal";
            }
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
        });
    </script>
</body>
</html>
