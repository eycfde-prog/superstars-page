<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veto Program - Deep Flat Avatar Studio (Fixed)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --v-dark-bg: #0f172a;
            --v-panel-bg: #1e293b;
            --v-primary: #6366f1;
            --v-accent: #f59e0b;
            --v-text-main: #f8fafc;
            --bar-height: 120px;
            /* Default Skin Colors */
            --skin-light: #FFDBAC;
            --skin-dark: #F1C27D;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Cairo', sans-serif; }
        body { background: var(--v-dark-bg); color: var(--v-text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Bars */
        .main-bar { height: var(--bar-height); background: var(--v-panel-bg); padding: 0 30px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border-bottom: 2px solid #334155; }
        .academy-logo img { height: 80px; }
        .content-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center;}
        .footer-bar { height: var(--bar-height); background: var(--v-panel-bg); border-top: 2px solid #334155; display: flex; align-items: center; padding: 0 20px; gap: 15px; overflow-x: auto; }

        /* Studio Overlay */
        .studio-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 200; display: none; align-items: center; justify-content: center; }
        .studio-card { background: var(--v-panel-bg); padding: 40px; border-radius: 24px; width: 900px; display: flex; gap: 50px; border: 2px solid var(--v-primary); box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .preview-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #070b14; border-radius: 20px; padding: 20px; border: 1px solid #334155; }
        .options-zone { flex: 1.5; }
        .step-title { font-size: 28px; color: var(--v-accent); margin-bottom: 25px; font-weight: 700; }
        .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .option-btn { background: #334155; border: 2px solid transparent; color: white; padding: 25px; border-radius: 16px; cursor: pointer; transition: 0.2s; }
        .option-btn:hover { background: var(--v-primary); transform: translateY(-3px); }
        .option-num { display: block; font-size: 30px; font-weight: 800; margin-bottom: 5px; }

        /* Avatar Display */
        .avatar-frame { width: 80px; height: 80px; border-radius: 50%; background: #1e293b; overflow: hidden; border: 3px solid var(--v-primary); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .avatar-svg { width: 100%; height: 100%; display: block; }
        
        /* Pills */
        .student-pill { min-width: 130px; padding: 10px; border-radius: 15px; background: rgba(255,255,255,0.03); border: 2px solid transparent; transition: 0.3s; text-align: center;}
        .student-pill.active { border-color: var(--v-primary); background: rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body>

<div id="avatarStudio" class="studio-overlay">
    <div class="studio-card">
        <div class="preview-zone">
            <div style="width: 250px; height: 250px; background: #fff; border-radius: 50%; overflow: hidden; border: 5px solid var(--v-primary);">
                <svg id="studioPreviewSVG" class="avatar-svg" viewBox="0 0 100 100">
                    <defs>
                        <radialGradient id="skinGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                            <stop offset="0%" style="stop-color:var(--skin-light);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:var(--skin-dark);stop-opacity:1" />
                        </radialGradient>
                        <filter id="shadow" x="0" y="0" width="200%" height="200%">
                            <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.3"/>
                        </filter>
                    </defs>
                    <rect x="40" y="75" width="20" height="25" id="neck-part" fill="#d1a67d" />
                    <path d="M40 80 Q50 85 60 80" fill="rgba(0,0,0,0.15)" />
                    <circle cx="50" cy="50" r="40" id="main-skin-circle" fill="url(#skinGrad)" />
                    <path d="M90 50 A40 40 0 0 1 50 90 A40 40 0 0 1 10 50" fill="rgba(0,0,0,0.07)" />
                    
                    <g id="layer-eyes" filter="url(#shadow)"></g>
                    <g id="layer-nose" filter="url(#shadow)"></g>
                    <g id="layer-mouth" filter="url(#shadow)"></g>
                </svg>
            </div>
            <h2 id="studioStudentName" style="margin-top: 25px; letter-spacing: 1px; color:white;">STUDENT NAME</h2>
        </div>
        <div class="options-zone">
            <h2 id="stepTitle" class="step-title">Select Gender</h2>
            <div id="optionsGrid" class="options-grid"></div>
        </div>
    </div>
</div>

<header class="main-bar">
    <div style="display: flex; align-items: center; gap: 20px;">
        <div id="currentAvatarFrame" class="avatar-frame"></div>
        <div>
            <div id="h-name" style="font-weight: 700; font-size: 22px;">Waiting...</div>
            <button onclick="openAvatarStudio()" style="background:var(--v-primary); border:none; color:white; padding:4px 10px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:700;">+ NEW STUDENT</button>
        </div>
    </div>
    <div class="academy-logo"><img src="logo.png" onerror="this.src='https://via.placeholder.com/150x80?text=VETO+LOGO'"></div>
    <div style="text-align: right;">
        <span style="color:var(--v-accent); font-weight:800; font-size:32px;" id="h-score">0</span>
        <div style="font-size:12px; color:#94a3b8; letter-spacing:1px;">TOTAL POINTS</div>
    </div>
</header>

<main class="content-area">
    <h1 id="q-text" style="font-size: 48px; max-width: 900px; line-height: 1.3;">Welcome to Veto Academy.<br><span style="color:var(--v-primary)">Click "New Student" to begin.</span></h1>
</main>

<footer class="footer-bar" id="footer-list"></footer>

<script>
    const SkinTones = [
        {light: '#FFDBAC', dark: '#F1C27D'},
        {light: '#F1C27D', dark: '#E0AC69'},
        {light: '#E0AC69', dark: '#C68642'},
        {light: '#8D5524', dark: '#5E3A1A'},
        {light: '#C68642', dark: '#8D5524'}
    ];

    const Assets = {
        eyes: [
            '<g transform="translate(0, -2)"><circle cx="35" cy="48" r="4" fill="#111"/><circle cx="65" cy="48" r="4" fill="#111"/><circle cx="36" cy="47" r="1.5" fill="#fff" opacity="0.6"/><circle cx="66" cy="47" r="1.5" fill="#fff" opacity="0.6"/></g>', 
            '<path d="M30 48 Q35 42 40 48" stroke="#111" fill="none" stroke-width="3" stroke-linecap="round"/><path d="M60 48 Q65 42 70 48" stroke="#111" fill="none" stroke-width="3" stroke-linecap="round"/>',
            '<rect x="28" y="46" width="12" height="4" rx="2" fill="#111"/><rect x="60" y="46" width="12" height="4" rx="2" fill="#111"/>',
            '<circle cx="35" cy="48" r="5" fill="#3C3489" stroke="#111" stroke-width="1"/><circle cx="65" cy="48" r="5" fill="#3C3489" stroke="#111" stroke-width="1"/>',
            '<path d="M30 50 L40 44 M60 44 L70 50" stroke="#111" stroke-width="4" stroke-linecap="round"/>'
        ],
        nose: [ 
            '<path d="M48 50 Q50 56 52 50" stroke="rgba(0,0,0,0.5)" fill="none" stroke-width="2.5" stroke-linecap="round"/>', 
            '<path d="M50 44 V56" stroke="rgba(0,0,0,0.4)" stroke-width="3" stroke-linecap="round"/>', 
            '<path d="M46 54 H54" stroke="rgba(0,0,0,0.5)" stroke-width="3" stroke-linecap="round"/>',
            '<path d="M47 48 L50 58 L53 48" stroke="rgba(0,0,0,0.6)" fill="none" stroke-width="2"/>', 
            '<circle cx="50" cy="54" r="3" fill="rgba(0,0,0,0.3)"/>'
        ],
        mouth: [ // Changed from mouths to mouth
            '<path d="M35 68 Q50 82 65 68" stroke="#111" fill="none" stroke-width="3" stroke-linecap="round"/>',
            '<path d="M40 72 H60" stroke="#111" stroke-width="4" stroke-linecap="round"/>',
            '<path d="M38 72 Q50 68 62 72" stroke="#111" fill="none" stroke-width="3"/>',
            '<circle cx="50" cy="72" r="6" fill="rgba(0,0,0,0.6)"/>',
            '<path d="M35 70 Q50 78 65 70" stroke="#c0392b" fill="none" stroke-width="5" stroke-linecap="round"/>'
        ]
    };

    let state = { students: [], currentS: -1, step: 0, temp: {} };

    const flow = [
        { title: "Select Gender", key: "gender", options: ["Male", "Female"] },
        { title: "Select Skin Tone", key: "skin", options: [1, 2, 3, 4, 5] },
        { title: "Select Eye Style", key: "eyes", options: [1, 2, 3, 4, 5] },
        { title: "Select Nose Style", key: "nose", options: [1, 2, 3, 4, 5] },
        { title: "Select Mouth Style", key: "mouth", options: [1, 2, 3, 4, 5] }
    ];

    function openAvatarStudio() {
        const name = prompt("Student Name:");
        if (!name) return;
        state.temp = { name };
        state.step = 0;
        // Reset Studio Preview
        document.getElementById('layer-eyes').innerHTML = '';
        document.getElementById('layer-nose').innerHTML = '';
        document.getElementById('layer-mouth').innerHTML = '';
        
        document.getElementById('studioStudentName').innerText = name.toUpperCase();
        document.getElementById('avatarStudio').style.display = 'flex';
        renderStep();
    }

    function renderStep() {
        const s = flow[state.step];
        document.getElementById('stepTitle').innerText = s.title;
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = s.options.map((o, i) => `
            <button class="option-btn" onclick="apply('${s.key}', ${i})">
                <span class="option-num">${i + 1}</span>
                ${typeof o === 'string' ? o : 'Style ' + o}
            </button>
        `).join('');
    }

    function apply(key, idx) {
        if (key === 'skin') {
            const colors = SkinTones[idx];
            document.documentElement.style.setProperty('--skin-light', colors.light);
            document.documentElement.style.setProperty('--skin-dark', colors.dark);
            document.getElementById('neck-part').setAttribute('fill', colors.dark);
            document.getElementById('main-skin-circle').setAttribute('fill', 'url(#skinGrad)');
        } else if (key !== 'gender') {
            const layerId = `layer-${key}`;
            const targetLayer = document.getElementById(layerId);
            if(targetLayer && Assets[key] && Assets[key][idx]) {
                targetLayer.innerHTML = Assets[key][idx];
            }
        }

        state.step++;
        if (state.step < flow.length) {
            renderStep();
        } else {
            finalize();
        }
    }

    function finalize() {
        const svgContent = document.getElementById('studioPreviewSVG').innerHTML;
        const student = { name: state.temp.name, score: 0, avatar: svgContent };
        state.students.push(student);
        state.currentS = state.students.length - 1;
        document.getElementById('avatarStudio').style.display = 'none';
        updateUI();
    }

    function updateUI() {
        if(state.currentS === -1) return;
        const s = state.students[state.currentS];
        document.getElementById('h-name').innerText = s.name;
        document.getElementById('currentAvatarFrame').innerHTML = `<svg class="avatar-svg" viewBox="0 0 100 100">${s.avatar}</svg>`;
        
        document.getElementById('footer-list').innerHTML = state.students.map((st, i) => `
            <div class="student-pill ${i === state.currentS ? 'active' : ''}">
                <div style="width:45px; height:45px; margin:0 auto 8px; border-radius:50%; background:#fff; overflow:hidden; border:2px solid var(--v-primary)">
                    <svg viewBox="0 0 100 100">${st.avatar}</svg>
                </div>
                <div style="font-weight:700; font-size:14px; color:white">${st.name}</div>
            </div>
        `).join('');
        document.getElementById('q-text').innerHTML = `Student <span style="color:var(--v-accent)">${s.name}</span> is ready.<br>Let's start the challenge!`;
    }
</script>
</body>
</html>
