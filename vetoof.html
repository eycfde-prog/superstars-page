<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veto Program - Smart Interface</title>
    <style>
        /* Veto Architect Styles - 4-Meter Rule Applied */
        :root {
            --primary-bg: #0a0a0a;
            --text-color: #ffffff;
            --overlay-opacity: 0.4; /* تتحكم في مدى ظهور الخلفية خلف المحتوى */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden; /* لمنع التمرير غير الضروري والحفاظ على ثبات العرض */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
        }

        /* حاوية الخلفية المتحركة */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: url('https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/51f1d5c58d4bcd34b8a4ddc1cd05d6fda68fade5/vetoofb.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* طبقة التباين (Overlay) لراحة العين ووضوح المحتوى */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, var(--overlay-opacity));
            z-index: -1;
        }

        /* الحاوية الرئيسية للمحتوى (السبورة الذكية) */
        .main-stage {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 5rem; /* حجم ضخم للرؤية من مسافة 4 أمتar */
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            font-weight: 800;
            letter-spacing: 2px;
        }

        .status-badge {
            margin-top: 20px;
            padding: 10px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            font-size: 1.5rem;
            backdrop-filter: blur(5px);
        }

        /* تأثير الحركة اللطيف للمحتوى */
        .fade-in {
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    
    <div class="overlay"></div>

    <main class="main-stage fade-in">
        <h1>VETO PROGRAM</h1>
        <div class="status-badge">جاهز للعرض الذكي | Smart Display Ready</div>
    </main>

    <script>
        // بروتوكول التحكم بالكيبورد (Veto Architect Logic)
        document.addEventListener('keydown', function(event) {
            if (event.key === "Enter") {
                console.log("Enter key pressed: Switching Slide...");
                // هنا سيتم ربط منطق التنقل بين ملفات الـ JS لاحقاً
                alert("مرحباً مستر عز، تم تفعيل اختصارات الكيبورد بنجاح.");
            }
        });

        // التأكد من استمرارية عمل الخلفية دون توقف
        window.addEventListener('load', () => {
            console.log("Veto Background is now active and looping.");
        });
    </script>
</body>
</html>
