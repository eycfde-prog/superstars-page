<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETO PROGRAM | Main Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.4);
            --bg-dark: #020202;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-color: #f0f0f0;
            --banner-height: 120px;
            --transition-speed: 0.4s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-dark);
            /* Futuristic Technology & Robotics Background */
            background-image: 
                linear-gradient(rgba(2, 2, 2, 0.8), rgba(2, 2, 2, 0.9)),
                url('https://img.freepik.com/free-vector/digital-technology-background-with-abstract-geometric-shapes_1017-26801.jpg?t=st=1721245000~exp=1721248600~hmac=6b9319e59f40e70402b85a3a79d30c5e1c8d06d4e1723a1a63c8f2b7f0e0c0f0&w=1800');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Optimized Banner --- */
        .top-banner {
            height: var(--banner-height);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .logo-img { height: 70px; width: auto; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        .mr-ezz-img { height: 90px; width: auto; border-radius: 15px; border: 2px solid var(--primary-gold); box-shadow: 0 0 15px var(--gold-glow); }
        
        .top-banner h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--primary-gold);
            text-shadow: 0 0 15px var(--gold-glow);
            text-align: center;
            flex-grow: 1;
            margin: 0 20px;
        }

        /* Mobile banner overrides */
        @media (max-width: 767px) {
            .top-banner { padding: 0 15px; height: 90px; }
            .top-banner h1 { font-size: 1.3rem; letter-spacing: 1px; margin: 0 10px; }
            .logo-img { height: 45px; }
            .mr-ezz-img { height: 65px; border-radius: 10px; }
        }

        /* --- Levels Grid --- */
        .levels-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
            align-items: start;
        }

        @media (max-width: 480px) {
            .levels-container {
                grid-template-columns: 1fr; /* Single column on very small screens */
                padding: 20px 15px;
            }
        }

        /* --- Level Card & Drawer --- */
        .level-block {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden; /* Crucial for drawer effect */
            transition: transform var(--transition-speed) ease, box-shadow var(--transition-speed) ease, border-color var(--transition-speed) ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .level-block:hover {
            transform: translateY(-5px);
            border-color: var(--gold-glow);
            box-shadow: 0 12px 40px rgba(197, 160, 89, 0.2);
        }

        /* Main Card Area */
        .level-card {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            position: relative;
            z-index: 10;
            background: transparent;
        }

        .level-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .level-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            font-weight: 600;
        }

        .level-number {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary-gold);
            line-height: 1;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        .level-icon {
            font-size: 1.5rem;
            color: var(--primary-gold);
            transition: transform var(--transition-speed) ease;
            opacity: 0.7;
        }

        /* Rotate icon when active */
        .level-block.active .level-icon {
            transform: rotate(-180deg);
            opacity: 1;
        }

        /* --- Lectures Drawer (الدَّرَج) --- */
        .lectures-drawer {
            max-height: 0; /* Hidden state */
            overflow: hidden;
            transition: max-height var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.2);
            border-top: 0 solid var(--glass-border);
        }

        /* Active state for drawer */
        .level-block.active .lectures-drawer {
            max-height: 500px; /* Approximate max height when open */
            border-top-width: 1px;
            padding: 20px;
        }

        .lectures-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
        }

        .lecture-node {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .lecture-node:hover {
            background: var(--primary-gold);
            color: #000;
            border-color: #fff;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .lecture-node .node-prefix {
            font-size: 0.7rem;
            font-weight: 600;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .lecture-node .node-number {
            font-size: 1.4rem;
            font-weight: 800;
        }
        
        /* Pulse for active node */
        .lecture-node:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <header class="top-banner">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="Logo" class="logo-img">
        <h1>VETO PROGRAM</h1>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz" class="mr-ezz-img">
    </header>

    <main class="levels-container" id="levelsGrid">
        </main>

    <script>
        const levelsGrid = document.getElementById('levelsGrid');
        const totalLevels = 12;
        const lecturesPerLevel = 4; // Assuming 4 lectures based on original S1-S4

        // --- Generate Level Blocks ---
        for (let i = 1; i <= totalLevels; i++) {
            // 1. Create the main block
            const levelBlock = document.createElement('div');
            levelBlock.className = 'level-block';
            levelBlock.id = `block-lvl-${i}`;

            // 2. Create the clickable card area
            const levelCardHTML = `
                <div class="level-card" onclick="toggleLevelDrawer(${i})">
                    <div class="level-info">
                        <span class="level-label">المستوى</span>
                        <div class="level-number">${String(i).padStart(2, '0')}</div>
                    </div>
                    <div class="level-icon">▼</div> </div>
            `;

            // 3. Create the Lectures Drawer (الدَّرَج)
            let lecturesHTML = '';
            for (let j = 1; j <= lecturesPerLevel; j++) {
                lecturesHTML += `
                    <div class="lecture-node" onclick="navigateToContent('${i}-${j}')">
                        <span class="node-prefix">محاضرة</span>
                        <div class="node-number">${j}</div>
                    </div>
                `;
            }

            const drawerHTML = `
                <div class="lectures-drawer">
                    <div class="lectures-grid">
                        ${lecturesHTML}
                    </div>
                </div>
            `;

            // 4. Combine and append
            levelBlock.innerHTML = levelCardHTML + drawerHTML;
            levelsGrid.appendChild(levelBlock);
        }

        // --- Function to toggle drawer open/close ---
        function toggleLevelDrawer(levelNum) {
            const clickedBlock = document.getElementById(`block-lvl-${levelNum}`);
            const allBlocks = document.querySelectorAll('.level-block');

            allBlocks.forEach((block) => {
                if (block === clickedBlock) {
                    // Toggle active class on the clicked block
                    block.classList.toggle('active');
                } else {
                    // Close all other blocks
                    block.classList.remove('active');
                }
            });
        }

        // --- Navigation Function ---
        function navigateToContent(sessionId) {
            // Keep original navigation logic
            window.location.href = `vetoofif.html?session=${sessionId}`;
        }
    </script>
</body>
</html>
