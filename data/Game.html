<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veto Bubbles - Miss Dina</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sky: #87CEEB;
            --bubble-gradient: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.3));
            --pink-accent: #ff477e;
        }

        * { -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg-sky);
            font-family: 'Fredoka One', cursive;
            touch-action: none;
            position: fixed;
        }

        #game-container {
            width: 100%; height: 100%;
            position: relative;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
        }

        #teacher-sign {
            position: absolute; bottom: 15px; right: 20px;
            font-size: 1rem; color: rgba(255,255,255,0.8); z-index: 10;
        }

        #stats {
            position: absolute; top: env(safe-area-inset-top, 20px); width: 100%;
            display: flex; justify-content: space-around;
            font-size: 1.8rem; color: white; 
            text-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 20;
        }

        #danger-line {
            position: absolute; bottom: 35%; 
            width: 100%; height: 8px;
            background: repeating-linear-gradient(90deg, #ff4d4d, #ff4d4d 20px, transparent 20px, transparent 40px);
            z-index: 5;
        }

        #word-wrapper {
            position: absolute; top: -120px;
            display: flex; flex-direction: row;
            gap: 10px; width: 100%; justify-content: center;
        }

        .bubble-char {
            width: 60px; height: 60px;
            background: var(--bubble-gradient);
            border: 3px solid white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #005f73;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .popped { animation: pop-effect 0.3s ease-out forwards; }
        @keyframes pop-effect {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(10, 25, 47, 0.9);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 1000; color: white; text-align: center;
            padding: 20px;
        }

        button {
            padding: 18px 45px; font-size: 1.8rem; font-family: 'Fredoka One';
            background: var(--pink-accent); color: white; border: none; border-radius: 50px;
            box-shadow: 0 6px #c9184a; cursor: pointer; transition: 0.1s;
        }

        button:active { transform: translateY(4px); box-shadow: 0 2px #c9184a; }

        #hidden-input {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0; z-index: -1;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="teacher-sign">Miss Dina ✨</div>
    <div id="stats">
        <div>⏳ <span id="timer">30</span>s</div>
        <div>🏆 <span id="score">0</span></div>
    </div>
    <div id="word-wrapper"></div>
    <div id="danger-line"></div>
    <input type="text" id="hidden-input" inputmode="text" autocomplete="off">

    <div id="start-screen" class="overlay">
        <h1 style="color: #00f2fe; font-size: 3rem; margin-bottom: 10px;">VETO BUBBLES</h1>
        <p style="margin-bottom: 20px; opacity: 0.8;">Ready for the challenge?</p>
        <button id="start-btn">START MISSION 🚀</button>
    </div>

    <div id="end-screen" class="overlay" style="display: none;">
        <h1 style="font-size: 3.5rem; color: #ff477e;">BRAVO! 🌈</h1>
        <p style="font-size: 2.2rem;">Score: <span id="final-score" style="color: #00f2fe">0</span></p>
        <button onclick="location.reload()">PLAY AGAIN 🔄</button>
    </div>
</div>

<audio id="snd-right" preload="auto">
    <source src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/data/gamewav/rlitter.wav" type="audio/wav">
</audio>
<audio id="snd-wrong" preload="auto">
    <source src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/data/gamewav/wlitter.wav" type="audio/wav">
</audio>
<audio id="snd-complete" preload="auto">
    <source src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/data/gamewav/completeworf.wav" type="audio/wav">
</audio>
<audio id="snd-finish" preload="auto">
    <source src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/data/gamewav/fimishgame.wav" type="audio/wav">
</audio>
<script>
    const originalWords = ["old", "live", "kind", "years", "mother", "father", "family", "sister", "brother", "together"];
    let wordIndex = 0;
    let currentWord = "";
    let charIdx = 0;
    let score = 0;
    let timeLeft = 30;
    let isActive = false;
    let baseSpeed = 0.7;

    const wrapper = document.getElementById('word-wrapper');
    const input = document.getElementById('hidden-input');
    const container = document.documentElement;

    const sounds = {
        right: document.getElementById('snd-right'),
        wrong: document.getElementById('snd-wrong'),
        complete: document.getElementById('snd-complete'),
        finish: document.getElementById('snd-finish')
    };

    // وظيفة ملء الشاشة
    function openFullscreen() {
        if (container.requestFullscreen) {
            container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) { /* Safari */
            container.webkitRequestFullscreen();
        } else if (container.msRequestFullscreen) { /* IE11 */
            container.msRequestFullscreen();
        }
    }

    document.getElementById('start-btn').addEventListener('click', () => {
        // تشغيل ملء الشاشة
        openFullscreen();
        
        document.getElementById('start-screen').style.display = 'none';
        isActive = true;
        
        // تفعيل الصوت (Unlock)
        Object.values(sounds).forEach(s => {
            s.play().then(() => {
                s.pause();
                s.currentTime = 0;
            }).catch(e => console.log("Audio unlock wait..."));
        });

        setTimeout(() => {
            input.focus();
            spawnWord();
            tick();
            runTimer();
        }, 300);
    });

    function spawnWord() {
        if (wordIndex >= originalWords.length) {
            wordIndex = 0;
            baseSpeed += 0.2;
        }
        
        currentWord = originalWords[wordIndex];
        wordIndex++;
        
        charIdx = 0;
        wrapper.innerHTML = "";
        wrapper.style.top = "-100px";
        
        currentWord.split('').forEach(char => {
            const div = document.createElement('div');
            div.className = 'bubble-char';
            div.innerText = char.toUpperCase();
            wrapper.appendChild(div);
        });
    }

    function tick() {
        if (!isActive) return;
        let top = parseFloat(wrapper.style.top) || -100;
        wrapper.style.top = (top + baseSpeed) + "px";

        const lineY = document.getElementById('danger-line').offsetTop;
        if (top + 60 > lineY) {
            spawnWord(); 
        }
        requestAnimationFrame(tick);
    }

    function runTimer() {
        const timer = setInterval(() => {
            if (!isActive) { clearInterval(timer); return; }
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                isActive = false;
                sounds.finish.play();
                showEnd();
            }
        }, 1000);
    }

    input.addEventListener('input', (e) => {
        if (!isActive) return;
        
        const val = e.target.value.toLowerCase();
        if (val.length === 0) return;
        
        const pressed = val[val.length - 1]; 
        const target = currentWord[charIdx].toLowerCase();

        if (pressed === target) {
            const bubbles = document.querySelectorAll('.bubble-char');
            if (bubbles[charIdx]) {
                bubbles[charIdx].classList.add('popped');
                sounds.right.currentTime = 0;
                sounds.right.play();
                charIdx++;

                if (charIdx === currentWord.length) {
                    score++;
                    document.getElementById('score').innerText = score;
                    sounds.complete.currentTime = 0;
                    sounds.complete.play();
                    spawnWord();
                }
            }
        } else {
            sounds.wrong.currentTime = 0;
            sounds.wrong.play();
        }
        e.target.value = ""; 
    });

    // لضمان استمرار التركيز على الـ Input
    document.addEventListener('click', () => {
        if(isActive) input.focus();
    });

    function showEnd() {
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
        if (document.exitFullscreen) {
            document.exitFullscreen().catch(() => {});
        }
    }
</script>

</body>
</html>
