<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veto Program | Mr. Ezz Y. Ali</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --veto-red: #ff3131; /* لون أحمر أكثر سطوعاً للشاشات الكبيرة */
            --veto-blue: #007bff;
            --text-main: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Oswald', 'Cairo', sans-serif;
            color: var(--text-main);
            overflow: hidden; /* لمنع التمرير غير الضروري في العرض */
        }

        /* --- Global Header (The Banner) --- */
        header {
            height: 12vh;
            background: linear-gradient(180deg, rgba(0,0,0,1) 0%, rgba(20,20,20,1) 100%);
            border-bottom: 4px solid var(--veto-red);
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 20px;
            box-shadow: 0 5px 20px rgba(255, 49, 49, 0.2);
        }

        .logo-container img { height: 9vh; border-radius: 50%; border: 2px solid #fff; }
        .teacher-title { font-size: 2.5rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }

        /* --- Levels Map (Grid) --- */
        .levels-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 40px;
            padding: 5vh 5vw;
            height: 80vh;
            overflow-y: auto;
        }

        .level-wrapper {
            position: relative;
            width: 180px; height: 180px;
            margin: auto;
        }

        .level-btn {
            width: 100%; height: 100%;
            background: var(--veto-red);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; /* شكل هندسي مميز */
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; cursor: pointer;
            transition: var(--transition);
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .level-wrapper:hover .level-btn { transform: scale(1.1) rotate(5deg); background: #fff; color: var(--veto-red); }

        /* --- Sub-Sessions (Floating Bubbles) --- */
        .sub-btn {
            position: absolute; width: 60px; height: 60px;
            background: var(--veto-blue); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; cursor: pointer;
            opacity: 0; transform: scale(0); transition: var(--transition);
            border: 3px solid #fff; z-index: 10;
        }

        .level-wrapper.active .sub-btn { opacity: 1; transform: scale(1); }
        .level-wrapper.active .sub-btn:nth-child(2) { top: -30px; left: 60px; }
        .level-wrapper.active .sub-btn:nth-child(3) { bottom: -30px; left: 60px; }
        .level-wrapper.active .sub-btn:nth-child(4) { left: -30px; top: 60px; }
        .level-wrapper.active .sub-btn:nth-child(5) { right: -30px; top: 60px; }

        /* --- Overlays (Full Screen Cinema) --- */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            display: none; z-index: 5000;
            backdrop-filter: blur(15px);
        }

        .activity-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* عمودين ضخمين للوضوح */
            gap: 30px; padding: 10vh 10vw;
        }

        .activity-card {
            background: var(--glass);
            border-left: 10px solid var(--veto-red);
            padding: 40px; font-size: 2.2rem;
            border-radius: 15px; cursor: pointer;
            transition: var(--transition);
        }

        .activity-card:hover {
            background: var(--veto-red);
            transform: translateX(20px);
        }

        /* --- The Stage (Activity Viewer) --- */
        .stage-header {
            padding: 20px; background: #000; display: flex; 
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--veto-red);
        }

        #activity-view-footer {
            position: fixed; bottom: 0; width: 100%;
            background: var(--veto-red); color: #000;
            padding: 10px; text-align: center; font-weight: 900; font-size: 1.5rem;
        }

        /* Keyboard Hint */
        .kb-hint {
            position: fixed; bottom: 80px; right: 20px;
            background: rgba(255,255,255,0.2); padding: 5px 15px;
            border-radius: 10px; font-size: 1rem; color: #aaa;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container"><img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png"></div>
        <div class="teacher-title">Mr. Ezz .Y. Ali</div>
        <div class="logo-container"><img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/MrEzz.png"></div>
    </header>

    <div class="levels-container" id="levelsGrid"></div>

    <div id="sessionOverlay" class="overlay">
        <div class="stage-header">
            <h2 id="sessionTitle" style="margin:0; color: var(--veto-red);">Session Content</h2>
            <button onclick="closeAll()" style="background:none; border:2px solid #fff; color:#fff; padding:10px 20px; cursor:pointer; font-family:'Oswald';">BACK TO MAP (ESC)</button>
        </div>
        <div id="sessionContent"></div>
    </div>

    <div id="activityOverlay" class="overlay">
        <div class="stage-header">
            <div id="activityDetails" style="font-size: 1.8rem;"></div>
            <button onclick="closeAll()" style="background:var(--veto-red); border:none; color:#000; padding:10px 30px; font-weight:bold; cursor:pointer;">EXIT VIEW</button>
        </div>
        <div id="activityFinalContent" style="height: 80vh; overflow: hidden;">
            </div>
        <div id="activity-view-footer">VETO PROGRAM | INTERACTIVE STAGE</div>
    </div>

    <div class="kb-hint">Press [1-4] for Sessions | [ESC] to Back</div>

    <script>
        // دمج بياناتك السابقة
        const sessionData = { /* ... بياناتك المسجلة سابقاً ... */ };

        // بناء المستويات
        const grid = document.getElementById('levelsGrid');
        for (let i = 1; i <= 12; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'level-wrapper';
            wrap.innerHTML = `<div class="level-btn" onclick="toggleLevel(event, this)">L ${i}</div>`;
            for (let j = 1; j <= 4; j++) {
                const s = document.createElement('div');
                s.className = 'sub-btn'; s.innerText = j;
                s.onclick = (e) => { e.stopPropagation(); openSession(i, j); };
                wrap.appendChild(s);
            }
            grid.appendChild(wrap);
        }

        function toggleLevel(e, btn) {
            e.stopPropagation();
            const parent = btn.parentElement;
            const isActive = parent.classList.contains('active');
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
            if (!isActive) parent.classList.add('active');
        }

        function openSession(lv, ss) {
            const activities = sessionData[`${lv}-${ss}`] || ["Coming Soon"];
            document.getElementById('sessionTitle').innerText = `Level ${lv} - Session ${ss}`;
            let html = `<div class="activity-grid">`;
            activities.forEach((act, index) => {
                // إضافة رقم النشاط ليسهل اختياره كيبوردياً مستقبلاً
                html += `<div class="activity-card" onclick="openFinalActivity(${lv}, ${ss}, '${act}')">
                            <span style="color:var(--veto-red)">${index + 1}.</span> ${act}
                         </div>`;
            });
            html += `</div>`;
            document.getElementById('sessionContent').innerHTML = html;
            document.getElementById('sessionOverlay').style.display = 'block';
        }

        function openFinalActivity(lv, ss, actName) {
            document.getElementById('activityDetails').innerHTML = `L${lv} / S${ss} / <span style="color:var(--veto-red)">${actName}</span>`;
            document.getElementById('activityOverlay').style.display = 'block';
            
            // لوجيك تحميل الـ JS الخاص بك (WOLF Standard)
            let cleanName = actName.replace(/\s+/g, ''); 
            let shortName = cleanName.substring(0, 3).charAt(0).toUpperCase() + cleanName.substring(0, 3).slice(1);
            const fileName = `L-${lv}-S-${ss}-${shortName}.js`;
            
            console.log("Architect Loading:", fileName);
            // هنا يتم حقن الـ Script بنفس طريقتك الأصلية
        }

        function closeAll() {
            document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
        }

        // محرك الكيبورد (Keyboard Engine)
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeAll();
            
            // اختيار الجلسات بالأرقام عند فتح ليفل
            const activeLevel = document.querySelector('.level-wrapper.active');
            if (activeLevel && !document.getElementById('sessionOverlay').offsetParent) {
                if (e.key >= 1 && e.key <= 4) {
                    const lvText = activeLevel.querySelector('.level-btn').innerText.split(' ')[1];
                    openSession(lvText, e.key);
                }
            }
        });

        // إغلاق القوائم عند الضغط في أي مكان فارغ
        document.addEventListener('click', () => {
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
        });
    </script>
</body>
</html>
