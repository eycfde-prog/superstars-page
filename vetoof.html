<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Ezz .Y. Ali - Learning System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --primary-red: #e74c3c;
            --white: #ffffff;
            --card-bg: #1e1e1e;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            color: var(--white);
            overflow-x: hidden;
        }

        /* Common Headers Styling */
        header, .activity-header {
            width: 100%; background: linear-gradient(to bottom, #1a1a1a, #000000);
            border-bottom: 2px solid var(--primary-red);
            display: flex; justify-content: space-around; align-items: center;
        }

        header { padding: 15px 0; }
        .activity-header { padding: 10px 0; font-size: 14px; }

        .logo { width: 70px; border-radius: 50%; }
        .logo-small { width: 45px; border-radius: 50%; }
        .profile-img { width: 70px; border-radius: 50%; border: 2px solid var(--white); }
        .teacher-name { font-size: 22px; font-weight: bold; }

        /* Buttons */
        .main-btn {
            margin: 20px auto; display: block;
            background-color: var(--primary-red);
            color: white; padding: 10px 30px; border-radius: 25px;
            font-weight: bold; cursor: pointer; border: none; transition: 0.3s;
        }

        /* Overlays */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: none; z-index: 2000;
            overflow-y: auto;
        }

        /* Activity Grid (Squares) */
        .activity-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px; padding: 40px; max-width: 1200px; margin: auto;
        }

        .activity-card {
            background: var(--card-bg); border: 1px solid var(--primary-red);
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 10px; cursor: pointer; border-radius: 12px;
            font-weight: 600; transition: 0.3s;
        }
        .activity-card:hover { background: var(--primary-red); transform: translateY(-5px); }

        /* Level Grid Main */
        .levels-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 80px; width: 90%; margin: 40px auto; justify-items: center;
        }

        .level-wrapper { position: relative; width: 120px; height: 120px; }
        .level-btn {
            width: 100%; height: 100%; background: var(--primary-red);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 4px solid white; cursor: pointer; z-index: 5; position: relative;
        }

        .sub-btn {
            position: absolute; width: 40px; height: 40px; background: white;
            color: var(--primary-red); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            opacity: 0; transform: scale(0); transition: 0.4s; z-index: 4; cursor: pointer;
        }
        .level-wrapper.active .sub-btn { opacity: 1; transform: scale(1); }
        .level-wrapper.active .sub-btn:nth-child(2) { top: -45px; left: 35px; }
        .level-wrapper.active .sub-btn:nth-child(3) { bottom: -45px; left: 35px; }
        .level-wrapper.active .sub-btn:nth-child(4) { left: -45px; top: 35px; }
        .level-wrapper.active .sub-btn:nth-child(5) { right: -45px; top: 35px; }

        /* Final Activity View */
        #activity-view-footer {
            position: fixed; bottom: 0; width: 100%;
            background: #000; padding: 15px 0; text-align: center;
            border-top: 1px solid #333; font-weight: bold; color: var(--primary-red);
        }

        .tokens-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; padding: 20px;
        }
    </style>
</head>
<body>

    <header id="main-header">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" class="logo">
        <div class="teacher-name">Mr. Ezz .Y. Ali</div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/MrEzz.png" class="profile-img">
    </header>

    <button class="main-btn" id="portalActionBtn" onclick="toggleTokens()">Tokens Portal</button>

    <div class="levels-container" id="levelsGrid"></div>

    <div id="sessionOverlay" class="overlay">
        <div id="sessionContent"></div>
    </div>

    <div id="activityOverlay" class="overlay">
        <div class="activity-header">
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" class="logo-small" style="margin-left: 20px;">
            <div id="activityDetails" style="text-align: center; flex-grow: 1;">
                </div>
            <div style="margin-right: 20px; font-weight: bold; color: var(--primary-red);">Trainer. Ezz Y. Ali</div>
        </div>
        
        <div id="activityFinalContent" style="padding: 50px; text-align: center;">
            <h1 style="color: #444;">Activity Content Loading...</h1>
        </div>

        <div id="activity-view-footer">EYC - Veto Program</div>
    </div>

    <script>
const sessionData = {
    // Level 1
    "1-1": ["Gr 1 study", "Lis 1 intro", "Reading 1 Rev"],
    "1-2": ["Gr 1 Rev", "Gr 2 study"],
    "1-3": ["Gr 2 Rev", "Gr 3 study"],
    "1-4": ["Gr 3 Rev", "Gr 4 study"],

    // Level 2
    "2-1": ["Lis 4 Rev", "Gr 4 Rev", "Reading 5 Rev"],
    "2-2": ["Gr 5 test", "Reading 2 Rec"],
    "2-3": ["Vocab 3 Rev", "Reading 7 Rev"],
    "2-4": ["Lis 7 test", "Reading 4 Rec"],

    // Level 3
    "3-1": ["Lis 8 Rev", "Gr 6 Rev", "Reading 9 Rev"],
    "3-2": ["Lis 9 test", "Reading 6 Rec"],
    "3-3": ["Reading 6 Rev", "Reading 11 Rev"],
    "3-4": ["Reading 8 Rev", "Reading 12 Rev"],

    // Level 4
    "4-1": ["Lis 12 Rev", "Gr 8 Rev", "Reading 13 Rev"],
    "4-2": ["Lis 13 test", "Reading 10 Rec"],
    "4-3": ["Reading 10 Rev", "Reading 15 Rev"],
    "4-4": ["Reading 12 Rec", "Reading 16 Rev"],

    // Level 5
    "5-1": ["Lis 16 Rev", "Gr 10 Rev", "Reading 17 Rev"],
    "5-2": ["Lis 17 test", "Reading 14 Rec"],
    "5-3": ["Reading 14 Rev", "Reading 19 Rev"],
    "5-4": ["Reading 16 Rec", "Reading 20 Rev"],

    // Level 6
    "6-1": ["Lis 20 Rev", "Gr 12 Rev", "Reading 21 Rev"],
    "6-2": ["Lis 21 test", "Reading 18 Rec"],
    "6-3": ["Reading 18 Rev", "Reading 23 Rev"],
    "6-4": ["Reading 20 Rec", "Reading 24 Rev"],

    // Level 7
    "7-1": ["Lis 24 Rev", "Gr 14 Rev", "Reading 25 Rev"],
    "7-2": ["Lis 25 test", "Reading 22 Rec"],
    "7-3": ["Reading 22 Rev", "Reading 27 Rev"],
    "7-4": ["Reading 24 Rec", "Reading 28 Rev"],

    // Level 8
    "8-1": ["Lis 28 Rev", "Gr 16 Rev", "Reading 29 Rev"],
    "8-2": ["Lis 29 test", "Reading 26 Rec"],
    "8-3": ["Reading 26 Rev", "Reading 31 Rev"],
    "8-4": ["Reading 28 Rec", "Reading 32 Rev"],

    // Level 9
    "9-1": ["Lis 32 Rev", "Gr 18 Rev", "Reading 33 Rev"],
    "9-2": ["Lis 33 test", "Reading 30 Rec"],
    "9-3": ["Reading 30 Rev", "Reading 35 Rev"],
    "9-4": ["Reading 32 Rec", "Reading 36 Rev"],

    // Level 10
    "10-1": ["Lis 36 Rev", "Gr 20 Rev", "Reading 37 Rev"],
    "10-2": ["Lis 37 test", "Reading 34 Rec"],
    "10-3": ["Reading 34 Rev", "Reading 39 Rev"],
    "10-4": ["Reading 36 Rec", "Reading 40 Rev"],

    // Level 11
    "11-1": ["Lis 40 Rev", "GP intro", "Lis 1 test"],
    "11-2": ["Lis 41 test", "Reading 38 Rec"],
    "11-3": ["Reading 38 Rev", "Gr 3 test"],
    "11-4": ["Reading 40 Rec", "Vocab 4 test"],

    // Level 12
    "12-1": ["gp rev", "GP intro", "Gr 1 test"],
    "12-2": ["Gr 2 study", "Reading 38 Rec"],
    "12-3": ["dmt 5 rev", "Gr 3 test"],
    "12-4": ["dmt 5 test", "Vocab 4 test"]
};

        // Initialize Levels
        const grid = document.getElementById('levelsGrid');
        for (let i = 1; i <= 12; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'level-wrapper';
            wrap.innerHTML = `<div class="level-btn">Level ${i}</div>`;
            for (let j = 1; j <= 4; j++) {
                const s = document.createElement('div');
                s.className = 'sub-btn'; s.innerText = j;
                s.onclick = (e) => { e.stopPropagation(); openSession(i, j); };
                wrap.appendChild(s);
            }
            wrap.onclick = (e) => {
                e.stopPropagation();
                document.querySelectorAll('.level-wrapper').forEach(w => w!==wrap && w.classList.remove('active'));
                wrap.classList.toggle('active');
            };
            grid.appendChild(wrap);
        }

        // Open Session (Activity Grid)
        function openSession(lv, ss) {
            const activities = sessionData[`${lv}-${ss}`] || ["Coming Soon"];
            let html = `<div class="activity-grid">`;
            activities.forEach(act => {
                html += `<div class="activity-card" onclick="openFinalActivity(${lv}, ${ss}, '${act}')">${act}</div>`;
            });
            html += `</div>`;
            
            document.getElementById('sessionContent').innerHTML = html;
            document.getElementById('sessionOverlay').style.display = 'block';
            updateBtn("Levels Portal", () => closeAll());
        }

        // Open Final Activity View with dynamic script loading
function openFinalActivity(lv, ss, actName) {
    const details = `
        <span style="margin: 0 10px;">Level ${lv}</span> | 
        <span style="margin: 0 10px;">Session ${ss}</span> | 
        <span style="color: var(--primary-red); margin: 0 10px;">${actName}</span>
        <button class="main-btn" style="display:inline-block; margin-left:20px; padding: 5px 15px;" onclick="closeAll()">Levels Portal</button>
    `;
    document.getElementById('activityDetails').innerHTML = details;

    const container = document.getElementById('activityFinalContent');
    container.innerHTML = '<h2 style="color: #666;">Loading Activity Contents...</h2>';
    document.getElementById('activityOverlay').style.display = 'block';

    // --- نظام WOLF الموحد لتسمية الملفات ---
    
    // 1. تنظيف الاسم من المسافات والأرقام تماماً قبل أخذ الاختصار
    // Regex: [^a-zA-Z] بيشيل أي حاجة مش حرف (زي الأرقام والمسافات)
    let cleanName = actName.replace(/[^a-zA-Z]/g, ''); 
    
    // 2. أخذ أول 3 حروف فقط
    let shortName = cleanName.substring(0, 3);
    
    // 3. جعل أول حرف كبير والباقي صغير (PascalCase) لضمان مطابقة الملفات
    shortName = shortName.charAt(0).toUpperCase() + shortName.slice(1).toLowerCase();
    
    // 4. بناء اسم الملف النهائي
    const fileName = `L-${lv}-S-${ss}-${shortName}.js`;
    const filePath = `data/${fileName}`;
    
    // ---------------------------------------

    const oldScript = document.getElementById('activity-script');
    if (oldScript) oldScript.remove();

    const script = document.createElement('script');
    script.id = 'activity-script';
    script.src = filePath;
    
    script.onerror = () => {
        container.innerHTML = `
            <div style="color: #e74c3c; padding: 20px; border: 2px dashed #e74c3c; border-radius: 15px; background: rgba(231, 76, 60, 0.1);">
                <h3>⚠️ File Not Found!</h3>
                <p>Expected File: <span style="color: yellow;">${fileName}</span></p>
                <p>Path: <span style="color: #fff;">${filePath}</span></p>
                <p style="font-size: 12px; color: #aaa;">Make sure the file name is exactly: <b>${fileName}</b></p>
            </div>
        `;
    };

    document.body.appendChild(script);
}

        // Tokens Portal
        function toggleTokens() {
            const categories = ["Attendence", "ICA", "Reading", "Tongue Twister", "One Shot", "Games", "Squeezer", "DMT", "Wish", "Project", "Graduation Project", "Extra Bonus"];
            let html = `<div class="tokens-grid">`;
            categories.forEach(c => {
                html += `<div style="background:#1e1e1e; border:1px solid #e74c3c; height:80px; border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative;">
                            <input type="text" style="width:100%; background:transparent; border:none; color:#e74c3c; text-align:center; font-size:18px; outline:none;" placeholder=" ">
                            <label style="position:absolute; color:#555; pointer-events:none;">${c}</label>
                         </div>`;
            });
            html += `</div>`;
            document.getElementById('sessionContent').innerHTML = html;
            document.getElementById('sessionOverlay').style.display = 'block';
            updateBtn("Levels Portal", () => closeAll());
        }

        function updateBtn(text, fn) {
            const btn = document.getElementById('portalActionBtn');
            btn.innerText = text;
            btn.onclick = fn;
        }

        function closeAll() {
            document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
            updateBtn("Tokens Portal", () => toggleTokens());
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
        });
    </script>
</body>
</html>
