<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYC Veto Program - Level Selection</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --text-color: #ecf0f1;
            --vortex-speed: 5s;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Banner Styling */
        .banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 50px;
            background: linear-gradient(90deg, #000, #2c3e50, #000);
            border-bottom: 3px solid var(--accent-color);
        }

        .banner img { height: 100px; border-radius: 50%; border: 2px solid var(--text-color); }
        .banner h1 { flex-grow: 1; text-align: center; font-size: 2.5em; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* Switch Button Area */
        .controls {
            display: flex;
            justify-content: center;
            padding: 15px;
            background: #000;
        }

        .switch-btn {
            padding: 12px 30px;
            font-weight: bold;
            text-transform: uppercase;
            background: var(--accent-color);
            color: white;
            border: 2px solid white;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .switch-btn:hover { transform: scale(1.05); background: #c0392b; }

        /* Levels Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 60px;
            padding: 60px;
            justify-items: center;
        }

        .level-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-circle {
            width: 100px;
            height: 100px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.6);
        }

        /* Sub-circles positioning */
        .sub-circle {
            position: absolute;
            width: 45px;
            height: 45px;
            background: #3498db;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            z-index: 5;
            transition: 0.3s;
        }

        /* Orbiting Animation */
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(85px) rotate(0deg); }
            to   { transform: rotate(360deg) translateX(85px) rotate(-360deg); }
        }

        .active .sub-circle { display: flex; animation: orbit 6s linear infinite; }
        
        /* Math-based distribution for sub-circles */
        .active .s1 { animation-delay: 0s; }
        .active .s2 { animation-delay: -1.5s; }
        .active .s3 { animation-delay: -3s; }
        .active .s4 { animation-delay: -4.5s; }

        /* Vortex Iframe Area */
        #vortex-container {
            display: none;
            width: 100%;
            height: 60vh;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .vortex {
            width: 300px;
            height: 300px;
            border: 10px double var(--accent-color);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin var(--vortex-speed) linear infinite;
            box-shadow: 0 0 50px var(--accent-color);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Session Iframe */
        #content-frame { display: none; width: 100vw; height: 100vh; border: none; }
        .back-btn { position: fixed; top: 20px; right: 20px; padding: 10px 20px; background: var(--accent-color); color: white; border: none; cursor: pointer; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <button class="back-btn" onclick="goBack()">Back to Menu</button>

    <div id="main-ui">
        <header class="banner">
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="Logo">
            <h1>Mr. Ezz .Y. Ali</h1>
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz">
        </header>

        <div class="controls">
            <button class="switch-btn" onclick="toggleView()">Switch to Vortex Mode</button>
        </div>

        <main class="grid-container" id="levels-grid"></main>
        
        <div id="vortex-container">
            <div class="vortex"></div>
        </div>
    </div>

    <iframe id="content-frame"></iframe>

    <script>
        const grid = document.getElementById('levels-grid');
        const vortex = document.getElementById('vortex-container');
        const mainUi = document.getElementById('main-ui');
        const iframe = document.getElementById('content-frame');
        const backBtn = document.querySelector('.back-btn');
        const switchBtn = document.querySelector('.switch-btn');

        let isVortexMode = false;

        // Generate 12 levels
        for (let i = 1; i <= 12; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'level-wrapper';
            wrapper.innerHTML = `
                <div class="main-circle" onclick="toggleSubCircles(this)">Level ${i}</div>
                <div class="sub-circle s1" onclick="loadSession(${i}, 1)">1</div>
                <div class="sub-circle s2" onclick="loadSession(${i}, 2)">2</div>
                <div class="sub-circle s3" onclick="loadSession(${i}, 3)">3</div>
                <div class="sub-circle s4" onclick="loadSession(${i}, 4)">4</div>
            `;
            grid.appendChild(wrapper);
        }

        function toggleView() {
            isVortexMode = !isVortexMode;
            if (isVortexMode) {
                grid.style.display = 'none';
                vortex.style.display = 'flex';
                switchBtn.innerText = "Switch to Levels Mode";
            } else {
                grid.style.display = 'grid';
                vortex.style.display = 'none';
                switchBtn.innerText = "Switch to Vortex Mode";
            }
        }

        function toggleSubCircles(element) {
            document.querySelectorAll('.level-wrapper').forEach(w => {
                if(w !== element.parentElement) w.classList.remove('active');
            });
            element.parentElement.classList.toggle('active');
        }

        function loadSession(level, session) {
            // Path to your GitHub files
            const baseUrl = "https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/sessions/";
            const fileName = `${level}-${session}.js`;
            
            mainUi.style.display = 'none';
            iframe.style.display = 'block';
            backBtn.style.display = 'block';

            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(`
                <html>
                <body style="background:#1a1a1a; color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif;">
                    <h2 style="color:#e74c3c">Session ${level}-${session}</h2>
                    <div id="loading">Initializing System...</div>
                    <script src="${baseUrl}${fileName}"><\/script>
                </body>
                </html>
            `);
            doc.close();
        }

        function goBack() {
            mainUi.style.display = 'block';
            iframe.style.display = 'none';
            backBtn.style.display = 'none';
            iframe.src = "about:blank";
        }
    </script>
</body>
</html>
