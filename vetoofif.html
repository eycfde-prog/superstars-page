<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Smart Board</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --banner-height: 100px;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; 
            -webkit-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
        }

        /* Responsive Banner */
        .top-banner {
            height: var(--banner-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; background: #000; border-bottom: 3px solid var(--primary-gold);
        }

        .logo-img { height: 50px; }
        .mr-ezz-img { height: 70px; border-radius: 8px; border: 1px solid var(--primary-gold); }
        .session-info h1 { font-size: 1.8rem; color: var(--primary-gold); }

        /* Grid for Cards - Glassy Theme Applied */
        .content-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 50px;
            overflow-y: auto;
            height: calc(100vh - var(--banner-height));
            touch-action: pan-y;
        }

        .content-card {
            width: 80%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            padding: 25px 50px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .content-card::before {
            content: "TASK";
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            font-size: 0.7rem;
            color: var(--primary-gold);
            letter-spacing: 5px;
            opacity: 0.5;
        }

        .content-card h2 {
            font-size: 2.2rem;
            font-weight: 300;
            color: #fff;
            text-align: left;
        }

        .content-card:hover {
            background: rgba(197, 160, 89, 0.1);
            border-color: var(--primary-gold);
            transform: scale(1.02);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* Activity Stage */
        #activity-stage { 
            position: fixed; inset: 0; background:#000; z-index: 8000; display: none; 
        }

        /* Laser & Canvas */
        #laser-pointer {
            position: fixed; width: 25px; height: 25px; background: rgba(255, 0, 0, 0.9); 
            border-radius: 50%; pointer-events: none; z-index: 10000; display: none;
            box-shadow: 0 0 15px red, 0 0 30px red; transform: translate(-50%, -50%);
        }
        #drawing-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }

        /* Mobile Orientation Force (CSS) */
        @media screen and (max-width: 900px) and (orientation: portrait) {
            #activity-stage { 
                transform: rotate(90deg); transform-origin: bottom left;
                width: 100vh; height: 100vw; top: -100vw; left: 0;
            }
        }

        /* Controls */
        .exit-btn {
            position: absolute; top: 15px; left: 15px; z-index: 8500;
            background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 8px;
        }

        .toolbox-wrapper { position: fixed; bottom: 20px; right: 20px; z-index: 9500; display: flex; flex-direction: column-reverse; gap: 10px; }
        .tool-btn { 
            width: 60px; height: 60px; border-radius: 50%; background: var(--primary-gold); 
            border: none; font-size: 1.5rem; display: none; align-items: center; justify-content: center;
        }
        .toolbox-wrapper.open .tool-btn { display: flex; }
        .tool-btn.active { background: #ff4757; }
    </style>
</head>
<body>

    <header class="top-banner">
        <button onclick="window.location.href='vetoof.html'" style="background:none; border:1px solid var(--primary-gold); color:var(--primary-gold); padding:8px 15px; border-radius:5px; cursor:pointer;">← BACK</button>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        <div class="session-info"><h1 id="display-title">VETO BOARD</h1></div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage">
        <button class="exit-btn" onclick="closeStage()">EXIT (ESC)</button>
        <div id="stage-content" style="width:100%; height:100%;"></div>
    </div>

    <div id="laser-pointer"></div>
    <canvas id="drawing-canvas"></canvas>

    <div class="toolbox-wrapper" id="toolBox">
        <button class="tool-btn" style="display:flex; background:#222;" onclick="toggleToolBox()">🛠️</button>
        <button class="tool-btn" id="laserBtn" onclick="toggleLaser()">🔦</button>
        <button class="tool-btn" onclick="location.reload()">🔄</button>
    </div>

    <script src="data/levels.js"></script>

    <script>
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const urlParams = new URLSearchParams(window.location.search);
        const currentSessionId = urlParams.get('session');
        
        let laserActive = false;
        let isDrawing = false;
        const laser = document.getElementById('laser-pointer');
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resizeCanvas; resizeCanvas();

        function initSession() {
            if (!currentSessionId || !sessionData[currentSessionId]) return;
            const container = document.getElementById('content-container');
            sessionData[currentSessionId].forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.onclick = () => openActivity(item);
                card.innerHTML = `<h2>${item}</h2>`;
                container.appendChild(card);
            });
        }

        async function openActivity(activityName) {
            const [lvl, sess] = currentSessionId.split('-');
            const prefix = activityName.split(' ')[0].substring(0, 3);
            const filePath = `data/L-${lvl}-S-${sess}-${prefix}.js`;
            
            const stage = document.getElementById('activity-stage');
            stage.style.display = 'block';
            
            if (isMobile && stage.requestFullscreen) {
                stage.requestFullscreen().catch(err => console.log(err));
            }

            const script = document.createElement('script');
            script.src = filePath;
            document.head.appendChild(script);
        }

        function closeStage() {
            document.getElementById('activity-stage').style.display = 'none';
            document.getElementById('stage-content').innerHTML = "";
            if (document.fullscreenElement) document.exitFullscreen();
        }

        function toggleToolBox() { document.getElementById('toolBox').classList.toggle('open'); }

        function toggleLaser() {
            laserActive = !laserActive;
            document.getElementById('laserBtn').classList.toggle('active');
            laser.style.display = (laserActive && !isMobile) ? 'block' : 'none';
        }

        function getCoords(e) {
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        }

        function startAction(e) {
            if (!laserActive) return;
            isDrawing = true;
            const pos = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            if (isMobile) laser.style.display = 'block';
            updateLaserPos(e);
        }

        function moveAction(e) {
            if (!laserActive) return;
            const pos = getCoords(e);
            updateLaserPos(e);
            if (isDrawing) {
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            }
        }

        function endAction() {
            isDrawing = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (isMobile) laser.style.display = 'none';
        }

        function updateLaserPos(e) {
            const pos = getCoords(e);
            laser.style.left = pos.x + 'px';
            laser.style.top = pos.y + 'px';
        }

        window.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);
        window.addEventListener('touchstart', (e) => { if(laserActive) e.preventDefault(); startAction(e); }, {passive: false});
        window.addEventListener('touchmove', (e) => { if(laserActive) e.preventDefault(); moveAction(e); }, {passive: false});
        window.addEventListener('touchend', endAction);

        document.getElementById('activity-stage').addEventListener('click', (e) => {
            if (!isMobile || laserActive) return;
            const width = window.innerWidth;
            if (e.clientX > width * 0.8) {
                if(typeof nextSlide === "function") nextSlide();
            } else if (e.clientX < width * 0.2) {
                if(typeof prevSlide === "function") prevSlide();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (document.getElementById('activity-stage').style.display === 'none') return;
            if (e.key === "Enter" || e.key === "ArrowRight" || e.key === " ") {
                if(typeof nextSlide === "function") nextSlide();
            } else if (e.key === "ArrowLeft" || e.key === "Backspace") {
                if(typeof prevSlide === "function") prevSlide();
            } else if (e.key === "Escape") {
                closeStage();
            }
        });

        initSession();
    </script>
</body>
</html>
