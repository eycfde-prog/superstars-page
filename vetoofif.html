<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Session Content</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --banner-height: 140px;
        }

        /* حماية المحتوى من التحديد والكليك يمين */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: manipulation;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Banner Style */
        .top-banner {
            height: var(--banner-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 3px solid var(--primary-gold);
        }

        .logo-img { height: 70px; }
        .mr-ezz-img { height: 100px; border-radius: 8px; }
        .session-info h1 { font-size: 2.5rem; color: var(--primary-gold); text-transform: uppercase; letter-spacing: 3px; }

        /* Content Grid - Optimized for Large Screens */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            padding: 50px;
            max-width: 1600px;
            margin: 0 auto;
            overflow-y: auto;
            height: calc(100vh - var(--banner-height));
        }

        .content-card {
            background: var(--card-bg);
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .content-card:hover { 
            border-color: var(--primary-gold); 
            transform: translateY(-10px);
            background: rgba(197, 160, 89, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #stage-content { user-select: none; }

        /* --- Giant Quick Board --- */
        #note-pad {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; 
            display: none; flex-direction: column; padding: 30px;
        }

        #note-text { 
            width: 100%; height: 80%; background: rgba(255, 255, 255, 0.02); 
            border: 3px solid var(--primary-gold); color: white; 
            font-size: 4rem; padding: 30px; border-radius: 20px; 
            resize: none; outline: none; line-height: 1.4; font-weight: bold;
            -webkit-user-select: text; user-select: text;
        }

        /* --- Laser & Pointer --- */
        #laser-pointer {
            position: fixed; width: 18px; height: 18px; background: #ff0000; border-radius: 50%;
            pointer-events: none; z-index: 9999; display: none;
            box-shadow: 0 0 10px #ff0000, 0 0 25px #ff0000, 0 0 50px #ff0000;
        }
        #drawing-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9998; }

        /* --- ToolBox --- */
        .toolbox-wrapper { position: fixed; bottom: 30px; right: 30px; z-index: 7000; display: flex; flex-direction: column-reverse; gap: 15px; }
        .tool-btn { 
            width: 65px; height: 65px; border-radius: 50%; background: var(--primary-gold); border: none; 
            cursor: pointer; font-size: 1.8rem; display: none; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .toolbox-wrapper.open .tool-btn { display: flex; }
        .tool-btn.active { background: #ff4757; transform: scale(1.1); }

        #activity-stage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background:#000; z-index: 1000; display: none; }
        
        @media (max-width: 768px) { #note-text { font-size: 2.5rem; } }
    </style>
</head>
<body oncontextmenu="return false;"> 
    <header class="top-banner">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        <div class="session-info"><h1 id="display-title">VETO SYSTEM</h1></div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage">
        <button onclick="closeStage()" style="position:absolute; top:20px; left:20px; z-index:2001; background:var(--primary-gold); border:none; padding:12px 25px; cursor:pointer; font-weight:900; border-radius:8px; color:#000;">EXIT SESSION</button>
        <div id="stage-content" style="width:100%; height:100%;"></div>
    </div>

    <div id="laser-pointer"></div>
    <canvas id="drawing-canvas"></canvas>

    <div id="note-pad">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:10px; margin-bottom: 20px;">
            <span style="color:var(--primary-gold); font-weight:bold; letter-spacing:2px;">QUICK BOARD MODE</span>
            <button onclick="toggleNotePad()" style="background:#ff4757; border:none; color:white; padding:10px 30px; border-radius:50px; cursor:pointer; font-weight:bold;">DONE</button>
        </div>
        <textarea id="note-text" placeholder="Type explanation here..."></textarea>
    </div>

    <div class="toolbox-wrapper" id="toolBox">
        <button class="tool-btn" style="display:flex; background:#222; color:var(--primary-gold); border:2px solid var(--primary-gold);" onclick="toggleToolBox()">🛠️</button>
        <button class="tool-btn" id="laserBtn" onclick="toggleLaser()">🔦</button>
        <button class="tool-btn" onclick="toggleNotePad()">📝</button>
        <button class="tool-btn" onclick="location.reload()">🔄</button>
    </div>

    <script src="data/levels.js"></script>
    <script>
        // --- Veto Architect Engine: Core Logic ---
        let laserActive = false;
        let isDrawing = false;
        const laser = document.getElementById('laser-pointer');
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resizeCanvas; resizeCanvas();

        function toggleLaser() {
            laserActive = !laserActive;
            const laserBtn = document.getElementById('laserBtn');
            const stage = document.getElementById('stage-content');
            laserBtn.classList.toggle('active');
            laser.style.display = laserActive ? 'block' : 'none';
            document.body.style.cursor = laserActive ? 'none' : 'default';
            stage.style.pointerEvents = laserActive ? 'none' : 'auto';
        }

        window.addEventListener('mousemove', (e) => {
            if (!laserActive) return;
            laser.style.left = e.clientX - 9 + 'px';
            laser.style.top = e.clientY - 9 + 'px';
            if (isDrawing) { ctx.lineTo(e.clientX, e.clientY); ctx.stroke(); }
        });

        window.addEventListener('mousedown', (e) => {
            if (!laserActive) return;
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.clientX, e.clientY);
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff0000';
        });

        window.addEventListener('mouseup', () => {
            isDrawing = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        function toggleToolBox() { document.getElementById('toolBox').classList.toggle('open'); }
        function toggleNotePad() {
            const pad = document.getElementById('note-pad');
            const isOpen = pad.style.display === 'flex';
            pad.style.display = isOpen ? 'none' : 'flex';
            if (!isOpen) setTimeout(() => document.getElementById('note-text').focus(), 100);
        }

        function closeStage() {
            document.getElementById('activity-stage').style.display = 'none';
            document.getElementById('stage-content').innerHTML = "";
            if(laserActive) toggleLaser(); 
        }

        // --- Veto Architect Engine: Data Linking ---
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id'); 

        if (sessionId && typeof sessionData !== 'undefined') {
            const data = sessionData[sessionId] || [];
            const container = document.getElementById('content-container');
            const [lvl, sess] = sessionId.split('-');
            document.getElementById('display-title').innerText = `LEVEL ${lvl} | SESSION ${sess}`;

            const contentMap = {
                "Grammar": { icon: "⚙️", code: "Gra" },
                "Vocab": { icon: "🔖", code: "Voc" },
                "Listening": { icon: "🎧", code: "Lis" },
                "Reading": { icon: "📖", code: "Rea" },
                "DMT": { icon: "⏱️", code: "DMT" },
                "One Shot": { icon: "🎯", code: "One" },
                "Tongue Twister": { icon: "👅", code: "Ton" },
                "Squeezer": { icon: "🍋", code: "Squ" },
                "Project": { icon: "🏗️", code: "Pro" },
                "Wish": { icon: "✨", code: "Wsh" },
                "Job": { icon: "💼", code: "Job" }
            };

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';
                let matchedKey = Object.keys(contentMap).find(key => item.includes(key)) || "Default";
                let config = contentMap[matchedKey] || { icon: "📚", code: "Gen" };

                card.innerHTML = `
                    <div style="font-size: 3.5rem; margin-bottom: 15px;">${config.icon}</div>
                    <h2 style="color:var(--primary-gold); font-size:1.8rem; font-weight:bold;">${item}</h2>
                `;

                card.onclick = () => openActivity(item, config.code, lvl, sess);
                container.appendChild(card);
            });
        }

        function openActivity(activityName, prefix, lvl, sess) {
            const filePath = `data/L-${lvl}-S-${sess}-${prefix}.js`;
            const stage = document.getElementById('activity-stage');
            const content = document.getElementById('stage-content');
            
            stage.style.display = 'block';
            content.innerHTML = `<div style="display:flex; justify-content:center; align-items:center; height:100%; font-size:2rem; color:var(--primary-gold);">Loading Content...</div>`; 

            const script = document.createElement('script');
            script.src = filePath;
            script.onerror = () => {
                content.innerHTML = `<div style="text-align:center; padding-top:20vh;">
                    <h1 style="color:#ff4757; font-size:4rem;">File Missing!</h1>
                    <p style="font-size:1.5rem; color:#aaa;">Target: ${filePath}</p>
                </div>`;
            };
            document.head.appendChild(script);
        }
    </script>
</body>
</html>
