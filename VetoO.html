<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="vetoo.css">
</head>
<body>

    <header class="student-banner" id="studentBanner">
        <div class="banner-content">
            <div class="avatar-wrapper">
                <img id="headerAvatar" src="https://via.placeholder.com/100" alt="Agent">
                <button class="info-badge-btn" onclick="showFlashScreen()"><i class="fas fa-id-card"></i></button>
            </div>
            <div class="student-info">
                <h1 id="headerName">Loading Agent...</h1>
                <div class="stats-row">
                    <span><i class="fas fa-fingerprint"></i> ID: <b id="headerCode">--</b></span>
                    <span><i class="fas fa-coins"></i> TOKENS: <b id="headerTokens">0</b></span>
                    <span><i class="fas fa-trophy"></i> RANK: <b id="headerRank">#0</b></span>
                </div>
            </div>
            
            <div class="header-controls">
                <div class="notification-wrapper">
                    <button class="noti-btn" id="notiBtn" onclick="toggleMailbox()">
                        <i class="fas fa-bell"></i>
                        <span id="notiBadge" class="badge"></span>
                    </button>
                </div>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div id="loginOverlay">
            <div class="login-box">
                <div class="logo">VETO SYSTEM</div>
                <input type="email" id="loginEmail" placeholder="EMAIL ADDRESS">
                <input type="text" id="loginCode" placeholder="ACCESS CODE">
                <button onclick="attemptLogin()" id="loginBtn">ACCESS DASHBOARD</button>
                <button onclick="window.location.href='NS.html'" class="new-student-btn">NEW AGENT (تسجيل جديد)</button>
            </div>
        </div>

        <div id="navigationView" class="view-container">
            <div class="section-header">
                <h2><i class="fas fa-rocket"></i> MISSION CONTROL</h2>
                <p>Select your training level to begin</p>
            </div>
            <div class="level-grid" id="levelMenu"></div>
        </div>

        <div id="sessionView" class="view-container" style="display: none;">
            <div class="top-nav">
                <button class="back-btn" onclick="showLevels()"><i class="fas fa-chevron-left"></i> BACK</button>
                <div id="path" class="breadcrumb">LEVEL X</div>
            </div>
            <div class="session-tabs" id="sessionList"></div>
            <div class="activity-grid" id="activityGrid"></div>
        </div>
    </main>

    <div id="mailbox" class="mailbox-popup" style="display:none;">
        <h3><i class="fas fa-envelope-open-text"></i> MESSAGES</h3>
        <div id="msgList"></div>
    </div>

    <div id="flashScreen" class="overlay" style="display:none;">
        <div class="flash-card">
            <button class="close-flash" onclick="closeFlash()">&times;</button>
            <div id="flashContent"></div>
        </div>
    </div>

    <div id="activityOverlay">
        <div id="activityWindow">
            <iframe id="activityFrame" src="" frameborder="0" loading="lazy" allow="autoplay; encrypted-media"></iframe>
        </div>
        <button class="close-mission-btn" onclick="closeActivity()">
            <i class="fas fa-times"></i> ABORT MISSION (إغلاق)
        </button>
    </div>

    <script src="vetoo.js"></script>
    <script>
        function toggleMailbox() {
            const lb = document.getElementById('mailbox');
            lb.style.display = lb.style.display === 'none' ? 'block' : 'none';
        }

        function showFlashScreen() {
            document.getElementById('flashScreen').style.display = 'block';
        }

        function closeFlash() {
            document.getElementById('flashScreen').style.display = 'none';
        }
    </script>
</body>
</html>
