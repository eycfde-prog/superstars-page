<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Ezz .Y. Ali - Learning System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sky: #87CEEB;
            --cloud-white: rgba(255, 255, 255, 0.9);
            --primary-tech-blue: #3498db;
            --accent-sun: rgba(255, 223, 0, 0.25);
            --text-dark: #2c3e50;
            --text-light: #ffffff;
            --font-huge: 2.5rem;
            --font-medium: 1.8rem;
            --primary-red: #e74c3c;
        }

        body {
            margin: 0; 
            padding: 0;
            background-color: #0f172a; 
            font-family: 'Poppins', 'Cairo', sans-serif;
            color: var(--text-dark);
            overflow-x: hidden;
            perspective: 1000px;
            position: relative;
        }

        /* الخلفية المتحركة (السحب) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 200%; /* جعل الخلفية أطول من الشاشة لضمان سلاسة التكرار */
            background: url('https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/cc1a19c948140fe870b0666920ba20b5668d2336/vetoofb.webp');
            background-repeat: repeat-y;
            background-size: cover;
            z-index: -1;
            /* الأنيميشن الجديد: من الأسفل للأعلى في 30 ثانية */
            animation: cloudsRise 30s linear infinite;
            opacity: 0.6; /* تقليل الشفافية قليلاً لزيادة تباين العناصر الأمامية */
        }

        @keyframes cloudsRise {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-50%); /* التحرك لنصف مساحة الخلفية المكررة */
            }
        }

        header, .banner {
            width: 100%;
            background: linear-gradient(110deg, rgba(255,255,255,0.1) 40%, var(--accent-sun) 50%, rgba(255,255,255,0.1) 60%);
            background-size: 200% 100%;
            animation: sunGleam 20s infinite;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255,255,255,0.2);
            display: flex; justify-content: space-around; align-items: center;
            position: relative; z-index: 1000;
        }

        header { padding: 15px 0; height: 100px; }

        .activity-header {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
            z-index: 1000;
            height: 100px;
            background: #1e293b;
            border-bottom: 4px solid var(--primary-tech-blue);
            padding: 0 20px;
            font-size: 2rem !important;
        }

        @keyframes sunGleam {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .logo { width: 70px; border-radius: 50%; filter: drop-shadow(0 0 10px rgba(255, 223, 0, 0.3)); }
        
        header::before {
            content: ''; position: absolute; top: 10px; left: 20px;
            width: 60px; height: 60px;
            background: radial-gradient(circle, rgba(255,255,200,0.4) 0%, rgba(255,223,0,0.1) 70%, transparent 100%);
            border-radius: 50%; filter: blur(5px); z-index: -1;
        }

        .profile-img { width: 70px; border-radius: 50%; border: 2px solid white; filter: drop-shadow(-5px 5px 10px rgba(255, 223, 0, 0.2)); }
        .teacher-name { font-size: 22px; font-weight: bold; color: var(--text-dark); }

        .main-btn {
            margin: 20px auto; display: block; background-color: var(--primary-tech-blue);
            color: white; padding: 12px 35px; border-radius: 25px;
            font-weight: bold; cursor: pointer; border: none; transition: 0.3s;
            font-size: 1.1rem; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(135, 206, 235, 0.95); display: none; z-index: 2000;
            overflow-y: auto; backdrop-filter: blur(5px);
        }

        .activity-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px; padding: 50px;
        }

        .activity-card {
            background: rgba(255,255,255,0.9); border: 2px solid rgba(52, 152, 219, 0.3);
            min-height: 150px; font-size: var(--font-huge); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s ease; color: var(--text-dark); cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .activity-card:hover {
            background: var(--primary-tech-blue); color: white;
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(52, 152, 219, 0.4); border-color: white;
        }

        .levels-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 80px; width: 90%; margin: 60px auto; justify-items: center;
            transform-style: preserve-3d;
        }

        .level-wrapper { position: relative; width: 150px; height: 150px; transform-style: preserve-3d; transition: transform 0.5s; }
        .level-btn {
            width: 100%; height: 100%; background: radial-gradient(circle at 30% 30%, #5dade2, var(--primary-tech-blue));
            color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem; border: 4px solid rgba(255,255,255,0.8);
            cursor: pointer; z-index: 5; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), inset 0 0 20px rgba(0,0,0,0.3);
            animation: orbitSpace 20s linear infinite;
        }

        .sub-btn {
            position: absolute; width: 45px; height: 45px; background: radial-gradient(circle at 30% 30%, #ffffff, #bdc3c7);
            color: var(--primary-tech-blue); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            opacity: 0; transform: scale(0) translateZ(20px); transition: 0.4s; z-index: 4; cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2); border: 2px solid var(--primary-tech-blue);
        }

        @keyframes orbitSpace { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
        @keyframes subOrbit { from { transform: rotate(0deg) translateX(65px) rotate(0deg); } to { transform: rotate(360deg) translateX(65px) rotate(-360deg); } }

        .level-wrapper.active .sub-btn { opacity: 1; transform: scale(1) translateZ(30px); }
        .level-wrapper.active .sub-btn:nth-child(2) { animation: subOrbit 4s linear infinite; }
        .level-wrapper.active .sub-btn:nth-child(3) { animation: subOrbit 4s linear infinite reverse; animation-delay: -1s; }
        .level-wrapper.active .sub-btn:nth-child(4) { animation: subOrbit 4s linear infinite; animation-delay: -2s; }
        .level-wrapper.active .sub-btn:nth-child(5) { animation: subOrbit 4s linear infinite reverse; animation-delay: -3s; }

        #activityOverlay { background: #0f172a; }

        #activityFinalContent {
            height: calc(100vh - 160px) !important;
            margin: 10px 20px !important;
            border-radius: 15px;
            background: #ffffff;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 0 !important;
        }

        #activity-view-footer {
            height: 60px;
            font-size: 1.5rem;
            background: #1e293b;
            color: #94a3b8;
            border-top: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .tokens-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; padding: 20px; }
        
        .nav-link-btn {
            font-size: 1.8rem !important;
            color: #3498db !important;
            font-weight: 800;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 15px;
            transition: 0.3s;
        }

        .nav-separator { color: rgba(255,255,255,0.5); font-size: var(--font-medium); margin: 0 5px; }
        
        .nav-active-act {
            font-size: 2.2rem !important;
            color: #f1c40f !important;
            text-decoration: underline;
            font-weight: bold;
        }

        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" class="logo">
        <div class="teacher-name">Mr. Ezz .Y. Ali</div>

    </header>

    <button class="main-btn" id="portalActionBtn" onclick="toggleTokens()">Tokens Portal</button>

    <div class="levels-container" id="levelsGrid"></div>

    <div id="sessionOverlay" class="overlay">
        <div id="sessionContent"></div>
    </div>

        <div id="activityFinalContent"></div>

          "9-2": ["Listening 33 Review", "Grammar 19 Review", "Reading 30 Review", "Reading 31 Review", "Tongue Twister 24 Review", "Tongue Twister 27 Review", "Vocab 17 Review", "One Shot 15 Test", "Squeezer 4 test"],

          "9-4": ["Listening 35 Review", "Reading 32 Review", "Reading 33 Review", "Tongue Twister 28 Review", "Tongue Twister 29 Review", "Grammar 20 Study", "One Shot 16 Test", "Vocab 18 Test", "DMT 4 Rev"],

          "10-4": ["Listening 39 Review", "Reading 36 Review", "Reading 37 Review", "Tongue Twister 32 Review", "Tongue Twister 33 Review", "One Shot 18 Test", "Vocab 20 Test", "DMT 4 Review", "Project 2 Rev"],

          "12-1": ["GP Review"],
          "12-2": ["GP Review"],
          "12-3": ["GP Review"],
          "12-4": ["GP Viewing"]
        };

        function goToLevels() { closeAll(); }
        function goToSession(lv, ss) { document.getElementById('activityOverlay').style.display = 'none'; openSession(lv, ss); }

        function openFinalActivity(lv, ss, actName) {
            const detailsHtml = `
                <button class="nav-link-btn" onclick="goToLevels()">L${lv}</button>
                <span class="nav-separator">»</span>
                <button class="nav-link-btn" onclick="goToSession(${lv}, ${ss})">S${ss}</button>
                <span class="nav-separator">»</span>
                <span class="nav-active-act">${actName}</span>
            `;
            document.getElementById('activityDetails').innerHTML = detailsHtml;

            const container = document.getElementById('activityFinalContent');
            container.innerHTML = '<div class="loader"></div><h2 style="font-size:3rem; color:#3498db;">Loading Session...</h2>';
            
            document.getElementById('activityOverlay').style.display = 'block';
            document.body.style.overflow = 'hidden';

            const oldScript = document.getElementById('activity-script');
            if (oldScript) oldScript.remove();

            let cleanName = actName.replace(/\s+/g, ''); 
            let shortName = cleanName.substring(0, 3).charAt(0).toUpperCase() + cleanName.substring(0, 3).slice(1);
            const fileName = `L-${lv}-S-${ss}-${shortName}.js`;
            const filePath = `data/${fileName}`;

            const script = document.createElement('script');
            script.id = 'activity-script';
            script.src = filePath;
            
            script.onerror = () => {
                container.innerHTML = `
                    <div style="text-align:center; color:#e74c3c;">
                        <h1 style="font-size:5rem;">404</h1>
                        <p style="font-size:2rem;">Missing File: ${fileName}</p>
                    </div>
                `;
            };
            document.body.appendChild(script);
        }

        const grid = document.getElementById('levelsGrid');
        for (let i = 1; i <= 12; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'level-wrapper';
            wrap.innerHTML = `<div class="level-btn">Level ${i}</div>`;
            for (let j = 1; j <= 4; j++) {
                const s = document.createElement('div');
                s.className = 'sub-btn'; s.innerText = j;
                s.onclick = (e) => { e.stopPropagation(); openSession(i, j); };
                wrap.appendChild(s);
            }
            wrap.onclick = (e) => {
                e.stopPropagation();
                document.querySelectorAll('.level-wrapper').forEach(w => w!==wrap && w.classList.remove('active'));
                wrap.classList.toggle('active');
            };
            grid.appendChild(wrap);
        }

        function openSession(lv, ss) {
            const activities = sessionData[`${lv}-${ss}`] || ["Coming Soon"];
            let html = `<div class="activity-grid">`;
            activities.forEach(act => {
                html += `<div class="activity-card" onclick="openFinalActivity(${lv}, ${ss}, '${act}')">${act}</div>`;
            });
            html += `</div>`;
            document.getElementById('sessionContent').innerHTML = html;
            document.getElementById('sessionOverlay').style.display = 'block';
            updateBtn("Levels Portal", () => closeAll());
        }

        function toggleTokens() {
            const categories = ["Attendence", "ICA", "Reading", "Tongue Twister", "One Shot", "Games", "Squeezer", "DMT", "Wish", "Project", "Graduation Project", "Extra Bonus"];
            let html = `<div class="tokens-grid">`;
            categories.forEach(c => {
                html += `<div style="background:#1e1e1e; border:1px solid #3498db; height:120px; border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative;">
                            <input type="text" style="width:100%; background:transparent; border:none; color:white; text-align:center; font-size:1.8rem; outline:none;" placeholder=" ">
                            <label style="position:absolute; color:#555; pointer-events:none; font-size: 1.2rem;">${c}</label>
                         </div>`;
            });
            html += `</div>`;
            document.getElementById('sessionContent').innerHTML = html;
            document.getElementById('sessionOverlay').style.display = 'block';
            updateBtn("Levels Portal", () => closeAll());
        }

        function updateBtn(text, fn) {
            const btn = document.getElementById('portalActionBtn');
            btn.innerText = text;
            btn.onclick = fn;
        }

        function closeAll() {
            document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
            document.body.style.overflow = 'auto';
            updateBtn("Tokens Portal", () => toggleTokens());
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                closeAll();
            }
            
            if (e.key === "Enter") {
                const currentActivity = document.getElementById('activityOverlay');
                if (currentActivity.style.display === 'block') {
                    if (typeof window.nextStep === "function") {
                        window.nextStep();
                    }
                }
            }
        });
    </script>
</body>
</html>
