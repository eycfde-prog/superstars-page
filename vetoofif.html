<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Interactive Board</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --banner-height: 140px;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; /* منع الزووم التلقائي لضمان دقة الليزر */
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--font-main);
            min-height: 100vh;
            overflow: hidden;
        }

        /* تحسين عرض الموبايل ليكون عريضاً */
        @media screen and (max-width: 900px) and (orientation: portrait) {
            body::before {
                content: "Please Rotate Your Device 🔄";
                position: fixed; inset: 0; background: #000; z-index: 99999;
                display: flex; align-items: center; justify-content: center; font-size: 2rem;
            }
        }

        /* Banner */
        .top-banner {
            height: var(--banner-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 4px solid var(--primary-gold);
        }

        .back-btn {
            background: transparent;
            border: 2px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 10px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.3s;
            text-decoration: none;
        }
        .back-btn:hover { background: var(--primary-gold); color: black; }

        .logo-img { height: 70px; }
        .mr-ezz-img { height: 100px; border-radius: 12px; border: 2px solid var(--primary-gold); }
        
        .session-info h1 { 
            font-size: 2.5rem; 
            color: var(--primary-gold); 
            text-transform: uppercase; 
            letter-spacing: 3px;
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - var(--banner-height));
            overflow-y: auto;
        }

        .content-card {
            background: var(--card-bg);
            border: 2px solid rgba(197, 160, 89, 0.2);
            padding: 50px 20px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.4s ease;
        }
        .content-card h2 { font-size: 2.2rem; color: #fff; }
        .content-card:hover { border-color: var(--primary-gold); transform: translateY(-10px); }

        /* Stage Area (The Board) */
        #activity-stage { 
            position: fixed; inset: 0; background:#000; z-index: 8000; display: none; 
        }

        /* مناطق الضغط للتنقل (Next/Prev) */
        .nav-zone {
            position: absolute; top: 0; bottom: 0; width: 15%; z-index: 8100;
            /* background: rgba(255,255,255,0.05);  لفحص المنطقة برمجياً */
        }
        .nav-next { right: 0; }
        .nav-prev { left: 0; }

        /* Laser Pointer */
        #laser-pointer {
            position: fixed; width: 30px; height: 30px; background: radial-gradient(circle, #ff0000 30%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 10000; display: none;
            box-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
        }
        #drawing-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }

        .exit-btn {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 8500; background: #ff4757; color: white; border: none; 
            padding: 10px 30px; font-size: 1.2rem; border-radius: 30px; cursor: pointer;
        }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <header class="top-banner">
        <a href="vetoof.html" class="back-btn">⬅ BACK</a>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        <div class="session-info"><h1 id="display-title">SESSION</h1></div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage">
        <button class="exit-btn" onclick="closeStage()">CLOSE BOARD</button>
        
        <div class="nav-zone nav-prev" onclick="navSlide(-1)"></div>
        <div class="nav-zone nav-next" onclick="navSlide(1)"></div>

        <div id="stage-content" style="width:100%; height:100%;">
            </div>
    </div>

    <div id="laser-pointer"></div>
    <canvas id="drawing-canvas"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentSessionId = urlParams.get('session') || "1-1";

        let laserActive = false;
        const laser = document.getElementById('laser-pointer');
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resizeCanvas; resizeCanvas();

        // 1. عرض كروت المحتوى
        function initSession() {
            // محاكاة لجلب البيانات من ملف الـ JS
            const sessionTitle = `LEVEL ${currentSessionId.replace('-', ' | SESSION ')}`;
            document.getElementById('display-title').innerText = sessionTitle;
            
            // مثال لبيانات تجريبية (يجب أن تكون في ملف levels.js)
            const mockData = ["Vocabulary", "Grammar Lesson", "Quiz 1", "Final Review"];
            const container = document.getElementById('content-container');
            
            mockData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.onclick = () => openActivity(item);
                card.innerHTML = `<h2>${item}</h2>`;
                container.appendChild(card);
            });
        }

        // 2. فتح السبورة التفاعلية
        function openActivity(activityName) {
            document.getElementById('activity-stage').style.display = 'block';
            laserActive = true; // تفعيل الليزر تلقائياً عند فتح البورد
            laser.style.display = 'block';
        }

        function closeStage() {
            document.getElementById('activity-stage').style.display = 'none';
            laserActive = false;
            laser.style.display = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 3. منطق الليزر (التاتش والماوس)
        window.addEventListener('pointermove', (e) => {
            if (!laserActive) return;
            laser.style.left = e.clientX - 15 + 'px';
            laser.style.top = e.clientY - 15 + 'px';

            if (e.buttons === 1) { // عند الضغط المطول (تاتش أو ماوس)
                draw(e.clientX, e.clientY);
            }
        });

        window.addEventListener('pointerup', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // مسح الدائرة فور ترك الشاشة
        });

        function draw(x, y) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(x, y, 40, 0, Math.PI * 2);
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 5;
            ctx.stroke();
        }

        // 4. منطق التنقل (Next / Prev)
        function navSlide(direction) {
            if(direction === 1) {
                console.log("Moving to Next Slide...");
                // هنا تضع كود الانتقال للسلايد التالية
            } else {
                console.log("Moving to Previous Slide...");
            }
        }

        initSession();
    </script>
</body>
</html>
