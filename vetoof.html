<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYC Veto Program - WOLF Edition</title>
    <link rel="stylesheet" href="vetoof.css">
    <style>
        /* تأكيد تنسيقات الدوائر المنبثقة لضمان ظهورها */
        .level-wrapper { position: relative; width: 120px; height: 120px; }
        .main-circle { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: #e74c3c; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; position: relative; z-index: 2;
            font-weight: bold; box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .sub-circle {
            position: absolute; width: 50px; height: 50px; 
            background: #f1c40f; color: #000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; z-index: 1;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translate(0, 0) scale(0);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        /* أماكن خروج الدوائر الأربعة عند تفعيل الـ active */
        .level-wrapper.active .s1 { opacity: 1; transform: translate(-70px, -70px) scale(1); }
        .level-wrapper.active .s2 { opacity: 1; transform: translate(70px, -70px) scale(1); }
        .level-wrapper.active .s3 { opacity: 1; transform: translate(-70px, 70px) scale(1); }
        .level-wrapper.active .s4 { opacity: 1; transform: translate(70px, 70px) scale(1); }
        
        .level-wrapper.active .main-circle { transform: scale(1.1); box-shadow: 0 0 30px #e74c3c; }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeFlash()"></div>

    <div id="main-ui">
        <header class="banner">
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="Logo">
            <h1>Mr. Ezz .Y. Ali</h1>
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz">
        </header>

        <div class="controls">
            <button class="switch-btn" onclick="toggleView()">Tokens Portal</button>
        </div>

        <main class="grid-container" id="levels-grid"></main>
        
        <div id="vortex-container" style="display:none;">
            <div class="vortex"></div>
            <div class="vortex-content">
                <h2>VORTEX ACCESS</h2>
                <input type="text" id="offlineCode" placeholder="Enter Agent Code..." onkeypress="handleCode(event)">
                <p style="margin-top:15px; font-size:0.8em; color:rgba(255,255,255,0.5)">Press Enter to Scan</p>
            </div>
        </div>
    </div>

    <div id="flash-screen">
        <div class="card-top" id="studentHeader"></div>
        <div class="card-bottom">
            <div class="grade-box"><input type="number" placeholder="Attendence" onchange="submitGrade(this, 'Attendence')"></div>
            <div class="grade-box"><input type="number" placeholder="ICA" onchange="submitGrade(this, 'ICA')"></div>
            <div class="grade-box"><input type="number" placeholder="Reading" onchange="submitGrade(this, 'Reading')"></div>
            <div class="grade-box"><input type="number" placeholder="Tongue Twister" onchange="submitGrade(this, 'Tongue Twister')"></div>
            <div class="grade-box"><input type="number" placeholder="One Shot" onchange="submitGrade(this, 'One Shot')"></div>
            <div class="grade-box"><input type="number" placeholder="Games" onchange="submitGrade(this, 'Games')"></div>
            <div class="grade-box"><input type="number" placeholder="Squeezer" onchange="submitGrade(this, 'Squeezer')"></div>
            <div class="grade-box"><input type="number" placeholder="DMT" onchange="submitGrade(this, 'DMT')"></div>
            <div class="grade-box"><input type="number" placeholder="Wish" onchange="submitGrade(this, 'Wish')"></div>
            <div class="grade-box"><input type="number" placeholder="Project" onchange="submitGrade(this, 'Project')"></div>
            <div class="grade-box"><input type="number" placeholder="Graduation Project" onchange="submitGrade(this, 'Graduation Project')"></div>
            <div class="grade-box bonus-box"><input type="number" placeholder="★ Special Bonus" onchange="submitGrade(this, 'Bonus')"></div>
        </div>
    </div>

    <div id="content-frame-container">
        <button class="close-frame" onclick="closeFrame()">Back to Map</button>
        <iframe id="content-iframe"></iframe>
    </div>

    <script>
        // --- الأساسيات (Logic) ---
        const API_URL = "https://script.google.com/macros/s/AKfycbw9ua5PF26VSy4gzNK0pSNMRuZ5ejXBQaAR0-m-rUNirMW8F7Knk6wYcBz80LCy5PhqvQ/exec";
        let currentStudent = null;

        function toggleView() {
            const grid = document.getElementById('levels-grid');
            const vortex = document.getElementById('vortex-container');
            const btn = document.querySelector('.switch-btn');
            if (grid.style.display !== 'none') {
                grid.style.display = 'none';
                vortex.style.display = 'flex';
                btn.innerText = "Back to Levels";
            } else {
                grid.style.display = 'grid';
                vortex.style.display = 'none';
                btn.innerText = "Tokens Portal";
            }
        }

        // --- إنشاء المستويات والدواير المنبثقة ---
        const grid = document.getElementById('levels-grid');
        for (let i = 1; i <= 12; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'level-wrapper';
            wrapper.innerHTML = `
                <div class="main-circle" onclick="toggleSubCircles(this)">Level ${i}</div>
                <div class="sub-circle s1" onclick="openLecture(${i}, 1)">1</div>
                <div class="sub-circle s2" onclick="openLecture(${i}, 2)">2</div>
                <div class="sub-circle s3" onclick="openLecture(${i}, 3)">3</div>
                <div class="sub-circle s4" onclick="openLecture(${i}, 4)">4</div>
            `;
            grid.appendChild(wrapper);
        }

        function toggleSubCircles(el) {
            const parent = el.parentElement;
            const wasActive = parent.classList.contains('active');
            // إغلاق أي دوائر تانية مفتوحة
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
            // فتح الحالية لو مكنتش مفتوحة
            if (!wasActive) parent.classList.add('active');
        }

        // --- وظيفة الـ iFrame (المسرح العملاق) ---
        function openLecture(level, session) {
            const frameContainer = document.getElementById('content-frame-container');
            const iframe = document.getElementById('content-iframe');
            
            // الكود الذي سيتم حقنه داخل الـ iframe مع التنسيقات العملاقة
            const baseHTML = `
                <html>
                <head>
                    <style>
                        :root { --accent: #e74c3c; --bg: #1a1a1a; }
                        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
                        
                        /* Animations */
                        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
                        @keyframes fadeInUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
                        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
                        .animate-bounceIn { animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
                        .animate-fadeInUp { animation: fadeInUp 0.6s ease-out; }

                        .veto-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #000; border-bottom: 2px solid var(--accent); height: 60px; }
                        .veto-header img { height: 45px; border-radius: 50%; }
                        .info h2 { margin: 0; font-size: 1.1em; color: var(--accent); }

                        #content-area { flex-grow: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }

                        /* Giant Styles */
                        .slide-container { width: 100%; text-align: center; }
                        .slide-title-pop { font-size: 3.5vw; color: #f1c40f; margin-bottom: 20px; }
                        .main-term-card { 
                            background: #3498db; width: 70vw; height: 45vh; margin: auto;
                            display: flex; align-items: center; justify-content: center;
                            border-radius: 40px; border: 12px solid white; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
                        }
                        .term-text { font-size: 18vw; font-weight: 900; color: white; }
                        .term-desc-pop { font-size: 5vw; margin-top: 25px; color: #ecf0f1; }

                        .question-text { font-size: 5vw; color: white; margin-bottom: 30px; }
                        .options-grid-giant { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 85vw; margin: auto; }
                        .option-btn-giant { padding: 35px; font-size: 4.5vw; font-weight: bold; background: #2c3e50; border: 5px solid var(--accent); color: white; border-radius: 25px; cursor: pointer; }
                        
                        .giant-table { width: 85vw; border-collapse: separate; border-spacing: 0 15px; }
                        .giant-table td { padding: 30px; font-size: 5.5vw; font-weight: bold; text-align: center; border-radius: 20px; }
                        .col-subject { background: #3498db; } .col-object { background: #e67e22; }

                        .nav-controls-overlay { position: fixed; bottom: 50px; width: 100%; display: flex; justify-content: center; gap: 60px; pointer-events: none; }
                        .nav-btn-round { pointer-events: auto; width: 90px; height: 90px; border-radius: 50%; background: #e74c3c; border: none; color: white; font-size: 2.5em; cursor: pointer; }
                        .slide-counter-bubble { background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 40px; font-size: 1.8em; align-self: center; }

                        .menu-btn { width: 300px; padding: 25px; margin: 15px; background: var(--accent); border: none; color: white; font-size: 1.5em; border-radius: 15px; cursor: pointer; }
                    </style>
                </head>
                <body>
                    <header class="veto-header">
                        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png">
                        <div class="info"><h2>EYC Veto - L${level} S${session}</h2></div>
                        <div style="font-weight:bold">Mr Ezz Y.Ali</div>
                    </header>
                    <div id="content-area">
                        <div id="inner-view">
                            <h1>MISSION SELECTION</h1>
                            <button class="menu-btn" onclick="loadScript('Listening')">🎧 Listening</button>
                            <button class="menu-btn" onclick="loadScript('Grammar')">📝 Grammar</button>
                        </div>
                    </div>
                    <script>
                        let lessonData = null;
                        function loadScript(type) {
                            const scriptPath = \`data/L\${${level}}S\${${session}}_\${type}.js\`;
                            const script = document.createElement('script');
                            script.src = scriptPath;
                            script.onload = () => {
                                lessonData = (type === 'Grammar') ? (window.grammarData || grammarData) : (window.listeningData || listeningData);
                                if (lessonData) renderSlide(0);
                            };
                            document.body.appendChild(script);
                        }

                        function renderSlide(index) {
                            const slide = lessonData.slides[index];
                            let html = \`<div class="slide-container" style="animation: zoomIn 0.5s;">\`;

                            if (slide.type === "explanation") {
                                html += \`<h1 class="slide-title-pop">\${slide.title}</h1>
                                         <div class="main-term-card animate-bounceIn"><span class="term-text">\${slide.term}</span></div>
                                         <p class="term-desc-pop">\${slide.desc || ''}</p>\`;
                            } else if (slide.type === "practice") {
                                html += \`<h1 class="slide-title-pop">\${slide.title}</h1>\`;
                                slide.questions.forEach(q => {
                                    html += \`<p class="question-text">\${q.q}</p>
                                             <div class="options-grid-giant">\${q.options.map(o => \`<button class="option-btn-giant" onclick="checkAnswer(this,'\${o}','\${q.correct}')">\${o}</button>\`).join('')}</div>\`;
                                });
                            } else if (slide.type === "comparison") {
                                html += \`<h1 class="slide-title-pop">\${slide.title}</h1>
                                         <table class="giant-table">\${slide.data.map(row => \`<tr><td class="col-subject">\${row[0]}</td><td class="col-object">\${row[1]}</td></tr>\`).join('')}</table>\`;
                            }

                            html += \`<div class="nav-controls-overlay">
                                        <button class="nav-btn-round" onclick="renderSlide(\${index-1})" \${index===0?'disabled style="opacity:0.2"':''}>❮</button>
                                        <span class="slide-counter-bubble">\${index+1} / \${lessonData.slides.length}</span>
                                        <button class="nav-btn-round" onclick="renderSlide(\${index+1})" \${index===lessonData.slides.length-1?'disabled style="opacity:0.2"':''}>❯</button>
                                     </div></div>\`;
                            document.getElementById('inner-view').innerHTML = html;
                        }

                        function checkAnswer(btn, sel, cor) {
                            if(sel === cor) { btn.style.background="#27ae60"; alert("Excellent! 🌟"); }
                            else { btn.style.background="#c0392b"; alert("Try Again! ❌"); }
                        }
                    <\/script>
                </body>
                </html>
            `;
            iframe.srcdoc = baseHTML;
            frameContainer.style.display = 'block';
        }

        // باقي الدوال (handleCode, closeFrame, closeFlash, submitGrade) تظل كما هي في كودك الأصلي...
        function closeFrame() { document.getElementById('content-frame-container').style.display = 'none'; }
        function closeFlash() { document.getElementById('overlay').style.display = 'none'; document.getElementById('flash-screen').style.display = 'none'; }
        
        // ... (بقيت دوال النظام) ...
    </script>
</body>
</html>
