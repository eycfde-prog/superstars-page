<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Ezz .Y. Ali - Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-red: #e74c3c;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Cairo', sans-serif;
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Section */
        header {
            width: 100%;
            background: linear-gradient(to bottom, #1a1a1a, #000000);
            padding: 20px 0;
            border-bottom: 2px solid var(--primary-red);
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
        }

        .logo { width: 80px; border-radius: 50%; }
        .profile-img { width: 80px; border-radius: 50%; border: 2px solid var(--white); }
        
        .teacher-name {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Tokens Button */
        .tokens-portal {
            margin: 20px 0;
            background-color: var(--primary-red);
            color: white;
            padding: 10px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .tokens-portal:hover {
            background-color: transparent;
            border-color: var(--primary-red);
            box-shadow: 0 0 15px var(--primary-red);
        }

        /* Levels Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 30px;
            padding: 40px;
            max-width: 1000px;
        }

        .level-btn {
            width: 120px;
            height: 120px;
            background-color: var(--primary-red);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s;
            border: 4px solid var(--white);
            text-decoration: none;
            color: white;
            text-align: center;
        }

        .level-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.6);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
            .teacher-name { font-size: 18px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" alt="EYC Logo" class="logo">
        <div class="teacher-name">Mr. Ezz .Y. Ali</div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/MrEzz.png" alt="Mr Ezz" class="profile-img">
    </header>

    <a href="#" class="tokens-portal">Tokens Portal</a>

    <div class="grid-container" id="levelsGrid">
        </div>

    <script>
        // مصفوفة المستويات لتسهيل التعديل مستقبلاً
        const levelsCount = 10;
        const grid = document.getElementById('levelsGrid');

        for (let i = 1; i <= levelsCount; i++) {
            const btn = document.createElement('a');
            btn.href = `#level-${i}`; // يمكنك وضع لينك المستويات هنا
            btn.className = 'level-btn';
            btn.innerHTML = `Level ${i}`;
            
            // إضافة حدث عند الضغط (للربط مع Backend مستقبلاً)
            btn.onclick = function() {
                console.log(`تم اختيار المستوى: ${i}`);
            };
            
            grid.appendChild(btn);
        }
    </script>

</body>
</html>
