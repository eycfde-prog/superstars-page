<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETO PROGRAM | Main Hub</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.6);
            --bg-dark: #050505;
            --banner-height: 140px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Optimized Banner */
        .top-banner {
            height: var(--banner-height);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(5,5,5,0.8) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--primary-gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-img { height: 80px; width: auto; }
        .mr-ezz-img { height: 110px; width: auto; border-radius: 10px; border: 1px solid var(--primary-gold); }
        
        .top-banner h1 {
            font-size: 2.8rem;
            letter-spacing: 5px;
            text-shadow: 0 0 15px var(--primary-gold);
            text-align: center;
            flex-grow: 1;
        }

        /* Mobile specific banner overrides */
        @media (max-width: 767px) {
            .top-banner {
                padding: 0 15px;
                height: 100px;
            }
            .top-banner h1 {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }
            .logo-img { height: 50px; }
            .mr-ezz-img { height: 70px; }
        }

        /* Levels Grid */
        .levels-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 80px 20px;
            padding: 40px 20px;
            max-width: 1600px;
            margin: 0 auto;
            justify-items: center;
        }

        @media (min-width: 768px) {
            .levels-container { 
                grid-template-columns: repeat(4, 1fr); 
                gap: 120px 40px; 
                padding: 80px 40px;
            }
        }

        .level-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .level-circle {
            width: 130px;
            height: 130px;
            background: #000;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            border: 2px solid #333;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .level-circle:hover { transform: scale(1.1); border-color: var(--primary-gold); }
        .level-circle .num { font-size: 2.5rem; color: var(--primary-gold); font-weight: 900; }
        .level-circle span { font-size: 0.9rem; letter-spacing: 2px; opacity: 0.8; }

        /* Pulse effect for active level */
        .level-wrapper.active .level-circle {
            box-shadow: 0 0 25px var(--gold-glow);
            border-color: var(--primary-gold);
        }

        /* Slow Rotating Border */
        .rotating-border {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--primary-gold), transparent 40%);
            animation: rotate 12s linear infinite;
            z-index: 5;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Sessions Tray */
        .sessions-tray {
            position: absolute;
            width: 240px;
            height: 240px;
            display: none;
            pointer-events: none;
            z-index: 15;
        }

        .active .sessions-tray { display: block; animation: fadeIn 0.5s ease; }

        .session-node {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, #8e6d31 100%);
            color: black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            pointer-events: auto;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
            border: 2px solid white;
        }

        .session-node:hover { background: #fff; transform: scale(1.2); box-shadow: 0 0 30px #fff; }

        /* Precise Positioning */
        .s1 { top: -20px; left: 50%; transform: translateX(-50%); }
        .s2 { bottom: -20px; left: 50%; transform: translateX(-50%); }
        .s3 { left: -20px; top: 50%; transform: translateY(-50%); }
        .s4 { right: -20px; top: 50%; transform: translateY(-50%); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <header class="top-banner">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="Logo" class="logo-img">
        <h1>VETO PROGRAM</h1>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz" class="mr-ezz-img">
    </header>

    <main class="levels-container" id="grid">
    </main>

    <script>
        const grid = document.getElementById('grid');

        // Create 12 Levels
        for (let i = 1; i <= 12; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'level-wrapper';
            wrapper.id = `lvl-${i}`;
            
            wrapper.innerHTML = `
                <div class="rotating-border"></div>
                <div class="level-circle" onclick="toggleLevel(${i})">
                    <span>LEVEL</span>
                    <div class="num">${i}</div>
                </div>
                <div class="sessions-tray">
                    <div class="session-node s1" onclick="navigateToContent('${i}-1')">S1</div>
                    <div class="session-node s2" onclick="navigateToContent('${i}-2')">S2</div>
                    <div class="session-node s3" onclick="navigateToContent('${i}-3')">S3</div>
                    <div class="session-node s4" onclick="navigateToContent('${i}-4')">S4</div>
                </div>
            `;
            grid.appendChild(wrapper);
        }

        function toggleLevel(levelNum) {
            const allWrappers = document.querySelectorAll('.level-wrapper');
            
            allWrappers.forEach((el, index) => {
                const i = index + 1;
                if (i === levelNum) {
                    el.classList.toggle('active');
                } else {
                    el.classList.remove('active');
                }
            });
        }

        function navigateToContent(sessionId) {
            window.location.href = `vetoofif.html?session=${sessionId}`;
        }
    </script>
</body>
</html>
