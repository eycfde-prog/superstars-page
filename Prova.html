<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Pink Keyboard Design</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeef8; /* لون خلفية هادي */
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* حاوية الكيبورد */
        .keyboard {
            position: relative;
            display: grid;
            grid-template-columns: repeat(10, 50px);
            gap: 10px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); /* تأثير زجاجي */
            border-radius: 15px;
            border: 2px solid #ffb6c1;
            z-index: 2;
        }

        /* الزراير */
        .key {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff69b4; /* لون الحروف وردي */
            font-weight: bold;
            box-shadow: 0 4px #ffb6c1;
            cursor: pointer;
            transition: 0.2s;
        }

        .key:active {
            transform: translateY(4px);
            box-shadow: 0 0 #ffb6c1;
        }

        /* خلفية القلوب المتحركة */
        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: #ffb6c1;
            font-size: 20px;
            animation: float 5s linear infinite;
            opacity: 0.7;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="background-animation" id="bg"></div>

    <div class="keyboard">
        <div class="key">Q</div>
        <div class="key">W</div>
        <div class="key">E</div>
        <div class="key">R</div>
        <div class="key">T</div>
        <div class="key">Y</div>
        <div class="key">U</div>
        <div class="key">I</div>
        <div class="key">O</div>
        <div class="key">P</div>
    </div>

    <script>
        // كود بسيط لتوليد القلوب بشكل عشوائي
        const bg = document.getElementById('bg');
        const symbols = ['🌸', '💗', '✨', '🌹'];

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            bg.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHeart, 300);
    </script>

</body>
</html>
