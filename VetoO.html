<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYC VETO - Student Homework Portal</title>
    <style>
        :root {
            --sidebar-bg: #0f172a;
            --accent: #10b981;
            --bg-main: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-main); overflow: hidden; }

        /* Sidebar & Drawers */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; overflow-y: auto; z-index: 10; }
        .logo { padding: 25px; font-size: 1.4rem; font-weight: 800; color: var(--accent); text-align: center; border-bottom: 1px solid #1e293b; }
        
        .level-btn { width: 100%; padding: 18px 25px; background: none; border: none; color: #cbd5e1; text-align: left; cursor: pointer; font-weight: 600; transition: 0.3s; border-bottom: 1px solid #1e293b; }
        .level-btn:hover { background: #1e293b; }
        .level-btn.active { background: #1e293b; color: var(--accent); border-left: 4px solid var(--accent); }

        .drawer { max-height: 0; overflow: hidden; background: #020617; transition: max-height 0.3s ease; }
        .sess-btn { width: 100%; padding: 12px 40px; background: none; border: none; color: #64748b; text-align: left; cursor: pointer; font-size: 0.9rem; }
        .sess-btn:hover { color: white; }
        .sess-btn.active { color: var(--accent); font-weight: bold; }

        /* Main Stage */
        .stage { flex: 1; display: flex; flex-direction: column; padding: 40px; overflow-y: auto; }
        .breadcrumb { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }

        /* Activity Cards */
        .act-card { 
            padding: 25px 15px; border-radius: 12px; color: white; font-weight: 700; border: none; cursor: pointer;
            transition: 0.3s; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .act-card:hover { transform: translateY(-3px); filter: brightness(1.1); }
        
        /* Activity Type Colors */
        .type-test { background: #dc2626; }    
        .type-study { background: #2563eb; }   
        .type-hw { background: #475569; }      
        .type-rec { background: #0891b2; }     
        .type-special { background: #be123c; } 
        .type-gp { background: #ca8a04; }      

        /* Overlay & Modal Styles */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #activityWindow {
            width: 90%; height: 80%; background: white; border-radius: 15px;
            position: relative; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }
        .modal-controls {
            width: 90%; display: flex; justify-content: space-between; margin-top: 20px;
        }
        .close-btn { background: #ef4444; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .close-btn:hover { background: #b91c1c; }
        .main-submit-btn { background: var(--accent); color: white; border: none; padding: 12px 50px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.2s; }
        .main-submit-btn:hover { filter: brightness(1.1); transform: scale(1.02); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">VETO STUDENT</div>
        <div id="levelList"></div>
    </aside>

    <main class="stage">
        <div id="path" class="breadcrumb">Select a Session</div>
        <h1 id="title">Homework Dashboard</h1>
        <div class="activity-grid" id="grid"></div>
    </main>

    <div id="overlay">
        <div id="activityWindow">
            <iframe id="activityFrame" src="" frameborder="0" style="width:100%; height:100%;"></iframe>
        </div>
        <div class="modal-controls">
            <button class="close-btn" onclick="closeActivity()">CLOSE WINDOW</button>
            <button class="main-submit-btn" onclick="submitFromIframe()">SUBMIT MY WORK</button>
        </div>
    </div>

    <script>
        const syllabus = {
            1: {
                1: ["H W", "Lis 1 test", "Gr 1 test"],
                2: ["H W", "Gr 2 test", "Lis 2 test", "Vocab 1 study"],
                3: ["H W", "Gr 3 test", "Lis 3 test", "Vocab 2 study"],
                4: ["H W", "Gr 4 test", "Lis 4 test", "Reading 1 Rec"]
            },
            // ... (باقي مستويات المنهج كما هي في الكود السابق)
            2: { 1: ["H W"], 2: ["Lis 5 test", "Gr 5 test", "Reading 2 Rec", "One Shot 1 study"], 3: ["H W", "Lis 6 test", "Reading 3 Rec", "Vocab 3 study"], 4: ["H W", "Lis 7 test", "Reading 4 Rec", "Vocab 4 study", "One Shot 2 study", "Lis 8 test", "Reading 5 Rec", "Gr 6 test", "Tongue Twister 1 Rec"] },
            3: { 1: ["H W"], 2: ["H W", "Lis 9 test", "Reading 6 Rec", "Tongue Twister 2 Rec", "One Shot 3 study"], 3: ["H W", "Lis 10 test", "Reading 7 Rec", "Tongue Twister 3 Rec", "Vocab 5 study"], 4: ["H W", "Lis 11 test", "Reading 8 Rec", "Tongue Twister 4 Rec", "Vocab 6 study", "One Shot 4 study", "H W", "Lis 12 test", "Reading 9 Rec", "Tongue Twister 5 Rec", "Gr 8 test", "Squeezer 1 study"] },
            4: { 1: ["H W"], 2: ["H W", "Lis 13 test", "Gr 9 test", "Reading 10 Rec", "Tongue Twister 6 Rec", "Squeezer 2 study", "One Shot 5 study"], 3: ["H W", "Lis 14 test", "Reading 11 Rec", "Tongue Twister 7 Rec", "Vocab 7 study"], 4: ["H W", "Lis 15 test", "Reading 12 Rec", "Tongue Twister 8 Rec", "Vocab 8 study", "One Shot 6 study", "H W", "Lis 16 test", "Reading 13 Rec", "Tongue Twister 9 Rec", "Gr 10 test", "DMT 1 study"] },
            5: { 1: ["H W"], 2: ["H W", "Lis 17 test", "Gr 11 test", "Reading 14 Rec", "Tongue Twister 10 Rec", "DMT 2 study", "One Shot 7 study"], 3: ["H W", "Lis 18 test", "Reading 15 Rec", "Tongue Twister 11 Rec", "Vocab 9 study"], 4: ["H W", "Lis 19 test", "Reading 16 Rec", "Tongue Twister 12 Rec", "Vocab 10 study", "One Shot 8 study", "H W", "Lis 20 test", "Reading 17 Rec", "Tongue Twister 13 Rec", "Gr 12 test", "job interview role play"] },
            6: { 1: ["H W"], 2: ["H W", "Lis 21 test", "Gr 13 test", "Reading 18 Rec", "Tongue Twister 14 Rec", "DMT 3 study", "One Shot 9 study"], 3: ["H W", "Lis 22 test", "Reading 19 Rec", "Tongue Twister 15 Rec", "Vocab 11 study"], 4: ["H W", "Lis 23 test", "Reading 20 Rec", "Tongue Twister 16 Rec", "Vocab 12 study", "One Shot 10 study", "H W", "Lis 24 test", "Reading 21 Rec", "Tongue Twister 17 Rec", "Gr 14 test", "Wish 1 study"] },
            7: { 1: ["H W"], 2: ["H W", "Lis 25 test", "Gr 15 test", "Reading 22 Rec", "Tongue Twister 18 Rec", "Squeezer 3 study", "One Shot 11 study"], 3: ["H W", "Lis 26 test", "Reading 23 Rec", "Tongue Twister 19 Rec", "Vocab 13 study"], 4: ["H W", "Lis 27 test", "Reading 24 Rec", "Tongue Twister 20 Rec", "Vocab 14 study", "One Shot 12 study", "H W", "Lis 28 test", "Reading 25 Rec", "Tongue Twister 21 Rec", "Gr 16 test", "Wish 2 study"] },
            8: { 1: ["H W"], 2: ["H W", "Lis 29 test", "Gr 17 test", "Reading 26 Rec", "Tongue Twister 22 Rec", "Squeezer 4 study", "One Shot 13 study"], 3: ["H W", "Lis 30 test", "Reading 27 Rec", "Tongue Twister 23 Rec", "Vocab 15 study"], 4: ["H W", "Lis 31 test", "Reading 28 Rec", "Tongue Twister 24 Rec", "Vocab 16 study", "One Shot 14 study", "H W", "Lis 32 test", "Reading 29 Rec", "Tongue Twister 25 Rec", "Gr 18 test", "Project 1 study"] },
            9: { 1: ["H W"], 2: ["H W", "Lis 33 test", "Gr 19 test", "Reading 30 Rec", "Tongue Twister 26 Rec", "Squeezer 5 study", "One Shot 15 study"], 3: ["H W", "Lis 34 test", "Reading 31 Rec", "Tongue Twister 27 Rec", "Vocab 17 study"], 4: ["H W", "Lis 35 test", "Reading 32 Rec", "Tongue Twister 28 Rec", "Vocab 18 study", "One Shot 16 study", "H W", "Lis 36 test", "Reading 33 Rec", "Tongue Twister 29 Rec", "Gr 20 test", "DMT 4 study"] },
            10: { 1: ["H W"], 2: ["H W", "Lis 37 test", "Reading 34 Rec", "Tongue Twister 30 Rec", "Wish 3 study"], 3: ["H W", "Lis 38 test", "Reading 35 Rec", "Tongue Twister 31 Rec", "Vocab 19 study"], 4: ["H W", "Lis 39 test", "Reading 36 Rec", "Tongue Twister 32 Rec", "Vocab 20 study", "One Shot 18 study", "H W", "Lis 40 test", "Reading 37 Rec", "Tongue Twister 33 Rec", "Project 2 study"] },
            11: { 1: ["H W"], 2: ["gp study", "H W", "Lis 41 test", "gp study", "Reading 38 Rec", "Tongue Twister 34 Rec", "Wish 3 study"], 3: ["H W", "Lis 42 test", "Reading 39 Rec", "Tongue Twister 35 Rec", "dmt 5 study"], 4: ["H W", "Lis 43 test", "Reading 40 Rec", "Tongue Twister 36 Rec", "Squeezer 6 study", "One Shot 20 study", "gp study", "H W", "gp study"] },
            12: { 1: ["H W", "gp study"], 2: ["H W"], 3: ["H W", "gp study", "gp sending"], 4: ["H W", "gp sending", "gp study"] }
        };

        function getActType(name) {
            const n = name.toLowerCase();
            if (n.includes('test')) return 'type-test';
            if (n.includes('rec')) return 'type-rec';
            if (n.includes('study')) return 'type-study';
            if (n.includes('h w')) return 'type-hw';
            if (n.includes('gp') || n.includes('project')) return 'type-gp';
            if (n.includes('squeezer') || n.includes('dmt') || n.includes('wish')) return 'type-special';
            return 'type-hw';
        }

        // Initialize Sidebar Levels
        const levelList = document.getElementById('levelList');
        for (let i = 1; i <= 12; i++) {
            levelList.innerHTML += `
                <button class="level-btn" onclick="toggleDrawer(${i}, this)">LEVEL ${i}</button>
                <div class="drawer" id="drawer-${i}">
                    ${[1,2,3,4].map(s => `<button class="sess-btn" onclick="loadSession(${i}, ${s}, this)">Session ${s}</button>`).join('')}
                </div>
            `;
        }

        function toggleDrawer(lvl, btn) {
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const drawer = document.getElementById(`drawer-${lvl}`);
            const isOpen = drawer.style.maxHeight;
            document.querySelectorAll('.drawer').forEach(d => d.style.maxHeight = null);
            drawer.style.maxHeight = isOpen ? null : drawer.scrollHeight + "px";
        }

        function loadSession(lvl, sess, btn) {
            document.querySelectorAll('.sess-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('path').innerText = `Level ${lvl} > Session ${sess}`;
            
            const grid = document.getElementById('grid');
            const acts = syllabus[lvl][sess] || [];
            grid.innerHTML = acts.map(a => `
                <div class="act-card ${getActType(a)}" onclick="launch('${a}')">${a}</div>
            `).join('');
        }

        // --- Portal Core Functions ---

        function launch(name) {
            const overlay = document.getElementById('overlay');
            const frame = document.getElementById('activityFrame');
            const fileName = name.replace(/\s+/g, '_');
            
            frame.src = `eycmainengine.html?activity=${fileName}`;
            overlay.style.display = 'flex';
        }

        function closeActivity() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('activityFrame').src = '';
        }

        function submitFromIframe() {
            const frame = document.getElementById('activityFrame');
            // الاتصال بالمحرك لسحب البيانات
            if (frame.contentWindow && typeof frame.contentWindow.getStudentData === 'function') {
                const studentData = frame.contentWindow.getStudentData();
                console.log("Submitting Data:", studentData);
                
                // تنبيه مؤقت للمستخدم
                alert(`Excellent! You submitted your work for ${studentData.activity}.`);
                closeActivity();
            } else {
                alert("Activity is still loading or not compatible with auto-submit.");
            }
        }
    </script>
</body>
</html>
