<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Session Content</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --banner-height: 140px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; overflow: hidden; }
        .top-banner { height: var(--banner-height); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: rgba(0, 0, 0, 0.9); border-bottom: 3px solid var(--primary-gold); }
        .logo-img { height: 70px; }
        .mr-ezz-img { height: 100px; border-radius: 8px; }
        .session-info h1 { font-size: 2.5rem; color: var(--primary-gold); text-transform: uppercase; letter-spacing: 3px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 50px; max-width: 1400px; margin: 0 auto; overflow-y: auto; height: calc(100vh - var(--banner-height)); }
        .content-card { background: var(--card-bg); border: 1px solid rgba(197, 160, 89, 0.2); padding: 40px; border-radius: 15px; text-align: center; transition: 0.3s ease; cursor: pointer; }
        .content-card:hover { border-color: var(--primary-gold); transform: translateY(-10px); }
        #activity-stage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background:#000; z-index: 1000; display: none; }
        .toolbox-wrapper { position: fixed; bottom: 30px; right: 30px; z-index: 7000; display: flex; flex-direction: column-reverse; gap: 15px; }
        .tool-btn { width: 65px; height: 65px; border-radius: 50%; background: var(--primary-gold); border: none; cursor: pointer; font-size: 1.8rem; display: none; align-items: center; justify-content: center; transition: 0.3s; }
        .toolbox-wrapper.open .tool-btn { display: flex; }
    </style>
</head>
<body>
    <header class="top-banner">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        <div class="session-info"><h1 id="display-title">VETO SYSTEM</h1></div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage">
        <button onclick="closeStage()" style="position:absolute; top:20px; left:20px; z-index:2001; background:var(--primary-gold); border:none; padding:12px 25px; cursor:pointer; font-weight:900; border-radius:8px;">EXIT SESSION</button>
        <div id="stage-content" style="width:100%; height:100%; overflow: auto;"></div>
    </div>

    <div class="toolbox-wrapper" id="toolBox">
        <button class="tool-btn" style="display:flex; background:#222; color:var(--primary-gold); border:2px solid var(--primary-gold);" onclick="toggleToolBox()">🛠️</button>
        <button class="tool-btn" onclick="location.reload()">🔄</button>
    </div>

    <script src="data/levels.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('id');

        if (sessionId && typeof sessionData !== 'undefined') {
            const data = sessionData[sessionId] || [];
            const container = document.getElementById('content-container');
            document.getElementById('display-title').innerText = `LEVEL ${sessionId.split('-')[0]} | SESSION ${sessionId.split('-')[1]}`;

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.onclick = () => openActivity(item);
                card.innerHTML = `<h3>${item}</h3><p>Click to Launch</p>`;
                container.appendChild(card);
            });
        }

        function openActivity(activityName) {
            const [lvl, sess] = sessionId.split('-');
            let prefix = "File"; 
            if(activityName.toLowerCase().includes("vocab")) prefix = "Voc";
            else if(activityName.toLowerCase().includes("grammar")) prefix = "Gra";
            else if(activityName.toLowerCase().includes("listening")) prefix = "Lis";
            else prefix = activityName.split(' ')[0];

            const filePath = `data/L-${lvl}-S-${sess}-${prefix}.js`;
            
            document.getElementById('activity-stage').style.display = 'block';
            const stage = document.getElementById('stage-content');
            stage.innerHTML = "<h2 style='color:white; text-align:center; margin-top:20%;'>Loading Content...</h2>";
            
            // إزالة أي سكريبت قديم لنفس النشاط
            const oldScript = document.getElementById('active-activity-script');
            if(oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'active-activity-script';
            script.src = filePath + "?v=" + new Date().getTime(); // منع الكاش
            
            script.onload = () => {
                console.log("Script loaded successfully: " + filePath);
                // إذا كان الملف يحتوي على دالة تشغيل مثل init()، استدعيها هنا.
                if(typeof initActivity === 'function') initActivity();
            };

            script.onerror = () => {
                stage.innerHTML = `<h2 style='color:red; text-align:center; margin-top:20%;'>Failed to load:<br>${filePath}</h2>`;
            };

            document.body.appendChild(script);
        }

        function closeStage() {
            document.getElementById('activity-stage').style.display = 'none';
            document.getElementById('stage-content').innerHTML = "";
            const oldScript = document.getElementById('active-activity-script');
            if(oldScript) oldScript.remove();
        }

        function toggleToolBox() { document.getElementById('toolBox').classList.toggle('open'); }
    </script>
</body>
</html>
