<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veto Program - Interactive Board</title>
    <style>
        /* 1. CSS Variables لسهولة التعديل مستقبلاً */
        :root {
            --primary-bg: #0a0a0a;
            --overlay-color: rgba(0, 0, 0, 0.65); /* طبقة تباين لحماية عين الطالب */
            --text-color: #ffffff;
            --accent-color: #00d4ff; /* لون تمييز للعناصر التفاعلية */
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 2. Reset & Full Screen Layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* لمنع التمرير العشوائي أثناء الشرح */
            font-family: var(--font-main);
            background-color: var(--primary-bg);
        }

        /* 3. Animated Background Layer */
        .veto-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* استخدام رابط الـ Raw لضمان العرض المباشر */
            background: url('https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/51f1d5c58d4bcd34b8a4ddc1cd05d6fda68fade5/vetoofb.webp') no-repeat center center fixed;
            background-size: cover;
            z-index: -2;
        }

        /* 4. Contrast Overlay (طبقة الحماية والوضوح) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-color);
            z-index: -1;
        }

        /* 5. Main Content Container (Smart iFrame Ready) */
        .main-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 40px;
            text-align: center;
            color: var(--text-color);
        }

        /* Typography - 4 Meter Rule */
        h1 {
            font-size: 5rem; /* حجم ضخم للقراءة من بعيد */
            font-weight: 800;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .status-badge {
            padding: 10px 25px;
            background: var(--accent-color);
            color: #000;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="veto-background"></div>
    
    <div class="overlay"></div>

    <main class="main-container">
        <h1>VETO PROGRAM</h1>
        <div class="status-badge">جاهز لاستقبال المحتوى التعليمي...</div>
        
        </main>

    <script>
        // تجهيز مستمعات الكيبورد (Keyboard Listeners)
        document.addEventListener('keydown', function(event) {
            if (event.key === "Enter") {
                console.log("Enter key pressed: Ready for next slide transition.");
                // سيتم إضافة كود الانتقال بين ملفات الـ JS هنا
            }
        });

        console.log("Veto Architect: System Initialized with Animated Background.");
    </script>
</body>
</html>
