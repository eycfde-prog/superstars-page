<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETO PROGRAM | Cinematic Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           Veto Dark Theme & Variables
           Focus: High Contrast & Large Screen Optimization
           ========================================= */
        :root {
            --primary-gold: #c5a059; /* الذهب الأساسي لفيتو */
            --gold-glow: rgba(197, 160, 89, 0.7);
            --bg-dark: #020202; /* أسود أعمق لتباين أعلى */
            --bg-grid: #080808;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --banner-height: 160px; /* زيادة الطول قليلاً للهيبة */
            
            /* Typography Scale - Optimized for 4 Meters */
            --font-h1: 3.5rem;   /* عنوان البرنامج */
            --font-lvl-num: 3rem; /* رقم المستوى */
            --font-lvl-txt: 1rem; /* كلمة LEVEL */
            --font-sess: 1.3rem;  /* أزرار الحصص */
        }

        /* Reset & Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-dark);
            /* إضافة نمط شبكي خفيف جداً يوحي بالتكنولوجيا */
            background-image: 
                linear-gradient(var(--bg-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            /* منع اختيار النص أثناء الشرح */
            -webkit-user-select: none; user-select: none; 
        }

        /* =========================================
           1. Header (Banner) - Cinematic Style
           ========================================= */
        .top-banner {
            height: var(--banner-height);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px); /* تأثير زجاجي خلفي */
            border-bottom: 4px solid var(--primary-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* تحسين شعار فيتو وحواف صورة مستر عز */
        .logo-img { height: 100px; width: auto; filter: drop-shadow(0 0 10px var(--gold-glow)); }
        
        .mr-ezz-zone { display: flex; align-items: center; gap: 20px; }
        .mr-ezz-img { 
            height: 130px; width: auto; 
            border-radius: 15px; 
            border: 2px solid var(--primary-gold);
            box-shadow: 0 0 20px var(--gold-glow);
        }
        
        /* خط Oswald القوي للعناوين */
        .top-banner h1 {
            font-family: 'Oswald', sans-serif;
            font-size: var(--font-h1);
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 30%, var(--primary-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--gold-glow);
            text-align: center;
            flex-grow: 1;
        }

        /* =========================================
           2. Levels Grid - Full Screen Layout
           ========================================= */
        .levels-container {
            display: grid;
            /* نظام 4 أعمدة ثابت للشاشات الكبيرة لضمان الاتساق */
            grid-template-columns: repeat(4, 1fr); 
            gap: 100px 50px; /* مسافات عمودية كبيرة تمنع التكدس */
            padding: 80px 60px;
            max-width: 1800px; /* استغلال عرض الشاشات الـ 4K */
            margin: 0 auto;
            justify-items: center;
            padding-bottom: 150px; /* مساحة سفلية إضافية */
        }

        /* =========================================
           3. Level Item (Circular UI)
           ========================================= */
        .level-wrapper {
            position: relative;
            width: 180px; /* تكبير الحجم قليلاً */
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        /* الـ Container الأساسي للمستوى */
        .level-circle {
            width: 150px;
            height: 150px;
            background: #000;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            border: 3px solid #222; /* تباين أوضح للإطار الإفتراضي */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
        }

        /* تفاصيل النص داخل الدائرة */
        .level-circle span { 
            font-size: var(--font-lvl-txt); 
            letter-spacing: 3px; 
            color: var(--text-muted);
            font-weight: 700;
        }
        
        .level-circle .num { 
            font-size: var(--font-lvl-num); 
            color: var(--primary-gold); 
            font-weight: 900; 
            line-height: 1;
            font-family: 'Oswald', sans-serif;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        /* الإطار الدوار - تحسين الحركة لتكون أنعم */
        .rotating-border {
            position: absolute;
            width: 175px;
            height: 175px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--primary-gold), transparent 50%);
            animation: rotate 8s linear infinite; /* أسرع قليلاً لجذب الانتباه */
            z-index: 5;
            opacity: 0.3; /* خافت في الحالة العادية */
            transition: opacity 0.3s;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* =========================================
           4. Interactive States (Hover, Active, Focus)
           ========================================= */
        
        /* حالة التحديد بالماوس (Hover) */
        .level-circle:hover { 
            transform: scale(1.1); 
            border-color: var(--primary-gold); 
            box-shadow: 0 0 30px var(--gold-glow);
        }
        .level-wrapper:hover .rotating-border { opacity: 1; }

        /* حالة النشاط (عند فتح الـ Tray) */
        .level-wrapper.active .level-circle {
            border-color: #fff; /* إطار أبيض لتمييز المستوي المفتوح */
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        .level-wrapper.active .rotating-border { animation-duration: 2s; opacity: 1; }

        /* **جديد: حالة التركيز بالكيبورد (Key Focus)** */
        /* تظهر عند التنقل بالأسهم */
        .level-wrapper:focus {
            outline: none;
        }
        .level-wrapper:focus .level-circle {
            border-color: #fff;
            box-shadow: 0 0 0 6px var(--bg-dark), 0 0 0 10px var(--primary-gold);
            transform: scale(1.1);
        }

        /* =========================================
           5. Sessions Tray - Glassmorphism Style
           ========================================= */
        .sessions-tray {
            position: absolute;
            width: 280px; /* أوسع قليلاً */
            height: 280px;
            display: none;
            pointer-events: none;
            z-index: 15;
            /* إضافة خطوط ربط وهمية */
            background: 
                radial-gradient(circle at center, transparent 70px, rgba(197, 160, 89, 0.1) 71px, transparent 72px);
        }

        .active .sessions-tray { 
            display: block; 
            animation: trayPopIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        /* زر الحصة (Node) */
        .session-node {
            position: absolute;
            width: 70px; /* تكبير أزرار الحصص للمس أسهل */
            height: 70px;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%); /* خلفية فاتحة لتباين أقصى مع النص */
            color: #000; /* نص أسود على خلفية فاتحة */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: var(--font-sess);
            font-family: 'Oswald', sans-serif;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border: 4px solid var(--bg-dark); /* إطار فاصل عميق */
        }

        /* تأثير الـ Hover على الحصة */
        .session-node:hover { 
            background: var(--primary-gold); 
            color: #fff;
            transform: scale(1.2) translateY(-5px); 
            box-shadow: 0 15px 30px var(--gold-glow); 
        }

        /* تحديد مواقع الحصص بدقة (Cross Layout) */
        .s1 { top: -25px; left: 50%; transform: translateX(-50%); }
        .s2 { bottom: -25px; left: 50%; transform: translateX(-50%); }
        .s3 { left: -25px; top: 50%; transform: translateY(-50%); }
        .s4 { right: -25px; top: 50%; transform: translateY(-50%); }

        @keyframes trayPopIn { 
            from { opacity: 0; transform: scale(0.8); } 
            to { opacity: 1; transform: scale(1); } 
        }

        /* =========================================
           6. Responsive Overrides (Large Screen Focus)
           ========================================= */
        /* إلغاء الـ Media Query الخاصة بالموبايل لتركيز العرض على الشاشات الكبيرة */
        
        /* تحسين العرض للشاشات المتوسطة (Tablets landscape) */
        @media (max-width: 1200px) {
            .levels-container { grid-template-columns: repeat(3, 1fr); gap: 80px 30px; }
            :root { --font-h1: 2.8rem; --banner-height: 130px; }
            .logo-img { height: 70px; }
            .mr-ezz-img { height: 100px; }
        }

    </style>
</head>
<body>

    <header class="top-banner">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="Veto Logo" class="logo-img">
        <h1>VETO PROGRAM</h1>
        <div class="mr-ezz-zone">
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz" class="mr-ezz-img">
        </div>
    </header>

    <main class="levels-container" id="grid">
    </main>

    <script>
        const grid = document.getElementById('grid');
        const TOTAL_LEVELS = 12;
        // متغير للاحتفاظ بالمستوى المحدد حالياً بالكيبورد
        let currentFocusedIndex = -1; 

        // =========================================
        // 1. DOM Generation (إنشاء العناصر)
        // =========================================
        function createGrid() {
            for (let i = 1; i <= TOTAL_LEVELS; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'level-wrapper';
                wrapper.id = `lvl-${i}`;
                // جعل العنصر قابل للتركيز عليه بالكيبورد
                wrapper.tabIndex = 0; 
                
                wrapper.innerHTML = `
                    <div class="rotating-border"></div>
                    <div class="level-circle" onclick="toggleLevel(${i})">
                        <span>LEVEL</span>
                        <div class="num">${i}</div>
                    </div>
                    <div class="sessions-tray">
                        <div class="session-node s1" onclick="navigateToContent('${i}-1')" title="Session 1">S1</div>
                        <div class="session-node s2" onclick="navigateToContent('${i}-2')" title="Session 2">S2</div>
                        <div class="session-node s3" onclick="navigateToContent('${i}-3')" title="Session 3">S3</div>
                        <div class="session-node s4" onclick="navigateToContent('${i}-4')" title="Session 4">S4</div>
                    </div>
                `;
                
                // إضافة المستمعين للأحداث الخاصة بالتركيز (Focus) لتحديث المؤشر
                wrapper.addEventListener('focus', () => {
                    currentFocusedIndex = i - 1;
                });

                grid.appendChild(wrapper);
            }
        }

        // =========================================
        // 2. Interaction Logic (المنطق التفاعلي)
        // =========================================
        
        // فتح/إغلاق قائمة الحصص للمستوى
        function toggleLevel(levelNum) {
            const allWrappers = document.querySelectorAll('.level-wrapper');
            const targetWrapper = document.getElementById(`lvl-${levelNum}`);
            
            // تحقق مما إذا كان المستوى المستهدف مفتوحاً بالفعل
            const isAlreadyActive = targetWrapper.classList.contains('active');

            // إغلاق جميع المستويات أولاً
            allWrappers.forEach(el => el.classList.remove('active'));

            // إذا لم يكن مفتوحاً، قم بفتحه
            if (!isAlreadyActive) {
                targetWrapper.classList.add('active');
                // وضع التركيز عليه عند الفتح بالكيبورد
                targetWrapper.focus(); 
            }
        }

        // الانتقال لصفحة المحتوى
        function navigateToContent(sessionId) {
            console.log(`Navigating to: vetoofif.html?session=${sessionId}`);
            // سطر الانتقال الفعلي (مفعل)
            window.location.href = `vetoofif.html?session=${sessionId}`;
        }

        // =========================================
        // 3. Keyboard Navigation Logic (التحكم بالكيبورد)
        // Focus: Veto 4-Meter Rule
        // =========================================
        
        document.addEventListener('keydown', function(e) {
            const wrappers = document.querySelectorAll('.level-wrapper');
            
            // إذا لم يتم تحديد أي عنصر، ابدأ من الأول عند ضغط أي سهم
            if (currentFocusedIndex === -1 && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                currentFocusedIndex = 0;
                wrappers[currentFocusedIndex].focus();
                e.preventDefault();
                return;
            }

            switch(e.key) {
                case 'ArrowRight':
                    if (currentFocusedIndex < TOTAL_LEVELS - 1) currentFocusedIndex++;
                    break;
                case 'ArrowLeft':
                    if (currentFocusedIndex > 0) currentFocusedIndex--;
                    break;
                case 'ArrowDown':
                    // النزول لأسفل (نظام 4 أعمدة، إذن +4)
                    if (currentFocusedIndex + 4 < TOTAL_LEVELS) {
                        currentFocusedIndex += 4;
                    }
                    break;
                case 'ArrowUp':
                    // الصعود لأعلى (-4)
                    if (currentFocusedIndex - 4 >= 0) {
                        currentFocusedIndex -= 4;
                    }
                    break;
                case 'Enter':
                    // عند ضغط Enter، نفذ عملية الـ Click على المستوى المحدد
                    if (currentFocusedIndex !== -1) {
                        wrappers[currentFocusedIndex].querySelector('.level-circle').click();
                    }
                    e.preventDefault();
                    break;
                case 'Escape':
                    // إغلاق أي Tray مفتوحة عند ضغط Esc
                    wrappers.forEach(el => el.classList.remove('active'));
                    break;
                default: return; // الخروج إذا كان مفتاحاً آخر
            }

            // تطبيق التركيز على العنصر الجديد
            if (currentFocusedIndex !== -1 && wrappers[currentFocusedIndex]) {
                wrappers[currentFocusedIndex].focus();
                // منع التمرير الافتراضي للصفحة عند استخدام الأسهم
                e.preventDefault(); 
            }
        });

        // =========================================
        // Initialization
        // =========================================
        createGrid();

    </script>
</body>
</html>
