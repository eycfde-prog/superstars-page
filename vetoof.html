<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYC Veto Program - Level Selection</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --text-color: #ecf0f1;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Banner Styling */
        .banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 50px;
            background: linear-gradient(90deg, #000, #2c3e50, #000);
            border-bottom: 3px solid var(--accent-color);
        }

        .banner img {
            height: 100px;
            border-radius: 50%;
            border: 2px solid var(--text-color);
        }

        .banner h1 {
            flex-grow: 1;
            text-align: center;
            font-size: 2.5em;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Levels Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 50px;
            padding: 50px;
            justify-items: center;
        }

        .level-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
        }

        .main-circle {
            width: 120px;
            height: 120px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2em;
            z-index: 10;
            position: relative;
            transition: transform 0.3s;
            box-shadow: 0 0 15px rgba(231, 76, 60, 0.5);
        }

        .main-circle:hover {
            transform: scale(1.1);
        }

        /* Sub-circles (Sessions) */
        .sub-circle {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #3498db;
            border-radius: 50%;
            display: none; /* Hidden by default */
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 5;
        }

        .sub-circle:hover {
            background: #2ecc71;
        }

        /* Animation for orbiting */
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(100px) rotate(0deg); }
            to   { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
        }

        .active .sub-circle {
            display: flex;
            animation: orbit 8s linear infinite;
        }

        /* Individual delays to spread them out */
        .s1 { animation-delay: 0s !important; }
        .s2 { animation-delay: -2s !important; }
        .s3 { animation-delay: -4s !important; }
        .s4 { animation-delay: -6s !important; }

        /* Iframe Area */
        #content-frame {
            display: none;
            width: 100vw;
            height: 100vh;
            border: none;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <button class="back-btn" onclick="goBack()">Back to Levels</button>

    <div id="main-ui">
        <header class="banner">
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/215fb6c953e6b31e98de9d0a4e6b955b1e56dca7/logo.png" alt="Logo">
            <h1>Mr. Ezz .Y. Ali</h1>
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/215fb6c953e6b31e98de9d0a4e6b955b1e56dca7/MrEzz.png" alt="Mr Ezz">
        </header>

        <main class="grid-container" id="levels-grid">
            </main>
    </div>

    <iframe id="content-frame"></iframe>

    <script>
        const grid = document.getElementById('levels-grid');
        const mainUi = document.getElementById('main-ui');
        const iframe = document.getElementById('content-frame');
        const backBtn = document.querySelector('.back-btn');

        // Generate 12 levels
        for (let i = 1; i <= 12; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'level-wrapper';
            wrapper.innerHTML = `
                <div class="main-circle" onclick="toggleSubCircles(this)">Level ${i}</div>
                <div class="sub-circle s1" onclick="loadSession(${i}, 1)">1</div>
                <div class="sub-circle s2" onclick="loadSession(${i}, 2)">2</div>
                <div class="sub-circle s3" onclick="loadSession(${i}, 3)">3</div>
                <div class="sub-circle s4" onclick="loadSession(${i}, 4)">4</div>
            `;
            grid.appendChild(wrapper);
        }

        function toggleSubCircles(element) {
            // Close other active levels
            document.querySelectorAll('.level-wrapper').forEach(w => {
                if(w !== element.parentElement) w.classList.remove('active');
            });
            // Toggle current
            element.parentElement.classList.toggle('active');
        }

        function loadSession(level, session) {
            const fileName = `${level}-${session}.js`;
            console.log(`Loading: ${fileName}`);
            
            // Hide UI and Show Iframe
            mainUi.style.display = 'none';
            iframe.style.display = 'block';
            backBtn.style.display = 'block';

            // Method to load JS inside iframe
            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(`
                <html>
                <body style="background:#1a1a1a; color:white; display:flex; justify-content:center; align-items:center; height:100vh;">
                    <h1>Loading Session ${level}-${session}...</h1>
                    <script src="${fileName}"><\/script>
                </body>
                </html>
            `);
            doc.close();
        }

        function goBack() {
            mainUi.style.display = 'block';
            iframe.style.display = 'none';
            backBtn.style.display = 'none';
            iframe.src = "about:blank";
        }
    </script>
</body>
</html>
