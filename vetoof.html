<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veto Learning System - Mr. Ezz .Y. Ali</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --primary-blue: #00a2ff;
            --veto-gold: #f1c40f;
            --text-light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.1);
            --font-huge: 3.2rem; /* مقروء من 4 أمتار */
            --font-header: 1.8rem;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 200%;
            background: url('https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/4940b6bbd5ca38042de66f63a8619a4dc684c91b/vetoofb.webp');
            background-size: cover;
            z-index: -1;
            animation: cloudsRise 100s linear infinite;
            opacity: 0.4;
        }

        @keyframes cloudsRise { from { transform: translateY(0); } to { transform: translateY(-50%); } }

        /* Modern Header */
        header {
            display: flex;
            align-items: center;
            padding: 15px 50px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary-blue);
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 100px;
            gap: 25px;
        }

        .logo, .profile-img {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 3px solid var(--veto-gold);
            object-fit: cover;
            box-shadow: 0 0 20px var(--veto-gold);
        }

        .teacher-info { flex-grow: 1; }
        .teacher-name {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--veto-gold);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* Portal Button */
        .main-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 60px;
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--primary-blue);
            color: white;
            border: 3px solid var(--veto-gold);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0, 162, 255, 0.4);
        }
        .main-btn:hover { transform: scale(1.1); background: var(--veto-gold); color: var(--bg-dark); }

        /* Levels Grid */
        .levels-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 60px;
            padding: 40px 10%;
        }

        .level-wrapper {
            position: relative;
            width: 180px; height: 180px;
            margin: auto;
            cursor: pointer;
        }

        .level-btn {
            width: 100%; height: 100%;
            background: radial-gradient(circle, #1e293b, #0f172a);
            border: 4px solid var(--primary-blue);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900;
            z-index: 10; position: relative;
            transition: 0.5s;
        }

        .level-wrapper::after {
            content: "";
            position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 4px dashed var(--veto-gold);
            border-radius: 50%;
            animation: rotateSlow 20s linear infinite;
        }

        @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Sub Buttons (Sessions) */
        .sub-btn {
            position: absolute;
            width: 55px; height: 55px;
            background: var(--veto-gold);
            color: #000;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.5rem;
            z-index: 15; opacity: 0; transform: scale(0);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .level-wrapper.active .sub-btn { opacity: 1; transform: scale(1); }
        .level-wrapper.active .sub-btn:nth-child(2) { top: -30px; left: 60px; }
        .level-wrapper.active .sub-btn:nth-child(3) { bottom: -30px; left: 60px; }
        .level-wrapper.active .sub-btn:nth-child(4) { left: -30px; top: 60px; }
        .level-wrapper.active .sub-btn:nth-child(5) { right: -30px; top: 60px; }

        /* Activity Overlay - Full Screen Mode */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: none; z-index: 2000;
            flex-direction: column;
        }

        .activity-header {
            height: 80px;
            background: #1e293b;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px;
            border-bottom: 4px solid var(--primary-blue);
        }

        .activity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px; padding: 50px;
            overflow-y: auto;
        }

        .activity-card {
            background: var(--glass);
            border: 2px solid var(--primary-blue);
            height: 200px;
            border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: var(--font-huge);
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            padding: 20px;
        }

        .activity-card:hover {
            background: var(--primary-blue);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        #activityFinalContent {
            flex-grow: 1;
            background: #fff;
            width: 100%;
            display: flex; justify-content: center; align-items: center;
            color: #000;
        }

        .nav-link-btn { color: var(--primary-blue); font-size: 1.8rem; font-weight: 900; background: none; border: none; cursor: pointer; }
        .nav-active-act { color: var(--veto-gold); font-size: 2rem; font-weight: 900; margin-right: 15px; }

        .loader {
            width: 100px; height: 100px;
            border: 12px solid #f3f3f3;
            border-top: 12px solid var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" class="logo">
    <div class="teacher-info">
        <div class="teacher-name">Mr. Ezz .Y. Ali</div>
    </div>
    <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/MrEzz.png" class="profile-img">
</header>

<button class="main-btn" id="portalActionBtn" onclick="toggleTokens()">Tokens Portal</button>

<div class="levels-container" id="levelsGrid"></div>

<div id="sessionOverlay" class="overlay">
    <div class="activity-header">
        <button class="nav-link-btn" onclick="closeAll()">◀ العودة للمستويات</button>
        <div id="sessionTitle" style="font-size: 2rem; font-weight: 900; color: var(--veto-gold);"></div>
        <div style="width: 100px;"></div>
    </div>
    <div id="sessionContent" class="activity-grid"></div>
</div>

<div id="activityOverlay" class="overlay">
    <div class="activity-header">
        <div id="activityDetails"></div>
        <div style="font-weight: 900; color: #fff;">VETO ARCHITECT 2026</div>
    </div>
    <div id="activityFinalContent">
        </div>
</div>

<script>
    // Data remains the same as your source
    const sessionData = { /* ... بياناتك المرفقة ... */ };

    const grid = document.getElementById('levelsGrid');
    for (let i = 1; i <= 12; i++) {
        const wrap = document.createElement('div');
        wrap.className = 'level-wrapper';
        wrap.innerHTML = `<div class="level-btn">LEVEL ${i}</div>`;
        for (let j = 1; j <= 4; j++) {
            const s = document.createElement('div');
            s.className = 'sub-btn'; s.innerText = j;
            s.onclick = (e) => { e.stopPropagation(); openSession(i, j); };
            wrap.appendChild(s);
        }
        wrap.onclick = (e) => {
            e.stopPropagation();
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
            wrap.classList.add('active');
        };
        grid.appendChild(wrap);
    }

    function openSession(lv, ss) {
        document.getElementById('sessionTitle').innerText = `Level ${lv} - Session ${ss}`;
        const activities = sessionData[`${lv}-${ss}`] || ["قريباً"];
        let html = "";
        activities.forEach(act => {
            html += `<div class="activity-card" onclick="openFinalActivity(${lv}, ${ss}, '${act}')">${act}</div>`;
        });
        document.getElementById('sessionContent').innerHTML = html;
        document.getElementById('sessionOverlay').style.display = 'flex';
    }

    function openFinalActivity(lv, ss, actName) {
        const detailsHtml = `
            <button class="nav-link-btn" onclick="openSession(${lv}, ${ss})">◀ S${ss}</button>
            <span class="nav-active-act">${actName}</span>
        `;
        document.getElementById('activityDetails').innerHTML = detailsHtml;
        const container = document.getElementById('activityFinalContent');
        container.innerHTML = `<div class="loader"></div>`;
        
        document.getElementById('activityOverlay').style.display = 'flex';

        // Logic لتحميل ملف الـ JS الخاص بك
        let cleanName = actName.replace(/\s+/g, ''); 
        let shortName = cleanName.substring(0, 3).charAt(0).toUpperCase() + cleanName.substring(0, 3).slice(1);
        const fileName = `L-${lv}-S-${ss}-${shortName}.js`;

        setTimeout(() => {
            const script = document.createElement('script');
            script.src = `data/${fileName}`;
            script.onerror = () => {
                container.innerHTML = `<h1 style="font-size:4rem; color:red;">FILE NOT FOUND<br>${fileName}</h1>`;
            };
            document.body.appendChild(script);
        }, 800);
    }

    function closeAll() {
        document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
    }

    // Keyboard Shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") closeAll();
        if (e.key === "Enter") {
            if (typeof window.nextStep === "function") window.nextStep();
        }
    });
</script>
</body>
</html>
