<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYC Veto Program - WOLF Edition</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --text-color: #ecf0f1;
            --vortex-speed: 5s;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: var(--text-color); overflow-x: hidden; }

        /* Banner */
        .banner { display: flex; align-items: center; justify-content: space-between; padding: 10px 50px; background: linear-gradient(90deg, #000, #2c3e50, #000); border-bottom: 3px solid var(--accent-color); }
        .banner img { height: 80px; border-radius: 50%; border: 2px solid var(--text-color); }
        .banner h1 { text-align: center; font-size: 1.8em; }

        .controls { display: flex; justify-content: center; padding: 10px; background: #000; }
        .switch-btn { padding: 10px 25px; font-weight: bold; background: var(--accent-color); color: white; border: 2px solid white; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .switch-btn:hover { background: #c0392b; box-shadow: 0 0 15px var(--accent-color); }

        /* Vortex & Input */
        #vortex-container { display: none; width: 100%; height: 70vh; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .vortex { width: 350px; height: 350px; border: 8px double var(--accent-color); border-radius: 50%; border-top-color: transparent; animation: spin var(--vortex-speed) linear infinite; position: absolute; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .vortex-content { z-index: 20; text-align: center; }
        .vortex-content h2 { margin-bottom: 20px; text-shadow: 0 0 10px var(--accent-color); }
        .vortex-content input { padding: 15px; border-radius: 30px; border: 2px solid var(--accent-color); width: 250px; text-align: center; font-size: 1.2em; background: rgba(0,0,0,0.7); color: white; outline: none; }

        /* Flash Screen (The Card) */
        #flash-screen { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 600px; background: #2c3e50; border-radius: 15px; overflow: hidden; z-index: 1000; box-shadow: 0 0 50px #000; border: 1px solid rgba(255,255,255,0.1); }
        .card-top { display: flex; align-items: center; padding: 20px; background: #1a1a1a; border-bottom: 3px solid var(--accent-color); }
        .card-top img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent-color); margin-right: 20px; object-fit: cover; }
        .student-info h3 { margin: 0; color: var(--accent-color); font-size: 1.5em; }
        .student-info p { margin: 5px 0; font-size: 0.9em; opacity: 0.9; }
        
        .card-bottom { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #2c3e50; max-height: 350px; overflow-y: auto; }
        .grade-box { position: relative; background: #34495e; padding: 5px; border-radius: 8px; transition: 0.3s; border: 1px solid transparent; }
        .grade-box:hover { border-color: var(--accent-color); }
        .grade-box input { width: 90%; background: transparent; border: none; color: white; padding: 10px; font-size: 1em; text-align: center; outline: none; }
        .grade-box input::placeholder { color: #95a5a6; font-size: 0.85em; }
        .grade-box.updated { background: #27ae60 !important; transform: scale(1.02); }
        /* استايل خاص لخانة البونص لتمييزها */
        .grade-box.bonus-box { border: 1px solid #f1c40f; background: #2d3436; }

        /* Grid */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 40px; padding: 40px; justify-items: center; }
        .level-wrapper { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }
        .main-circle { width: 80px; height: 80px; background: var(--accent-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; z-index: 10; transition: 0.3s; box-shadow: 0 0 15px rgba(231,76,60,0.4); }
        .main-circle:hover { transform: scale(1.1); }
        .sub-circle { position: absolute; width: 35px; height: 35px; background: #3498db; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; z-index: 5; font-size: 0.8em; }
        @keyframes orbit { from { transform: rotate(0deg) translateX(75px) rotate(0deg); } to { transform: rotate(360deg) translateX(75px) rotate(-360deg); } }
        .active .sub-circle { display: flex; animation: orbit 6s linear infinite; }
        .active .s1 { animation-delay: 0s; } .active .s2 { animation-delay: -1.5s; } .active .s3 { animation-delay: -3s; } .active .s4 { animation-delay: -4.5s; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; backdrop-filter: blur(5px); }
        
        .card-bottom::-webkit-scrollbar { width: 6px; }
        .card-bottom::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

        /* Iframe Overlay Style */
        #content-frame-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            z-index: 2000;
        }
        #content-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .close-frame {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 2100;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeFlash()"></div>

    <div id="main-ui">
        <header class="banner">
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="Logo">
            <h1>Mr. Ezz .Y. Ali</h1>
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz">
        </header>

        <div class="controls">
            <button class="switch-btn" onclick="toggleView()">Tokens Portal</button>
        </div>

        <main class="grid-container" id="levels-grid"></main>
        
        <div id="vortex-container">
            <div class="vortex"></div>
            <div class="vortex-content">
                <h2>VORTEX ACCESS</h2>
                <input type="text" id="offlineCode" placeholder="Enter Agent Code..." onkeypress="handleCode(event)">
                <p style="margin-top:15px; font-size:0.8em; color:rgba(255,255,255,0.5)">Press Enter to Scan</p>
            </div>
        </div>
    </div>

    <div id="flash-screen">
        <div class="card-top" id="studentHeader"></div>
        <div class="card-bottom">
            <div class="grade-box"><input type="number" placeholder="Attendence" onchange="submitGrade(this, 'Attendence')"></div>
            <div class="grade-box"><input type="number" placeholder="ICA" onchange="submitGrade(this, 'ICA')"></div>
            <div class="grade-box"><input type="number" placeholder="Reading" onchange="submitGrade(this, 'Reading')"></div>
            <div class="grade-box"><input type="number" placeholder="Tongue Twister" onchange="submitGrade(this, 'Tongue Twister')"></div>
            <div class="grade-box"><input type="number" placeholder="One Shot" onchange="submitGrade(this, 'One Shot')"></div>
            <div class="grade-box"><input type="number" placeholder="Games" onchange="submitGrade(this, 'Games')"></div>
            <div class="grade-box"><input type="number" placeholder="Squeezer" onchange="submitGrade(this, 'Squeezer')"></div>
            <div class="grade-box"><input type="number" placeholder="DMT" onchange="submitGrade(this, 'DMT')"></div>
            <div class="grade-box"><input type="number" placeholder="Wish" onchange="submitGrade(this, 'Wish')"></div>
            <div class="grade-box"><input type="number" placeholder="Project" onchange="submitGrade(this, 'Project')"></div>
            <div class="grade-box"><input type="number" placeholder="Graduation Project" onchange="submitGrade(this, 'Graduation Project')"></div>
            <div class="grade-box bonus-box"><input type="number" placeholder="★ Special Bonus" onchange="submitGrade(this, 'Bonus')"></div>
        </div>
    </div>

    <div id="content-frame-container">
        <button class="close-frame" onclick="closeFrame()">Back to Map</button>
        <iframe id="content-iframe"></iframe>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw9ua5PF26VSy4gzNK0pSNMRuZ5ejXBQaAR0-m-rUNirMW8F7Knk6wYcBz80LCy5PhqvQ/exec";
        let currentStudent = null;

        function toggleView() {
            const grid = document.getElementById('levels-grid');
            const vortex = document.getElementById('vortex-container');
            const btn = document.querySelector('.switch-btn');
            if (grid.style.display !== 'none') {
                grid.style.display = 'none';
                vortex.style.display = 'flex';
                btn.innerText = "Back to Levels";
            } else {
                grid.style.display = 'grid';
                vortex.style.display = 'none';
                btn.innerText = "Tokens Portal";
            }
        }

        function handleCode(e) {
            if (e.key === 'Enter') {
                const code = e.target.value.trim();
                if(!code) return;
                
                e.target.disabled = true;
                e.target.placeholder = "Scanning...";

                fetch(`${API_URL}?action=getStudentByOfflineCode&offlineCode=${code}`)
                .then(response => response.json())
                .then(res => {
                    e.target.disabled = false;
                    e.target.placeholder = "Enter Agent Code...";
                    if (res.status === "success") {
                        showStudentCard(res.data);
                        e.target.value = "";
                    } else {
                        alert(res.message || "Code not found!");
                    }
                })
                .catch(err => {
                    console.error(err);
                    e.target.disabled = false;
                    alert("System Connection Error");
                });
            }
        }

        function showStudentCard(data) {
            currentStudent = data;
            document.getElementById('studentHeader').innerHTML = `
                <img src="${data.avatar}" onerror="this.src='https://via.placeholder.com/100'">
                <div class="student-info">
                    <h3>${data.name}</h3>
                    <p>Tokens: <b style="color:#2ecc71">${data.tokens}</b> | Stars: <b style="color:#f1c40f">⭐${data.stars}</b></p>
                    <p>Global: #${data.globalRank} | Local: #${data.localRank} | Group: ${data.group}</p>
                </div>
            `;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('flash-screen').style.display = 'block';
        }

        function submitGrade(input, activity) {
            const val = input.value;
            if (!val || !currentStudent) return;
            
            const parent = input.parentElement;
            parent.style.opacity = "0.5";

            const updateUrl = `${API_URL}?action=updateGrades&email=${encodeURIComponent(currentStudent.email)}&activity=${encodeURIComponent(activity)}&grade=${val}`;

            fetch(updateUrl)
            .then(response => response.json())
            .then(res => {
                if(res.status === "success") {
                    parent.classList.add('updated');
                    parent.style.opacity = "1";
                    showStudentCard(res.data); 
                    input.value = ""; 
                } else {
                    alert("Wolf Error: " + (res.message || res));
                    parent.style.opacity = "1";
                }
            })
            .catch(err => {
                console.error(err);
                alert("Connection Lost!");
                parent.style.opacity = "1";
            });
        }

        function closeFlash() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('flash-screen').style.display = 'none';
            document.querySelectorAll('.grade-box').forEach(b => b.classList.remove('updated'));
            document.querySelectorAll('.grade-box input').forEach(i => i.value = "");
        }

        function openLecture(level, session) {
            const frameContainer = document.getElementById('content-frame-container');
            const iframe = document.getElementById('content-iframe');
            
            const menuHTML = `
                <html>
                <head>
                    <style>
                        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
                        .menu-btn { width: 250px; padding: 20px; margin: 10px; background: #e74c3c; border: none; color: white; font-size: 1.2em; border-radius: 10px; cursor: pointer; transition: 0.3s; }
                        .menu-btn:hover { background: #c0392b; transform: scale(1.05); }
                    </style>
                </head>
                <body>
                    <h1>Level ${level} - Session ${session}</h1>
                    <button class="menu-btn" onclick="loadScript('Listening')">🎧 Listening</button>
                    <button class="menu-btn" onclick="loadScript('Grammar')">📝 Grammar</button>

                    <script>
                        function loadScript(type) {
                            const scriptPath = \`data/L\${${level}}S\${${session}}_\${type}.js\`;
                            const script = document.createElement('script');
                            script.src = scriptPath;
                            script.onload = () => console.log(type + ' Loaded');
                            script.onerror = () => alert('File not found: ' + scriptPath);
                            document.body.appendChild(script);
                            document.body.innerHTML = '<h2 style="padding:20px;">Loading ' + type + '...</h2>';
                        }
                    <\/script>
                </body>
                </html>
            `;

            iframe.srcdoc = menuHTML;
            frameContainer.style.display = 'block';
        }

        function closeFrame() {
            document.getElementById('content-frame-container').style.display = 'none';
            document.getElementById('content-iframe').srcdoc = "";
        }

        const grid = document.getElementById('levels-grid');
        for (let i = 1; i <= 12; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'level-wrapper';
            wrapper.innerHTML = `
                <div class="main-circle" onclick="toggleSubCircles(this)">Level ${i}</div>
                <div class="sub-circle s1" onclick="openLecture(${i}, 1)">1</div>
                <div class="sub-circle s2" onclick="openLecture(${i}, 2)">2</div>
                <div class="sub-circle s3" onclick="openLecture(${i}, 3)">3</div>
                <div class="sub-circle s4" onclick="openLecture(${i}, 4)">4</div>
            `;
            grid.appendChild(wrapper);
        }

        function toggleSubCircles(el) {
            const wasActive = el.parentElement.classList.contains('active');
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
            if (!wasActive) el.parentElement.classList.add('active');
        }
    </script>
</body>
</html>
