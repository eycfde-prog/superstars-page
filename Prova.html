<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb to Be Quiz</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #fab1a0;
            --bg-color: #f0f3f7;
            --text-color: #2d3436;
            --correct-color: #00b894;
            --error-color: #d63031;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        #game-container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border: 5px solid var(--secondary-color);
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p.instruction {
            color: #636e72;
            margin-bottom: 20px;
            font-weight: 500;
        }

        #question-box {
            background: #fff9f0;
            padding: 40px 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sentence {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--error-color);
            margin: 0;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 18px 25px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #answer-btn {
            background-color: var(--primary-color);
            color: white;
        }

        #next-btn {
            background-color: var(--correct-color);
            color: white;
            display: none;
        }

        button:active {
            transform: scale(0.95);
        }

        .progress {
            margin-top: 25px;
            font-size: 1rem;
            color: #b2bec3;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>Find the Mistake! 🕵️‍♀️</h1>
    <p class="instruction">Can you fix the "Verb to Be"?</p>
    
    <div id="question-box">
        <p id="sentence"></p>
    </div>

    <div class="btn-container">
        <button id="answer-btn" onclick="showAnswer()">Check Answer ✅</button>
        <button id="next-btn" onclick="nextQuestion()">Next Question ➡️</button>
    </div>

    <div class="progress">Question <span id="current">1</span> of 10</div>
</div>

<script>
    // Mix of statements and questions
    const questions = [
        { wrong: "I is a doctor.", right: "I am a doctor." },
        { wrong: "Are he your brother?", right: "Is he your brother?" },
        { wrong: "They am at school.", right: "They are at school." },
        { wrong: "Is you ready?", right: "Are you ready?" },
        { wrong: "It are very cold.", right: "It is very cold." },
        { wrong: "Am she a teacher?", right: "Is she a teacher?" },
        { wrong: "We is the champions.", right: "We are the champions." },
        { wrong: "Are it a red apple?", right: "Is it a red apple?" },
        { wrong: "You am very kind.", right: "You are very kind." },
        { wrong: "Are I late?", right: "Am I late?" }
    ];

    let currentIndex = 0;

    const sentenceEl = document.getElementById('sentence');
    const answerBtn = document.getElementById('answer-btn');
    const nextBtn = document.getElementById('next-btn');
    const currentEl = document.getElementById('current');

    function loadQuestion() {
        sentenceEl.textContent = questions[currentIndex].wrong;
        sentenceEl.style.color = "var(--error-color)";
        answerBtn.style.display = "block";
        nextBtn.style.display = "none";
        currentEl.textContent = currentIndex + 1;
    }

    function showAnswer() {
        sentenceEl.textContent = questions[currentIndex].right;
        sentenceEl.style.color = "var(--correct-color)";
        answerBtn.style.display = "none";
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < questions.length) {
            loadQuestion();
        } else {
            alert("Awesome Job! You finished all questions! 🎉");
            currentIndex = 0;
            loadQuestion();
        }
    }

    loadQuestion();
</script>

</body>
</html>
