<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Veto Bubbles - Miss Dina</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sky: #87CEEB;
            --bubble-gradient: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
            --pink-accent: #ff477e;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--bg-sky);
            font-family: 'Fredoka One', cursive;
            touch-action: none;
            position: fixed; /* تمنع الاهتزاز عند فتح الكيبورد */
        }

        #game-container {
            width: 100%; height: 100%;
            position: relative;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            display: flex; flex-direction: column;
        }

        #teacher-sign {
            position: absolute; bottom: 15px; right: 20px;
            font-size: 1rem; color: rgba(255,255,255,0.8); z-index: 10;
            letter-spacing: 1px;
        }

        #stats {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-around;
            font-size: 1.8rem; color: white; 
            text-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 20;
        }

        #danger-line {
            position: absolute; bottom: 35%; 
            width: 100%; height: 8px;
            background: repeating-linear-gradient(90deg, #ff4d4d, #ff4d4d 20px, transparent 20px, transparent 40px);
            z-index: 5;
            filter: drop-shadow(0 0 5px rgba(255,0,0,0.4));
        }

        #word-wrapper {
            position: absolute; top: -120px;
            display: flex; flex-direction: row;
            gap: 10px; width: 100%; justify-content: center;
            transition: transform 0.05s linear;
        }

        .bubble-char {
            width: 65px; height: 65px;
            background: var(--bubble-gradient);
            border: 3px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; color: #005f73;
            box-shadow: inset 0 4px 10px rgba(255,255,255,0.5), 0 6px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .popped { animation: pop-effect 0.4s ease-out forwards; }
        @keyframes pop-effect {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); background: #fff; filter: brightness(1.2); }
            100% { transform: scale(2); opacity: 0; }
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(10, 25, 47, 0.9);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 1000; color: white; text-align: center;
            padding: 20px;
        }

        button {
            padding: 18px 45px; font-size: 1.8rem; font-family: 'Fredoka One';
            background: var(--pink-accent); color: white; border: none; border-radius: 50px;
            box-shadow: 0 6px #c9184a; cursor: pointer; transition: 0.2s;
            margin-top: 20px;
        }

        button:active { transform: translateY(3px); box-shadow: 0 3px #c9184a; }

        /* تعديل الكيبورد المخفي ليكون متفاعل أكثر */
        #hidden-input {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0; z-index: -1;
            font-size: 16px; /* يمنع الـ Zoom في iOS */
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="teacher-sign">Miss Dina ✨</div>
    
    <div id="stats">
        <div>⏳ <span id="timer">30</span>s</div>
        <div>🏆 <span id="score">0</span></div>
    </div>

    <div id="word-wrapper"></div>
    <div id="danger-line"></div>

    <input type="text" id="hidden-input" inputmode="text" autocomplete="off" autofocus>

    <div id="start-screen" class="overlay">
        <h1 style="color: #00f2fe; font-size: 3rem; margin-bottom: 5px; text-shadow: 0 5px 15px rgba(0,242,254,0.4);">VETO BUBBLES</h1>
        <p style="font-size: 1.2rem; margin-bottom: 25px; opacity: 0.9;">Created for Miss Dina's Heroes 🌟</p>
        <button id="start-btn">GO! 🚀</button>
    </div>

    <div id="end-screen" class="overlay" style="display: none;">
        <h1 style="font-size: 3rem; color: #ff477e;">SUPER JOB! 🌈</h1>
        <p style="font-size: 2rem;">You got: <span id="final-score" style="color:#00f2fe">0</span> words</p>
        <button onclick="location.reload()">PLAY AGAIN 🔄</button>
    </div>
</div>

<audio id="snd-right" src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/049c78119aea7374931dfc64f1864034f1b0cb7a/data/gamewav/rlitter.wav"></audio>
<audio id="snd-wrong" src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/049c78119aea7374931dfc64f1864034f1b0cb7a/data/gamewav/wlitter.wav"></audio>
<audio id="snd-complete" src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/049c78119aea7374931dfc64f1864034f1b0cb7a/data/gamewav/completeworf.wav"></audio>
<audio id="snd-finish" src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/049c78119aea7374931dfc64f1864034f1b0cb7a/data/gamewav/fimishgame.wav"></audio>

<script>
    const originalWords = ["live", "kind", "old", "together", "mother", "brother", "sister", "father", "years", "family"];
    let wordPool = [...originalWords];
    let currentWord = "";
    let charIdx = 0;
    let score = 0;
    let timeLeft = 30;
    let isActive = false;
    let baseSpeed = 0.6;

    const wrapper = document.getElementById('word-wrapper');
    const input = document.getElementById('hidden-input');
    
    const sounds = {
        right: document.getElementById('snd-right'),
        wrong: document.getElementById('snd-wrong'),
        complete: document.getElementById('snd-complete'),
        finish: document.getElementById('snd-finish')
    };

    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('start-screen').style.display = 'none';
        isActive = true;

        // تفعيل الكيبورد والميديا
        input.focus();
        Object.values(sounds).forEach(s => { s.play(); s.pause(); s.currentTime = 0; });

        spawnWord();
        tick();
        runTimer();
    });

    function spawnWord() {
        if (wordPool.length === 0) wordPool = [...originalWords];
        const randIdx = Math.floor(Math.random() * wordPool.length);
        currentWord = wordPool.splice(randIdx, 1)[0];
        
        charIdx = 0;
        wrapper.innerHTML = "";
        wrapper.style.top = "-100px";
        
        currentWord.split('').forEach(char => {
            const div = document.createElement('div');
            div.className = 'bubble-char';
            div.innerText = char.toUpperCase();
            wrapper.appendChild(div);
        });
    }

    function tick() {
        if (!isActive) return;
        let top = parseFloat(wrapper.style.top) || -100;
        
        let speed = baseSpeed / (currentWord.length > 6 ? 1.3 : 1);
        wrapper.style.top = (top + speed) + "px";

        const lineY = document.getElementById('danger-line').offsetTop;
        if (top + 60 > lineY) {
            spawnWord(); 
        }

        requestAnimationFrame(tick);
    }

    function runTimer() {
        const timer = setInterval(() => {
            if (!isActive) { clearInterval(timer); return; }
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                isActive = false;
                sounds.finish.play();
                showEnd();
            }
        }, 1000);
    }

    // تعديل منطق الإدخال ليدعم الـ Input المباشر للموبايل
    input.addEventListener('input', (e) => {
        if (!isActive) return;
        
        const val = e.target.value.toLowerCase();
        const pressed = val[val.length - 1]; // آخر حرف تم كتابته
        const target = currentWord[charIdx].toLowerCase();

        if (pressed === target) {
            const bubbles = document.querySelectorAll('.bubble-char');
            bubbles[charIdx].classList.add('popped');
            sounds.right.currentTime = 0;
            sounds.right.play();
            charIdx++;

            if (charIdx === currentWord.length) {
                score++;
                document.getElementById('score').innerText = score;
                sounds.complete.currentTime = 0;
                sounds.complete.play();
                setTimeout(spawnWord, 400);
            }
        } else {
            sounds.wrong.currentTime = 0;
            sounds.wrong.play();
        }
        
        // مسح الـ input أول بأول عشان يفضل يستقبل حروف
        if (val.length > 5) e.target.value = ""; 
    });

    // إبقاء الكيبورد مفتوحاً مهما حصل
    document.addEventListener('touchstart', () => {
        if(isActive) input.focus();
    });

    function showEnd() {
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
        input.blur(); // إغلاق الكيبورد عند النهاية
    }
</script>

</body>
</html>
