<style>
    /* Overlay Styles */
    #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.95); display: none;
        flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
    }
    #activityWindow {
        width: 90%; height: 80%; background: white; border-radius: 15px;
        position: relative; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
    }
    .modal-controls {
        width: 90%; display: flex; justify-content: space-between; margin-top: 20px;
    }
    .close-btn { background: #ef4444; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .main-submit-btn { background: var(--accent); color: white; border: none; padding: 10px 40px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
</style>

<div id="overlay">
    <div id="activityWindow">
        <iframe id="activityFrame" src="" frameborder="0" style="width:100%; height:100%;"></iframe>
    </div>
    <div class="modal-controls">
        <button class="close-btn" onclick="closeActivity()">CLOSE</button>
        <button class="main-submit-btn" onclick="submitFromIframe()">SUBMIT MY WORK</button>
    </div>
</div>

<script>
    // تحديث وظيفة الـ Launch
    function launch(name) {
        const overlay = document.getElementById('overlay');
        const frame = document.getElementById('activityFrame');
        
        // تنظيف اسم النشاط لتحويله لاسم ملف (تبديل المسافات بـ _)
        const fileName = name.replace(/\s+/g, '_');
        
        // مناداة المحرك الشامل مع اسم المهمة
        frame.src = `eycmainengine.html?activity=${fileName}`;
        overlay.style.display = 'flex';
    }

    function closeActivity() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('activityFrame').src = '';
    }

    // الوظيفة السحرية: سحب البيانات من داخل الـ Iframe وإرسالها
    function submitFromIframe() {
        const frame = document.getElementById('activityFrame');
        // الوصول للوظيفة الموجودة داخل eycmainengine
        if (frame.contentWindow.getStudentData) {
            const data = frame.contentWindow.getStudentData();
            console.log("Data Received from Engine:", data);
            alert("Great Job! Data collected. Ready for Google Sheets.");
            closeActivity();
        } else {
            alert("Wait for the activity to load completely.");
        }
    }
</script>
