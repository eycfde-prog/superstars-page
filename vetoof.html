<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETO PROGRAM | Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette Enhancement: Higher Contrast Gold */
            --primary-gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition-speed: 0.4s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            /* Refined Background Overlay for better text legibility */
            background-image: 
                radial-gradient(circle at center, rgba(197, 160, 89, 0.05) 0%, transparent 70%),
                linear-gradient(rgba(2, 2, 2, 0.9), rgba(2, 2, 2, 0.95)),
                url('https://img.freepik.com/free-vector/digital-technology-background-with-abstract-geometric-shapes_1017-26801.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Stylish Header --- */
        .top-banner {
            height: 100px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-img { height: 50px; filter: drop-shadow(0 0 10px var(--gold-glow)); transition: 0.3s; }
        .logo-img:hover { filter: drop-shadow(0 0 15px var(--primary-gold)); }

        .mr-ezz-img { 
            height: 75px; 
            border-radius: 50%; /* Modern Circular Look */
            border: 2px solid var(--primary-gold); 
            box-shadow: 0 0 15px var(--gold-glow);
            transition: transform 0.3s ease;
        }
        .mr-ezz-img:hover { transform: scale(1.1) rotate(3deg); }

        /* --- Special Animated Title --- */
        .title-container { text-align: center; flex-grow: 1; }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(180deg, #fff 30%, var(--primary-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px var(--gold-glow));
            animation: titlePulse 4s infinite ease-in-out;
        }

        @keyframes titlePulse {
            0%, 100% { opacity: 0.8; transform: scale(1); filter: brightness(1); }
            50% { opacity: 1; transform: scale(1.03); filter: brightness(1.3) drop-shadow(0 0 20px var(--primary-gold)); }
        }

        /* --- Levels Grid --- */
        .levels-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            padding: 60px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- Level Card & Drawer --- */
        .level-block {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all var(--transition-speed) cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .level-block:hover {
            border-color: var(--primary-gold);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .level-card {
            padding: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .level-info .level-label {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: var(--primary-gold);
            font-weight: 700;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        .level-info .level-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.4rem;
            font-weight: 900;
            line-height: 1;
            color: #fff;
        }

        .arrow-icon {
            font-size: 1rem;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--primary-gold);
            background: rgba(212, 175, 55, 0.1);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .level-block.active { border-color: var(--primary-gold); background: rgba(255, 255, 255, 0.07); }
        .level-block.active .arrow-icon { transform: rotate(180deg); background: var(--primary-gold); color: #000; }

        /* --- Lectures Drawer --- */
        .lectures-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.3);
        }

        .level-block.active .lectures-drawer {
            max-height: 500px;
            border-top: 1px solid var(--glass-border);
            padding: 25px;
        }

        .lectures-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .lecture-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .lecture-item:hover {
            background: var(--primary-gold);
            border-color: var(--primary-gold);
            color: #000;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px var(--gold-glow);
        }

        .lecture-item span { font-size: 0.65rem; display: block; opacity: 0.8; letter-spacing: 1px; margin-bottom: 4px; }
        .lecture-item b { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .top-banner { height: 80px; padding: 0 3%; }
            .main-title { font-size: 1.2rem; letter-spacing: 4px; }
            .mr-ezz-img { height: 55px; }
            .logo-img { height: 35px; }
            .levels-container { padding: 30px 4%; }
            .lectures-grid { grid-template-columns: repeat(2, 1fr); }
            .level-info .level-number { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="top-banner">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="VETO" class="logo-img">
        <div class="title-container">
            <h1 class="main-title">VETO PROGRAM</h1>
        </div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz" class="mr-ezz-img">
    </header>

    <main class="levels-container" id="mainContainer">
        </main>

    <script>
        const container = document.getElementById('mainContainer');
        const levelsCount = 12;
        const sessionsPerLevel = 4;

        function initApp() {
            for (let i = 1; i <= levelsCount; i++) {
                const block = document.createElement('div');
                block.className = 'level-block';
                block.id = `level-${i}`;

                let sessionsHTML = '';
                for (let s = 1; s <= sessionsPerLevel; s++) {
                    sessionsHTML += `
                        <div class="lecture-item" onclick="event.stopPropagation(); navigate('${i}-${s}')">
                            <span>SESSION</span>
                            <b>${s < 10 ? '0' + s : s}</b>
                        </div>
                    `;
                }

                block.innerHTML = `
                    <div class="level-card" onclick="toggleDrawer(${i})">
                        <div class="level-info">
                            <span class="level-label">Access Point</span>
                            <div class="level-number">LEVEL ${i < 10 ? '0' + i : i}</div>
                        </div>
                        <div class="arrow-icon">▼</div>
                    </div>
                    <div class="lectures-drawer">
                        <div class="lectures-grid">
                            ${sessionsHTML}
                        </div>
                    </div>
                `;
                container.appendChild(block);
            }
        }

        function toggleDrawer(id) {
            const allBlocks = document.querySelectorAll('.level-block');
            const target = document.getElementById(`level-${id}`);
            const isActive = target.classList.contains('active');
            
            // Close others (Accordion effect)
            allBlocks.forEach(b => b.classList.remove('active'));
            
            // Toggle current
            if (!isActive) {
                target.classList.add('active');
                // Scroll into view smoothly if needed
                setTimeout(() => {
                    target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 300);
            }
        }

        function navigate(sid) {
            // Added loading state feel
            const items = document.querySelectorAll('.lecture-item');
            items.forEach(item => item.style.pointerEvents = 'none');
            window.location.href = `vetoofif.html?session=${sid}`;
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
