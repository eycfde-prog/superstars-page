<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veto Program - Fix Background</title>
    <style>
        :root {
            --primary-bg: #000;
            --text-color: #ffffff;
            --overlay-opacity: 0.3; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--primary-bg);
            font-family: 'Segoe UI', sans-serif;
        }

        /* التصحيح التقني لرابط الخلفية باستخدام jsDelivr CDN */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            /* تم تحديث الرابط ليعمل مباشرة دون مشاكل صلاحيات */
            background-image: url('https://cdn.jsdelivr.net/gh/eycfde-prog/EYCVetoProgram@51f1d5c58d4bcd34b8a4ddc1cd05d6fda68fade5/vetoofb.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, var(--overlay-opacity));
            z-index: -1;
        }

        .main-stage {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: clamp(3rem, 10vw, 7rem); /* حجم مرن يملأ الشاشات الكبيرة */
            font-weight: 900;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="overlay"></div>

    <main class="main-stage">
        <h1>VETO PROGRAM</h1>
    </main>

</body>
</html>
