<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Smart Board</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --banner-height: 110px; /* زيادة الطول قليلاً للفخامة */
            --font-main: 'Arial Black', 'Segoe UI', Roboto, sans-serif; /* خط عريض للرؤية البعيدة */
        }

        /* Reset & Base Styles */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; 
            -webkit-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
        }

        /* Header Styling - Optimized for 4 Meters */
        .top-banner {
            height: var(--banner-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; background: #000; 
            border-bottom: 4px solid var(--primary-gold);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .logo-img { height: 65px; filter: drop-shadow(0 0 5px var(--primary-gold)); }
        .mr-ezz-img { height: 85px; border-radius: 12px; border: 2px solid var(--primary-gold); }
        
        .session-info { text-align: center; flex-grow: 1; }
        .session-info h1 { 
            font-size: 2.2rem; 
            color: var(--primary-gold); 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .session-info span { 
            display: block; font-size: 1rem; color: #fff; opacity: 0.8; 
            font-family: 'Segoe UI', sans-serif; font-weight: normal;
        }

        /* Content Grid - Better Spacing */
        .content-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* كروت أعرض */
            gap: 25px; 
            padding: 40px; 
            overflow-y: auto;
            height: calc(100vh - var(--banner-height));
        }

        .content-card {
            background: var(--card-bg); 
            border: 2px solid rgba(197,160,89,0.2);
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            min-height: 160px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .content-card:hover { 
            border-color: var(--primary-gold); 
            background: rgba(197,160,89,0.1);
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 40px rgba(197,160,89,0.2);
        }

        .content-card h2 { 
            font-size: 1.8rem; /* خط كبير جداً للطلاب */
            line-height: 1.2;
            color: #fff;
        }

        /* Quick Tools & Overlays */
        #activity-stage { position: fixed; inset: 0; background:#000; z-index: 8000; display: none; }
        
        .exit-btn {
            position: absolute; top: 20px; left: 20px; z-index: 8500;
            background: #ff4757; color: white; border: none; 
            padding: 12px 25px; border-radius: 10px; font-weight: bold;
            cursor: pointer; font-size: 1.2rem;
        }

        /* ToolBox Styling */
        .toolbox-wrapper { position: fixed; bottom: 30px; right: 30px; z-index: 9500; display: flex; flex-direction: column-reverse; gap: 15px; }
        .tool-btn { 
            width: 60px; height: 60px; border-radius: 50%; 
            background: #1a1a1a; border: 2px solid var(--primary-gold); 
            color: var(--primary-gold); font-size: 1.5rem; display: none; 
            align-items: center; justify-content: center; cursor: pointer;
        }
        .toolbox-wrapper.open .tool-btn { display: flex; animation: slideUp 0.3s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Note Input */
        #smart-note-input {
            width: 90%; background: rgba(0, 0, 0, 0.95); 
            border: 4px solid var(--primary-gold); border-radius: 20px;
            color: #fff; padding: 30px; text-align: center;
            font-size: 3.5rem; font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="top-banner">
        <button onclick="window.location.href='vetoof.html'" style="background:none; border:2px solid var(--primary-gold); color:var(--primary-gold); padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">← BACK</button>
        
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        
        <div class="session-info">
            <h1 id="display-title">LOADING...</h1>
            <span id="display-subtitle">VETO EDUCATIONAL SYSTEM</span>
        </div>

        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage">
        <button class="exit-btn" onclick="closeStage()">EXIT (ESC)</button>
        <div id="stage-content" style="width:100%; height:100%;"></div>
    </div>

    <div id="quick-note-container" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 100%; z-index: 9600; display: none; text-align: center;">
        <input type="text" id="smart-note-input" placeholder="Type Note...">
    </div>

    <div class="toolbox-wrapper" id="toolBox">
        <button class="tool-btn" style="display:flex; background:var(--primary-gold); color:black;" onclick="toggleToolBox()">🛠️</button>
        <button class="tool-btn" id="laserBtn" onclick="toggleLaser()">🔦</button>
        <button class="tool-btn" id="reloadBtn" onclick="location.reload()">🔄</button>
        <button class="tool-btn" id="noteBtn" onclick="toggleNote()">📝</button>
    </div>

    <script src="data/levels.js"></script>
    <script>
        // Logic لإظهار المستوى والمحاضرة في العنوان
        const urlParams = new URLSearchParams(window.location.search);
        const currentSessionId = urlParams.get('session'); // Example: "1-5"

        function updateHeader() {
            if (currentSessionId) {
                const parts = currentSessionId.split('-');
                const level = parts[0];
                const session = parts[1];
                document.getElementById('display-title').innerText = `LEVEL ${level} | SESSION ${session}`;
            }
        }

        // تحسين الـ Card Generation
        function initSession() {
            updateHeader();
            if (!currentSessionId || !sessionData[currentSessionId]) return;
            
            const container = document.getElementById('content-container');
            sessionData[currentSessionId].forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.onclick = () => openActivity(item);
                card.innerHTML = `<h2>${item}</h2>`;
                container.appendChild(card);
            });
        }

        // باقي دوال الـ Logic (openActivity, closeStage, etc.) تُضاف هنا كما هي في الكود الأصلي
        // ... (Keep your existing JS logic for tools and activities)

        window.onload = initSession;
    </script>
</body>
</html>
