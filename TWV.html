 على نفسه ليعود ويأخذه، فهو ليس مجرد قطعة صوف، بل هو الرابط الوحيد ب \"مليكة\". ولكن فجأة، ظهر ذئب ثالث من بين الصخور، بدأ يشمشم الأرض ببطء حتى وصل إلى الشال المشبع برائحة الدم.", "صرخ \"كلاي\" بجنون وهو يحاول إخافة الذئب: \"اترك الشال! اتركه أيها اللعين!\". تملكه رعب مزدوج؛ فخلفه وحش غامض قد يختطفه في أي لحظة كما فعل بالحصان، وأمامه ذئب يسرق ذكراه الوحيدة منها. لكن الذئب، مدفوعاً برائحة الدم، ظن أن الشال يحتوي على قطعة لحم أو صيد ثمين، فالتقطه بفكه وانطلق يركض بعيداً في الظلام.", "انهار \"كلاي\" عند مدخل الكهف، وركع علي ركبيته وهو يصرخ بأعلى صوته في وجه الذئب الهارب: \"تعال أيها الغبي! أنا هنا.. أنا الفريسة.. أنا الوحش! اترك الشال وعد إليّ!\"", "كانت صرخة يأس هزت أركان الكهف، لكن الذئب اختفى في عتمة الليل، تاركاً \"كلاي\" وحيداً، جريحاً، وفي مواجهة مباشرة مع ظلام المتاهة الذي بدأ يتنفس خلف ظهره.", "كانت المكافأة المرصودة لرأس \"كلاي\" تمثل حلم أي زوجين في الوادي؛ خيمة متوسطة الحجم تفوق في حجمها خيام القرويين، وقطيعاً من الأغنام يضمن حياة أبدية رغدة. انطلق الفرسان في صحراء الثلوج، يطاردون الغريب الذي وصموه بسرقة التاج الملكي.", "كان المشهد مهيباً؛ فرسان بلا أعين يتحركون في عرض الصحراء بمنتهى الخفة والثقة، يتفادون الصخور والنباتات والمنحدرات وكأنهم يملكون بصراً خارقاً. سر تميزهم كان \"رادار الصوت\"؛ مهارة عسكرية تجعل الفارس يقف في اللامكان، يطلق زفيراً طويلاً مصحوباً بأصوات متتالية ومنظمة في كل الاتجاهات لمدة دقيقة كاملة. وبحاسة سمع تفوق بمراحل قدرة القرويين العاديين، يلتقطون ارتداد الصوت (الصدى) في لحظة صدوره. يلف الفارس حول نفسه كأنه ينفخ في الهواء، ليتأكد من ثبات الارتداد أو تغيره، وبناءً عليه يحددون أماكن الأجسام بدقة مذهلة؛ فالصمت المطلق يعني فراغ المدى، وأي تغيير في نغمة الصدى يعني وجود هدف. والأغرب أن لكل فارس طبقة صوتية خاصة لا يلتقط شفرتها المرتدة سواه.", "ولكن، إذا كان هؤلاء هم الفرسان العاديون، فإن فرسان \"إنزو\" كانوا يتجاوزون حدود البشر.", "خرج \"تيد\" و\"بن\" على خيولهما، يخترقان رياح \"لامبرث\" التي يستخدمونها كبوصلة لتحديد الاتجاهات. لم يتجها صوب \"كهف المتاهة\" كما قد يظن البعض، بل قصدا \"كهف الذئاب\" تنفيذاً لأوامر الطبيب العجوز القبيح. كان هذا الكهف الممتد تحت الأرض معقلاً لقبيلة من الذئاب الشرسة التي دجنها رجال \"إنزو\" لتكون جيشهم السري وسيداً للصحراء الثلجية.", "وهكذا تم انقاذ كلاي بعد ان انهار به الجبل وهجم عليه الذئب الضخم.", "أطلق \"بن\" صفارة خفية ذات تردد خاص، وما هي إلا ثوانٍ حتى انطلق ذئب ضخم من الأعماق، ارتمى فوق \"بن\" يداعبه بمودة وحشية وسط ضحكات الأخوين. أخرج \"تيد\" من جعبة حصانه \"ملاءة السرير\" التي كان ينام عليها \"كلاي\" في خيمته، وقربها من أنف الذئب ليشتمّ رائحة \"الغريب\".", "توقع الأخوان أن ينطلق الذئب فوراً نحو \"كهف المتاهة\" ليتبعاه، لكن الذئب فعل شيئاً غير متوقع؛ عاد إلى داخل كهف الذئاب مرة أخرى. تبادل \"تيد\" و\"بن\" همهمات الحيرة، ولكن بعد ثوانٍ، خرج الذئب وهو يحمل شيئاً في فمه.", "وعندما تحسسه الأخوان، تجمعت على وجوههم ابتسامة نصر شيطانية؛ لقد كان \"شال مليكة\" الصوفي، غارقاً بدم \"كلاي\" الحقيقي. كانت الخطة تخدم نفسها بأكثر مما تمنوا؛ فقد كان \"إنزو\" يطالبهم بأي أثر لـ \"كلاي\" ليلطخوه بالدماء ويقدموه للزعيم كدليل على موته وجدارة \"تيد\"، لكن امامهم كانت دماء \"كلاي\" الفعلية على طبق من ذهب.", "كان الحزن يعتصر قلب \"كلاي\" على فقدان الشال؛ لم يكن حزناً على صوفٍ يدفئه، بل على قطعة من روح \"مليكة\" كانت تؤنس وحشته. ومع كل خطوة يخطوها داخل الكهف، كان يشعر بالدفء يزداد، وكأن الجبل يحتضنه بعيداً عن صقيع الخارج.", "بدأ \"كلاي\" يتفحص الجدران والسقف بعناية فائقة، باحثاً عن أي علامة ترشد هويته أو تدل على من سكنوا هذا المكان. وبالفعل، وقعت عيناه على نقوش ملونة لأطفال يبتسمون مع أهاليهم؛ رسومات تنبض بالبهجة والأمان، وكأن هذا الكهف لم يكن يوماً مقبرة أو متاهة، بل كان ملاذاً دافئاً وحياة كاملة.", "سار \"كلاي\" ببطء شديد، يجر حقيبته خلفه ويعرج متألماً، بينما الحذر يملأ كيانه. يلتفت يميناً ويساراً وخلفه، متوقعاً في أي لحظة أن يظهر \"المسخ\" ليلتهمه، وهو العاجز حتى عن الهرب. وصل إلى مفترق طرق، وبعد حيرة، قرر البقاء على الطريق الأساسي، لكنه بعد خطوات قليلة وجد نفسه أمام طريق مسدود.", "كانت هناك حائط ضخم يسد الممر، عليه رسومات غامضة متهالكة. اقترب \"كلاي\" وكشافه يرتجف في يده، فحص الكلمات المحفورة حتى استطاع تمييز كلمة واحدة: \"لامبرث\". حاول البحث عن أبواب سرية أو فتحات، لكن الجدار بدا أصماً. رفع نظره للأعلى، فلاحظ أن الحائط لا يصل إلى السقف تماماً؛ هناك فراغ بسيط وراءه، مما يعني أن المخرج يكمن خلف هذا السد.", "ثبّت \"كلاي\" الكشاف بجانبه، وبدأ يضغط بكل قوته على جوانب الحائط وأركانه، يمد ذراعه لأقصى مداها صعوداً وهبوطاً، لكن دون جدوى.", "مرت به دقائق وهو يفحص الكهف من كل الجوانب والاتجاهات حتي نفذت طاقته، وانتهى مفعول \"أدرينالين\" الاكتشاف ليحل محله إرهاق يصحبه تشوش. سقط \"كلاي\" جالساً على الأرض، وأسند ظهره إلى الحائط الذي سدّ طريقه، وبدأ ينهج بعنف من المجهود، وبدأ بدفع ثمن تحامله علي رجله المصابه, عادت آلام ساقه كأنها سياط من نار.", "تسلل اليأس إلى روحه، فدمعت عيناه في ذلك الظلام الدامس، ومن فرط التعب سقط الكشاف من يده المرتجفة. وبينما كان الكشاف يتدحرج على الأرض، استقر ضوؤه على مكان محفور، مغطىً بمربع حديدي لم يلحظه من قبل.", "اتسعت عينا \"كلاي\" بدهشة وهو يراقب المربع الحديدي تحت ضوء الكشاف الذي بدأ يضعف ويومض منادياً بنفاد البطارية. هزّ \"كلاي\" الكشاف بقوة ليعيد إليه الحياة، وقرب الضوء من المربع ليجد جملة محفورة بدقة باللغة الإنجليزية:", "\"فقط عند السقوط بقوة.. يمكن الارتفاع بقوة\"", "حبس \"كلاي\" أنفاسه؛ الكلمات ليست مجرد حكمة، بل هي \"كتالوج\" لتشغيل هذا المكان. هل المخرج ليس في الصعود، بل في النزول إلى أعماق أكثر رعباً؟", "الفصل الرابع والثلاثون: حوافر الموت والظلام الدامس", "لم يستوعب \"كلاي\" مغزى الجملة المحفورة، لكن غريزة البقاء دفعته للبحث عن أمل تحت ذلك المربع الحديدي. وبالفعل نجح في رفعه، ليكشف عن حلقة حديدية مربوطة بسلسلة قصيرة تمتد عميقاً تحت الأرض. أيقن أن هذا هو \"المفتاح\"؛ شدّ هذه السلسلة قد يفتح باباً سرياً أو مخرجاً طال انتظاره.", "لكن، وفي اللحظة التي تلامست فيها أصابعه مع برودة السلسلة، انطفأ نور الكشاف تماماً بفعل نفاذ البطارية. وفي الثانية التالية، اخترقت السكون زمجرةٌ مرعبة خرجت من حنجرةٍ لا يمكن أن تنتمي لذئب أو أي كائن أرضي يعرفه. كانت زمجرة ذات صدىً عميق واهتزازات واضحة، كفيلة بترويع عشيرة كاملة من الضواري.", "تجمد جسد \"كلاي\" من فرط الرعب؛ لم يعد يشعر بأطرافه، وسرت قشعريرة في كيانه شلّت تفكيره. لكنه مدّ يده ببطء شديد نحو الكشاف الملقى بجانبه على الأرض، متردداً بين رغبته في رؤية مصدر الصوت وخوفه من أن يكشف الضوء مكانه للمسخ، إذا لم يكن قد رآه بالفعل.", "\"هل حقاً أريد رؤية هذا الكابوس؟\". فكر في استخدام \"الفلاير\" فهو سلاح أضمن. رفع يده عن الكشاف ليتحسس سلاحه في الظلام الكاحل، لكن فالحظة التي رفع فيها يده عن الكشاف، عاد الكشاف، ليظهر مشهداً للاسف سيبقى محفوراً في ذاكرة \"كلاي\" ما عاش.", "كشف الضوء الخافت، وهو ملقى على الأرض، عن أرجل الوحش التي كانت تقف على بُعد خطوة واحدة فقط من \"كلاي\" الجالس مفرود الساقين في جمود. رأى أربعة أرجل طويلة وضخمة تشبه سيقان الزرافة، يكسوها شعر بني طويل مبلل بشكل غير مبرر, مشهد الحوافر وحدها خطف أنفاسه؛ ففي نهاية كل رجل من الأربع، برزت خمسة أظافر صقرية بيضاءصفراء تلمع تحت الضوء، حادة لدرجة توحي بأن الوحش كان يشحذها طوال اليوم انتظاراً لهذه اللحظة.", "نسي \"الفلاير\" ونسي الهروب، وانشغل عقله في حالة من الذهول المرعب بمحاولة تصنيف هذا الكائن الذي يملك مثل هذه السيقان. قطع حبل أفكاره سقوط بقعة كبيرة لزجة وخضراء على الأرض، أيقن أنها لعابٌ يسيل من شدق المسخ الذي كانت رأسه لا تزال غارقة في ظلام السقف العالي.", "راقب \"كلاي\" بقعة اللعاب وهي تتوسع، وشعر بغثيان شديد من لونها الأخضر المقزز، لكن سؤالاً بديهياً قفز إلى ذهنه وسط هذا الرعب: \"لماذا لا أزال حياً؟\". الوحش قريب جداً، و\"كلاي\" متجمد لا يصدر صوتاً، فهل الوحش لا يراه؟ هل هو أعمى مثل سكان الوادي؟ أم أنه لا يرى الضوء ولا يشم الرائحة؟", "وفجأة، وقبل أن يجد إجابة، ماتت البطارية تماماً، وانقطع خيط الضوء، ليترك \"كلاي\" والمسخ في ظلام دامس، لا يقطعه سوى صوت أنفاس الكائن الثقيلة.", "لم تمر سوى ثوانٍ معدودة، بدت كأنها دهر، حتى سمع \"كلاي\" وقع خطوات المسخ وهي تبتعد غارقة في أعماق المتاهة. كان قد دخل الكهف مدفوعاً بشغف استكشاف تاريخ الوادي، وهو يعلم أن نسبة نجاته تكاد تكون منعدمة، لكن الفضول المعرفي أعماه عن رؤية الحقيقة.", "إن قربه من ذلك المسخ كان مستوى من الرعب لم يختبره حتى حين كانت أنياب الذئاب تنهش ساقه. منظر ضخامة الأرجل والشعر المبلل -رغم جفاف الكهف- كان أهون بكثير من تلك اللحظات الساكنة التي تلت انطفاء الكشاف. فقد \"كلاي\" كل ذرة طاقة في جسده، وظل قابعاً في مكانه لا يجرؤ على تحريك إصبع واحد، بينما العرق يتصبب منه بغزارة، وعيناه متسعتان في الظلام تحاولان سحب ذرات الهواء من العدم.", "قضي دقائق يحاول بصعوبة سحب الهواء الي صدره لعله يعيد لقبه النبض الذي لم يعد يشعر به.", "تسللت إلى خاطره مجدداً تلك الجملة الغامضة: \"فقط عند السقوط بقوة.. يمكن الارتفاع بقوة\". يبدو أن عقله، من فرط الصدمة، قرر تجاهل وجود المسخ الذي كان على بُعد نصف متر منه، ليعود للعمل من النقطة التي توقف عندها قبل ظهور الكابوس.", "وعند اول حركة لذراعه شعر كان عظامه كانت متجمده لسنوات, بدأ \"كلاي\" يتحسس بيده مكان الحلقة الحديدية والسلسلة في العتمة وهو مازال يجاهد في سحب ذرات الاكسجين من الهواء؛ لم يكن يرى شيئاً، لكنه رسم خريطة لمكانها في مخيلته. حاول رفع ذراعه المرتجفة، لكنه فقد السيطرة عليها في منتصف الطريق لتسقط فوق جسده الهزيل. لم يستسلم، ظل يحاول وهو يشعر بأن جسده كله مخدر، حتى تمكنت أصابعه أخيراً من القبض على الحلقة.", "تحامل على نفسه واستعان بوزنه وأطلق أنيناً مكتوماً وهو يشد السلسلة بكل ما تبقى له من قوة. سُمع صوت \"تكة\" ميكانيكية عالية ترددت أصداؤها في المكان. ومع التكة، بدأت قطعة الحجر التي كان يجلس عليها \"كلاي\" فالارتفاع عن الأرض، لتقف به فوق الجدار الضخم الذي كان يسد طريقه.", "ارتمى \"كلاي\" على جانبه متفاديا حركة الجدار خلف ظهره ورأي ما وراء الحائط، فصعقه المشهد؛ لقد وجد باباً خلفياً للكهف، مخرجاً يطل مباشرة على السماء والأرض. \"أين الثلج؟!\"", "سأل نفسه في ذهول وهو يتأمل السماء الصافية المرصعة بالنجوم، والأرض التي بدت مائلة للسواد تحت جنح الليل، لكن لا أثر للجليد هناك. دبت في جسده طاقة مفاجئة، وزحف بكل قوته حتى وصل إلى حافة باب الكهف الخارجي.", "هنا، اتسعت عيناه من الدهشة؛ فرغم الظلام الدامس، لم يشعر ببرد \"لامبرث\" القارس. تلمس الأرض خارج الكهف وهو نائم عليها، ليجدها تربة رملية جافة. هل خرج فعلاً من الوادي الملعون؟ غمره أمل جارف وسعادة لم يعرفها منذ زمن، وبدأ يشم رائحة التراب بشغف كأنه جائع يشم رائحة الخبز.", "لكنه لم يلحظ أن هناك كائناً آخر جائعاً حقاً، كائناً يشمشم الهواء مثله تماماً، لكن ليس فالتراب.. بل يشم رائحة الدماء الطازجة النازفة من رجل كلاي المصابة، والتي كانت بمثابة دعوة عشاء صريحة في هذا العالم الجديد.", "لم يكد \"كلاي\" يهنأ برائحة التراب الجاف ودفء الجو الجديد، حتى أعلن \"ذئب البرية\" عن وجوده. لم تكن مجرد عضة، بل كانت إعلاناً بالاستحواذ على جسد \"كلاي\" المنهك؛ انغرزت الأنياب في نفس الكاحل المصاب، لتعيد تمزيق الجروح القديمة بضراوة.", "صرخ \"كلاي\" صرخة دوت في أرجاء المكان، صرخة أطاحت بالتراب أمام وجهه.", "التفت بصعوبة بالغة، وعيناه تنهال بالدموع من فرط الألم، ليرى خصمه الجديد: ذئب ضخم من ذئاب البرية، يفوق في حجمه وقوته ذئاب الثلوج التي واجهها في الوادي بمرتين.", "بدت العلاقة بين \"كلاي\" والذئاب وكأنها ثأر قديم لا ينتهي؛ ففي كل مرة يظن أنه نجا، يظهر له ذئب ليختبر إرادته. لكن هذه المرة، كان الغضب داخل \"كلاي\" أقوى من الخوف؛ فكرة أن رحلته الشاقة، واكتشافاته المذهلة، وخروجه من ممر \"لامبرث\" المستحيل قد تضيع هباءً تحت أنياب حيوان مفترس، جعلت الدماء تغلي في عروقه.", "وبدون تردد، وبحركة نابعة من غريزة البقاء الصرفة، مد يده نحو حزامه وجذب \"الفلاير\" بغل.", "تفاجأ الذئب بالحركة السريعة، فترك الساق المصابة محملقاً في عيني \"كلاي\" مباشرة بزمجرة تحذيرية، كأنها تنذره من الضغط على الزناد. لكن من يقف أمام هذا الذئب ليس مجرد فريسة، بل هو مدرس تاريخ استطاع فك شفرات وادٍ ظل محبوساً لمئات السنين، وخرج من ممر لم يجرؤ أحد على دخوله.", "بكل ما أوتي من غضب، وبأصابع ترتجف من الألم والارتباك، ضغط \"كلاي\" على الزناد. دوى صوت الانفجار في سكون الليل ليصم الآذان، وانطلقت الرصاصة الضوئية بلونها الناري لتضيء المكان كأن شمسًا قد أشرقت فجأة في قلب الظلام.", "ضيق\"كلاي\" عينيه من وهج الطلقة.. لكن الرصاصة لم تصب الذئب؛ مرت بجانبه, تركت \"كلاي\" في مواجهة مصيره وجهاً لوجه مع الذئب.", "وبعد كل ما وصل له من نجاح, فقد \"كلاي\" رصاصته الأخيرة، وسلاحه الوحيد للنجاة.", "لم يكن \"تيد\" أو \"بن\" بحاجة للذهاب إلى \"كهف المتاهة\" ليتأكدا من مصير \"كلاي\"؛ فبالنسبة لهما، كان \"الغريب\" ساذجاً بما يكفي ليصدق أنه صار واحداً من رجال \"إنزو\". تخيلاه وهو يحاول ممارسة ما تعلمه منهما، فبات ليلته في عراء الثلج وسط الذئاب الجائعة، ظاناً أن \"صفيراً خفياً\" سيحميه، بينما الواقع أن تلك الذئاب قد مزقته إرباً.", "كان \"الشال\" الملطخ بالدماء في أيديهم هو الدليل القاطع الذي يغلق القضية. وبمجرد أن علم \"إنزو\" بالخبر، اصطحب \"تيد\" والتاج والشال، وتوجهوا بموكب انتصار إلى الخيمة الكبيرة حيث تجمع القرويون ليشهدوا استرداد كرامة الوادي.", "قال \"إنزو\" بصوت يملأ القاعة: \"أيها الزعيم، إنزو صديقك المخلص يفي بوعده دائماً، وبمساعدة أشجع فرسان الوادي، تيد.\"", "اقترب \"تيد\" من العرش وركع في خشوع، ماداً يديه بصينية تحمل التاج الملكي وشال \"كلاي\" الملطخ. مد الزعيم يده يتحسس الهواء المحيط بالتاج دون أن يلمسه، وكأنه يقرأ طاقته، ثم سأل بهدوء: \"أين وجدتموه؟\"", "سارع \"إنزو\" بالرد قبل أن يرتبك \"تيد\" فهو قريب جدا من الزعيم \"لقد مات الغريب يا زعيم، مزقته الذئاب شر ممزق جزاء ما اقترفت يداه.\"", "كانت \"مليكة\" تقف وسط الحاضرين، ولكن القاعة كانت تضج بنبضات قلوب القرويين المتسارعة، ولولا ذلك الضجيج لانفضح أمر قلبها الذي كان يعزف لحن الحزن واللوعة. سأل الزعيم بصوته الرزين: \"وكيف تأكدتم من موته؟\"", "هنا، فاجأ \"تيد\" الجميع، وحتى \"إنزو\" نفسه، حين نهض وبسط اظهر قامة الفارس أمام الزعيم وبنبرة واثقة خالية من التردد قال: \"كنت أتمنى أن أنال شرف قتله بيدي يا زعيم، لكن ذئاب الثلوج قامت بالمهمة بالنيابة عني.. وهذا الشال الغارق بدم اللص القذر هو برهاننا.\"", "انخلع قلب \"مليكة\" عند ذكر الشال. هل هو فعلاً الشال الذي أهدته له؟ تمنت لو تلمسه لتعرف الحقيقة، لكنها في الوقت ذاته كانت تخشى اليقين. غلبها الحزن فانسحبت من القاعة متجهة إلى خيمتها، وهناك استسلمت لصراع مرير بين الرغبة في معرفة الحقيقة والخوف من تأكيد موته.", "وفي غمرة صمتها المحزن، تناهى إلى سمعها صوت \"فرقعة\" غريب وضئيل، آتٍ من مسافة بعيدة جداً. كان صوتاً لا يكاد يُسمع، لكنه بالنسبة لأذني \"مليكة\" المرهفتين كان بمثابة صرخة حياة.", "خفق قلبها وانبعث الأمل في روحها من جديد؛ فهذا الصوت يقول لها إن صاحبه لا يزال يتنفس، لكن السؤال الذي ظل يؤرقها: هل هو بخير؟"], ["كانت هذه هي المرة الثانية في حياة \"كلاي\" التي يضغط فيها على زناد \"الفلاير\"، وفهم فوراً سبب إخفاق الرصاصة؛ فهذا السلاح يعتمد على ارتداد عكسي قوي يتطلب ثباتاً تاماً لحظة الانفجار، ويد \"كلاي\" المرتجفة والمستنزفة لم تكن تملك تلك الطاقة، رغم كل ما استجمعه من غضب وشجاعة ضد ذئاب هذا الوادي الملعون.", "استقرت الرصاصة المشتعلة في جذع شجرة خلف الذئب، ليرسم نورها الضعيف ظلالاً مرعبة لأنياب الوحش الذي تراجع خطوة لهول الضوء، قبل أن يدرك أن \"العشاء\" قد حان وقته. انقض الذئب بشراسة نحو رقبة \"كلاي\" الذي تسمر مكانه ينتظر الموت، لكن الهجوم لم يكتمل؛ إذ ظهر ذئبٌ آخر، أضخم قليلا ولكن اشرس ، ليعترض طريق الذئب الأول مانعاً إياه من الانفراد بالفريسة.", "يبدو أن دوي \"الفلاير\" كان بمثابة جرس أعلن لعشيرة الذئاب كلها أن موعد \"العشاء\" قد حان. تسمر \"كلاي\" وهو يشاهد اختفاء الذئب الأول تحت وطأة هجوم الثاني، وبدأ يراقب بصدمة ودموع صراع الأنياب المحتدم حول من يستحق التهام جسده المنهك.", "في لحظة يأس، بدأ \"كلاي\" يتوهم أن الرؤية في الظلام بدأت تتضح، تمنى لو أن الشمس تشرق فجأة لتحرق تلك المسوخ كما يحدث في روايات مصاصي الدماء الخرافية. نظر إلى \"الفلاير\" في يده، وبحركة يائسة ضغط على الزناد مرة أخرى، حالماً برصاصة سحرية تحرق الذئاب بدلاً من الشمس، لكن السلاح كان قد فرغ تماماً.", "فجأة اخترق ألمٌ حاد كتفه الأيمن، شعر وكأن لحمه يُمزق عن العظم. كان ذئباً ثالثاً قد تسلل من خلفه، وبدأ ينهش كتفه ويجره بعيداً عن ساحة الصراع بين الذئبين. صرخة \"كلاي\" المفزعة نبهت الذئاب المتصارعة إلى \"الخيانة\" التي تحدث خلف ظهورهم. استغل الذئب الأضخم الموقف، ووجه عضة قاتلة للذئب الأول جعلته يعوي هارباً، ثم انطلق ليمسك برجل \"كلاي\" المصابة ويشدها في الاتجاه المعاكس للذئب الذي ينهش كتفه.", "تحول جسد \"كلاي\" إلى ساحة لـ \"حرب شد\" بين فكين مفترسين، بينما بدأت الدماء تغطي الأرض الترابية بغزارة، معلنةً عن اقتراب لحظة النهاية تحت سماء غريبة لا تعرف الرحمة.", "توهجت غرفة الزعيم ببريق تاجين وضعا جنباً إلى جنب على الطاولة الملكية؛ كلاهما آية في الإتقان والعظمة. وقف الزعيم أمامهما في صمت، بملامح يكسوها الرضا. دخلت \"مليكة\" بخطوات حذرة، موصدةً أبواب قلبها بكل ما تملك من قوة؛ فهي تدرك أنها أمام \"زعيم لامبرث\" الذي يستطيع سماع دبيب النملة إذا ما ركز حواسه.", "لم تأتِ \"مليكة\" بمحض إرادتها، بل استدعاها الزعيم في وقت غير معتاد، مما ضاعف من توترها. وقفت بجانبه تستشعر وهج الذهب، لكن لفت انتباهها وجود ثلج داخل التاج الجديد، فسألت بدهشة دون أن تلمسه: \"أبي.. لماذا التاج الجديد مقلوب وممتلئ بالثلج؟ أين الخدم؟\" أجابها الزعيم دون أن يلتفت: \"اهدئي يا عزيزتي، لا يوجد خطأ هنا.. هكذا يجب أن يكون الأمر.\"", "مال الزعيم نحوها بوقار، ولف ذراعه حول كتفها ليضمها إليه، ا نحو التاج المثلج قائلاً: \"هذه هي طريقة احتفال \\'الزعيم الأبيض\\' لوادي لامبرث بتنصيبه تاجاً جديداً.\" اندهشت \"مليكة\"؛ فهي تدرك علم والدها الواسع، لكنها المرة الأولى التي تسمع فيها عن هذا التقليد أو عن لقب \"الزعيم الأبيض\". فجأة قال الزعيم: \"لقد طلب \\'تيد\\' يدكِ للزواج.. وأنا وافقت يا مليكة.\"", "في تلك اللحظة، خذلت \"مليكة\" كل أقفال قلبها. تسارعت نبضاتها، وتمنت لو تملك سر \"إنزو\" القبيح في كتمان مشاعره القذرة أمام الحاكم. أحس الزعيم بهذا الاضطراب، فاستطرد بهدوء: \"\\'تيد\\' فارس أعاد للزعيم حقه، وقلبه من حديد. طلبه ليدكِ أمر يتوقعه الوادي كله، وأي فتاة سيخفق قلبها فرحاً بهذا الطلب لا قلقاً.. لماذا أشعر بشيء مختلف منكِ يا مليكة؟\"", "استمر قلب \"مليكة\" في الخفقان العنيف كأنه يريد الهروب من صدرها. ظلت صامتة؛ فماذا عساها أن تقول؟ هل تخبره عن صوت \"الفرقعة\" البعيد؟ هل تخبره أنها تنتظر \"كلاي\" ليتقدم لها بدلاً من \"تيد\"؟ \"تحدثي!\" قالها الزعيم بلهجة آمرة، فكانت كلمته كزرٍ حرك كل مشاعرها المكبوتة. استجمعت \"مليكة\" شجاعتها وقررت الهجوم: \"أبي.. لماذا تنصت لـ \\'إنزو\\' دائماً؟ تيد وبن ليسوا إلا أدوات في يده. تيد ربما أثبت نفسه، لكني واثقة بوجود مؤامرة؛ هم يكرهون أي غريب، حتى لو كان منا وتاه عنا وعاد إلينا.\"", "رد الزعيم بصلابته المعهودة: \"\\'كلاي\\' أثبت تذبذبه في المحكمة، وتيد أثبت جدارته بالانتماء للعائلة الملكية رغم أن دماءه ليست ملكية. \\'إنزو\\' يقول رأيه كأي شاهد، لكن الحكم لي وحدي. شعب \\'لامبرث\\' بأكمله يتحدث منذ أسبوع عن الغريب الذي استغل قربكِ منه ليسرق التاج.\"", "انعصر قلب \"مليكة\" حزناً، فضمها الزعيم لصدره بحنان الأب قالا: \"يا ابنتي.. الشجرة عندما تستقر في أرضها وتضرب جذورها، تُزهر فتبهج النفوس، وتُثمر فتملأ البطون، وتظلل فتسكن القوالب.. لكنها إذا بُترت من جذورها، أصبحت مجرد جذع بائس، لا ينتظر منه إلا أن يحترق ليدفئ عابراً لليلة واحدة باردة.\"", "يملك العقل البشري مفتاح الوعي الرئيسي للجسم كله، ويستخدم هذا المفتاح حين يصبح الضغط النفسي أو الجسدي فوق طاقة الاحتمال. كان \"كلاي\" يمر بحالة ألم غير طبيعية؛ فكلا الذئبين ينهشانه من جهتين متضادتين، حتى تحول صراخه إلى فحيح مكتوم. وبلا تردد، ضغط مخه على مفتاح \"الغيبوبة\" ليحمي صاحبه من الشعور بتمزق أطرافه.", "بدأت رؤية \"كلاي\" تتغير، شعر بضوء شديد يقترب منه، ظن أن الشمس قد نزلت من سمائها لتحتضنه وتودعه. وبينما كان يسلم روحه للظلام والذئاب تحاول اقتطاع أجزاء من جسده، حدث ارتطام عنيف بجانب رأسه، وتبعه وهج حراري مفاجئ. سمع عواء الذئب الذي كان ينهش رجله كأنه يحترق، بينما فر الذئب الآخر بمجرد شعوره بلهيب النار.", "أجل صوت الارتطام ولهيب الحرارة تفعيل مفتاح \"الغيبوبة\" لثوانٍ معدودة، استجمع فيها \"كلاي\" قوته ليرفع رأسه قليلاً من علي الارض في وهن وارتجاف. لم يفهم كيف هبطت الشمس لإنقاذه، كل ما رآه كان نيراناً تشتعل في كل مكان حوله، قبل أن ترتد رأسه للخلف وتصطدم بالأرض الترابية ليفقد الوعي تماماً.", "\"هذه الأداة سلاح ذو حدين.. كما يمكنها أن تكون أداة دمار، قد تصبح وسيلة إنقاذ.\" تذكر \"كلاي\" هذه الجملة وهو يستعيد وعيه في اليوم التالي، والشمس الحقيقية تحرق وجهه بلهيبها الصيفي. ضيق عينيه ليجد قرص الشمس ملتهباً في كبد السماء. حاول الجلوس بصعوبة بالغة وسط حطام وفحم ناتج عن حريق استمر طوال الليل.", "تذكر كلمات \"مليكة\" وفهم ما حدث؛ رصاصة \"الفلاير\" التي أخطأت الذئب استقرت في شجرة جافة، وفي الدقائق التي تصارع فيها الوحوش علي من يستحق الجثة, اكلت النيران الاغصان الجافة, وسقطت الشجرة المحترقة لتفرق الذئاب وتنقذه. شعر بحنين غريب لدفء الشمس، لكن آلام كتفه ورجله كانت تفوق الوصف. لاحظ فقده للكثير من الدماء، أخرج زجاجة مياه صغيرة من سترته وارتوى، ثم أكل بعض البلح المجفف وهو يفكر في \"مليكة\" التي كانت -بشكل غير مباشر- سبب نجاته.", "بدأ يشعر بالحرارة الشديدة فخفف من ثيابه الثقيلة، وحاول مداواة جروحه بما تيسر له. كانت رجله في حالة خطيرة، فاستند إلى فرع شجرة نجا من الحريق واستخدمه كعكاز. تحامل على نفسه وبمنتهى الألم وقف يصلب طوله، ثم اتجه نحو الحافة القريبة من مخرج الكهف.", "وبمجرد أن وقع بصره على المشهد الممتد أمامه، خرجت منه شهقة ذهول لا إرادية.", "كان الجمال مشعاً, سهول خضراء على مد البصر ، حيوانات لم يرَ بجمالها من قبل، نهر طويل يشق الوادي ويصب في شلال نقي، وبيوت من الطوب مرصوفة بأناقة ورقة تامة، وأشجار فاكهة من كل لون وشكل.", "كانت جنة تبهج الناظرين، جنة خلف جدران الثلج والعمى. همس \"كلاي\" لنفسه بذهول: \"الكهف يوصل لقرية مفقودة.. فيها جنة خضراء!\"", "قبل الزفاف بأسبوع، انزوت \"مليكة\" في خيمتها ليومين كاملين؛ كان الحزن يغيم علي روحها والخوف يسكن قلبها، فهي تدرك أن كلمات الزعيم ليست مجرد وعظ، بل هي أوامر عسكرية لا تقبل الجدل. لكن \"مليكة\" ليست مجرد فتاة، بل هي نتاج تربية ملكية وعلمٍ استقته من حكمة والدها اجدادها.", "تمنت لو كانت فتاة عادية تذهب للسوق كل يوم، لكن قدرها أن تحمل \"الدم الملكي\". وبما أن الزعيم لم ينجب ذكوراً، فإن \"مليكة\" هي الجسر الوحيد لاستمرار الحكم؛ فإذا تزوجت، أصبح زوجها هو الزعيم القادم. أدركت بخبث أن \"إنزو\" استغل هذه النقطة بدقة، ليضع \"تيد\" في طريقها ويحكم الوادي من خلاله. ولكنها قررت أن تدوس على مشاعرها تجاه \"كلاي\"، وخرجت لشعبها لتعلن بلسانٍ ثابت وقلبٍ مكسور سعادتها باختيار الزعيم، ولتؤكد ولاءها لتخليد الدم الملكي.", "خفق قلب \"تيد\" بزهو لم يعرفه من قبل حين وصلته كلمات \"مليكة\"، وتخيل نفسه بالفعل والتاج يزين رأسه. وفي تلك الأثناء، كان \"إنزو\" العجوز في خيمته يضع طعام مسموم لفأرٍ صغير؛ كان الفأر غارقاً في جروحه، واهناً من رحلة عبور \"المتاهة\"، لكنه لا يزال يتنفس.", "وضع \"إنزو\" الطبق أمام الفأر المنهك وتمتم بفحيح الأفاعي: \"يوم الزفاف سيكون بداية النهاية للعائلة الملكية.\"", "ثم استدار نحو \"بن\" الذي كان واقفاً كتمثال من جليد، ووضع يده القبيحة على وجهه قائلاً بلهجة محرضة: \"أخوك يا \\'بن\\' صار هو الزعيم القادم. شهران فقط نتأكد فيهما من حمل الأميرة، وسأمنحك حينها شرف إطلاق ذئابك لتمزقها هي ووالدها إرباً. ستصبح أنت سيد صحراء \\'لامبرث\\' الأوحد بقوة عشيرة الذئاب.\"", "شعر \"بن\" بالزهو يغمر كيانه، فاستمر \"إنزو\" في الطرق على الحديد وهو ساخن: \"لكن حالياً، راقب تصرفات أخيك جيداً. لا تترك ابنة الزعيم تعبث بعقله. لا يليق بسيد الصحراء أن يكون له أخ ضعيف في حكم وادياً صغيراً يسكنه القرويون.\"", "ملأت كلمات العجوز صدر \"بن\" بالحزم والصرامة. وخلال الأيام التي سبقت العرس، لم يفارق \"بن\" أخاه \"تيد\" لحظة واحدة، وكان يستضعفه كلما شعر منه لهفة أو لِيناً تجاه \"مليكة\"، معتبراً تلك المشاعر ضعفاً لا يليق بالحاكم , ماذا لو تحكمت فيه مليكة؟", "في شرفة قصرٍ فخم يطل على مشهد بكر لنهر صافٍ تداعبه طيور ملونة، جلس رجل يرتدي ثياب نوم ملكية وثيرة. بجانبه عصا مرصعة بالأحجار الكريمة، وبين يديه قدح فاخر مزخرف تفوح منه رائحة أعشاب زكية، بينما يستلقي عند قدميه ذئب بري ملكي ضخم، يغطي جسده شعر ناعم طويل وتبرز من شدقيه أنياب تثير الرعب رغم سكونه.", "كان هذا \"كلاي\". قضى أسبوعاً كاملاً في هذا \"الوادي الأخضر\" منذ أن أنقذته معجزة الشجرة المحترقة. ورغم مظاهر الرفاهية التي تحيط به، إلا أنه لم يجد بشرياً واحداً في هذا الوادي.قرية صغيرة تكفي ل الف نسمة ولكن كانت البيوت كلها فارغة، مكسوة بخيوط العنكبوت والتراب، تحكي قصة هجران دامت لأكثر من مائة عام، لكن الطبيعة هناك ظلت تنبض بالحياة، والحيوانات تتكاثر في تناغم.", "في مدخل القصر الملكي الكبير في منتصف القرية، وجد \"كلاي\" رفاتاً لشخص يجلس على كرسي؛ زية الملقي علي الارض يقول انه خادم مخلص مات منذ قرن من الزمان. ومن خلال المذكرات المتربة التي وجدها في غرفة الزعيم الشخصية، فك \"كلاي\" اللغز: لقد أصاب العقم رجال ونساء هذا الوادي الأخضر فجأة بمجرد أن أغلقوا حدودهم خوفاً من غارات \"الوادي الأبيض\" (لامبرث الحالي).", "انبهر \"كلاي\" بعظمة القصر؛ تماثيل لنساء يصببن الماء في نافورة ضخمة، لوحات زيتية تفوق الوصف. لكن اللوحة التي حلت كل شيء كانت لملكين شقيقين بعيون زرقاء صافية، أحدهما يرتدي الأبيض والآخر الأخضر، يمسكان تيجانهما، وقد قلب \"الملك الأبيض\" تاجه ليضع فيه الثلج..", "قرأ لاحقا انهم اولاد عموم, الملك الابيض زعيم الوادي الابيض وسط الثلوج, والملك الاخضر يحكم الجانب الاخر الاوادي الاخضر.", "أدرك \"كلاي\" أن العلم هو السلاح الأقوى هنا وليس الحواس مثل الوادي الابيض؛ ففي المكتبة الملكية، نهل من كتب العلوم والطب، وخلال يومين فقط قرأ ثلاثين مجلداً. بفضل هذا العلم، صنع خلطة عشبية عجيبة داوت جروحه بنسبة ثمانين بالمائة في وقت قياسي ادهش كلاي رغم ثقته فالنتائج. وبناءً على دراسته لعلم الحيوان، خرج الي قلب الغابة و أطلق صفارة خفية، خلال ثوان وجد \"الذئب الملكي\" يقفز فوقه متمسحاً به كالقطط.", "وعرف الحقيقة المذهلة عن \"المسخ\" الذي قابله في الكهف؛ إنه ليس وحشاً أسطورياً، بل هو ذئب من فصيلة الوادي الأخضر، تم حقنه بمواد خاصة منذ ولادته ليفقد بصره ويصبح عملاقاً يعيش لأكثر من قرن. هذا المسخ لا يسمع حد لا يتم السيطره عليه, و مدرب على حماية الوادي، قاعدته الذهبية هي: التهام أي كائن بلا أعين يحاول الدخول، بينما يُحرم عليه مساس البشر ذوي العيون الحقيقية. لقد كان المسخ هو \"الحارس\" الذي يضمن بقاء الوادي الأخضر بعيداً عن أيدي سكان \"لامبرث\" العميان.", "جلس \"كلاي\" يتأمل قوته الجديدة؛ لقد أصبح يملك العلم والحقيقة. وبينما يستعد الوادي الأبيض لزفاف \"تيد\" و\"مليكة\"، كان \"كلاي\" يخطط لعودة لا تشبه أبداً رحيله.", "من مذكرات \"هايصن\" -- زعيم الوادي الأخضر:", "\"الثلج ليس مجرد ماء متجمد، بل هو حافظة للزمن. في الوادي الأبيض، حيث يسيطر الصقيع، تُحبس الخلايا الحية والفيروسات لآلاف السنين في حالة سكون. لكن حين يذوب الثلج أو يحدث انهيار جبل، تتحرر هذه الكائنات المجهرية لتبدأ دورة حياتها من جديد. وهذا هو التفسير كبير الاطباء لما حدث في الوادي الابيض؛ فالفيروس الذي سلبهم بصرهم ثم انتزع عيونهم، كان سجيناً في الجليد وتحرر حين استوطنوا تلك الدائرة الجبلية المنعزلة.", "لم اقتنع ودهوه يقول ما يشاء, انا اعلم ما سبب تلك اللعنة, لقد انفصلنا.", "الانفصال بين الواديين حدث قبل انتشار هذا الفيروس بسنوات. في ذلك الوقت، كان الحكم في \\'لامبرث\\' مزدوجاً وعادلاً بين وريث عائلة \\'لاندكيبت\\' ووريث عائلة \\'هايصن\\'. كنا ثلاثين فرداً في البداية، وحكمنا بالعدل حتى زاد عددنا إلى ألف وخمسمائة نسمة، تكيف لانكيبت مع الثلج وصار جزءاً من هويتهم.", "لكن عائلة \\'هايصن\\' --عائلتي-- كانت جيناتها تميل للبحث والاكتشاف. لم نستسلم للبرد كما فعلت عائلة \\'لاندكيبت\\'. وعندما اكتشف رجالنا وادياً أخضر مخفياً خلف كهف تسكنه ذئاب كاسرة، انقسمت الآراء. رأت \\'لاندكيبت\\' أن البقاء في الثلج آمن، خاصة وأن البعثات التي حاولت دخول الوادي الأخضر فقدت أفضل رجالها تحت أنياب ذئاب برية كانت ضعف حجم وشراسة ذئاب الثلج.", "كان الزعيمان، أول أحفاد الحاكمين، بمثابة قلب وعقل واحد رغم توتر العلاقة بين أفراد العائلتين. كان العدل هو دستورهما؛ يعاقب كل منهما ابن عائلته قبل أن يفكر الآخر في أمره. وكانت القاعدة الذهبية هي الحفاظ على \\'الدم الملكي\\'؛ فمن أراد الحكم من العائلتين، وجب عليه الزواج من داخل عائلته حصراً، لضمان وجود زعيمين ومشورتين دائماً.", "ولكن، مع تزايد رغبة \\'هايصن\\' في الاستقرار بالخضرة، وتزايد خسائر الأرواح بسبب الذئاب، اتخذ الزعيمان القرار الأصعب: الانفصال المنظم.", "قرروا أن تبقى \\'لاندكيبت\\' في الوادي الأبيض تحت إمرة \\'الزعيم الأبيض\\'، وأن تنتقل \\'هايصن\\' لتسكن الوادي الأخضر. ولضمان سلامة الجميع، أمر الزعيمان رجال العلم والجنود بالتعاون لحل مشكلة الذئاب. وبعد تجارب مريرة بدأت بفأر وانتهت بموت رجلين، نجحوا في الوصول إلى \\'درجات ترددية صوتية\\' (شفرات صوتية) يمكن من خلالها السيطرة على عقول الحيوانات.", "هكذا، عُمر الوادي الأخضر، وصارت الزيارات متبادلة. كان الانتقال سهلاً علينا نحن أبناء \\'هايصن\\'، لكنه ظل صعباً على أبناء \\'لاندكيبت\\' الذين، رغم جمال الجنة الخضراء، كانوا يشعرون بالانتماء لدفء الثلج الذي نشأوا في حضنه.\"", "من مذكرات \"هايصن\" -- زعيم الوادي الأخضر:", "\"كان التواصل بين وادينا الأخضر والوادي الأبيض يتعدى كونه تبادلاً مادياً؛ لقد كان اتحاداً علمياً وروحياً تجسد في الزيارات التي لا تنقطع. كانت المهرجانات تقام في السهول الخضراء صيفاً، وفي ساحات الجليد شتاءً، والكل يتبادل الضحكات والخبرات.", "ما زلت أذكر ذلك الاحتفال الملكي الذي أقيم بمناسبة تغيير الملك الأبيض لتاجه الملكي. دعاني ابن عمي لنقف معاً عند فوهة الكهف الفاصل بين عالمينا، لنتمثل أمام الرسام الملكي في وضعية تخلدها الأجيال؛ وهي اللوحة التي تزين الآن حائط قصري بطوله وعرضه.", "رأيت ابن عمي يتمسك بتقاليد عائلة \\'لاندكيبت\\' العريقة؛ وضع الثلج في تاجه الجديد، وظل يحمله بيده حتى ينصهر الثلج ويجف، تعبيراً عن الانتماء للأرض القاسية التي احتضنتهم. وبحكمته المعهودة، لم يطلب مني خلع تاجي حتى لا تظهر تفرقة في الصورة، لكنني،تقديراً له، خلعت تاجي وحملته بين يدي، ووقفنا ننظر للفنان بتلك الأعين الزرقاء الصافية التي ميزت سلالتنا قبل أن يحل الظلام.", "كم كان الدفء الاجتماعي يغمرني وأنا أراقب أطفال الوادي الأبيض وهم يتسلقون السلالم الخشبية بحماس، يسندهم الكبار ليرسموا بأزهى الألوان عبارة: \\'أهلاً بكم في وادي لامبرث\\' على سقف الكهف. كانت رسالة ترحيب يراها كل داخل أو خارج.", "أمسكت بيد الملك الأبيض ودخلنا أعماق الكهف، وضحك كثيراً حين اهتزت الأرض تحت قدميه وبدأت ترتفع؛ لقد كانت \\'الرافعة المائية\\' التي تعمل بضغط الماء، اختراعي الذي أفتخر به. وجد نفسه أمام الباب الخلفي للكهف، حيث اقتحم نور الشمس الساطعة عتمة الممر ليعلن بداية الوادي الأخضر.", "نظر إلي الاختراع بإعجاب وقال حكمتنا القديمة: \\'فقط عند السقوط بقوة.. يمكن الارتفاع بقوة\\'. كان يقصد بكلماته أن شغفنا نحن أبناء \\'هايصن\\' كان مخنوقاً ومحبوساً حين كنا في عثرة الثلج، لكنه انطلق كالشرارة حين وجدنا إمكانيات الوادي الأخضر. وكم كانت دهشته عظيمة حين طلبت منه أن ينظر تحت قدميه، ليرى الجملة ذاتها محفورة على مربع حديدي، بجانبه حلقة وسلسلة يشدها الخادم لتبدأ الرافعة في التحليق.\"", "من مذكرات \"هايصن\" -- زعيم الوادي الأخضر:", "\"بمجرد وقوع الكارثة، فقد بعض سكان الوادي الأبيض بصرهم تماماً؛ لم يعودوا يميزون حتى خيط الضوء. ارتفعت صرخات الاستغاثة، وبصفتي زعيم الوادي الأخضر، أرسلت بعثة طبية محملة بالعلم علي رأسها كبير اطبائي الشخصي. لكن الصدمة كانت حين عادت الأخبار بأن أفراد البعثة أنفسهم أصيبوا بالعدوى. في تلك اللحظة، اتخذت القرار الأكثر دموية في حياتي: غلق أبواب الكهف نهائياً وفصل الواديين.", "كان قراراً يمليه منطق البقاء، لكنه بتر جذورنا. عشنا في جنتنا الخضراء غارقين في حزن ثقيل، وزاد الطين بلة وقوع العقم المفاجئ بين رجالنا ونسائنا؛ وكأن الأرض عاقبتنا على التخلي عن أبناء عمومتنا. مرت السنين في صمت موحش، حتى جاء اليوم الذي انكسر فيه ذلك الصمت بدوي انفجار هائل هز أركان الجبل.", "لقد استخدم سكان الوادي الأبيض مادة سوداء وجدوها في الثلج تسمى \\'البارود\\'؛ مادة تملك قوة تدميرية كافية لتفتيت الصخر. لم يتخيل حراسنا أن ٢٥ عاماً من العزلة والعمى قد تُنتج جيلاً من المسوخ البشرية؛ بشر بلا أعين تماماً، لكنهم يملكون مهارات حركية وحواس خارقة لم يصل إليها رجالنا المبصرون.", "كانت معركة دموية، وانتهت بتسليم رسالة لي من \\'الزعيم الأبيض\\'. كانت رسالة تقطر مرارة ولعنات؛ وصفني فيها بالخائن والظالم الذي ينعم بالجنة بينما يترك أهله للجحيم. أعلن فيها الحرب والإبادة الصريحة. لم أتحمل وطأة كلماته، فأمرت بقتل تلك الكائنات، ولم أكتفِ بالحراسة، بل أمرت الأطباء بتهجين أشرس كائن عرفه الوادي ليكون حارساً أبدياً.", "أخرجوا لي \\'البيرووولف\\'؛ ذئب ضخم، مشوه، يُحقن منذ ولادته بعلاجات كيميائية تزيد من ضخامته وانصياعه. حين رأيته، أصابني الغثيان من لعابه الأخضر اللزج، لكنه كان الحارس المثالي؛ مدرب على قتل اي بشري ليس له أعين. أطلقته في الكهف الفاصل ليكون السد المنيع، وكان يكفي زفيره لتهرب ذئاب الوادي الأبيض كالفئران.", "ومع ذلك، كان هناك \\'شياطين\\' من الوادي الأبيض ينجحون في خداع المسخ والعبور، بمعدل شخص أو اثنين كل عام. كنا نأسرهم لنعرف أحوالهم. عرفت أن ابن عمي مات أعمى، وأن ابنه (الذي وُلد بلا أعين) هو من يدير الوادي بمساعدة مجلس الأطباء.", "وأذهلني آخر ناجٍ من \\'البيرووولف\\' قبل أن أمر بإنهاء حياته، حين قال لي باحتقار: \\'البصر صفة للحيوانات، ولا يجب أن تتوفر في الإنسان\\'. وان الكهف الفاصل بيننا الذي كان الاطفال يرسمون علي جدرانه اجمل الالوان صار الجميع يطلقون عليه: كهف المتاهة.\"", "ساد هدوءٌ ملامح \"كلاي\" وهو يجلس في شرفة القصر الملكي بالوادي الأخضر، يرتشف مشروبه الدافئ وعقله ينسج خطط المستقبل؛ لقد تحولت ملامحه من الانكسار إلى قوة المعرفة. وبعد أسبوع من النقاهة واستعادة اللياقة البدنية والذهنية، اتخذ قراره: العودة إلى \"وادي لامبرث الأبيض\".", "لماذا يعود؟ لا يوجد مكان في العالم الخارجي ولا في الوادي الأبيض يضاهي جمال \"الجنة الخضراء\" التي يعيش فيها الآن؛ حتى \"الذئب الملكي\" الضخم يضمن له نوماً هادئاً وسط ظلام الغابة، محمياً من كل خطر. لكن \"كلاي\" لم يعد ذلك الغريب الهارب، بل أصبح يحمل أمانةً ثقيلة تجاه شعب \"لامبرث\"؛ فهو الآن يملك مفاتيح حقائق يجهلها الشعب، بل ويجهلها الزعماء والأطباء أنفسهم.", "أهم معلومة استقاها هي أن \"الشعب الأخضر\" قد انقرض تماماً. فبحسب مذكرات آخر ملك للوادي الأخضر، الذي وافته المنية منذ مائة عام على الأقل، أصاب الوادي عقمٌ عام طال الرجال والنساء بمجرد إغلاق أبواب الكهف الفاصل. فشلت كل محاولات العلاج، وكانت كل المؤشرات تؤكد أن السبب هو \"الفصل القسري\" لبيئة الواديين عن بعضهما البعض، مما أدى لموت القرية تدريجياً وعودة الحيوانات لتسيد الوادي.", "وراهن علي ان ابناء الابيض يعرفون ان الكهف ليس به متاهه وبداخله كائن يدعي بييروولف ياكل المكفوفيين.", "فكر \"كلاي\": ألا يمكن بعد اختفاء الفيروس والسيطرة على الذئاب أن يتمكن أهل \"لامبرث\" من هزيمة \"المسخ\" والانتقال للعيش في هذا الدفء والنعيم بدلاً من صقيع الثلج القاتل؟", "وبالفعل، حزم \"كلاي\" أمتعته الجديدة التي غنمها من الوادي الأخضر، وكان من بينها حصان ملكي ذهبي اللون, واستعد لرحلة العودة عبر الكهف المحرم، وبجانبه \"الذئب الملكي\" الضخم، ليبدأ فصل المواجهة الأخيرة.", "حين تعيش حياتك في الظلام وأنت تدرك كنه الضوء، يصبح العجز مجرد فكرة لا وجود لها؛ هكذا كان حال أهالي \"لامبرث\" البيضاء وهم يستقبلون يوم الزفاف بمهرجانات تضج بالحياة. كانت الزهور تُنثر في كل زاوية لتصل عطورها الزكية إلى الأنوف، بينما تجمعت النساء في حلقات وسط الوادي، يهمس بكلمات وألحان هادئة تسحر الآذان وتملأ الأجواء طمأنينة.", "اشتعلت المشاعل منذ بزوغ الفجر لتنير وتدفئ الأبدان، ووزعت الحلوى والمخبوزات على الصغار والكبار في كرم ملكي لم يشهده الوادي منذ زمن. ومن خيمة العروسين، انبعثت روائح بخور ملكي خاص يحدد مكان الاحتفال ويُعلم الجميع ببدء المراسم. وبينما كان \"تيد\" محاطاً بعشرة من الجواري يساعدونه في ارتداء ملابس الزفاف المذهبة، كانت \"مليكة\" في خدرها محاطة بعدد لا يحصى من الخدم، ترتدي فستاناً بلغ من الرقة والجمال منتهاه.", "اما في الخيمة الكبيرة، كان الزعيم يجلس على عرشه وبجانبه \"أنزو\" العجوز القبيح، يراجعان معاً اللمسات الأخيرة لخطة الزفاف، والزعيم ينصت باهتمام وحذر. فجأة، اقتحم الحارس السكون وأعلن بأدب أن \"بن\" يطلب مقابلة الطبيب \"أنزو\" لأمر عاجل.", "انصرف \"أنزو\" بهدوء، وما إن اقترب من \"بن\" حتى سمع دقات قلبه تضرب في صدره بعنف، وأنفاسه متلاحقة تكشف عن رعب دفين. سأله \"أنزو\" بقلق عن السبب، فأجاب \"بن\" بصوت يرتجف: \"كنت أفحص عشيرة الذئاب في الصحراء لتأمين الزفاف، لكنني وجدتهم يرفضون الخروج من كهفهم.. وعندما حاولت الدخول إليهم، وجدتهم في حالة رعب لم أرها من قبل، بل كادوا يهاجمونني من شدة فزعهم.\"", "سكت \"أنزو\"، وأرهف سمعه لنبضات قلب \"بن\" التي كانت تنطق بالصدق والرعب، ثم سأل ببرود: \"ما الذي يمكنه أن يرعب ذئاب لامبرث الضارية يا بن؟\" هنا خفق قلب \"بن\" بقوة مرعبة، فقد أدرك أن الطبيب العجوز قد وصل إلى نفس النتيجة الكارثية التي يخشاها، ونطق بصوت متهدج: \"البـ.. بـيـرو.. البـيـرووولف!\"", "قليلون في الوادي من يعرفون هذا الاسم؛ إنه محصور بين أفراد العائلة الملكية وقسم من رجال \"أنزو\" المقربين، أما القرويون فلا يعرفون سوى أن \"كهف المتاهة\" يضم شيطاناً مجهولاً, وربما شياطين. كان قلب \"بن\" يتمزق خوفاً، فإذا كان أقوى كائن عرفه يرتعد هكذا، فماذا سيفعل البشر؟", "أما قلب \"أنزو\" فكان صخراً لا يهتز. هو يعلم كل شيء عن \"البيروولف\"؛ يعلم كيف صُنع، ومكونات الأعشاب التي حُقن بها وهو جنين، فقد قرأ الكتب السرية التي توارثتها عائلته.", "لم يكن \"أنزو\" يصدق أن \"البيروولف\" قد يترك حدود الكهف، فتدريبه يمنعه من ذلك.", "ولكنه أدرك أن هناك \"قوة\" قادمة، وأنها قريبة جداً. التفت إلى \"بن\" وقال بصوت واثق يملؤه المكر: \"واضح أن أولى مهام عريسنا الجديد.. ستبدأ الليلة!\""], ["أمام الخيمة الكبيرة، نُصبت دائرة احتفالية مهيبة، حيث من المقرر أن يقف العروسان في مركزها ليتلقيا مباركة الزعيم وبدء حياتهما الملكية. وبحسب تقاليد \"لامبرث\"، سار الزعيم علي مترجلا من خيمته ليصطحب العروس من خدرها إلى وسط الدائرة حيث ينتظرها العريس.", "في هذه الأثناء، كان \"تيد\" في خيمته يضع لمساته الأخيرة حين اقتحم \"بن\" عليه المكان بقلب مخطوف. صرف \"تيد\" الخدم فوراً مستشعراً الخطر، ليهمس له \"بن\" بصوت يرتجف: \"كبير الأطباء أنزو يقول إن البيرووولف قد خرج من حدود كهف المتاهة!\"", "سقط قلب \"تيد\" في قدميه؛ فهو يذكر جيداً ذلك الصوت المرعب الذي سمعه عند باب الكهف حين أرسله \"أنزو\" قديماً للاستكشاف، ومنذ ذلك الحين لم يجرؤ على الاقتراب من المتاهة. إن التحكم في ذئاب الوادي صار بالنسبة لهم لعبة أطفال، أما هذا المسخ فلا يرحم إنساناً ولا حيواناً. وعندما علم بحال الذئاب المرعوبة، زاد فزعه وسأل عن أوامر \"أنزو\". أجابه \"بن\": \"يقول أنزو إن أولى مهامك بعد الزفاف هي قتله، وبذلك ستصبح ملكاً للواديين.. الأبيض والأخضر.\"", "لم يفهم \"تيد\" معنى \"الوادي الأخضر\"، لكنه قرر بشجاعةٍ نابعة من غريزة البقاء والسيادة أن ينقذ الوادي ليثبت جدارته كزعيم مستقبلي. أرسل مع \"بن\" رسالة طمأنة لـ \"أنزو\"، ثم خرج ليقف في الدائرة منتظراً تتويجه.", "وفي الخيمة الملكية، كانت \"مليكة\" تقف كتمثال من البلور النادر، بفستانها الأبيض المرصع بالأحجار الملونة التي تتلألأ مع كل حركة. دخل الزعيم، فانصرف الجواري وبقيت هي في صمتها الرقيق. اقترب الزعيم، استنشق العطر الملكي المحيط بها، ومرر يده فوق الفستان ببطء دون ملامسته، وقال بلهجة نادرة المشاعر: \"أنا في غاية السعادة يا مليكة.\"", "ولما لم يجد منها استجابة، اتجه نحو طاولة الورود وداعب أوراقها بيده قائلاً: \"لو خرجتُ الآن وحدي، وأعلنتُ لتيد وللشعب أن الزفاف مُلغى لأن مليكة لا ترغب في إكمال رحلة الدم الملكي.. ماذا سيقول عني شعب لامبرث؟\" أجابته \"مليكة\" بهدوء: \"سيقولون حاكمٌ عادل، وأبٌ متفاهم.\" سألها: \"وماذا سيقولون عنكِ؟\" فكرت لحظة ثم قالت بصلابة: \"سيقولون إنني حرة، وأن هناك أخريات يحملن الدم الملكي ويستطعن القيام بهذا الواجب.\"", "التفت الزعيم نحوها، واقترب بوقار قائلاً: \"كنتُ أعرف إجاباتكِ، لكن كان لابد أن أتأكد أنكِ تفعلين ذلك برضاكِ لا غصباً.\" سكتت \"مليكة\" قليلاً، ثم رفعت رأسها وقالت بلهجة ملكية خالصة: \"أبي، لم أرَ منك ظلماً قط، وأعلم أنني سأظل ابنتك المفضلة مهما حدث. لكني أريد أن أكون جزءاً من تاريخ هذا الوادي، وأتمنى أن أربي الزعيم المستقبلي على مبادئك ليحكم بحكمتك.. وهذا هو أسمى درجات الواجب الملكي الذي أقدمه للوادي الذي أحبه.\"", "شعر الزعيم بفخرٍ لا يوصف بكلمات ابنته، لكن اللحظة لم تكتمل؛ فقد تناهى إلى مسامعه همسٌ مضطرب أمام الخيمة. أصدر الزعيم همهمةً ملكيةً آمرة، دخل على إثرها أحد الخدم المقربين ليعلن بخوف: \"أيها الزعيم، هناك قلقٌ يسود حدود الوادي. يهمس الناس عن مسخٍ يجوب الثلوج، وحيوانات الوادي في حالة هياجٍ وفزع غير مسبوق.\"", "تعالت الأصوات، واقتحم الحراس المكان طالبين من الزعيم والآنسة \"مليكة\" الانتقال فوراً إلى مكان آمن. أمر الزعيم بنقل \"مليكة\" إلى خيمته الشخصية المحصنة، وطلب إحضار حصانه الذهبي واستدعاء الطبيب \"أنزو\". وفي أقل من دقيقة، كان الزعيم يمتطي صهوة جواده بخفةٍ مذهلة، محاطاً بحرسه الشخصي، متجهاً نحو دائرة الزفاف حيث ينتظر \"تيد\" والجميع.", "رفضت \"مليكة\" الخروج إلا بمرافقة والدها للساحة، فقد استشعرت أن شيئاً عظيماً على وشك الحدوث, وارادة ان تكون ايضا جزء منه.", "وفي منتصف الطريق نحو العرش، توقف الحصان الذهبي للزعيم فجأة، والتف في الاتجاه المعاكس وهو ينفر بمنخاره بقوة. أدرك الزعيم بخبرته أن الجواد يشم رائحةً قوية تثيره.", "استنفر الزعيم حواسه الملكية الفائقة، وبدأ يحلل الأصوات والروائح في الأفق. ظهر له شبح كيانين ضخمين يتحركان بثقةٍ مطلقة، ووقع أقدام توحي بتجاهل تام لكل من حولهما. بدأت رائحة \"الغابة\" و\"النهر\" تكتسح هواء \"لامبرث\" الأبيض الجاف؛ رائحة لا تنتمي لهذا الوادي المتجمد.", "بدأ السونار البشري للزعيم يحلل الموقف: هناك ثلاثة كيانات تقترب. كيان لحصان من نفس فصلة حصان الزعيم لانها الاكبر حجما، وكيان لرجلٍ من أبناء \"لامبرث\" يمتضية لان كيان الحصان هادئ في حركته، وقلبٌ لكائنٍ ينتمي لفصيلة الذئاب، لكن طاقته الروحية وحجمه يتجاوزان أي ذئبٍ عُرف في هذا الوادي يسير بجانبه بوقار الملوك.", "بدأت الهمهمات تتصاعد من بين الجموع التي يمر بها القادمون، وما إن وصل اسم \"كلاي\" إلى مسامع الزعيم، حتى اهتز كيانه. كانت ردة فعله الوحيدة هي تعديل رأسه، وأصدر همهمةً قصيرةً جعلت الحراس المترجلون امامه يطوقونه في دائرة حماية وهو علي حصانه، مشغلين سونارهم الصوتي بكل طاقته لإدراك الموقف.", "لقد عاد الغريب، لكنه لم يعد وحيداً، ولم يعد \"كلاي\" الذي يعرفونه؛ عاد ومعه رائحة جنةٍ مفقودة، وحارسٌ لا قِبَلَ لفرسان الثلوج بمواجهته.", "ساد صمتٌ رهيب، لم يقطعه سوى شهقات مكتومة لبعض الجنود الذين تجمدت الدماء في عروقهم حين ارتدت إليهم الموجات الصوتية لترسم صورة \"الذئب الملكي\" في مخيلتهم. كانت المرة الأولى التي يشعرون فيها بكيانٍ بهذا الحجم، وعلى الرغم من ارتباك قلوبهم، إلا أن ثبات أيديهم على الرماح ظل صامداً كعادة فرسان \"لامبرث\".", "همس أحد الحراس المقربين للزعيم بصوت يرتجف: \"يا زعيم، هناك كائن عملاق ورجل على حصان يقتربان!\"", "وقف \"كلاي\" بحصانه الذهبي المهيب أمام الزعيم، وبجانبه \"الذئب الملكي\" الذي كان يرمق الوجوه الخالية من الأعين بنظرات ثاقبة. لقد خرج \"كلاي\" من الوادي الأخضر عبر بوابته الكبرى، ممتطياً واحداً من أجمل الخيول، وحارسه الذئب الملكي؛ فقد تبعه الكائن كأنه يدرك فصول القصة كاملة. ولو كان \"البيرووولف\" مكانه، لتحول الجميع إلى أشلاء في دقائق معدودة.", "نزل \"كلاي\" عن صهوة حصانه بمنتهى الهدوء والرشاقة، في مشيةٍ لا تشي بكسرٍ أو إصابة قديمة. تقدم بخطوات واثقة حتى وصل إلى رؤوس الرماح المصوبة نحوه، والتي بدأت تهتز قليلاً بمجرد استقرار الذئب الملكي مكانه. كانت التوقعات تشير إلى أن الزعيم سيصدر أمراً فورياً بإبادة هذا \"اللص\" الذي سرق التاج وأُعلنت وفاته، ورغم ضخامة الذئب، إلا أن كثرة الجنود كفيلة بإسقاطه.", "لكن أحداً لم يكن يرى ما يراه الزعيم بـ \"بصيرته\"؛ فقد استشعر قوة روحية غير عادية تنبعث من هذا الكائن، وأدرك أن أي صدام الآن سيعني خسائر لا يمكن تعويضها، خاصة وأن خيمة \"مليكة\" قريبة ولا يعلم إن كانت مازالت بداخلها أم لا.", "تساءل الزعيم في نفسه: \"هل هذا حقاً كلاي؟ ولماذا أشعر بقلبٍ ينتمي للوادي، قلبٌ أصم، مدرب، ومليء بالثقة والمعرفة؟\".", "وفي خطوة غير متوقعة، ترجل الزعيم عن حصانه واقترب من دائرة الحراس ليصبح وجهاً لوجه مع \"كلاي\"، محاولاً التأكد من هويته. ساد الصمت أرجاء الوادي الفسيح، والجميع ينتظر إشارة أو كلمة. كان \"كلاي\" يقف بثباتٍ من ثلج، ينظر للزعيم الحائر بعينين لم يرفّ لهما جفن؛ ليس فقط لأنه تعلم من الكتب كيفية التحكم في مشاعره ولغة قلبه، بل لأن المعرفة التي حصدها عن أجداد الزعيم ملأت روحه بالسكينة.", "والحق ان \"كلاي\" كان مستمتعا بهذه اللحظة؛ فبعد أن كان يرتعد كالورقة أمامهم، صار الآن هو مصدر الرهبة. ومع ذلك، كان الزعيم بخبرته الطويلة يسبق التوقعات دائماً، فالزعيم لا يُهزم، حتى أمام مذكرات ملك الوادي الأخضر.", "خرجت \"مليكة\" من خيمتها مدفوعةً بلهفةٍ غامضة لاستكشاف ما يجري، ولم يكن رهان الزعيم قائماً فقط على مجرد سماعها لهمهمات القرويين عن عودة \"كلاي\"، بل كان رهان على عيني \"كلاي\" ايضا. أن خيمة مليكة كانت بعيدة عن مدى ادراك أي شخص أعمى، و قلب \"كلاي\" خذله تماماً بمجرد أن وقع بصرُه عليها. لم يسعفه \"كتاب القلوب\" ولا كل فنون السيطرة على النفس التي تعلمها؛ فقد اضطربت نبضاته، ليلتقطها الزعيم فوراً ويدرك أن هو بالفعل \"كلاي\" من يقف أمامه على بُعد أمتار.", "شعر \"كلاي\" بمرارة الخسارة في هذه المعركة النفسية بسبب هوى قلبه، فكان لزاماً عليه أن يستعيد توازنه بردٍ قوي يداري به ارتباكه. قال بصوت هادئ وواثق يريح الآذان: \"لماذا كل هذا الاحتفال الكبير يا زعيم وادي لامبرث الأبيض؟\"", "ساد الوجوم؛ الجميع فهم السؤال، لكن الزعيم وحده هو من توقف بذهول عند الكلمة الأخيرة: \"الأبيض\". ومع أن الزعيم لم يظهر أي رد فعل علني أمام جنوده، إلا أن \"كلاي\" المبصر لاحظ علامات المفاجأة التي ارتسمت على وجهه لثوانٍ معدودة. إن مفاجأة زعيم \"لامبرث\" تُعد انتصاراً بحد ذاتها.", "سرق \"كلاي\" نظرتين قلقين نحو \"مليكة\" التي كانت تقترب بلهفة، فجأة، قام الزعيم بحركة أذهلت الحاضرين؛ مد ذراعه للأمام بهدوء عند مستوى صدره، وأطلق صفارة رفيعة وحادة. بمجرد سماعها، زمجر \"الذئب الملكي\" زمجرة مرعبة جعلت الجميع يضعون أيديهم على آذانهم من شدة الألم، حتى الجنود ألقوا رماحهم من هول الصوت.", "تملك الرعبُ قلب \"كلاي\" حين رأى الذئب يهجم نحوه بفكٍ مفتوح وأنياب ازدادت بشاعة، وظن للحظة أن الزعيم قد سيطر على الوحش وأمره بالتهامه. اتسعت عيناه وهو يرى الذئب يحلق في الهواء، لكن المفاجأة كانت حين استقر الذئب تحت قدمي الزعيم مباشرة، الذي ظل واقفاً كالجبل لم يتزحزح.", "تحول الوحش الكاسر إلى ما يشبه القط الجائع تحت أرجل الزعيم، وتجمد الجميع في أماكنهم، حتى الجنود الذين اصطدم بهم الذئب أثناء قفزته سكنوا من الرعب. وقف \"كلاي\" مدهوشاً وقلبه ينتفض، بينما أنزل الزعيم يده ببطء شديد حتى لمست فرو الذئب، فأصدر الكائن صوتاً ينم عن الرضا التام.", "قال الزعيم بصوت عميق: \"أنت بالفعل كنت في الوادي الأخضر\". لم يفهم أحدٌ معنى الكلمة سوى \"كلاي\" الذي استعاد ثباته وأجاب: \"نعم.. وعرفتُ كل شيء عنك، وعن أجدادك \\'لاندكيبت\\' و\\'هايصن\\'.\"", "كانت الكلمات كافية لتجعل قلب الزعيم يدق؛ وأن يضطرب قلب زعيم \"لامبرث\" فهذا يعني أنك حققت أمراً خارقاً للعادة. حتى الذئب شعر بتغير هدوء الزعيم فتحرك بتمعض هز جسد الملك. لم ينتظر الزعيم طويلاً، بل امتطى حصانه برشاقةٍ معهودة وأمر \"كلاي\" بكلمة واحدة أن يتبعه.", "على المنصة الرئيسية، بجانب كرسي العرش الخالي، وقف \"أنزو\" و\"بن\" والترقب علي ملامحهما. وفي وسط الدائرة الاحتفالية، انتصب \"تيد\" بملابسه الملكية، ينتظر عودة الزعيم ممسكاً بيد ابنته \"مليكة\" ليعلن بدء عهده الجديد كزعيمٍ لوادي \"لامبرث\".", "لكن آذانه وانفه المدربة لم تلتقط سوى رائحة الزعيم وجواده ووقع أقدام جنوده. تساءل \"تيد\" في نفسه \"أين العروس؟\". وفجأة، اجتاحت روحه هالةٌ طاغية من الطاقة الروحية العنيفة؛ إنها طاقة \"الذئب الملكي\" الذي عاد ليسير بجانب \"كلاي\" فصفاره امره من الزعيم.", "لاحظ \"تيد\" طيف كيانٍ يمتطي حصانه بجانب الزعيم بكبرياءٍ. استشعر أبعاد الكائن الضخم المرافق للحصان، فقفزت إلى ذهنه صورة \"البيرووولف\" المرعبة. وبلا تفكير، استل سيفه من جرابه واتخذ وضع الدفاع المستميت، مستعداً لمواجهة الموت.", "وبكل هدوءٍ، دخل \"كلاي\" إلى قلب الدائرة الاحتفالية، يقود حصانه الذهبي وبجانبه الذئب الملكي بطلته الأسطورية، ووقف وجهاً لوجه أمام \"تيد\" المذعور. وبمجرد أن استقر الزعيم على عرشه الملكي، أصدر أمراً لحراسه: \"ارموا بأنزو وبن داخل الدائرة!\"", "صُعق \"أنزو\" و\"بن\" من المفاجأة، وبمجرد أن وطأت أقدامهم أرض الدائرة، ارتسمت في مخيلتهم \"السونارية\" ملامح وهيكل الذئب الملكي الجاثم هناك؛ كائنٌ يفوق في ضخامته وشراسته كل ما عرفوه.", "سكنت الريح، وتوقفت الهمهمات، وأدرك الجميع أن مراسم الزفاف قد تحولت إلى ساحةٍ للحساب.", "يؤمن الزعيم الأبيض أن العدل يقوم على الثبات، لكنه يدرك أيضاً أن تغير المعطيات يستوجب إعادة النظر في كل النتائج. لقد منح ثقته لـ \"أنزو\" تقديراً لعلمه، وأمر بزواج ابنته من \"تيد\" بناءً على بطولته المزعومة. لكن عودة \"كلاي\" حياً من الوادي الأخضر، وبصحبته وحشٌ لا يروضه إلا الملوك، نسفت كل الثوابت.", "كان الزعيم يحلل المشهد بدهاء؛ غريبٌ فضولي يدخل كهفاً غامضاً بحثاً عن مخرج، تلك قصة مقنعة، لكن غير المقنع هو كيف صدق \"كلاي\" أن الكهف ممرٌ آمن بينما يحكي الجميع أنه قبرٌ جماعي؟ هل خُدع؟ ومن الذي خدعه؟", "حبس الجميع أنفاسهم انتظاراً لسؤال الزعيم للمتهمين، لكنه باغت الجميع بتوجيه سؤاله لـ \"كلاي\": \"كيف أقنعوك بأن كهف المتاهة هو معبر للهروب من الوادي يا مستر كلاي؟\"", "تفاجأ \"كلاي\" بالتسمية، فهو لم يكن يعرف أنه يسمى \"كهف المتاهة\"، فأجاب بصوت ثابت: \"أيها الزعيم، لا توجد متاهة في الكهف، بل يوجد وحشٌ مرعب يُدعى البيرووولف، وقد واجهته بنفسي.\" سادت شهقات الذعر بين الحاضرين، خاصة من يعرفون حقيقة المسخ. أكمل \"كلاي\": \"لقد كنتُ محظوظاً؛ التهم الوحش حصاني أمام عيني، لكنه لم يمسسني بسوء، لأن سلاحي الوحيد كان العينين اللتين في رأسي.\"", "ألقى \"كلاي\" نظرةً خاطفة على \"مليكة\"، التي شعرت بحرارة تلك النظرة رغم المسافة، ثم تابع وهو يرمق \"بن\" و\"تيد\" و\"أنزو\": \"تيد وبن لم يخبراني بأن الكهف معبرُ إنقاذ، بل أنكروا وجوده تماماً، واعتبروني أعمى لا أبصر شيئاً.\"", "سكت الزعيم لبرهة، ثم سأل بهدوءٍ مريب: \"أين تاجي الملكي يا مستر كلاي؟\"", "اندهش \"كلاي\" ونظر إلى التاج الذي يستقر فوق رأس الزعيم، ليكتشف أنه مختلفٌ عما رآه سابقاً. وضح له الزعيم الحقيقة المرة: \"في نفس يوم اختفائك، أعلن ذلك العجوز القبيح (أنزو) اختفاء تاجي الملكي، وصنع لي تاجاً آخر ظناً منه أنه يستطيع التحكم في الدم الملكي.\"", "استغرق الأمر ثوانٍ في عقل \"كلاي\" ليربط الخيوط؛ أدرك أن سرقة التاج وتزييفه كانت تمهيداً لشرعنة زواج \"مليكة\" من \"تيد\" لكسر احتكار الدم الملكي. فرد \"كلاي\" بثباتٍ أذهل الزعيم: \"أتمنى أن تكون قد وضعت فيه الثلج.. تماماً كما رأيتُ جدك \\'حفيد لاندكيبت\\' يفعل في صورته الملكية مع ابن عمه \\'حفيد هايصن\\' في القصر الملكي الأخضر.\"", "من مذكرات كبير أطباء الوادي الأخضر:", "\"قولوا ما تشاؤون، وليحترق كل منكم برأيه الخاص، فأنا كبير الأطباء في الواديين؛ الأخضر والأبيض. أنا أعلم أهل \\'لامبرث\\' بالطب وأسرار الأنسان والحيوان وحتي النبات، وفي يدي وحدي يجتمع علم اليابسة والجليد. أنا من صنعت \\'البيرووولف\\' حين كنت طريد الجنة، ولتعلموا أن أي جنة لابد لها من امتحان؛ إن اجتزته بقيت، وإن سقطت طُردت.", "في الوادي الأخضر، كان الامتحان متمثلاً في فاكهة بلغت من الجمال والمذاق منتهاه. حين تأكل منها، تشعر وكأنك حزت كل نفع وشهوة في الوادي، من ثمار الأرض إلى لحوم الحيوانات. كان أول من عثر عليها طبيب يعمل تحت إمرتي؛ أكل منها وجاءني غارقاً في غبطة و أفقدته توازنه.", "أخذت تلك الفاكهة وأخضعتها للدراسة الدقيقة، فوجدت أنها تحوي كل العناصر الغذائية التي يحتاجها الجسد، بما في ذلك البروتينات، لكنها كانت تخفي سماً حلواً؛ مادة تُسكر العقول وتُذهب الألباب. وقبل أن أتمكن من إطلاق تحذيري، كانت الفاكهة قد انتشرت كالنار في الهشيم، وأكل منها الجميع بلا استثناء؛ بدءاً من القرويين وصولاً إلى زعيم الوادي الأخضر وأسرته الملكية وحاشيته.", "وقع الجميع تحت تأثير السُكر الجماعي، وكان يوماً مشهوداً غاب فيه العقل عن \\'لامبرث\\'. وحين أفاق الزعيم ورأى حجم الخراب والمهانة التي حلّت بقرية كاملة بسبب فقدان الوعي، أصدر أمراً حازماً بجمع كل تلك الفاكهة وحرقها، واجتثاث أشجارها من جذورها، وحرّمها على الوادي كله، بل وحرّم حتى الهمس بذكرها.", "شعر أهل الوادي بالخزي والعار مما اقترفوه وهم سكارى، لذا طوى الكتمان تلك الحادثة ولم تصل أنباؤها أبداً إلى أهل الوادي الأبيض. تمت عمليات الحرق والإبادة في سرية تامة، وهنا وجدتُ أنا \\'فرصة العلم\\' ليزدهر في الخفاء.", "احتفظتُ ببعض تلك الثمار؛ ولم أكن أبله كالقرويين لأتذوقها، فأنا رجل علم لا تُسيره الشهوات. احتفظتُ بها للدراسة واستخراج الأدوية والسموم. وكانت تلك المادة المستخلصة هي \\'السر\\' الذي حُقن به \\'البيرووولف\\'؛ مسخ متاهة الوادي الأبيض، الذي صممتُ غريزته لينهش كل من يدخل الكهف.", "من مذكرات كبير أطباء الوادي الأخضر والابيض:", "\"كنتُ دائماً في قلب الحدث، أقدم المشورة لزعماء \\'لاندكيبت\\' و\\'هايصن\\' في الوادي الأبيض. وعندما اكتشفت عائلتي \\'هايصن\\' الوادي الأخضر، كنتُ أنا العقل الذي طوّر تلك \\'الترددات الصوتية\\' والصفير الذي أخضع ذئاب الواديين لسطوتنا؛ وبفضل هذا الإنجاز، انتقلتُ للعيش في الجنة الخضراء مع عائلتي.", "وعندما حلت معضلة \\'الفاكهة المحرمة\\'، لم أكن مجرد مراقب، بل كنتُ رجل علم يدرس الحالات بدقة. أدركتُ حينها أن حالة \\'السكر\\' ليست غياباً للوعي، بل هي حالة من \\'تشتت الوعي\\'؛ فالفاقد للوعي جثة هامدة تتنفس، أما السكران فيسمع ويرى ويتفاعل، والأخطر من ذلك أنه يملك القدرة على اتخاذ قرارات، لكنها قرارات مشتتة ومسلوبة الإرادة، وهنا تكمن الفرصة؛ فالشخص الذي يُسلب عقله يمكن قياده بمنتهى السهولة.", "تملكني شغف السيطرة، فاستخرجتُ عصارة تلك الفاكهة وبدأت تجاربي على فئران الجبال والكهوف. لاحظتُ أن الفئران تسكر وتتوحش وتلجأ للعنف المفرط، ورأيتُها تتعارك حتى الموت. لكن هدفي لم يكن القتل، بل السيطرة التامة. مزجتُ العصارة ببعض الأعشاب الخاصة، ونجحتُ أخيراً في إخضاع الفئران؛ كنتُ أزيد من جرعة الأعشاب ليصبح الفأر هادئاً لكنه يظل \\'مشتت الوعي\\'.", "صنعتُ متاهاتٍ معقدة، ولاحظتُ أن الفئران المحقونة تفقد التمييز بين النفع والضرر؛ رأيتُ فأراً يأكل ذيله بهدوء رغم الألم، وآخر يقفز في الهواء ويسقط مراراً غير مبالٍ بكسوره حتى يلفظ أنفاسه. لاحظتُ أيضاً أن لعابهم استحال إلى اللون الأخضر اللزج. لكن تلك الفئران كانت تعود لطبيعتها إذا أفاقت، وأنا كنتُ أريد حيواناً يظل مشتتاً للأبد.. وأريد كائناً أكبر.. الذئاب.", "توصلتُ إلى اكتشافٍ شيطاني: إذا حُقن الذئب وهو جنين في بطن أمه، ثم استمر الحقن بجرعات محددة خلال الأشهر الثلاثة الأولى من ولادته، سيؤدي ذلك إلى تشتيت وعيه بشكل أبدي. ومع التدريب المكثف، سينفذ هذا الكائن المهام الموكلة إليه بدقة ودون حاجة لرقابة مستمرة.", "أنا أعشق السيطرة؛ أهوى أن يتحرك كل ما حولي بمجرد إشارة مني، حتى وإن كانت المهمة الموكلة للكائن هي الانتحار في سبيلي.\"", "من مذكرات كبير أطباء الوادي الأخضر والأبيض:", "\"وهكذا ولدت فكرة البيرووولف. دونتُ كل ملاحظاتي وخطوات التنفيذ بدقة متناهية، وأضفتُ إلى خلطتي السرية نوعاً نادراً من الفطر يزيد من حجم الجنين وسرعة نمو أطرافه بشكل غير طبيعي. ودونتُ ملحوظة هامة؛ وهي الموت المحتوم للأم قبل موعد الولادة بفترة قصيرة بسبب انفجار الرحم من ضخامة الجنين. كل شيء بات جاهزاً للتنفيذ، لنصنع وحشاً أسطورياً يتحرك بإشارة من إصبعي الصغير.", "لكن، وقبل البدء بالتنفيذ، حلّت لعنة العمي في الوادي الأبيض. كان القرويون الساذجون، ومعهم الزعماء، يقسمون أن انفصال الواديين هو سبب اللعنة. كم هم حمقى! اذهبوا واسألوا أهل العلم. ولكني انا من ذهبتُ بكل ثقة للزعيم الأخضر وأخبرته أن الحقيقة تكمن في فيروس تحرر مع انهيار الثلج.", "أصدر الزعيم الأخضر أمراً مباشراً لي بتجهيز أفضل الأطباء وتكوين بعثة طبية مجهزة لعلاج المكفوفين في الوادي الأبيض، وعلى رأسهم الزعيم الأبيض نفسه. بالطبع، لم يكن الزعيم يعلم شيئاً عن معملي الخاص، ولا عن تجارب الفئران التي تأكل ذيولها؛ فقد كنتُ أدخر مفاجأة \\'الوحش\\' حتى يكتمل تدريبه، ليراه الناس كأعلى مستوى من التقدم في الوادي الأخضر الشغوف. فإذا كان الزعيمان قد انبهرا بالرافعة المائية، فلينظر أهل الواديين إلى ما يمكن لكبير الأطباء أن يصنعه.", "لكن أوامر الزعيم لا تُرد. أجلتُ تجاربي، وجمعتُ معداتي ومذكراتي وكتبي، وهجرتُ معملي متوجهاً إلى الوادي الأبيض. هناك، وجدتُ الوضع كارثياً؛ حكى لي المكفوفين أن المرض يبدأ بنقطة سوداء صغيرة تلاحق بصرك أينما نظرت، وفي ظرف شهر واحد تتوسع تلك البقعة لتغطي العين كاملة، فلا تعود ترى حتى بصيص الضوء.", "فشلت كل تجاربي في العلاج أو الوقاية، وحدث ما لم يكن في الحسبان؛ أصيب جميع أطبائي بالعمى في غضون شهور قليلة. أرسلتُ بالأخبار الصادمة لزعيم الوادي الأخضر، فجاءني الرد الذي زلزل كياني: أغلق الزعيم الأخضر بوابات الكهف نهائياً، وحرم الزيارات، بل ومنع عودة أي شخص خرج من الوادي الأخضر حتى لو كان سليماً معافى.", "أدركتُ أن القرار كان بدافع الحماية، ولكن ماذا عني أنا؟ لقد أخبرتُه في رسالتي أنني ما زلتُ أُبصر، فكيف يجرؤ على إغلاق الباب في وجهي؟\"", "من مذكرات كبير أطباء الوادي الأخضر والأبيض:", "\"تجرعتُ مرارة الخيانة، لكن الأمل في إيجاد علاجٍ يعيدني إلى الوادي الأخضر ظل يراودني. غير أن غضبي استحال جحيماً عندما علمتُ أن الزعيم الأخضر لم يكتفِ بنفيي، بل أمر الأطباء باقتحام معملي وسرقة أبحاثي وتنفيذ تجربة \\'البيرووولف\\' التي صممتُها؛ وضعوا الوحش في الكهف ودربوه ليفترس كل من يقترب، حتى صانعه الأصلي.", "ومع اقتراب الظلام من عيني وفقدان تسعين بالمائة من أهل الوادي الأبيض لبصرهم، أدركتُ أن أمامي شهراً واحداً قبل العمي الكامل. كان عليّ التصرف؛ قررتُ الإنجاب ليكون لي وريثٌ يستكمل ما بدأته. طلبتُ الزواج من العائلة المالكة، لكن الزعيم الأبيض رفضني وهو يتخبط في عماه، بحثتُ عن عائلةٍ مازالت تملك بصيصاً من البصر وتزوجت، لكن أصيبت زوجتي بالعمى وهي حامل، ووُلد ابني \\'أنزو\\' أعمى، بل وجاءت عيناه ضامرتين ومغلقتين تماماً.", "لم أستسلم؛ علمتُ \\'أنزو\\' كل أسراري حتى صار يتحرك كالمبصرين. وعندما أصيب فريقي الطبي بالعقم، أجرى \\'أنزو\\' الشاب تجاربه واكتشف الحقيقة: الفاكهة المحرمة هي السبب، وأنا الوحيد الذي نجا من عقمها لأني لم أذقها. ومن هنا، بدأتُ أغرس في نفس \\'أنزو\\' عقيدة أنه الزعيم الشرعي للواديين، انتقاماً من خيانة الأخضر ورفض الأبيض انتسابي لدمهم الملكي.", "مات الزعيم الأبيض وحل محله ابنه، وصار ابني \\'أنزو\\' كبيراً لأطبائه والعقل المحرك له. ولأني لم أملك نباتات الوادي الاخضر لحقن البشر والسيطرة عليهم كالذئاب، لعبتُ على العقول. جندتُ شباباً متحمسين خلف ظهر الزعيم، وزرعتُ فيهم وهماً بأن الكهف ليس متاهة بل هو معبرٌ للجنه، رغم علمي بوجود \\'البيرووولف\\'.", "مات الكثيرون، لكن القليل نجح في تفادي الوحش باستخدام البارود. وقبل أن يدركني الموت، أمرتُ \\'أنزو\\' بكتابة رسالة بأسم الزعيم الاخضر تفيض بالكراهية والتهديد بالحرب وإرسالها مع المجندين للزعيم الأخضر، ليعلم أننا قادمون.", "مذكرات كبير اطباء الوادي الاخضر", "أخفيتُ عن ابني إنزو حقيقة انقراض عائلتنا في الوادي الأخضر بسبب العقم، وزرعتُ فيه أمل العودة للعيش في الجنة، وأوهمته أن هناك سلالة من \\'هايصن\\' لم تذق الفاكهة المحرمة وهي من تعمّر الوادي الآن، ليبقى لديه دافعٌ للسيطرة والقتال حتى الرمق الأخير.\"", "كانت تلك المرة الأولى التي يرى فيها \"أنزو\" ذئباً من فصيلة الوادي الأخضر بهذا الحجم الأسطوري؛ فـ \"الذئب الملكي\" كان يضاهي في ضخامته الحصان الذهبي الذي يمتطيه \"كلاي\"، بل ويبدو ضعف حجم أي ذئب عادي رآه في حياته. أما \"تيد\"، فقد توهم أن هذا الكائن هو \"البيرووولف\" نفسه، فظل متمسكاً بسيفه في وضعية قتالية احترافية، منتظراً اللحظة التي يهجم فيها الوحش ليشقه نصفين.", "وفي المقابل، كان \"بن\" في حالة يرثى لها من الذعر، يرتجف كجناح عصفور بجانب \"أنزو\"؛ فعلى الرغم من قدرته على التحكم في ذئاب الوادي الأبيض بفضل صفارات \"أنزو\"، إلا أنه لم يواجه قط كائناً يملك هذه الهالة الروحية الطاغية التي أفقدته توازنه.", "وجه \"كلاي\" نظره نحو منصة الزعيم ليتأكد من وجود \"مليكة\" بجانبه، بينما كان الزعيم يجلس بعيداً عن الدائرة، لا يبصر الحركات لكنه يدركها عبر سلسلة من الخدم المقربين، تبدأ من قلب الحلقة وتنتهي عند أذنه، ينقلون له كل حركة وسكنة بشكل لحظي.", "ساد صمتٌ جنائزي لم يجرؤ أحد من القرويين أو الواقفين في الدائرة على كسر همهمته. حتى \"كلاي\" نفسه تردد في الكلام، متسائلاً عن سر هذا الصمت الطويل. لكن الزعيم لم يكن مجرد حاكم كفيف، بل كان سيداً في فهم النفوس والعقول. لقد ورث عن والده أسرار الوادي الأخضر، وحُفر في ذاكرته أن شعبه من عائلة \"هايصن\" لابد أن يظلوا معزولين لحمايتهم من عدوى العمي، ولذلك رحب قديماً برأي \"أنزو\" في تحريم دخول الكهف وإشاعة أسطورة \"المتاهة\" لتخويف العامة.", "ولكن الزعيم يعيش في عالم يظن فيه أن \"الأعين\" صفة حيوانية تشبه الذيول، وأن البشر الحقيقيين هم من انغلقت جفونهم, ما الفائدة من العيون اصلا, وعلي النقيض قد تكون سبب اغواء كبير لصاحبها. وعندما التقى بـ \"كلاي\" أول مرة، خشي أن يكون \"البصر\" معدياً تماماً كالعمي، فرفض وجوده. لكن عودة \"كلاي\" الآن بالذئب الملكي، ووصفه الدقيق للصورة التاريخية التي يمسك فيها والده التاج مقلوباً ملئ بالثلج، جعلت قلب الزعيم يخفق للمرة الثانية.", "\"مليكة\"، التي كانت تجلس بجانبه، شعرت بتلك الخفقة قبل أن يستعيد الزعيم سيطرته على مشاعره. تملكها العجب؛ كيف لهذا الغريب أن يعرف تقليداً ملكياً سرياً لا تعرفه هي؟ اشتعل غضب خفي في صدر الزعيم تجاه \"أنزو\"؛ فقد أدرك أن كبير الأطباء لم يخدعه في أمر \"كلاي\" فحسب، بل ربما كانت حياته كلها مبنية على سلسلة من الخدع الطبية والسياسية التي حان وقت كشفها.", "ما زال المشهدُ متجمداً، والدقائقُ تمرُّ ثقيلةً دون همس، لا يقطعها سوى صوت الرياح الخفيفة التي بدأت تزيح روائح بخور الزفاف والورود الملكية، ليحلَّ محلها عبير النهر وأشجار الغابة المنبعث من \"كلاي\" وحيواناته القادمة من الجنة. كان الزعيم يمارس \"لعبة الضغط النفسي\" ببراعة، صامتاً كتمثالٍ من الشمع، ينتظر أن ينضح كل إناءٍ بما فيه، وبالفعل، لم يحتمل الضعفاء هذا التوتر العالي.", "قطع \"تيد\" الصمت بصوتٍ متهدج، ونبرةٍ خانها الثبات فسمعها كل من في الدائرة: \"هل هذا هو البيرووولف الذي حدثتني عنه أنت وكبير الأطباء يا بن؟\"", "كان قلب \"تيد\" يكاد يقفز من صدره، أما \"بن\" فكان في حالٍ أسوأ؛ فالخوف من \"المجهول غير الطبيعي\" يصحبه الفضول، أما إدراك أن ما تراه هو \"كائن طبيعي\" لكنه يفوق قدراتك، فيصيبك بالرعب الصافي. أجاب \"بن\" وهو يرتعد: \"لا.. لا يا تيد، ليس هذا هو المسخ، هذا ذئب، ولكني لا أعرف من أين أتى.. لا يوجد حيوانٌ بهذا الهول في وادينا الأبيض.\"", "انتقل الرعبُ الصافي إلى يد \"تيد\" التي بدأت تهتز بوضوح فوق مقبض سيفه، وهو ما لاحظه \"كلاي\"، حضرت صورة \"مليكة\" في بال \"تيد\"؛ لم يكن يشتهيها لنفسها، بل كان يراها الجسر الوحيد نحو العرش الذي وعده به \"أنزو\" وزرع طموحه في دمه منذ الصغر.", "ما لم يكن يعلمه \"تيد\" أو \"بن\" أو أي أحد في الوادي، هو أن \"أنزو\" العجوز القبيح قد أقام علاقة غير شرعية مستغلاً نفوذه، وأنجب \"تيد\" ثم \"بن\"، لكنه أبقى الأمر سراً مقدساً. بالنسبة لـ \"تيد\"، كان \"أنزو\" هو المعلم وكبير الأطباء الذي اصطفاه من بين كل الشباب ليكون ملك \"لامبرث\" المستقبلي وأخوه سيداً للصحراء.", "ومع تذكر التاج والحكم، تدفق الأدرينالين في عروق \"تيد\" كالسم، وقرر الهجوم ليستعيد هيبته المهدورة. لكنه لم يهاجم \"كلاي\"؛ بل قرر وبكل شجاعةٍ وضراوة، وبحركة عسكرية متقنة تعكس جسد الفارس القوي، أن يوجه ضربة سيفه القاتلة نحو \"ذئب الوادي الأخضر\" ليشقّه نصفين أمام الجميع.", "لم يتخيل أحدٌ من الحاضرين، ممن استشعروا ضخامة \"الذئب الملكي\" وهالته الروحية، أن هناك بشراً يجرؤ حتى على الاقتراب منه، فضلاً عن الهجوم عليه. لذا، ساد الذهول وجوه الجميع وهم يسمعون اندفاعة \"تيد\" الانتحارية. لم ينكر أحدٌ شجاعة هذا الفارس الجسور، فهو بطل \"لامبرث\" المعروف، لكن المواجهة هذه المرة لم تكن مع ذئاب الثلج المألوفة.", "كان \"تيد\" يدرك أبعاد الذئب بدقة متناهية، فانقض عليه قفزاً في الهواء، ملتفاً حول نفسه بسيف الزفاف الطويل في حركة عسكرية رشيقة أذهلت \"كلاي\". كان \"تيد\" سريعاً، جسوراً، ولائقاً بدنياً إلى أقصى الحدود وهو يهوي بسيفه ليشق الذئب نصفين.", "لكن من وجهة نظر \"الذئب الملكي\"، كان \"تيد\" يتحرك ببطءٍ شديد رغم سرعته الظاهرية. وبمنتهى البرود، تراجع الذئب خطوة واحدة للخلف، ليمر السيف بجانبه ويشق الثلوج في الأرض محدثاً صوتاً مدوياً. وقبل أن يستوعب \"تيد\" فشل ضربته، استغل الذئب وضع التراجع علي ساقيه الخلفيتين وانطلق دفعه واحده كالبرق نحو الأعلى.", "فتح الذئب فكيه المرعبين وأطلق زئيراً صمَّ الآذان، انقض على \"تيد\" الذي تسمر في مكانه من هول الصوت. سقط الفارس أرضاً، ونهش الذئب عنقه في وحشيةٍ. صرخات \"تيد\" لم يسمعها أحد لا الذئب اوقف كل شئ في عنق تيد بأنيابه حتي ذبذبات الصوت، لكن الغريب أن الذئب لم يمزقه إرباً؛ بل اكتفى بنهش رقبته ثم تراجع وهو يلعق دماء \"تيد\" عن أنيابه بتلذذٍ وهدوء ليقف بجانب \"كلاي\" المصدوم.", "تُرك \"تيد\" يلفظ أنفاسه الأخيرة، محاولاً عبثاً حبس نوافير الدماء التي صبغت ثلوج الوادي الأبيض باللون القاني. كان \"كلاي\" يرتجف، والقشعريرة تسري في جسده وهو يرى \"تيد\" يموت أمام عينيه، مشلولاً بين الرغبة في المساعدة وبين إدراك فوات الأوان. هتف \"كلاي\" نحو المنصة: \"تيد يموت يا زعيم! الذئب نهشه!\" لكنه أدرك فور نطقها أنه يخبر الزعيم بأخبار أصبحت من الماضي؛ فالجميع سمع قفزة \"تيد\"، وسمع صرير السيف في الثلج، وزئير الذئب الذي زلزل أركان الوادي.", "ولكن الزعيم لم ينبس ببنت شفة حتى بعد أن فارقت روح \"تيد\" جسده. أما \"بن\"، فقد أصيب بهستيريا حادة، وجلس على الأرض يبكي بحرارة قبل أن تنتابه نوبة هلع جعلته يصرخ باسم أخيه \"تيد\".", "خشي \"كلاي\" أن ينهي الذئب حياة \"بن\" أيضاً، لكن الوحش ظل في مكانه كأنه لم يتحرك قط. همهم الزعيم همهمةً آمرة، فدخل الخدم الدائرة وسحبوا \"بن\" المنهار إلى الخارج.", "بقي في الدائرة: الحصان الذهبي، الذئب الملكي، \"كلاي\" المرتجف، و\"أنزو\" الذي ظل واقفاً كتمثالٍ صخري منذ اللحظة الأولى. وعلى الرغم من علمه بأن ابنه -الزعيم المستقبلي في نظره- قد مات، وأن ابنه الآخر قد انهار، إلا أن \"أنزو\" ظل صامداً، يستمع ببرودٍ مرعب إلى \"أوركسترا التوتر\" المنبعثة من خفقان القلوب المحيطة به، منتظراً ما ستؤول إليه هذه المحاكمة الدامية.", "الفصل الحادي والستون: سكونُ الشمعِ وزئيرُ الماضي", "كان \"أنزو\" الوحيد الذي فك شفرة \"الضغط النفسي\" الذي يمارسه الزعيم؛ فهو يدرك أن غرضه هو جعل الجميع ينفجرون ليعاقبوا أنفسهم بأنفسهم. ومع ذلك، ظل \"أنزو\" مؤمناً بأن \"الضعفاء فقط هم من يسقطون\". جرت الأفكار في عقله المظلم أسرع من الضوء الذي لا يبصره: \"ليقل الزعيم ما يشاء، سأنكر كل شيء. لم أكن معهم في \\'كهف العظام\\' حين أغروا كلاي بالمتاهة، ولم أكن معهم في \\'كهف الذئاب\\' حين كذبوا بشأن موته. لا دليل ضدي\". ولكن كان هناك سؤال مقلق في ذهنه: \" لماذا أنا هنا داخل هذه الدائرة اللعينة؟\".", "طبق الصمتُ على المكان مجدداً، ولم يعد يُسمع سوى صوت لعق \"الذئب الملكي\" لفروه، منظفاً نفسه من دماء \"تيد\" الذي استقرت جثته في مركز الدائرة. شعر \"كلاي\" بذنبٍ ثقيل، وأحس بمرارة المشاركة في هذه الفجيعة، فقرر كسر الصمت الرهيب. نظر للزعيم متعجباً من القوة التي يملكها هذا الرجل ليحرك البشر بصمته لا بكلماته، ثم هتف بصوتٍ متهدج: \"أيها الزعيم!\"", "تجاهل \"كلاي\" قواعد الصوت ليصل نداؤه للمنصة البعيدة، ولم يكن يعرف ماذا سيقول أو بمن سيلقي اللوم، لكنه فوجئ برد فعل الزعيم؛ صفق الزعيم بيديه مرتين في حسم. وفي لمحة بصر، تحول كل من في الوادي إلى تماثيل من شمع؛ القرويون، الحراس، والجنود، حتى خُيل لـ \"كلاي\" أن الهواء نفسه قد تجمد. لم يفهم \"كلاي\" سر هذه الحركة التي تنتمي لبروتوكولات الوادي الأبيض الصارمة، فتملكه الخوف القديم الذي كان يشعر به قبل رحلته للجنة الخضراء.", "هنا، همهم الزعيم همهمةً غامضة، لتأتي \"مليكة\" بالتفسير بصوتٍ مفعم بالثقة: \"هذه الصفقة يا كلاي تعني أنه لا يحق لأحد الكلام أو تحريك إصبع واحدة دون أمر مباشر من الزعيم\". كانت \"مليكة\" وستبقي المترجم الوحيد لإرادة والدها، فتجمد \"كلاي\" مكانه كالبقية. وهنا، قرر الزعيم تفجير القنبلة التي ستخلع قلب \"كبير الأطباء\" من مكانه، فسأل \"كلاي\": \"مَن قابلتَ من سكان الوادي الأخضر يا مستر كلاي؟\"", "بعد لحظات من السؤال، انحنى الخادم خلف الزعيم ليهمس له بخبرٍ هو الأول من نوعه: لقد دقت نبضات قلب \"أنزو\" القبيح! دقة واحدة قوية كانت كافية ليربح الزعيم رهانه؛ فلا شيء يفجر حصون هذا الرجل إلا \"الماضي والجذور\".", "\"أنزو\" لا يعلم بانقراض أبناء عمومته، فقد زرع والده في عقله أن هناك من نجا من \"العقم\" ومن \"الفاكهة المحرمة\". عاش \"أنزو\" حياته يخطط للعودة لعائلته \"هايصن\" في الجنة الخضراء، يمقت الثلج والوادي الأبيض، وحتى هذا الزعيم الذي يراه ابناً لرجلٍ رفض انتسابه لعائلته.", "بجوار \"كلاي\" يقبع \"الذئب الملكي\" الذي روضه أسلاف \"أنزو\" لملوك الأخضر، وأمامه \"الحصان الذهبي\" الذي اختارته سلالة \"هايصن\" لنفسها وحرمته على الرعية؛ ذاك الحصان الذي طالما تمنى \"أنزو\" لمسه، قال له ابوة انه أسرع وأضخم من خيول الأبيض الهزيلة. وعلى الرغم من إدراك \"أنزو\" أن الجميع سمعوا نبضه الضائع -مما يعد خسارة عسكرية بالنسبة له- إلا أنه ظل متجمداً، ينتظر بلهفةٍ واحتراق أخبار عائلته \"هايصن\" من هذا الغريب صاحب \"العيون الحيوانية\".", "لم يستوعب \"كلاي\" في الوهلة الأولى سر توقيت سؤال الزعيم؛ فالمشهدُ غارقٌ في الدماء، والجميعُ متجمدٌ بانتظارِ حُكمٍ، والزعيمُ يسألُ عن سكانِ الوادي الأخضر؟ لكنه حين لمح القلقَ يغزو وجه \"أنزو\" القبيح للمرة الأولى، أدرك أن الزعيم لا يرمي بكلمةٍ إلا في موضعها. ربط \"كلاي\" في ثوانٍ بين \"أنزو\" وبين كبير أطباء البعثة القديمة؛ إنه الوريثُ الذي يحمل حقد آبائه، والشخصُ الذي طُرد من \"الجنة\" قبل أن يراها.", "قرر \"كلاي\" أن يوجه الضربة القاضية لغرور الطبيب، فقال بصوتٍ رزين ملأ الساحة: \"كلُّ من في الوادي الأخضر قد مات وانقرض منذ مائة عام تقريباً أيها الزعيم. لم أرَ هناك سوى المقابر، والجثة الوحيدة التي وجدتها كانت رفات خادمٍ بائس، كان آخر من تبقّى، وآخر من دَفن، ولم يجد هو مَن يدفنه.\"", "نقل الخادمُ للزعيمِ اضطرابَ نبضاتِ \"أنزو\" الذي بدأ يفقد صوابه، لكن المفاجأة هذه كانت في اضطراب نبض الزعيم نفسه؛ فكلماتُ \"كلاي\" لم تحرق قلب ابن \"هايصن\" وحده، بل زلزلت كيان ابن \"لاندكيبت\" أيضاً. تنهد الزعيمُ بحرقةٍ لم يشعر بها منذ وفاة زوجته؛ فها هو يعلم أن أبناء عمومته قد فنوا تماماً بينما هو غارقٌ في عزلة واديه الأبيض.", "أما \"أنزو\"، فقد انفجر البركانُ الخامد في صدره. ولكنه فعل لم يتكلم, رغم أوامر الزعيم بالسكون، تحرك \"أنزو\" ببطئ نحو الحصان الذهبي الواقف بجانب كلاي. همَّ \"الذئب الملكي\" بالانقضاض، لكن \"أنزو\" أطلق صفارةً خفية خبيرة، أعادت الوحش لمكانه كقطٍ أليف. وصل العجوز للحصان، وراح يتحسس جسده بيديه المرتجفتين بلهفةِ من يلمسُ بقايا وطنٍ مفقود، يستمدُّ القوة من روح هذا الكائن الملكي الذي ينتمي لجذوره.", "خبر انقراض عائلته من شاهد عيان حزنه لدرجة انه اراد ان يقترب من اي شئ تخصهم.", "ثم التف بحدة نحو \"كلاي\" الذي كان يشاهد المشهد بتعاطف لأول مره تجاه ذلك العجوز الذي فقد وطنه.", "قال إنزو بغضب واضح عليه \"أنت تكذب! هايصن ما زالوا يعمرون الجنة، وأنتم من تستحقون الموت يا لاندكيبت الخونة! أنتم من أعديتم أبي بالعمى، وأنتم من رفضتم نسبه للتاج رغم فضله عليكم.. لولاه لكنتم طعاماً للذئاب!\"", "ثم استدار ليسمع الجميع صياحه: \"بفضلنا تأكلون وتشربون في أمان، وأنتم السبب في بوار الوادي الأخضر بمرضكم الملعون الذي حبس أبي هنا في هذا البرد القارس. اللعنة عليكم جميعاً، واللعنة عليك يا كلاي يا كاذب! لا أحد ينجو من \\'البيرووولف\\' الذي صنعه أبي ليقطعكم إرباً.. لا أحد! لقد أرسلتُ عشرات الشباب المدرب للكهف بعد ابي ولم يعد منهم أحد، فكيف تنجو أنت يا صاحب عيون الحيوانات؟\"", "للمرة الثالثة، سمع المحيطون دقات قلب الزعيم، وكانت هذه المرة حزناً وعزاءً؛ حزناً على الشباب الذين غرر بهم الطبيب القبيح لخدمة أوهامه، وحزناً على \"تيد\" الذي كان ضحيةً لنفوذ \"أنزو\" وتضليله. استشعر \"كلاي\" غضب الزعيم المكتوم، فنظر لـ \"أنزو\" وقال بهدوءٍ حزين: \"بعضُ الشباب الذين أرسلتهم وصلوا بالفعل للوادي الأخضر.. ولكن حاكم الوادي الاخضر قام باعدامهم خوفا علي شعبه من العمي. أما بخصوص \\'البيرووولف\\'، فأنا مستعدٌ للوقوف بجانبه مجدداً دون أن يخدشني، لأنه ببساطة.. مدربٌ على افتراس كل من لا يملك عيوناً في وجهه.\"", "سكنت الريحُ لتمتص صدمة الحقيقة؛ فالزعيم لم يكن يعلم أصلا بوجود \"البيرووولف\" في الكهف، بل ظنها متاهةً طبيعية أو عريناً لذئابٍ برية. أما \"أنزو\"، فقد تزلزلت أركانه حين أدرك أن سلاحه السري، ذلك المسخ، لم يكن يقتل إلا \"العميان\" من أبناء جلدته، وأن جنوده الذين أرسلهم وصلوا بالفعل، لكنهم قُتلوا هناك.", "تصاعد غضبُ \"أنزو\" حتى بلغت دقاتُ قلبه فوراناً لم يحتمله جسده السبعيني. وفي لحظةٍ خاطفة، سُمِع دويُّ ارتطامِ جسده بالأرض؛ لقد هوى \"كبير الأطباء\" صريعاً، فارقته الحياةُ تحت وطأة اليأس والحقد المكبوت. اتسعت عينا \"كلاي\" وهو يرقب الجثة الهامدة، ثم رفع بصره نحو الزعيم، ليجده كما هو.. جبلاً من الصمت لا تهزه العواصف.", "انتهت المحاكمة، وبدأت ملامحُ العهدِ الجديد:", "تطهير الممر: أصدر الزعيم أمراً فورياً بقتل \"البيرووولف\" وتنظيف الكهف وتزيينه، ليعود نفقاً آمناً يصل بين \"لامبرث\" والوادي الأخضر.", "رحلة الاستكشاف: كلف الزعيم بعثةً رسمية على رأسها \"كلاي\" والأميرة \"مليكة\" لزيارة الوادي الأخضر وتقديم تقريرٍ كامل عن أحواله لإعادة إحيائه.", "مراسم الدفن: أمر الزعيم بنقل جثامين \"تيد\" و\"أنزو\" ليُدفنا في الوادي الأخضر، الارض التي أفنوا حياتهم في الحلم بالعودة إليها.", "تحرير العقول: بعد أن استعاد \"بن\" وعيه من سموم \"أنزو\"، أمره الزعيم \\_وهو لا يعلم انه ابنا لأنزو\\_ بتعليم كل أهل \"لامبرث\" أسرار السيطرة على الذئاب، لضمان أمان الجميع في الواديين.", "خُيّر \"كلاي\" بين العودة لعالمه أو البقاء، فاختار بقلبٍ واثق أن يكمل حياته في هذا العالم الذي منحه البصيرة والحب، فنصبه الزعيم \"مستشاراً خاصاً للعرش\". وعندما طلب \"كلاي\" يد \"مليكة\"، وافق الزعيم بشرطٍ ملكي صارم: \"أن يظل الدم الحاكم نقياً، فلا يتولى كلاي أو اي من أبناؤه وسلالته زعامة الواديين، ليبقى الحكم لأبناء \\'لاندكيبت\\' فقط\".", "وهكذا، عاد النورُ ليتسلل عبر الكهف القديم، واختلط بياضُ الثلج بخضرةِ الشجر، ليعيش الواديان في سلامٍ لم يشهداه منذ مائة عام.", "الوادي الابيض.", "E.Y.E. Ali"]];

const CHAPTER_TITLES = [
  "حين يبتلع الجبل أسراره",
  "عيون لا ترى ولا تكذب",
  "الجنة التي أكلها الظلام",
  "ما وراء الكهف والحقيقة",
  "محاكمة بين ثلج ودم"
];

const CHAPTER_NUMS = ["الفصل الأول", "الفصل الثاني", "الفصل الثالث", "الفصل الرابع", "الفصل الخامس"];

let currentChapter = 0;
let fontSize = 19;
let themeIndex = 0;
const themes = ['', 'night', 'sepia'];
const themeIcons = ['🌙', '☀️', '📜'];

// Snow
function createSnow() {
  const container = document.getElementById('snowContainer');
  for (let i = 0; i < 50; i++) {
    const flake = document.createElement('div');
    flake.classList.add('snowflake');
    flake.textContent = '·';
    flake.style.left = Math.random() * 100 + 'vw';
    flake.style.animationDuration = (Math.random() * 8 + 5) + 's';
    flake.style.animationDelay = (Math.random() * 10) + 's';
    flake.style.fontSize = (Math.random() * 8 + 4) + 'px';
    container.appendChild(flake);
  }
}
createSnow();

// Build landing chapter pills
function buildLandingChapters() {
  const container = document.getElementById('landingChapters');
  CHAPTER_TITLES.forEach((title, i) => {
    const pill = document.createElement('button');
    pill.className = 'ch-pill';
    pill.textContent = CHAPTER_NUMS[i].replace('الفصل ', 'ف') + ' · ' + title;
    pill.onclick = () => openReader(i);
    container.appendChild(pill);
  });
}
buildLandingChapters();

// Build chapter nav
function buildChapterNav() {
  const nav = document.getElementById('chapterNav');
  nav.innerHTML = '';
  CHAPTER_TITLES.forEach((title, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-nav-btn' + (i === currentChapter ? ' active' : '');
    btn.textContent = CHAPTER_NUMS[i].replace('الفصل ', 'ف') + ': ' + title;
    btn.onclick = () => loadChapter(i);
    nav.appendChild(btn);
  });
}

function openReader(chapterIndex) {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  buildChapterNav();
  loadChapter(chapterIndex);
  window.scrollTo(0, 0);
  window.addEventListener('scroll', updateProgress);
}

function goBack() {
  document.getElementById('reader').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  window.scrollTo(0, 0);
}

function loadChapter(index) {
  currentChapter = index;
  const paras = CHAPTERS_DATA[index];

  // Update header
  document.getElementById('headerTitle').textContent = CHAPTER_TITLES[index];

  // Update nav active state
  document.querySelectorAll('.ch-nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  // Estimate reading time
  const totalWords = paras.join(' ').split(' ').length;
  const minutes = Math.ceil(totalWords / 200);

  // Build HTML
  let html = `
    <div class="chapter-header">
      <div class="chapter-num">${CHAPTER_NUMS[index]}</div>
      <h2 class="chapter-title">${CHAPTER_TITLES[index]}</h2>
      <div class="chapter-ornament"><div class="chapter-ornament-diamond"></div></div>
      <div class="reading-time">وقت القراءة التقديري: ~${minutes} دقيقة</div>
    </div>
    <div class="story-text chapter-content">
  `;

  paras.forEach((para, i) => {
    const isDialogue = para.startsWith('"') || para.startsWith('\u2014') || para.includes('---') || para.startsWith('—') || para.startsWith('قال') || para.startsWith('قالت') || para.startsWith('أجاب') || para.startsWith('همس') || para.startsWith('صاح');
    const cleanPara = para.replace(/---/g, '—');
    
    if (para.match(/^[\-\*\.]{5,}/) || para.trim() === '***') {
      html += '<div class="section-break">✦ ✦ ✦</div>';
    } else {
      html += `<p${isDialogue ? ' class="dialogue"' : ''}>${cleanPara}</p>`;
    }
  });

  html += '</div>';

  // Chapter end navigation
  html += '<div class="reader-footer">';
  if (index > 0) {
    html += `<button class="nav-btn-end" onclick="loadChapter(${index-1}); window.scrollTo(0,0)">← الفصل السابق</button>`;
  }
  if (index < 4) {
    html += `<button class="nav-btn-end" onclick="loadChapter(${index+1}); window.scrollTo(0,0)">الفصل التالي ←</button>`;
  } else {
    html += '<p style="font-family: Amiri, serif; font-size: 1.3rem; margin-top: 1rem;">تمّت الرواية ✦</p><p style="margin-top:0.5rem">الوادي الأبيض — عزالدين علي — ٢٠٢٦</p>';
  }
  html += '</div>';

  const container = document.getElementById('chapterContent');
  container.innerHTML = html;
  applyFontSize();
  window.scrollTo(0, 0);
  updateProgress();
}

function applyFontSize() {
  document.querySelectorAll('.story-text p').forEach(p => {
    p.style.fontSize = fontSize + 'px';
  });
  document.getElementById('fontSizeDisplay').textContent = fontSize;
}

function changeFontSize(delta) {
  fontSize = Math.min(28, Math.max(14, fontSize + delta));
  applyFontSize();
}

/**
 * يقوم بتبديل القوالب (Themes) بشكل دائري.
 * يتم التحقق من صحة الفئة (Class) قبل الإضافة أو الحذف لتجنب أخطاء DOMTokenList.
 */
function cycleTheme() {
  const themeBtn = document.getElementById('themeBtn');
  
  // 1. التحقق من وجود القالب الحالي وإزالته بأمان
  const currentTheme = themes[themeIndex];
  if (currentTheme && currentTheme.trim() !== "") {
    document.body.classList.remove(currentTheme);
  }

  // 2. تحديث المؤشر للانتقال للقالب التالي
  themeIndex = (themeIndex + 1) % themes.length;

  // 3. إضافة القالب الجديد وتحديث أيقونة الزر
  const nextTheme = themes[themeIndex];
  
  if (nextTheme && nextTheme.trim() !== "") {
    document.body.classList.add(nextTheme);
  }

  // تحديث نص أو أيقونة الزر إذا كان العنصر موجوداً
  if (themeBtn && themeIcons[themeIndex]) {
    themeBtn.textContent = themeIcons[themeIndex];
  }
}

/**
 * تحديث شريط التقدم العلوي بناءً على نسبة التمرير في الصفحة.
 */
function updateProgress() {
  const scrollTop = window.scrollY;
  // docHeight يمثل المسافة الإجمالية القابلة للتمرير
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  
  // حساب النسبة المئوية وضمان عدم القسمة على صفر
  const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  
  const progressFill = document.getElementById('progressFill');
  if (progressFill) {
    progressFill.style.width = `${progress}%`;
  }
}
</script>
