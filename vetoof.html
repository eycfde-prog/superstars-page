        .main-btn {
            margin: 20px auto; display: block;

            color: white; padding: 10px 30px; border-radius: 25px;
            font-weight: bold; cursor: pointer; border: none; transition: 0.3s;

        /* Overlays */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: none; z-index: 2000;
            overflow-y: auto;
        }

        /* Activity Grid (Squares) */
        .activity-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));

        .activity-card {

            text-align: center; padding: 10px; cursor: pointer; border-radius: 12px;
            font-weight: 600; transition: 0.3s;

        .activity-card:hover { background: var(--primary-red); transform: translateY(-5px); }

        /* Level Grid Main */
        .levels-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 80px; width: 90%; margin: 40px auto; justify-items: center;
        }

        .level-wrapper { position: relative; width: 120px; height: 120px; }
        .level-btn {
            width: 100%; height: 100%; background: var(--primary-red);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 4px solid white; cursor: pointer; z-index: 5; position: relative;
        }

        .sub-btn {
            position: absolute; width: 40px; height: 40px; background: white;
            color: var(--primary-red); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            opacity: 0; transform: scale(0); transition: 0.4s; z-index: 4; cursor: pointer;
        }
        .level-wrapper.active .sub-btn { opacity: 1; transform: scale(1); }
        .level-wrapper.active .sub-btn:nth-child(2) { top: -45px; left: 35px; }
        .level-wrapper.active .sub-btn:nth-child(3) { bottom: -45px; left: 35px; }
        .level-wrapper.active .sub-btn:nth-child(4) { left: -45px; top: 35px; }
        .level-wrapper.active .sub-btn:nth-child(5) { right: -45px; top: 35px; }

            background: #000; padding: 15px 0; text-align: center;
            border-top: 1px solid #333; font-weight: bold; color: var(--primary-red);
        }

            document.getElementById('sessionOverlay').style.display = 'block';

            container.innerHTML = '<h2 style="color: #666;">Loading Activity Contents...</h2>';
            document.getElementById('activityOverlay').style.display = 'block';

            // --- نظام التسمية الموحد (WOLF Standard) ---
            let cleanName = actName.replace(/\s+/g, ''); 
            let shortName = cleanName.substring(0, 3);
            shortName = shortName.charAt(0).toUpperCase() + shortName.slice(1);
            
            const fileName = `L-${lv}-S-${ss}-${shortName}.js`;
            const filePath = `data/${fileName}`;

            const oldScript = document.getElementById('activity-script');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'activity-script';
            script.src = filePath;
            
            script.onerror = () => {
                container.innerHTML = `
                    <div style="color: #e74c3c; padding: 20px; border: 2px dashed #e74c3c; border-radius: 15px; background: rgba(231, 76, 60, 0.1);">

                        <p>Expected File: <span style="color: yellow;">${fileName}</span></p>
                        <p>Path: <span style="color: #fff;">${filePath}</span></p>
                    </div>
                `;
            };

            document.body.appendChild(script);
        }

            });

        function updateBtn(text, fn) {
            const btn = document.getElementById('portalActionBtn');
            btn.innerText = text;

        function closeAll() {
            document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
            updateBtn("Tokens Portal", () => toggleTokens());
        }

            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
        });

            const wrap = document.createElement('div');
            wrap.className = 'level-wrapper';
            wrap.innerHTML = `<div class="level-btn" onclick="toggleLevel(event, this)">Level ${i}</div>`;
            for (let j = 1; j <= 4; j++) {
                const s = document.createElement('div');
                s.className = 'sub-btn'; s.innerText = j;
                s.onclick = (e) => { e.stopPropagation(); openSession(i, j); };
                wrap.appendChild(s);
            }
            grid.appendChild(wrap);
        }

        function toggleLevel(e, btn) {
            e.stopPropagation();
            const parent = btn.parentElement;
            const isActive = parent.classList.contains('active');
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
            if (!isActive) parent.classList.add('active');
        }

        function openSession(lv, ss) {
            const activities = sessionData[`${lv}-${ss}`] || ["Coming Soon"];
            document.getElementById('sessionTitle').innerText = `Level ${lv} - Session ${ss}`;
            let html = `<div class="activity-grid">`;
            activities.forEach((act, index) => {
                html += `<div class="activity-card" onclick="openFinalActivity(${lv}, ${ss}, '${act}')">
                            <span style="color:var(--veto-red)">${index + 1}.</span> ${act}
                         </div>`;
            });
            html += `</div>`;
            document.getElementById('sessionContent').innerHTML = html;
            document.getElementById('sessionOverlay').style.display = 'block';
        }

        function openFinalActivity(lv, ss, actName) {
            document.getElementById('activityDetails').innerHTML = `L${lv} / S${ss} / <span style="color:var(--veto-red)">${actName}</span>`;
            const container = document.getElementById('activityFinalContent');
            
            container.innerHTML = `
                <div id="veto-stage" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: var(--font-giant);">
                    <div class="loader-veto">جاري تحضير المحتوى...</div>
                </div>
            `;

            document.getElementById('activityOverlay').style.display = 'block';
            
            const fileName = `L-${lv}-S-${ss}-${actName.replace(/\s+/g, '').substring(0, 3)}.js`;
            console.log("Architect Loading:", fileName);
        }

        function closeAll() {
            document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeAll();

            const activeLevel = document.querySelector('.level-wrapper.active');
            if (activeLevel && !document.getElementById('sessionOverlay').offsetParent) {
                const levelNum = activeLevel.querySelector('.level-btn').innerText.replace('Level ', '');
                if (['1', '2', '3', '4'].includes(e.key)) {
                    openSession(parseInt(levelNum), parseInt(e.key));
                }
            }
        });

        document.addEventListener('click', () => {
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
        });
    </script>
</body>
</html>
