<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Robotic Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg-dark: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --transition-speed: 0.3s;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-user-select: none; 
            -ms-user-select: none; 
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .top-banner {
            height: 90px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 3px solid var(--primary-gold);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-img { height: 55px; filter: drop-shadow(0 0 10px var(--gold-glow)); }
        .mr-ezz-img { 
            height: 70px; border-radius: 10px;
            border: 2px solid var(--primary-gold); 
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            letter-spacing: 4px;
            background: linear-gradient(180deg, #fff 30%, var(--primary-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-align: center;
        }

        .levels-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 40px 5%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .level-block {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            position: relative;
            clip-path: polygon(0 0, 92% 0, 100% 15%, 100% 100%, 8% 100%, 0 85%);
            transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        .level-block:hover {
            border-color: var(--primary-gold);
            background: rgba(212, 175, 55, 0.08);
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .level-card {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .level-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px var(--gold-glow);
        }

        .lectures-drawer {
            height: 0;
            overflow: hidden;
            transition: height 0.4s ease-in-out;
            background: rgba(0, 0, 0, 0.4);
        }

        .drawer-inner {
            padding: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .level-block.active { border: 2px solid var(--primary-gold); z-index: 10; }

        .lectures-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (min-width: 1024px) { .lectures-grid { grid-template-columns: repeat(4, 1fr); } }

        .lecture-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--primary-gold);
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            clip-path: polygon(10% 0%, 100% 0%, 100% 90%, 90% 100%, 0% 100%, 0% 10%);
            transition: 0.3s;
        }

        .lecture-item:hover {
            background: var(--primary-gold);
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary-gold);
        }

        .lecture-item b { font-family: 'Orbitron'; font-size: 1.1rem; }
        
        .arrow-icon { transition: 0.3s; color: var(--primary-gold); font-size: 0.8rem; }
        .level-block.active .arrow-icon { transform: rotate(180deg); }

        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 5, 0.92);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .loading-overlay.visible { display: flex; }

        .loading-spinner {
            width: 60px; height: 60px;
            border: 3px solid rgba(212, 175, 55, 0.2);
            border-top-color: var(--primary-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--primary-gold);
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes spin  { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .protected-badge {
            position: fixed; bottom: 15px; right: 15px;
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--glass-border);
            padding: 6px 12px;
            font-size: 0.65rem; letter-spacing: 2px;
            color: var(--primary-gold);
            font-family: 'Orbitron', sans-serif;
            opacity: 0.5; pointer-events: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">LOADING SESSION...</div>
    </div>

    <header class="top-banner">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="VETO" class="logo-img">
        <div class="title-container">
            <h1 class="main-title">VETO SYSTEM v2.0</h1>
        </div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz" class="mr-ezz-img">
    </header>

    <main class="levels-container" id="mainContainer"></main>

    <div class="protected-badge">⚡ PROTECTED CONTENT</div>

    <script>
        const container = document.getElementById('mainContainer');
        const levelsCount = 12;
        const sessionsPerLevel = 4;
        let isNavigating = false;

        function initApp() {
            const fragment = document.createDocumentFragment();
            
            for (let i = 1; i <= levelsCount; i++) {
                const block = document.createElement('div');
                block.className = 'level-block';
                block.id = `level-${i}`;

                let sessionsHTML = '';
                for (let s = 1; s <= sessionsPerLevel; s++) {
                    sessionsHTML += `
                        <div class="lecture-item" onclick="event.stopPropagation(); navigate('${i}-${s}')">
                            <span>SESSION</span>
                            <b>${s < 10 ? '0' + s : s}</b>
                        </div>`;
                }

                block.innerHTML = `
                    <div class="level-card" onclick="toggleDrawer(${i})">
                        <div class="level-info">
                            <span style="font-size:0.7rem; color:var(--primary-gold); letter-spacing:2px;">SECTOR</span>
                            <div class="level-number">LEVEL ${i < 10 ? '0' + i : i}</div>
                        </div>
                        <div class="arrow-icon">▼</div>
                    </div>
                    <div class="lectures-drawer" id="drawer-${i}">
                        <div class="drawer-inner">
                            <div class="lectures-grid">${sessionsHTML}</div>
                        </div>
                    </div>`;
                fragment.appendChild(block);
            }
            container.appendChild(fragment);
        }

        function toggleDrawer(id) {
            const target = document.getElementById(`level-${id}`);
            const drawer = document.getElementById(`drawer-${id}`);
            const isActive = target.classList.contains('active');

            document.querySelectorAll('.level-block').forEach(b => {
                if (b.classList.contains('active')) {
                    b.classList.remove('active');
                    b.querySelector('.lectures-drawer').style.height = '0';
                }
            });

            if (!isActive) {
                target.classList.add('active');
                const fullHeight = drawer.querySelector('.drawer-inner').scrollHeight;
                drawer.style.height = fullHeight + 'px';
                setTimeout(() => {
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 400);
            }
        }

        function navigate(sid) {
            if (isNavigating) return;
            isNavigating = true;
            document.getElementById('loadingOverlay').classList.add('visible');
            setTimeout(() => {
                window.location.href = `smartboard.html?session=${sid}`;
            }, 600);
        }

        document.onkeydown = function(e) {
            if (e.key === 'F12') return false;
            if (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) return false;
            if (e.ctrlKey && ['C','V','U','S','A','P'].includes(e.key.toUpperCase())) return false;
            if (e.metaKey && ['C','V','U','S','A','P'].includes(e.key.toUpperCase())) return false;
        };

        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('keyup', function(e) {
            if (e.key === 'PrintScreen') navigator.clipboard?.writeText('').catch(() => {});
        });

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
