<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Smart Board</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --banner-height: 100px;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; 
            -webkit-user-select: none; user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--font-main);
            height: 100vh;
            overflow: hidden;
        }

        /* Responsive Banner */
        .top-banner {
            height: var(--banner-height);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; background: #000; border-bottom: 3px solid var(--primary-gold);
        }

        .logo-img { height: 50px; }
        .mr-ezz-img { height: 70px; border-radius: 8px; border: 1px solid var(--primary-gold); }
        .session-info h1 { font-size: 1.8rem; color: var(--primary-gold); }

        /* Grid for Cards - Updated Structural Logic */
        .content-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; 
            padding: 20px; 
            overflow-y: auto;
            height: calc(100vh - var(--banner-height));
            touch-action: pan-y;
        }

        .content-card {
            background: var(--card-bg); 
            border: 1px solid rgba(197,160,89,0.2);
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            transition: 0.3s; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }

        .content-card:hover { border-color: var(--primary-gold); background: rgba(197,160,89,0.05); }

        .content-card h2 {
            font-size: 1.1rem; 
            word-break: break-word;
        }

        /* Activity Stage */
        #activity-stage { 
            position: fixed; inset: 0; background:#000; z-index: 8000; display: none; 
        }

        /* Laser & Canvas */
        #laser-pointer {
            position: fixed; width: 25px; height: 25px; background: rgba(255, 0, 0, 0.9); 
            border-radius: 50%; pointer-events: none; z-index: 10000; display: none;
            box-shadow: 0 0 15px red, 0 0 30px red; transform: translate(-50%, -50%);
        }
        #drawing-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }

        /* Mobile Orientation Force (CSS) */
        @media screen and (max-width: 900px) and (orientation: portrait) {
            #activity-stage { 
                transform: rotate(90deg); transform-origin: bottom left;
                width: 100vh; height: 100vw; top: -100vw; left: 0;
            }
        }

        /* Controls */
        .exit-btn {
            position: absolute; top: 15px; left: 15px; z-index: 8500;
            background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 8px;
        }

        .toolbox-wrapper { position: fixed; bottom: 20px; right: 20px; z-index: 9500; display: flex; flex-direction: column-reverse; gap: 10px; }

        .tool-btn { 
            width: 48px; height: 48px; border-radius: 12px; 
            background: #1a1a1a; border: 1px solid var(--primary-gold); 
            color: var(--primary-gold); font-size: 1.2rem; display: none; 
            align-items: center; justify-content: center; transition: 0.2s;
            cursor: pointer;
        }

        .tool-btn:active { background: var(--primary-gold); color: #000; transform: scale(0.9); }

        .tool-btn.active { 
            background: #ff4757; 
            border-color: #ff4757; 
            color: white; 
        }

        #quick-note-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; z-index: 9600; display: none;
        }
        #smart-note-input {
            width: 100%; background: rgba(0, 0, 0, 0.85); 
            border: 2px solid var(--primary-gold); border-radius: 15px;
            color: #fff; padding: 15px 25px; text-align: center;
            font-size: 2.5rem; font-weight: bold; font-family: var(--font-main);
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.3);
        }

        .nav-hotspot {
            position: absolute; top: 0; height: 100%; width: 15%; z-index: 8400;
        }
        .nav-next { right: 0; } .nav-prev { left: 0; }

        @media screen and (max-width: 900px) {
            .nav-hotspot { display: block; }
        }

        .toolbox-wrapper.open .tool-btn { display: flex; }
    </style>
</head>
<body>

    <header class="top-banner">
        <button onclick="window.location.href='vetoof.html'" style="background:none; border:1px solid var(--primary-gold); color:var(--primary-gold); padding:8px 15px; border-radius:5px; cursor:pointer;">← BACK</button>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        <div class="session-info"><h1 id="display-title">VETO BOARD</h1></div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage">
        <button class="exit-btn" onclick="closeStage()">EXIT (ESC)</button>
        <div class="nav-hotspot nav-prev" onclick="if(typeof prevSlide === 'function') prevSlide()"></div>
        <div class="nav-hotspot nav-next" onclick="if(typeof nextSlide === 'function') nextSlide()"></div>
        <div id="stage-content" style="width:100%; height:100%;"></div>
    </div>

    <div id="quick-note-container">
        <input type="text" id="smart-note-input" placeholder="اكتب ملاحظتك هنا...">
    </div>

    <div id="laser-pointer"></div>
    <canvas id="drawing-canvas"></canvas>

    <div class="toolbox-wrapper" id="toolBox">
        <button class="tool-btn" style="display:flex; background:#222;" onclick="toggleToolBox()">🛠️</button>
        <button class="tool-btn" id="laserBtn" onclick="handleToolClick('laserBtn', toggleLaser)">🔦</button>
        <button class="tool-btn" id="reloadBtn" onclick="handleToolClick('reloadBtn', () => location.reload())">🔄</button>
        <button class="tool-btn" id="noteBtn" onclick="toggleNote()">📝</button>
    </div>

    <script src="data/levels.js"></script>

    <script>
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const urlParams = new URLSearchParams(window.location.search);
        const currentSessionId = urlParams.get('session');

        let laserActive = false;
        let isDrawing = false;
        const laser = document.getElementById('laser-pointer');
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resizeCanvas; resizeCanvas();

        function initSession() {
            if (!currentSessionId || !sessionData[currentSessionId]) return;
            const container = document.getElementById('content-container');
            sessionData[currentSessionId].forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.onclick = () => openActivity(item);
                card.innerHTML = `<h2>${item}</h2>`;
                container.appendChild(card);
            });
        }

        async function openActivity(activityName) {
            const [lvl, sess] = currentSessionId.split('-');
            let filePath = "";
            const nameUpper = activityName.toUpperCase();

            // Logic for Routing Files
            if (nameUpper.includes("GRAMMAR")) {
                filePath = `data/L-1-${lvl}-S-${sess}-Gra.js`;
            } 
            else if (nameUpper.includes("VOCAB")) {
                const type = nameUpper.includes("TEST") ? "2" : "1";
                filePath = `data/L-${type}-${lvl}-S-${sess}-Voc.js`;
            }
            else if (nameUpper.includes("READING")) {
                filePath = `data/L-${lvl}-S-${sess}-Rea.js`;
            }
            else if (nameUpper.includes("ONE SHOT")) {
                filePath = `data/L-${lvl}-S-${sess}-One.js`;
            }
            else if (nameUpper.includes("TONGUE TWISTER")) {
                filePath = `data/L-${lvl}-S-${sess}-Ton.js`;
            }
            else if (nameUpper.includes("SQUEEZER")) {
                const suffix = nameUpper.includes("TEST") ? "Squt" : "Squr";
                filePath = `data/L-${lvl}-S-${sess}-${suffix}.js`;
            }
            else if (nameUpper.includes("DMT")) {
                if (nameUpper.includes("TEST")) {
                    filePath = `data/Timer.js`;
                } else {
                    filePath = `data/L-${lvl}-S-${sess}-DMT.js`;
                }
            }
            else if (nameUpper.includes("WISH")) {
                const type = nameUpper.includes("TEST") ? "2" : "1";
                filePath = `data/L-${type}-1-S-${sess}-Wis.js`;
            }
            else if (nameUpper.includes("PROJECT")) {
                const type = nameUpper.includes("TEST") ? "2" : "1";
                filePath = `data/L-${type}-1-S-${sess}-Pro.js`;
            }
            else if (nameUpper.includes("GP")) {
                const type = nameUpper.includes("TEST") ? "2" : "1";
                filePath = `data/L-${type}-1-S-${sess}-GP.js`;
            }
            else {
                const prefix = activityName.split(' ')[0].substring(0, 3);
                filePath = `data/L-1-${lvl}-S-${sess}-${prefix}.js`;
            }

            console.log("Opening Path:", filePath); 

            const stage = document.getElementById('activity-stage');
            stage.style.display = 'block';
            
            if (isMobile && stage.requestFullscreen) {
                stage.requestFullscreen().catch(err => console.log(err));
            }

            document.getElementById('stage-content').innerHTML = "";
            const script = document.createElement('script');
            script.src = filePath;
            document.head.appendChild(script);
        }

        function toggleToolBox() { document.getElementById('toolBox').classList.toggle('open'); }

        function handleToolClick(btnId, action) {
            const btn = document.getElementById(btnId);
            action();
            if(!btn.classList.contains('active')) {
                btn.style.background = "var(--primary-gold)";
                btn.style.color = "#000";
                setTimeout(() => {
                    btn.style.background = "#1a1a1a";
                    btn.style.color = "var(--primary-gold)";
                }, 150);
            }
        }

        function toggleLaser() {
            laserActive = !laserActive;
            document.getElementById('laserBtn').classList.toggle('active');
            laser.style.display = (laserActive && !isMobile) ? 'block' : 'none';
        }

        function toggleNote() {
            const noteContainer = document.getElementById('quick-note-container');
            const noteInput = document.getElementById('smart-note-input');
            const noteBtn = document.getElementById('noteBtn');

            if (noteContainer.style.display === 'none' || noteContainer.style.display === '') {
                noteContainer.style.display = 'block';
                noteBtn.classList.add('active');
                noteInput.focus();
            } else {
                noteContainer.style.display = 'none';
                noteBtn.classList.remove('active');
                noteInput.value = ""; 
            }
        }

        let closeStage = function() {
            document.getElementById('activity-stage').style.display = 'none';
            document.getElementById('stage-content').innerHTML = "";
            document.getElementById('quick-note-container').style.display = 'none';
            document.getElementById('noteBtn').classList.remove('active');
            if (document.fullscreenElement) document.exitFullscreen();
        };

        function getCoords(e) {
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        }

        function startAction(e) {
            if (!laserActive) return;
            isDrawing = true;
            const pos = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            if (isMobile) laser.style.display = 'block';
            updateLaserPos(e);
        }

        function moveAction(e) {
            if (!laserActive) return;
            const pos = getCoords(e);
            updateLaserPos(e);
            if (isDrawing) {
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            }
        }

        function endAction() {
            isDrawing = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (isMobile) laser.style.display = 'none';
        }

        function updateLaserPos(e) {
            const pos = getCoords(e);
            laser.style.left = pos.x + 'px';
            laser.style.top = pos.y + 'px';
        }

        window.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);
        window.addEventListener('touchstart', (e) => { if(laserActive) e.preventDefault(); startAction(e); }, {passive: false});
        window.addEventListener('touchmove', (e) => { if(laserActive) e.preventDefault(); moveAction(e); }, {passive: false});
        window.addEventListener('touchend', endAction);

        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                if(document.getElementById('quick-note-container').style.display === 'block') {
                    toggleNote();
                } else {
                    closeStage();
                }
                return;
            }

            if (document.getElementById('activity-stage').style.display === 'none') return;

            if ([" ", "ArrowUp", "ArrowDown", "ArrowRight", "ArrowLeft"].includes(e.key)) {
                e.preventDefault();
            }

            const isInternalControl = (typeof document.onkeydown === 'function');

            if (!isInternalControl) {
                if (e.key === "Enter" || e.key === "ArrowRight" || e.key === " ") {
                    if(typeof nextSlide === "function") nextSlide();
                } else if (e.key === "ArrowLeft" || e.key === "Backspace") {
                    if(typeof prevSlide === "function") prevSlide();
                }
            }
        });

        initSession();
    </script>
</body>
</html>
