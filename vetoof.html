<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وجه متحرك SVG</title>
    <style>
        /* CSS Styling - الجزء المسؤول عن الشكل والألوان */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0; /* لون خلفية الصفحة */
            margin: 0;
            font-family: sans-serif;
            overflow: hidden; /* لمنع التمرير أثناء اللمس على الموبايل */
        }

        #face {
            width: 300px;
            height: 300px;
        }

        /* تنسيق الجلد */
        .skin {
            fill: #ffdbac; /* لون البشرة */
            stroke: #333; /* لون الحدود */
            stroke-width: 2;
        }

        /* تنسيق العيون (اللون الأبيض) */
        .eye-white {
            fill: white;
            stroke: #333;
            stroke-width: 2;
        }

        /* تنسيق بؤبؤ العين (الجزء المتحرك) */
        .pupil {
            fill: #333; /* لون البؤبؤ */
        }

        /* تنسيق الأنف والفم والأذنين */
        .feature {
            fill: none;
            stroke: #333;
            stroke-width: 3;
            stroke-linecap: round; /* أطراف الخطوط مستديرة */
        }

        /* تنسيق الشعر */
        .hair {
            fill: #5d4037; /* لون الشعر */
        }
        
    </style>
</head>
<body>

    <svg id="face" viewBox="0 0 100 100">
        <circle class="skin feature" cx="15" cy="50" r="10" />
        <circle class="skin feature" cx="85" cy="50" r="10" />

        <circle class="skin" cx="50" cy="50" r="45" />
        
        <path class="hair" d="M 15 30 Q 50 5 85 30 Q 50 20 15 30 Z" />

        <g class="eye" id="left-eye">
            <circle class="eye-white" cx="35" cy="40" r="7" />
            <circle class="pupil" cx="35" cy="40" r="3" />
        </g>

        <g class="eye" id="right-eye">
            <circle class="eye-white" cx="65" cy="40" r="7" />
            <circle class="pupil" cx="65" cy="40" r="3" />
        </g>

        <path class="feature" d="M 50 45 L 50 60 L 45 60" />

        <path class="feature" d="M 35 75 Q 50 85 65 75" />
    </svg>

    <script>
        const face = document.getElementById('face');
        const pupils = document.querySelectorAll('.pupil');

        // دالة للتعامل مع حركة المؤشر أو اللمس
        function moveEyes(e) {
            let mouseX, mouseY;

            // التحقق مما إذا كان الحدث لمسًا (موبايل) أو حركة ماوس (كمبيوتر)
            if (e.touches) {
                // حدث لمس
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            } else {
                // حدث ماوس
                mouseX = e.clientX;
                mouseY = e.clientY;
            }

            // الحصول على موقع ومركز الوجه على الشاشة
            const rect = face.getBoundingClientRect();
            const faceCenterX = rect.left + rect.width / 2;
            const faceCenterY = rect.top + rect.height / 2;

            // حساب المسافة بين مركز الوجه ومكان المؤشر
            const deltaX = mouseX - faceCenterX;
            const deltaY = mouseY - faceCenterY;

            // تحريك كل بؤبؤ
            pupils.forEach(pupil => {
                // تحديد أقصى مسافة يمكن للبؤبؤ التحرك فيها داخل العين (مثلاً 3 وحدات SVG)
                const maxOffset = 3;

                // حساب الإزاحة الجديدة (offset) بناءً على اتجاه الفأرة
                // نستخدم Math.atan2 لحساب الزاوية، و Math.min/max لضمان بقاء البؤبؤ داخل العين
                const angle = Math.atan2(deltaY, deltaX);
                const offsetX = Math.cos(angle) * maxOffset;
                const offsetY = Math.sin(angle) * maxOffset;

                // تطبيق الإزاحة باستخدام CSS Transform
                // نستخدم `translate` لتحريك البؤبؤ من موقعه الأصلي
                pupil.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            });
        }

        // إضافة مستمعي الأحداث:
        // 1. حركة الماوس على الكمبيوتر
        window.addEventListener('mousemove', moveEyes);

        // 2. اللمس على الموبايل
        window.addEventListener('touchstart', moveEyes);
        window.addEventListener('touchmove', moveEyes); // لتحريك العينين أثناء سحب الإصبع

        // منع السلوك الافتراضي للموبايل (مثل التمرير) عند لمس الوجه
        window.addEventListener('touchmove', function(e) {
            if (e.target.closest('#face')) {
                e.preventDefault();
            }
        }, { passive: false });

    </script>
</body>
</html>
