<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETO PROGRAM | Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.5);
            --bg-dark: #020202;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition-speed: 0.5s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(2, 2, 2, 0.85), rgba(2, 2, 2, 0.95)),
                url('https://img.freepik.com/free-vector/digital-technology-background-with-abstract-geometric-shapes_1017-26801.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Stylish Header --- */
        .top-banner {
            height: 120px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-img { height: 60px; filter: drop-shadow(0 0 8px var(--gold-glow)); }
        .mr-ezz-img { height: 85px; border-radius: 12px; border: 2px solid var(--primary-gold); box-shadow: 0 0 20px var(--gold-glow); }

        /* --- Special Animated Title --- */
        .title-container {
            text-align: center;
            flex-grow: 1;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(to bottom, #fff 20%, var(--primary-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--gold-glow));
            animation: titlePulse 3s infinite ease-in-out;
        }

        @keyframes titlePulse {
            0%, 100% { opacity: 0.9; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); filter: drop-shadow(0 0 20px var(--primary-gold)); }
        }

        /* --- Levels Grid --- */
        .levels-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 50px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- Level Card & Drawer --- */
        .level-block {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            transition: all var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .level-block:hover {
            border-color: var(--primary-gold);
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .level-card {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .level-info .level-label {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--primary-gold);
            font-weight: 700;
            text-transform: uppercase;
        }

        .level-info .level-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 1.1;
        }

        .arrow-icon {
            font-size: 1.2rem;
            transition: transform 0.4s ease;
            color: var(--primary-gold);
        }

        .level-block.active .arrow-icon { transform: rotate(180deg); }

        /* --- Lectures Drawer (The Drawer) --- */
        .lectures-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.02);
        }

        .level-block.active .lectures-drawer {
            max-height: 400px;
            border-top: 1px solid var(--glass-border);
            padding: 20px;
        }

        .lectures-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .lecture-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .lecture-item:hover {
            background: var(--primary-gold);
            color: #000;
            transform: scale(1.05);
            font-weight: 700;
        }

        .lecture-item span { font-size: 0.6rem; display: block; opacity: 0.7; margin-bottom: 2px; }
        .lecture-item b { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .top-banner { height: 90px; }
            .main-title { font-size: 1.4rem; letter-spacing: 3px; }
            .mr-ezz-img { height: 60px; }
            .logo-img { height: 40px; }
            .lectures-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <header class="top-banner">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="VETO" class="logo-img">
        <div class="title-container">
            <h1 class="main-title">VETO PROGRAM</h1>
        </div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz" class="mr-ezz-img">
    </header>

    <main class="levels-container" id="mainContainer">
        </main>

    <script>
        const container = document.getElementById('mainContainer');
        const levelsCount = 12;
        const sessionsPerLevel = 4;

        for (let i = 1; i <= levelsCount; i++) {
            const block = document.createElement('div');
            block.className = 'level-block';
            block.id = `level-${i}`;

            let sessionsHTML = '';
            for (let s = 1; s <= sessionsPerLevel; s++) {
                sessionsHTML += `
                    <div class="lecture-item" onclick="event.stopPropagation(); navigate('${i}-${s}')">
                        <span>SESSION</span>
                        <b>0${s}</b>
                    </div>
                `;
            }

            block.innerHTML = `
                <div class="level-card" onclick="toggleDrawer(${i})">
                    <div class="level-info">
                        <span class="level-label">Access Point</span>
                        <div class="level-number">LEVEL ${i < 10 ? '0' + i : i}</div>
                    </div>
                    <div class="arrow-icon">▼</div>
                </div>
                <div class="lectures-drawer">
                    <div class="lectures-grid">
                        ${sessionsHTML}
                    </div>
                </div>
            `;
            container.appendChild(block);
        }

        function toggleDrawer(id) {
            const allBlocks = document.querySelectorAll('.level-block');
            const target = document.getElementById(`level-${id}`);
            
            allBlocks.forEach(b => {
                if (b.id === `level-${id}`) {
                    b.classList.toggle('active');
                } else {
                    b.classList.remove('active');
                }
            });
        }

        function navigate(sid) {
            window.location.href = `vetoofif.html?session=${sid}`;
        }
    </script>
</body>
</html>
