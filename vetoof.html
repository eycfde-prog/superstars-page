<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Ezz .Y. Ali - Learning Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --primary-red: #e74c3c;
            --white: #ffffff;
            --sub-btn-size: 40px;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            color: var(--white);
            display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%; background: linear-gradient(to bottom, #1a1a1a, #000000);
            padding: 15px 0; border-bottom: 2px solid var(--primary-red);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .logo { width: 70px; border-radius: 50%; }
        .profile-img { width: 70px; border-radius: 50%; border: 2px solid var(--white); }
        .teacher-name { font-size: 22px; font-weight: bold; }

        .tokens-portal-btn {
            margin: 20px 0; background-color: var(--primary-red);
            color: white; padding: 10px 35px; border-radius: 25px;
            font-weight: bold; cursor: pointer; transition: 0.3s; border: none; z-index: 1001;
        }

        #main-wrapper {
            position: relative; width: 100%; flex-grow: 1;
            display: flex; justify-content: center; padding: 20px 0;
        }

        /* Portal View Overlay */
        #portal-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: none; z-index: 100;
            padding: 20px; box-sizing: border-box;
            text-align: center;
        }

        /* Data Cards Style */
        .data-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; width: 95%; margin: auto;
        }

        .data-card {
            background: #1e1e1e; border: 1px solid var(--primary-red);
            height: 100px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; position: relative;
        }

        .data-card input {
            width: 90%; height: 80%; background: transparent; border: none;
            color: var(--primary-red); text-align: center; font-size: 22px;
            font-weight: bold; outline: none; z-index: 2;
        }

        .data-card label {
            position: absolute; color: #888; font-size: 14px;
            transition: 0.3s; pointer-events: none;
        }

        .data-card input:not(:placeholder-shown) + label { display: none; }

        /* Levels Grid */
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 60px; width: 95%; max-width: 1400px; justify-items: center;
        }

        .level-wrapper { position: relative; width: 120px; height: 120px; }

        .main-circle {
            width: 100%; height: 100%; background-color: var(--primary-red);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-weight: bold; border: 4px solid var(--white);
            cursor: pointer; position: relative; z-index: 5;
        }

        .sub-circle {
            position: absolute; width: var(--sub-btn-size); height: var(--sub-btn-size);
            background-color: var(--white); color: var(--primary-red);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; font-size: 14px; font-weight: bold;
            opacity: 0; transform: scale(0); transition: 0.4s; z-index: 4;
            cursor: pointer;
        }

        .level-wrapper.active .sub-circle { opacity: 1; transform: scale(1); }
        .level-wrapper.active .s1 { top: -45px; left: 35px; }
        .level-wrapper.active .s2 { bottom: -45px; left: 35px; }
        .level-wrapper.active .s3 { left: -45px; top: 35px; }
        .level-wrapper.active .s4 { right: -45px; top: 35px; }

        .session-content { font-size: 24px; color: var(--primary-red); margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" class="logo">
        <div class="teacher-name">Mr. Ezz .Y. Ali</div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/MrEzz.png" class="profile-img">
    </header>

    <button id="toggleBtn" class="tokens-portal-btn" onclick="openTokensView()">Tokens Portal</button>

    <div id="main-wrapper">
        <div id="portal-container">
            <div id="portal-content"></div>
        </div>
        
        <div class="grid-container" id="levelsGrid">
            <div class="level-wrapper" id="level-1-wrapper">
                <div class="main-circle" onclick="toggleSubCircles(this)">Level 1</div>
                <div class="sub-circle s1" onclick="openSessionView(1, 1)">1</div>
                <div class="sub-circle s2" onclick="openSessionView(1, 2)">2</div>
                <div class="sub-circle s3" onclick="openSessionView(1, 3)">3</div>
                <div class="sub-circle s4" onclick="openSessionView(1, 4)">4</div>
            </div>
        </div>
    </div>

    <script>
        const portalContainer = document.getElementById('portal-container');
        const portalContent = document.getElementById('portal-content');
        const toggleBtn = document.getElementById('toggleBtn');
        const categories = ["Attendence", "ICA", "Reading", "Tongue Twister", "One Shot", "Games", "Squeezer", "DMT", "Wish", "Project", "Graduation Project", "Extra Bonus"];

        // Toggle Orbit
        function toggleSubCircles(element) {
            const wrapper = element.parentElement;
            document.querySelectorAll('.level-wrapper').forEach(w => w !== wrapper && w.classList.remove('active'));
            wrapper.classList.toggle('active');
            event.stopPropagation();
        }

        // View 1: Tokens Portal (Attendance, ICA, etc.)
        function openTokensView() {
            if (portalContainer.style.display === 'block') {
                closePortal();
            } else {
                let html = '<div class="data-grid">';
                categories.forEach(cat => {
                    html += `
                        <div class="data-card">
                            <input type="text" placeholder=" ">
                            <label>${cat}</label>
                        </div>`;
                });
                html += '</div>';
                portalContent.innerHTML = html;
                portalContainer.style.display = 'block';
                toggleBtn.innerText = "Levels Portal";
            }
        }

        // View 2: Session Content (When clicking 1, 2, 3, or 4)
        function openSessionView(level, session) {
            portalContent.innerHTML = `
                <div class="session-content">
                    <h2>Level ${level} - Session ${session}</h2>
                    <p>Welcome to the content of this session!</p>
                    <div style="color:white; font-size: 16px;">Here you can add videos, links or tasks.</div>
                </div>
            `;
            portalContainer.style.display = 'block';
            toggleBtn.innerText = "Levels Portal";
        }

        function closePortal() {
            portalContainer.style.display = 'none';
            toggleBtn.innerText = "Tokens Portal";
        }

        // Generate rest of levels (2-12) for visual symmetry
        const grid = document.getElementById('levelsGrid');
        for (let i = 2; i <= 12; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'level-wrapper';
            wrapper.innerHTML = `
                <div class="main-circle" onclick="toggleSubCircles(this)">Level ${i}</div>
                <div class="sub-circle s1" onclick="openSessionView(${i}, 1)">1</div>
                <div class="sub-circle s2" onclick="openSessionView(${i}, 2)">2</div>
                <div class="sub-circle s3" onclick="openSessionView(${i}, 3)">3</div>
                <div class="sub-circle s4" onclick="openSessionView(${i}, 4)">4</div>
            `;
            grid.appendChild(wrapper);
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
        });
    </script>
</body>
</html>
