<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VETO PROGRAM | Session Content</title>
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --banner-height: 140px;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* منع التحديد واللمس العشوائي */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            touch-action: none; /* تم الضبط للتحكم يدويًا في التاتش */
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: var(--font-main);
            min-height: 100vh;
            overflow: hidden;
        }

        /* الوضع العرضي للموبايل عند فتح البورد */
        @media screen and (max-width: 900px) and (orientation: portrait) {
            #note-pad.open-mobile {
                transform: rotate(90deg);
                transform-origin: bottom left;
                position: absolute;
                top: -100vw;
                left: 0;
                height: 100vw;
                width: 100vh;
            }
        }

        /* Banner */
        .top-banner {
            height: var(--banner-height);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 4px solid var(--primary-gold);
        }

        .back-btn {
            background: var(--primary-gold);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .logo-img { height: 70px; }
        .mr-ezz-img { height: 100px; border-radius: 12px; border: 2px solid var(--primary-gold); }
        .session-info h1 { font-size: 2.5rem; color: var(--primary-gold); letter-spacing: 3px; }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            padding: 40px;
            overflow-y: auto;
            height: calc(100vh - var(--banner-height));
            touch-action: pan-y; /* السماح بالسكرول الرأسي هنا فقط */
        }

        .content-card {
            background: var(--card-bg);
            border: 2px solid rgba(197, 160, 89, 0.15);
            padding: 50px 20px;
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .content-card h2 { font-size: 2rem; }
        .content-card:hover { border-color: var(--primary-gold); transform: translateY(-10px); }

        /* Quick Board */
        #note-pad {
            position: fixed; inset: 0; background: #000; z-index: 9000; 
            display: none; flex-direction: column; padding: 20px;
        }

        #note-text { 
            width: 100%; height: 80%; 
            background: #111; border: 3px solid var(--primary-gold);
            color: #fff; font-size: 4rem; padding: 20px; border-radius: 20px;
            outline: none; text-align: center; touch-action: auto;
        }

        /* Laser */
        #laser-pointer {
            position: fixed; width: 30px; height: 30px; background: rgba(255, 0, 0, 0.8); 
            border-radius: 50%; pointer-events: none; z-index: 10000; display: none;
            box-shadow: 0 0 20px red, 0 0 40px red;
        }
        #drawing-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }

        /* Tools */
        .toolbox-wrapper { position: fixed; bottom: 30px; right: 30px; z-index: 9500; display: flex; flex-direction: column-reverse; gap: 15px; }
        .tool-btn { 
            width: 70px; height: 70px; border-radius: 50%; background: var(--primary-gold); border: none; 
            cursor: pointer; font-size: 1.8rem; display: none; align-items: center; justify-content: center;
        }
        .toolbox-wrapper.open .tool-btn { display: flex; }
        .tool-btn.active { background: #ff4757; }

        #activity-stage { position: fixed; inset: 0; background:#000; z-index: 8000; display: none; }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <header class="top-banner">
        <button class="back-btn" onclick="window.location.href='vetoof.html'">⬅ BACK</button>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" class="logo-img">
        <div class="session-info"><h1 id="display-title">VETO SYSTEM</h1></div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" class="mr-ezz-img">
    </header>

    <main class="content-grid" id="content-container"></main>

    <div id="activity-stage">
        <button onclick="closeStage()" style="position:absolute; top:20px; left:20px; z-index:8500; background:#ff4757; color:white; border:none; padding:10px 20px; border-radius:10px; font-weight:bold;">EXIT</button>
        <div id="stage-content" style="width:100%; height:100%;"></div>
    </div>

    <div id="laser-pointer"></div>
    <canvas id="drawing-canvas"></canvas>

    <div id="note-pad">
        <button onclick="toggleNotePad()" style="align-self: flex-end; background:#ff4757; color:white; border:none; padding:10px 30px; border-radius:10px; margin-bottom:10px;">CLOSE</button>
        <textarea id="note-text" placeholder="Explain here..."></textarea>
    </div>

    <div class="toolbox-wrapper" id="toolBox">
        <button class="tool-btn" style="display:flex; background:#222; border:2px solid var(--primary-gold);" onclick="toggleToolBox()">🛠️</button>
        <button class="tool-btn" id="laserBtn" onclick="toggleLaser()">🔦</button>
        <button class="tool-btn" onclick="toggleNotePad()">📝</button>
        <button class="tool-btn" onclick="location.reload()">🔄</button>
    </div>

    <script src="data/levels.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const currentSessionId = urlParams.get('session');
        let laserActive = false;
        let isDrawing = false;
        const laser = document.getElementById('laser-pointer');
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resizeCanvas; resizeCanvas();

        function initSession() {
            if (!currentSessionId || !sessionData[currentSessionId]) return;
            document.getElementById('display-title').innerText = `L-${currentSessionId}`;
            const container = document.getElementById('content-container');
            sessionData[currentSessionId].forEach(item => {
                const card = document.createElement('div');
                card.className = 'content-card';
                card.onclick = () => openActivity(item);
                card.innerHTML = `<h2>${item}</h2>`;
                container.appendChild(card);
            });
        }

        function openActivity(activityName) {
            const [lvl, sess] = currentSessionId.split('-');
            const prefix = activityName.split(' ')[0].substring(0, 3);
            const filePath = `data/L-${lvl}-S-${sess}-${prefix}.js`;
            document.getElementById('activity-stage').style.display = 'block';
            const script = document.createElement('script');
            script.src = filePath;
            document.head.appendChild(script);
        }

        function closeStage() {
            document.getElementById('activity-stage').style.display = 'none';
            document.getElementById('stage-content').innerHTML = "";
        }

        function toggleNotePad() {
            const pad = document.getElementById('note-pad');
            const isOpen = pad.style.display === 'flex';
            pad.style.display = isOpen ? 'none' : 'flex';
            pad.classList.toggle('open-mobile');
        }

        function toggleToolBox() { document.getElementById('toolBox').classList.toggle('open'); }

        function toggleLaser() {
            laserActive = !laserActive;
            document.getElementById('laserBtn').classList.toggle('active');
            laser.style.display = 'none';
        }

        // --- نظام التحكم بالتاتش (Laser & Navigation) ---
        let touchStartX = 0;

        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            if (laserActive) {
                isDrawing = true;
                const touch = e.touches[0];
                laser.style.display = 'block';
                laser.style.left = touch.clientX - 15 + 'px';
                laser.style.top = touch.clientY - 15 + 'px';
                ctx.beginPath();
                ctx.moveTo(touch.clientX, touch.clientY);
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (laserActive && isDrawing) {
                const touch = e.touches[0];
                laser.style.left = touch.clientX - 15 + 'px';
                laser.style.top = touch.clientY - 15 + 'px';
                ctx.lineTo(touch.clientX, touch.clientY);
                ctx.strokeStyle = 'red';
                ctx.lineWidth = 5;
                ctx.stroke();
            }
        });

        window.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            
            // الليزر يختفي فوراً عند ترك الشاشة
            if (laserActive) {
                isDrawing = false;
                laser.style.display = 'none';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else if (document.getElementById('activity-stage').style.display === 'block') {
                // نظام الملاحة (يمين/شمال) في وضع المحتوى
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    const key = diff > 0 ? 'ArrowRight' : 'ArrowLeft';
                    document.dispatchEvent(new KeyboardEvent('keydown', { key: key }));
                }
            }
        });

        initSession();
    </script>
</body>
</html>
