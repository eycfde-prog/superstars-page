<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETO PROGRAM | Robotic Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #d4af37; 
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg-dark: #080808;
            --tech-blue: #00f2ff;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(212, 175, 55, 0.2);
            --transition-speed: 0.4s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 80%),
                linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); /* نمط ألياف الكربون */
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Stylish Header --- */
        .top-banner {
            height: 100px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--primary-gold);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .logo-img { height: 50px; filter: drop-shadow(0 0 10px var(--gold-glow)); }
        .mr-ezz-img { 
            height: 75px; 
            border-radius: 15% 0 15% 0; /* شكل روبوتي للصور */
            border: 2px solid var(--primary-gold); 
            box-shadow: 0 0 15px var(--gold-glow);
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #fff, var(--primary-gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* --- Levels Grid --- */
        .levels-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            padding: 50px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- Level Block (The Robotic Shell) --- */
        .level-block {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            position: relative;
            /* شكل مشطوف للحواف */
            clip-path: polygon(0 0, 95% 0, 100% 15%, 100% 100%, 5% 100%, 0 85%);
            transition: all var(--transition-speed);
        }

        .level-block::before {
            content: "ID-0"+attr(id);
            position: absolute;
            top: 5px;
            right: 20px;
            font-size: 10px;
            color: var(--primary-gold);
            opacity: 0.5;
            font-family: 'Orbitron';
        }

        .level-block:hover {
            border-color: var(--primary-gold);
            background: rgba(212, 175, 55, 0.05);
            transform: translateY(-5px);
        }

        .level-card {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .level-info .level-label {
            font-size: 0.6rem;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .level-info .level-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 0 0 10px var(--gold-glow);
        }

        /* --- Lectures Drawer --- */
        .lectures-drawer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            background: rgba(255, 255, 255, 0.02);
        }

        .level-block.active { border-color: var(--primary-gold); border-width: 2px; }
        .level-block.active .lectures-drawer {
            max-height: 400px;
            padding: 20px;
            border-top: 1px dashed var(--primary-gold);
        }

        /* --- Robotic Lecture Buttons --- */
        .lectures-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .lecture-item {
            background: transparent;
            border: 1px solid var(--primary-gold);
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            position: relative;
            /* شكل التروس أو القطع الميكانيكية */
            clip-path: polygon(15% 0%, 100% 0%, 100% 85%, 85% 100%, 0% 100%, 0% 15%);
            transition: 0.3s;
        }

        .lecture-item::after {
            content: '';
            position: absolute;
            bottom: 2px; right: 2px;
            width: 5px; height: 5px;
            background: var(--primary-gold);
        }

        .lecture-item:hover {
            background: var(--primary-gold);
            color: #000;
            box-shadow: 0 0 15px var(--primary-gold);
            transform: scale(1.05);
        }

        .lecture-item span { font-size: 0.6rem; display: block; font-weight: bold; }
        .lecture-item b { font-family: 'Orbitron', sans-serif; font-size: 1rem; }

        .arrow-icon {
            transition: 0.4s;
            color: var(--primary-gold);
            font-family: 'Orbitron';
        }
        .level-block.active .arrow-icon { transform: rotate(180deg); text-shadow: 0 0 10px var(--primary-gold); }

        /* Responsive */
        @media (max-width: 768px) {
            .lectures-grid { grid-template-columns: repeat(2, 1fr); }
            .main-title { font-size: 1.1rem; letter-spacing: 2px; }
            .levels-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <header class="top-banner">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/logo.png" alt="VETO" class="logo-img">
        <div class="title-container">
            <h1 class="main-title">VETO SYSTEM v2.0</h1>
        </div>
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/main/MrEzz.png" alt="Mr Ezz" class="mr-ezz-img">
    </header>

    <main class="levels-container" id="mainContainer">
        </main>

    <script>
        const container = document.getElementById('mainContainer');
        const levelsCount = 12;
        const sessionsPerLevel = 4;

        function initApp() {
            for (let i = 1; i <= levelsCount; i++) {
                const block = document.createElement('div');
                block.className = 'level-block';
                block.id = `level-${i}`;

                let sessionsHTML = '';
                for (let s = 1; s <= sessionsPerLevel; s++) {
                    sessionsHTML += `
                        <div class="lecture-item" onclick="event.stopPropagation(); navigate('${i}-${s}')">
                            <span>UNIT-MOD</span>
                            <b>${s < 10 ? '0' + s : s}</b>
                        </div>
                    `;
                }

                block.innerHTML = `
                    <div class="level-card" onclick="toggleDrawer(${i})">
                        <div class="level-info">
                            <span class="level-label">SYSTEM SECTOR</span>
                            <div class="level-number">LEVEL ${i < 10 ? '0' + i : i}</div>
                        </div>
                        <div class="arrow-icon">▼</div>
                    </div>
                    <div class="lectures-drawer">
                        <div class="lectures-grid">
                            ${sessionsHTML}
                        </div>
                    </div>
                `;
                container.appendChild(block);
            }
        }

        function toggleDrawer(id) {
            const allBlocks = document.querySelectorAll('.level-block');
            const target = document.getElementById(`level-${id}`);
            const isActive = target.classList.contains('active');
            
            allBlocks.forEach(b => b.classList.remove('active'));
            
            if (!isActive) {
                target.classList.add('active');
                setTimeout(() => {
                    target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 300);
            }
        }

        function navigate(sid) {
            const items = document.querySelectorAll('.lecture-item');
            items.forEach(item => item.style.pointerEvents = 'none');
            // التأكد من توجيه المستخدم بنفس المنطق الخاص بك
            window.location.href = `vetoofif.html?session=${sid}`;
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
