<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Ezz .Y. Ali - Learning System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* تحسين شكل الكروت (Cards Stylizing) */
        .activity-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.9));
            border: 2px solid rgba(0, 162, 255, 0.3);
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .activity-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--primary-blue), var(--veto-gold));
            opacity: 0; transition: 0.3s;
        }

        .activity-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--veto-gold);
            box-shadow: 0 20px 50px rgba(0, 162, 255, 0.2);
            background: rgba(30, 41, 59, 0.95);
        }

        .activity-card:hover::before { opacity: 1; }

        /* تأثير النص داخل الكرت */
        .activity-card-text {
            font-size: 2.8rem; /* ضخم جداً للرؤية من بعيد */
            font-weight: 900;
            text-align: center;
            background: linear-gradient(to bottom, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            drop-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header id="main-header">
        <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" class="logo sun-halo">
        
        <div class="header-left" style="display: flex; flex-direction: row; justify-content: flex-start; flex-grow: 1; margin-left: 20px; align-items: center; gap: 20px;">

    <button class="main-btn" id="portalActionBtn" onclick="toggleTokens()">Tokens Portal</button>

    <div class="levels-container" id="levelsGrid"></div>

    <div id="sessionOverlay" class="overlay">
        <header style="background: rgba(15, 23, 42, 0.9); border-bottom: 3px solid var(--veto-gold); width: 100%; display: flex; align-items: center; padding: 10px 20px; box-sizing: border-box;">
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" class="logo">
            <div class="teacher-info" style="flex-grow: 1; margin-left: 20px;">
                <div class="teacher-name">Mr. Ezz .Y. Ali | <span id="sessionTitle" style="color: var(--text-light); font-size: 1.5rem;"></span></div>
            </div>
            <button class="nav-link-btn" onclick="closeAll()" style="margin-left: 20px; background: var(--veto-gold); color: #000; padding: 5px 20px; border-radius: 10px; cursor: pointer;">العودة للمستويات ◀</button>
            <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/MrEzz.png" class="profile-img">
        </header>

        <div id="sessionContent" class="activity-grid" style="margin-top: 20px; width: 100%;">
        </div>
    </div>

    <div id="activityOverlay" class="overlay">
        <div class="activity-header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/logo.png" class="logo sun-halo" style="width: 70px; height: 70px;">
                <div style="color: white; font-weight: 900; font-size: 1.5rem; border-left: 2px solid var(--primary-tech-blue); padding-left: 15px;">
                    VETO<br>SYSTEM
                </div>
            </div>

            <div id="activityDetails" style="flex-grow: 1; text-align: center;"></div>

            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="text-align: right;">
                    <div style="color: var(--veto-gold); font-weight: 900; font-size: 1.4rem;">Mr. Ezz .Y. Ali</div>
                    <div style="color: #64748b; font-size: 0.9rem;">Lead Instructor</div>
                </div>
                <img src="https://raw.githubusercontent.com/eycfde-prog/EYCVetoProgram/600916c2888a13d5855b23a1cd18d59c270b542e/MrEzz.png" class="profile-img sun-halo" style="width: 70px; height: 70px;">
            </div>
        </div>
        
        <div id="activityFinalContent"></div>

        <div id="activity-view-footer">
            <span>PRESS [ESC] TO EXIT</span>
            <span style="margin: 0 30px; color: var(--primary-tech-blue);">|</span>
            <span>VETO ARCHITECT 2026 EDITION</span>
        </div>
    </div>

          "10-3": ["Listening 38 Review", "Reading 35 Review", "Reading 36 Review", "Tongue Twister 31 Review", "Tongue Twister 32 Review", "Vocab 19 Test", "Vocab 20 Review", "One Shot 3 Test"],
          "10-4": ["Listening 39 Review", "Reading 36 Review", "Reading 37 Review", "Tongue Twister 32 Review", "Tongue Twister 33 Review", "One Shot 18 Test", "Vocab 20 Test", "DMT 4 Review", "Project 2 Rev"],

          "11-3": ["Listening 42 Review", "Reading 39 Review", "Reading 40 Review", "Tongue Twister 35 Review", "Tongue Twister 36 Review", "Squeezer 6 Review", "Squeezer 6 Rev", "DMT 5 test"],
          "11-4": ["Listening 43 Review", "Reading 40 Review", "Tongue Twister 36 Review", "Squeezer 6 Test", "GP Review", "Squeezer 6 test"],
          "12-1": ["GP Review"],
          "12-2": ["GP Review"],
          "12-3": ["GP Review"],
          "12-4": ["GP Viewing"]
        };

        function goToLevels() { closeAll(); }
        function goToSession(lv, ss) { document.getElementById('activityOverlay').style.display = 'none'; openSession(lv, ss); }

        function openFinalActivity(lv, ss, actName) {
            const detailsHtml = `
                <button class="nav-link-btn" onclick="goToLevels()">L${lv}</button>
                <span class="nav-separator">»</span>
                <button class="nav-link-btn" onclick="goToSession(${lv}, ${ss})">S${ss}</button>
                <span class="nav-separator">»</span>
                <span class="nav-active-act">${actName}</span>
            `;
            document.getElementById('activityDetails').innerHTML = detailsHtml;

            const container = document.getElementById('activityFinalContent');
            container.innerHTML = '<div class="loader"></div><h2 style="font-size:3rem; color:#3498db;">Loading Session...</h2>';
            
            document.getElementById('activityOverlay').style.display = 'block';
            document.body.style.overflow = 'hidden';

            const oldScript = document.getElementById('activity-script');
            if (oldScript) oldScript.remove();

            let cleanName = actName.replace(/\s+/g, ''); 
            let shortName = cleanName.substring(0, 3).charAt(0).toUpperCase() + cleanName.substring(0, 3).slice(1);
            const fileName = `L-${lv}-S-${ss}-${shortName}.js`;
            const filePath = `data/${fileName}`;

            const script = document.createElement('script');
            script.id = 'activity-script';
            script.src = filePath;

            script.onerror = () => {
                container.innerHTML = `
                    <div style="text-align:center; color:#e74c3c;">
                        <h1 style="font-size:5rem;">404</h1>
                        <p style="font-size:2rem;">Missing File: ${fileName}</p>
                    </div>
                `;
            };
            document.body.appendChild(script);
        }

        const grid = document.getElementById('levelsGrid');
        for (let i = 1; i <= 12; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'level-wrapper';
            wrap.innerHTML = `<div class="level-btn">Level ${i}</div>`;
            for (let j = 1; j <= 4; j++) {
                const s = document.createElement('div');
                s.className = 'sub-btn'; s.innerText = j;
                s.onclick = (e) => { e.stopPropagation(); openSession(i, j); };
                wrap.appendChild(s);
            }
            wrap.onclick = (e) => {
                e.stopPropagation();
                const targetLevelIndex = i;
                document.querySelectorAll('.level-wrapper').forEach((w, index) => {
                    const currentLevelNum = index + 1;
                    if (currentLevelNum <= targetLevelIndex) {
                        w.classList.add('active');
                    } else {
                        w.classList.remove('active');
                    }
                });
            };
            grid.appendChild(wrap);
        }

        function openSession(lv, ss) {
            document.getElementById('sessionTitle').innerText = `Level ${lv} - Session ${ss}`;
            const activities = sessionData[`${lv}-${ss}`] || ["قريباً"];
            let html = "";
            activities.forEach(act => {
                html += `
                    <div class="activity-card" onclick="openFinalActivity(${lv}, ${ss}, '${act}')">
                        <div class="activity-card-text">${act}</div>
                    </div>`;
            });
            document.getElementById('sessionContent').innerHTML = html;
            document.getElementById('sessionOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            updateBtn("Levels Portal", () => closeAll());
        }

        function toggleTokens() {
            const categories = ["Attendence", "ICA", "Reading", "Tongue Twister", "One Shot", "Games", "Squeezer", "DMT", "Wish", "Project", "Graduation Project", "Extra Bonus"];
            let html = `<div class="tokens-grid">`;
            categories.forEach(c => {
                html += `<div style="background:#1e1e1e; border:1px solid #3498db; height:120px; border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative;">
                            <input type="text" style="width:100%; background:transparent; border:none; color:white; text-align:center; font-size:1.8rem; outline:none;" placeholder=" ">
                            <label style="position:absolute; color:#555; pointer-events:none; font-size: 1.2rem;">${c}</label>
                         </div>`;
            });
            html += `</div>`;
            document.getElementById('sessionContent').innerHTML = html;
            document.getElementById('sessionOverlay').style.display = 'flex';
            updateBtn("Levels Portal", () => closeAll());
        }

        function updateBtn(text, fn) {
            const btn = document.getElementById('portalActionBtn');
            btn.innerText = text;
            btn.onclick = fn;
        }

        function closeAll() {
            document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
            document.body.style.overflow = 'auto';
            updateBtn("Tokens Portal", () => toggleTokens());
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.level-wrapper').forEach(w => w.classList.remove('active'));
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                closeAll();
            }

            if (e.key === "Enter") {
                const currentActivity = document.getElementById('activityOverlay');
                if (currentActivity.style.display === 'block') {
                    if (typeof window.nextStep === "function") {
                        window.nextStep();
                    }
                }
            }
        });
    </script>
</body>
</html>
