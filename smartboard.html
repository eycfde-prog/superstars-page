<!-- 
  ════════════════════════════════════════════════════════
  VETO PORTAL — نسخ هذا القسم كاملاً ليحل محل:
    1. #portal-overlay div
    2. دالة openPortal / closePortal / resetPortal / buildGradesGrid
    3. دالة fetchStudent / submitGrades
  ════════════════════════════════════════════════════════
-->

<!-- ── CSS: أضف هذا داخل <style> بدلاً من تعريفات #portal-overlay القديمة ── -->
<style id="portal-new-styles">

/* ══ PORTAL FULLSCREEN ══ */
#portal-overlay {
    position: fixed; inset: 0; z-index: 15000;
    display: none; flex-direction: column;
    background: #060810;
    overflow: hidden;
}
#portal-overlay.active { display: flex; }
#portal-overlay::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,212,255,0.012) 3px, rgba(0,212,255,0.012) 4px);
}

/* ── PORTAL HEADER BAR ── */
.portal-topbar {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 60px;
    background: #080a14;
    border-bottom: 1.5px solid var(--gold);
    flex-shrink: 0;
}
.portal-title {
    font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 900;
    letter-spacing: 6px; color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan-glow);
}
.portal-title span { color: var(--gold); }
.portal-close {
    background: transparent; border: 1.5px solid #ff4757; color: #ff4757;
    padding: 7px 16px; border-radius: 6px; cursor: pointer;
    font-family: 'Orbitron', sans-serif; font-size: 0.58rem; letter-spacing: 2px;
    transition: background 0.2s;
}
.portal-close:hover { background: rgba(255,71,87,0.18); }

/* ── PORTAL BODY: two columns ── */
.portal-body {
    position: relative; z-index: 1;
    flex: 1; display: grid;
    grid-template-columns: 340px 1fr;
    overflow: hidden;
}

/* ── LEFT PANEL: search + student card ── */
.portal-left {
    display: flex; flex-direction: column; gap: 0;
    border-right: 1px solid rgba(0,212,255,0.15);
    overflow-y: auto; padding: 22px 20px;
    background: #080b18;
}
.portal-left::-webkit-scrollbar { width: 2px; }
.portal-left::-webkit-scrollbar-thumb { background: var(--gold); }

/* search */
.p-search-label {
    font-family: 'Orbitron', sans-serif; font-size: 0.5rem;
    letter-spacing: 3px; color: var(--cyan); opacity: 0.65; margin-bottom: 7px;
}
.p-search-row { display: flex; gap: 10px; margin-bottom: 14px; }
#portal-code-input {
    flex: 1; background: rgba(0,212,255,0.05);
    border: 1.5px solid rgba(0,212,255,0.25); border-radius: 8px;
    color: var(--cyan); font-family: 'Orbitron', sans-serif;
    font-size: 1.15rem; font-weight: 700; letter-spacing: 4px;
    padding: 11px 14px; outline: none; text-transform: uppercase;
    -webkit-user-select: text; user-select: text;
    transition: border-color 0.2s, box-shadow 0.2s;
}
#portal-code-input:focus { border-color: var(--cyan); box-shadow: 0 0 14px var(--cyan-dim); }
#portal-fetch-btn {
    background: var(--cyan); border: none; color: #000;
    font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700;
    letter-spacing: 2px; padding: 11px 14px; border-radius: 8px; cursor: pointer;
    transition: box-shadow 0.2s;
}
#portal-fetch-btn:hover { box-shadow: 0 0 20px var(--cyan-glow); }

/* status */
#portal-status {
    text-align: center; font-family: 'Orbitron', sans-serif;
    font-size: 0.62rem; letter-spacing: 2px;
    padding: 9px 12px; border-radius: 8px; margin-bottom: 14px; display: none;
}
#portal-status.success { background: rgba(0,255,136,0.08); color: #00ff88; border: 1px solid rgba(0,255,136,0.25); }
#portal-status.error   { background: rgba(255,71,87,0.08);  color: #ff4757; border: 1px solid rgba(255,71,87,0.25); }
#portal-status.loading { background: rgba(0,212,255,0.08);  color: var(--cyan); border: 1px solid rgba(0,212,255,0.25); }

/* ── STUDENT SHOWCASE CARD ── */
#portal-student-card {
    display: none;
    background: linear-gradient(160deg, #0c1128 0%, #070b18 100%);
    border: 1px solid rgba(0,212,255,0.22);
    border-radius: 14px; overflow: hidden; position: relative;
}
#portal-student-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2.5px;
    background: linear-gradient(90deg, var(--cyan), var(--gold), var(--cyan));
}

/* Avatar hero */
.psc-hero {
    display: flex; flex-direction: column; align-items: center;
    padding: 26px 20px 18px; gap: 12px;
    background: linear-gradient(180deg, rgba(0,212,255,0.06) 0%, transparent 100%);
    border-bottom: 1px solid rgba(0,212,255,0.12);
}
#portal-avatar {
    width: 96px; height: 96px; border-radius: 14px;
    border: 2.5px solid var(--gold); object-fit: cover;
    box-shadow: 0 0 30px var(--gold-glow), 0 0 60px rgba(197,160,89,0.12);
}
#portal-name {
    font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700;
    color: #fff; letter-spacing: 2px; text-align: center;
}
.psc-group {
    font-family: 'Orbitron', sans-serif; font-size: 0.48rem; letter-spacing: 3px;
    color: var(--cyan); opacity: 0.6;
}

/* ── BIG STATS: Tokens & Stars front and center ── */
.psc-stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: rgba(0,212,255,0.1);
}
.psc-stat {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 18px 10px; gap: 6px;
    background: #080b18;
}
.psc-stat-label {
    font-family: 'Orbitron', sans-serif; font-size: 0.45rem;
    letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase;
}
.psc-stat-value {
    font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900;
    line-height: 1; color: var(--gold);
    text-shadow: 0 0 20px var(--gold-glow);
}
.psc-stat-value.cyan-val { color: var(--cyan); text-shadow: 0 0 20px var(--cyan-glow); }

/* Stars row */
.psc-stars {
    padding: 14px 16px; display: flex; align-items: center; justify-content: center;
    gap: 4px; flex-wrap: wrap;
    border-top: 1px solid rgba(197,160,89,0.1);
    background: rgba(197,160,89,0.03);
}
.psc-star {
    font-size: 1.3rem; transition: transform 0.2s;
    filter: drop-shadow(0 0 4px var(--gold-glow));
}
.psc-star.empty { opacity: 0.15; filter: none; }

/* Rank chip */
.psc-rank {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 11px; border-top: 1px solid rgba(0,212,255,0.1);
    background: rgba(0,212,255,0.03);
}
.psc-rank-label {
    font-family: 'Orbitron', sans-serif; font-size: 0.5rem;
    letter-spacing: 3px; color: var(--text-dim);
}
.psc-rank-value {
    font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700;
    color: #fff;
}

/* ── RIGHT PANEL: grades ── */
.portal-right {
    display: flex; flex-direction: column;
    overflow-y: auto; padding: 22px 24px;
    gap: 16px;
}
.portal-right::-webkit-scrollbar { width: 2px; }
.portal-right::-webkit-scrollbar-thumb { background: var(--gold); }

.p-grades-title {
    font-family: 'Orbitron', sans-serif; font-size: 0.58rem;
    letter-spacing: 4px; color: var(--gold);
    padding-bottom: 10px; border-bottom: 1px solid rgba(197,160,89,0.18);
    flex-shrink: 0;
}

.grades-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 11px;
}

.grade-cell {
    background: rgba(0,212,255,0.04); border: 1px solid rgba(0,212,255,0.13);
    border-radius: 8px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 7px;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.grade-cell:focus-within { border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan-dim); }
.grade-cell.bonus-cell { border-color: rgba(197,160,89,0.25); background: rgba(197,160,89,0.05); }
.grade-cell.bonus-cell:focus-within { border-color: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }

.grade-label {
    font-family: 'Orbitron', sans-serif; font-size: 0.48rem;
    letter-spacing: 1.5px; color: var(--text-dim); text-transform: uppercase;
}
.grade-label.bonus-lbl { color: var(--gold); }

.grade-input {
    background: transparent; border: none;
    border-bottom: 1.5px solid rgba(0,212,255,0.18);
    color: var(--cyan); font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    width: 100%; outline: none; padding: 3px 0;
    transition: border-color 0.2s; text-align: center;
    -webkit-user-select: text; user-select: text;
}
.grade-input:focus { border-color: var(--cyan); }
.grade-input.bonus-inp { color: var(--gold); border-bottom-color: rgba(197,160,89,0.25); }
.grade-input.bonus-inp:focus { border-color: var(--gold); }

/* submit */
#portal-submit-btn {
    width: 100%; margin-top: 6px;
    background: linear-gradient(135deg, #091e12 0%, #051008 100%);
    border: 1.5px solid #00cc70; color: #00ff88;
    font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700;
    letter-spacing: 4px; padding: 18px; border-radius: 10px;
    cursor: pointer; text-transform: uppercase;
    transition: box-shadow 0.2s, transform 0.1s;
    flex-shrink: 0;
}
#portal-submit-btn:hover { box-shadow: 0 0 28px rgba(0,255,136,0.28); transform: translateY(-1px); }
#portal-submit-btn:active { transform: translateY(0); }
#portal-submit-btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }

/* ── MOBILE ── */
@media (max-width: 768px) {
    .portal-body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .portal-left { border-right: none; border-bottom: 1px solid rgba(0,212,255,0.15); padding: 14px; }
    #portal-avatar { width: 72px; height: 72px; }
    .psc-stat-value { font-size: 1.5rem; }
    .portal-topbar { padding: 0 14px; height: 52px; }
}
</style>

<!-- PORTAL HTML — يحل محل div#portal-overlay القديم كاملاً -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="portal-overlay">

    <!-- TOPBAR -->
    <div class="portal-topbar">
        <div class="portal-title">VETO <span>PORTAL</span></div>
        <button class="portal-close" onclick="closePortal()">✖ CLOSE</button>
    </div>

    <!-- BODY -->
    <div class="portal-body">

        <!-- LEFT: search + card -->
        <div class="portal-left">
            <div class="p-search-label">AGENT OFFLINE CODE</div>
            <div class="p-search-row">
                <input type="text" id="portal-code-input" placeholder="V-0000"
                       maxlength="12" autocomplete="off"
                       onkeydown="if(event.key==='Enter')fetchStudent()">
                <button id="portal-fetch-btn" onclick="fetchStudent()">SCAN</button>
            </div>

            <div id="portal-status"></div>

            <div id="portal-student-card">
                <!-- Avatar hero -->
                <div class="psc-hero">
                    <img id="portal-avatar" src="" alt="Agent">
                    <div id="portal-name">—</div>
                    <div class="psc-group" id="portal-group">—</div>
                </div>

                <!-- Big stats -->
                <div class="psc-stats">
                    <div class="psc-stat">
                        <div class="psc-stat-label">TOKENS</div>
                        <div class="psc-stat-value" id="portal-tokens">0</div>
                    </div>
                    <div class="psc-stat">
                        <div class="psc-stat-label">RANK</div>
                        <div class="psc-stat-value cyan-val" id="portal-rank">—</div>
                    </div>
                </div>

                <!-- Stars -->
                <div class="psc-stars" id="portal-stars-row"></div>

                <!-- Rank label -->
                <div class="psc-rank">
                    <div class="psc-rank-label">GLOBAL RANK</div>
                    <div class="psc-rank-value" id="portal-rank-full">—</div>
                </div>
            </div>
        </div>

        <!-- RIGHT: grades form -->
        <div class="portal-right">
            <div class="p-grades-title">MISSION SCORES — UPLOAD GRADES</div>
            <div class="grades-grid" id="portal-grades-grid"></div>
            <button id="portal-submit-btn" onclick="submitGrades()">▶ UPLOAD SCORES TO SYSTEM</button>
        </div>

    </div>
</div>

<!-- JS — استبدل دوال الـ Portal القديمة بهذه               -->
<!-- ════════════════════════════════════════════════════════ -->
<script id="portal-new-js">
const API = 'https://script.google.com/macros/s/AKfycbyD_Dj4nliZoFMibi7WHLaQZj1d2K1_OnGkNng588KVWXW8iwpGVSybhOWK-U4ys9sXTQ/exec';
let currentEmail = null;

// ── open / close / reset ──
function openPortal() {
    document.getElementById('portal-overlay').classList.add('active');
    document.getElementById('toolbox').classList.remove('open');
    buildGradesGrid();
    setTimeout(() => document.getElementById('portal-code-input').focus(), 200);
}
function closePortal() {
    document.getElementById('portal-overlay').classList.remove('active');
    resetPortal();
}
function resetPortal() {
    currentEmail = null;
    document.getElementById('portal-code-input').value = '';
    document.getElementById('portal-student-card').style.display = 'none';
    setStatus('', '');
    document.querySelectorAll('.grade-input').forEach(i => i.value = '');
}

// ── grade grid ──
const PORTAL_ACTIVITIES = [
    { label: 'Attendance',         col: 'Attendence'        },
    { label: 'ICA',                col: 'ICA'               },
    { label: 'Listening',          col: 'Listening'         },
    { label: 'Grammar',            col: 'Grammar'           },
    { label: 'Reading',            col: 'Reading'           },
    { label: 'Tongue Twister',     col: 'Tongue Twister'    },
    { label: 'One Shot',           col: 'One Shot'          },
    { label: 'Games',              col: 'Games'             },
    { label: 'Squeezer',           col: 'Squeezer'          },
    { label: 'DMT',                col: 'DMT'               },
    { label: 'Wish',               col: 'Wish'              },
    { label: 'Project',            col: 'Project'           },
    { label: 'Graduation Project', col: 'Graduation Project'},
];

function buildGradesGrid() {
    const grid = document.getElementById('portal-grades-grid');
    grid.innerHTML = '';
    PORTAL_ACTIVITIES.forEach(act => {
        const cell = document.createElement('div');
        cell.className = 'grade-cell';
        cell.innerHTML = `<div class="grade-label">${act.label.toUpperCase()}</div>
            <input class="grade-input" type="number" min="0" max="100" step="0.5"
                   placeholder="—" data-col="${act.col}">`;
        grid.appendChild(cell);
    });
    // Bonus cell
    const bc = document.createElement('div');
    bc.className = 'grade-cell bonus-cell';
    bc.innerHTML = `<div class="grade-label bonus-lbl">BONUS</div>
        <input class="grade-input bonus-inp" type="number" min="0" max="9999" step="1"
               placeholder="—" data-col="Bonus">`;
    grid.appendChild(bc);
}

// ── status helper ──
function setStatus(msg, type) {
    const el = document.getElementById('portal-status');
    if (!msg) { el.style.display = 'none'; return; }
    el.textContent = msg; el.className = type; el.style.display = 'block';
}

// ── stars renderer ──
function renderStars(n) {
    let h = '';
    for (let i = 0; i < 10; i++)
        h += `<span class="psc-star ${i < n ? '' : 'empty'}">★</span>`;
    return h;
}

// ── fetch student ──
async function fetchStudent() {
    const code = document.getElementById('portal-code-input').value.trim().toUpperCase();
    if (!code) { setStatus('ENTER AGENT CODE', 'error'); return; }
    setStatus('SCANNING AGENT...', 'loading');
    document.getElementById('portal-student-card').style.display = 'none';
    currentEmail = null;
    try {
        const res  = await fetch(`${API}?action=getStudentByOfflineCode&offlineCode=${encodeURIComponent(code)}`);
        const data = await res.json();
        if (data.status !== 'success') { setStatus('AGENT NOT FOUND — CHECK CODE', 'error'); return; }
        const s = data.data;
        currentEmail = s.email;

        document.getElementById('portal-name').textContent  = s.name  || '—';
        document.getElementById('portal-group').textContent = s.group || '—';
        document.getElementById('portal-tokens').textContent = (s.tokens || 0).toLocaleString();
        document.getElementById('portal-rank').textContent   = '#' + (s.globalRank || '—');
        document.getElementById('portal-rank-full').textContent = '#' + (s.globalRank || '—');
        document.getElementById('portal-stars-row').innerHTML = renderStars(s.stars || 0);

        const av = document.getElementById('portal-avatar');
        av.src = s.avatar || ''; av.onerror = () => { av.style.display = 'none'; };

        document.getElementById('portal-student-card').style.display = 'block';
        setStatus('', '');
        document.querySelectorAll('.grade-input').forEach(i => i.value = '');
        const first = document.querySelector('.grade-input');
        if (first) first.focus();
    } catch(err) { setStatus('CONNECTION ERROR', 'error'); }
}

// ── submit grades — FIRE AND RETURN immediately ──
async function submitGrades() {
    if (!currentEmail) { setStatus('SCAN AGENT FIRST', 'error'); return; }

    const inputs = [...document.querySelectorAll('.grade-input')];
    const payload = inputs
        .filter(inp => inp.value.trim() !== '' && !isNaN(parseFloat(inp.value)))
        .map(inp => ({ col: inp.getAttribute('data-col'), grade: parseFloat(inp.value) }));

    if (payload.length === 0) { setStatus('NO SCORES ENTERED', 'error'); return; }

    const btn = document.getElementById('portal-submit-btn');
    btn.disabled = true;
    setStatus('SENDING...', 'loading');

    // بعت كل الطلبات مرة واحدة بدون await على كلها
    // نبعت ونرد للواجهة فوراً بمجرد وصول أول رد من السيرفر
    const emailSnap = currentEmail;
    const promises  = payload.map(({ col, grade }) =>
        fetch(`${API}?action=updateGrades&email=${encodeURIComponent(emailSnap)}&activity=${encodeURIComponent(col)}&grade=${grade}`)
            .then(r => r.json())
            .catch(() => ({ status: 'error' }))
    );

    // نقول "Done" بمجرد ما أول وعد يرجع (سرعة الاستجابة)
    Promise.race(promises).then(() => {
        setStatus('✓ SENT — READY FOR NEXT AGENT', 'success');
        btn.disabled = false;

        // reset بعد ثانيتين تلقائياً
        setTimeout(() => {
            resetPortal();
            document.getElementById('portal-code-input').focus();
        }, 2000);
    });

    // نكمل معالجة الباقي في الخلفية
    Promise.all(promises).catch(() => {});
}
</script>
