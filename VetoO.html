<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYC Veto Program</title>
    <link rel="stylesheet" href="vetoo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="app">
        <div class="overlay" id="overlay">
            <div class="modal">
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
        </div>

        <div class="profile-section">
            <img src="https://via.placeholder.com/150" alt="Profile" class="profile-img" id="userAvatar">
            <div class="profile-info">
                <h1 id="userName">EYC</h1>
                <p>
                    <i class="fas fa-id-card"></i> ID: <span id="userId">VTO-2939</span>
                    <i class="fas fa-coins"></i> TOKENS: <span id="userTokens">10000</span>
                    <i class="fas fa-trophy"></i> RANK: #<span id="userRank">0</span>
                </p>
                <div class="actions">
                    <button class="icon-btn"><i class="fas fa-bell"></i><span class="notification-dot"></span></button>
                    <button class="icon-btn"><i class="fas fa-power-off"></i></button>
                </div>
            </div>
        </div>

        <div class="mission-control">
            <h2><i class="fas fa-rocket"></i> MISSION CONTROL</h2>
            <p>Select your training level to begin</p>
            <div class="levels-stack">
                <i class="fas fa-layer-group"></i>
            </div>
        </div>
    </div>

    <script src="vetoo.js"></script>
</body>
</html>
